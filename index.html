<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CBR Theorie Trainer</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --bg2: #13132a;
      --bg3: #1a1a35;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #2d2d5e;
      --card: #1e1e3f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.5px;
    }
    .xp-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--yellow);
    }

    /* ===== SCREENS ===== */
    .screen { display: none; padding: 16px; min-height: calc(100vh - 57px); }
    .screen.active { display: block; }

    /* ===== HOME ===== */
    .hero {
      text-align: center;
      padding: 32px 0 24px;
    }
    .hero-icon {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #a855f7, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .hero p {
      color: var(--muted);
      font-size: 14px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent2);
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* ===== CATEGORY CARDS ===== */
    .category-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .cat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .cat-card:active { transform: scale(0.98); }
    .cat-card:hover { border-color: var(--accent2); background: var(--bg3); }
    .cat-icon { font-size: 30px; flex-shrink: 0; }
    .cat-info { flex: 1; }
    .cat-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .cat-sub {
      font-size: 12px;
      color: var(--muted);
    }
    .cat-progress {
      width: 100%;
      height: 4px;
      background: var(--bg3);
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }
    .cat-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .cat-arrow {
      color: var(--muted);
      font-size: 18px;
    }

    .exam-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none;
      border-radius: 14px;
      padding: 16px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .exam-btn:active { opacity: 0.85; }

    /* ===== QUIZ SCREEN ===== */
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .back-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
      flex-shrink: 0;
    }
    .quiz-progress-wrap { flex: 1; }
    .quiz-progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg3);
      border-radius: 6px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 6px;
      transition: width 0.4s ease;
    }
    .quiz-counter {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .streak-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--yellow);
      flex-shrink: 0;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .question-category {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent2);
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .option-btn:active { transform: scale(0.99); }
    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      color: var(--muted);
    }
    .option-btn.correct {
      border-color: var(--green);
      background: rgba(34, 197, 94, 0.1);
    }
    .option-btn.correct .option-letter {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }
    .option-btn.wrong {
      border-color: var(--red);
      background: rgba(239, 68, 68, 0.1);
    }
    .option-btn.wrong .option-letter {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }
    .option-btn:disabled { cursor: default; }

    .feedback-card {
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }
    .feedback-card.correct {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }
    .feedback-card.wrong {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }
    .feedback-icon { font-size: 18px; margin-bottom: 4px; }

    .next-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      transition: opacity 0.2s;
    }
    .next-btn:active { opacity: 0.85; }

    /* ===== TIMER ===== */
    .timer-wrap {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--yellow);
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .timer-wrap.exam-mode { display: flex; }

    /* ===== RESULTS ===== */
    .results-hero {
      text-align: center;
      padding: 32px 0 24px;
    }
    .results-icon { font-size: 72px; line-height: 1; margin-bottom: 12px; }
    .results-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .results-title.pass { color: var(--green); }
    .results-title.fail { color: var(--red); }
    .results-sub { color: var(--muted); font-size: 15px; }

    .score-ring-wrap {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }
    .score-ring {
      width: 140px;
      height: 140px;
      position: relative;
    }
    .score-ring svg {
      transform: rotate(-90deg);
    }
    .score-ring-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-pct {
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
    }
    .score-pct-label {
      font-size: 11px;
      color: var(--muted);
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .result-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .result-stat-num {
      font-size: 28px;
      font-weight: 800;
    }
    .result-stat-num.green { color: var(--green); }
    .result-stat-num.red { color: var(--red); }
    .result-stat-num.yellow { color: var(--yellow); }
    .result-stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none;
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-secondary {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in { animation: slideIn 0.25s ease forwards; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .pulse { animation: pulse 0.3s ease; }

    /* ===== XP TOAST ===== */
    .xp-toast {
      position: fixed;
      top: 70px;
      right: 16px;
      background: var(--yellow);
      color: #1a1a00;
      font-weight: 800;
      font-size: 14px;
      border-radius: 20px;
      padding: 6px 14px;
      z-index: 999;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .xp-toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<!-- XP Toast -->
<div class="xp-toast" id="xpToast">+10 XP</div>

<!-- Header -->
<div class="header">
  <div class="header-title">🚗 CBR Trainer</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="timer-wrap" id="timerWrap">⏱ <span id="timerText">25:00</span></div>
    <div class="xp-badge">⚡ <span id="xpDisplay">0</span> XP</div>
  </div>
</div>

<!-- ===== HOME ===== -->
<div class="screen active" id="homeScreen">
  <div class="hero">
    <div class="hero-icon">🏁</div>
    <h1>CBR Theorie Trainer</h1>
    <p>Haal je rijbewijs. Level voor level.</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Gedaan</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statCorrect" style="color:var(--green)">0</div>
      <div class="stat-label">Goed</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statStreak" style="color:var(--yellow)">0</div>
      <div class="stat-label">Streak 🔥</div>
    </div>
  </div>

  <div class="section-title">Kies een categorie</div>
  <div class="category-grid" id="categoryGrid"></div>

  <button class="exam-btn" onclick="startExam()">
    🎯 Oefenexamen (65 vragen)
  </button>
</div>

<!-- ===== QUIZ ===== -->
<div class="screen" id="quizScreen">
  <div class="quiz-header">
    <div class="back-btn" onclick="goHome()">←</div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quizProgressFill"></div>
      </div>
      <div class="quiz-counter" id="quizCounter">Vraag 1 van 10</div>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 0</div>
  </div>

  <div class="question-card slide-in" id="questionCard">
    <div class="question-category" id="questionCat"></div>
    <div class="question-text" id="questionText"></div>
  </div>

  <div class="options" id="optionsWrap"></div>

  <div class="feedback-card" id="feedbackCard">
    <div class="feedback-icon" id="feedbackIcon"></div>
    <div id="feedbackText"></div>
  </div>

  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Volgende →</button>
</div>

<!-- ===== RESULTS ===== -->
<div class="screen" id="resultsScreen">
  <div class="results-hero">
    <div class="results-icon" id="resultsIcon"></div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-sub" id="resultsSub"></div>
  </div>

  <div class="score-ring-wrap">
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="60" fill="none" stroke="var(--bg3)" stroke-width="12"/>
        <circle cx="70" cy="70" r="60" fill="none" stroke="url(#ringGrad)" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="377" id="ringCircle"/>
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#22c55e"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="score-ring-text">
        <div class="score-pct" id="scorePct">0%</div>
        <div class="score-pct-label">score</div>
      </div>
    </div>
  </div>

  <div class="results-grid">
    <div class="result-stat">
      <div class="result-stat-num green" id="resCorrect">0</div>
      <div class="result-stat-label">✅ Goed</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num red" id="resWrong">0</div>
      <div class="result-stat-label">❌ Fout</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num yellow" id="resXP">0</div>
      <div class="result-stat-label">⚡ XP verdiend</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num" id="resStreak">0</div>
      <div class="result-stat-label">🔥 Max streak</div>
    </div>
  </div>

  <div class="action-btns">
    <button class="btn-primary" id="retryBtn" onclick="retrySession()">🔄 Opnieuw</button>
    <button class="btn-secondary" onclick="goHome()">🏠 Terug naar menu</button>
  </div>
</div>

<script>
// ============================================================
// VRAGENBANK
// ============================================================
const QUESTIONS = [

  // ===== CATEGORIE: Voorrang =====
  {cat:"Voorrang", q:"Je rijdt op een gelijkwaardige kruising. Van rechts nadert een voertuig. Wat doe je?",
   opts:["Je hebt voorrang, rij door","Je verleent voorrang aan het voertuig van rechts","Je claxonneert en rijdt door","Je stopt en wacht tot de weg vrij is"],
   correct:1, explain:"Op een gelijkwaardige kruising heeft het verkeer van rechts altijd voorrang."},

  {cat:"Voorrang", q:"Je nadert een kruising met een haaientandmarkering op het wegdek. Wat betekent dit?",
   opts:["Je hebt voorrang op dit kruispunt","Je moet voorrang verlenen aan het verkeer op de kruisende weg","Je moet altijd stoppen","Je mag doorrijden als er geen verkeer is"],
   correct:1, explain:"Haaientanden (driehoeken op het wegdek) geven aan dat je voorrang moet verlenen."},

  {cat:"Voorrang", q:"Een ambulance met sirene en blauw zwaailicht nadert van achteren. Wat doe je?",
   opts:["Versnellen om uit de weg te gaan","Stoppen waar je rijdt","Zoveel mogelijk naar rechts gaan en zo nodig stoppen","Naar links gaan om ruimte te maken"],
   correct:2, explain:"Voorrangvoertuigen met sirene en blauw licht moet je zo snel mogelijk doorgang verlenen. Ga naar rechts en stop indien nodig."},

  {cat:"Voorrang", q:"Je wilt linksaf slaan op een kruising. Een tegenligger rijdt rechtdoor. Wie heeft voorrang?",
   opts:["Jij, want je bent eerder bij de kruising","De tegenligger, want rechtdoor gaat voor linksaf","Beiden tegelijk, jullie mogen gelijktijdig rijden","De tegenligger, maar jij mag er tussendoor"],
   correct:1, explain:"Bij linksafslaan moet je altijd het tegemoetkomend verkeer dat rechtdoor rijdt, laten gaan."},

  {cat:"Voorrang", q:"Je rijdt op een erftoegangweg en wilt de hoofdweg oprijden. Wat geldt?",
   opts:["Je hebt voorrang op de hoofdweg","Je moet voorrang verlenen aan het verkeer op de hoofdweg","Je mag doorrijden als er geen auto's zijn","Verkeer op de hoofdweg moet voor jou stoppen"],
   correct:1, explain:"Verkeer dat een erftoegangweg verlaat moet altijd voorrang verlenen aan het verkeer op de aansluitende weg."},

  // ===== CATEGORIE: Snelheid =====
  {cat:"Snelheid", q:"Wat is de maximumsnelheid binnen de bebouwde kom?",
   opts:["30 km/u","50 km/u","70 km/u","80 km/u"],
   correct:1, explain:"Binnen de bebouwde kom geldt standaard een maximumsnelheid van 50 km/u, tenzij anders aangegeven."},

  {cat:"Snelheid", q:"Op een autosnelweg buiten de bebouwde kom, wat is de standaard maximumsnelheid?",
   opts:["100 km/u","120 km/u","130 km/u","150 km/u"],
   correct:2, explain:"Op autosnelwegen geldt een maximumsnelheid van 130 km/u, tenzij borden een lagere snelheid aangeven."},

  {cat:"Snelheid", q:"Op een autoweg (geen autosnelweg) buiten de bebouwde kom, wat is de maximumsnelheid?",
   opts:["80 km/u","100 km/u","120 km/u","130 km/u"],
   correct:1, explain:"Op autowegen (aangeduid met blauw bord met auto) geldt een maximumsnelheid van 100 km/u."},

  {cat:"Snelheid", q:"Je rijdt 's nachts op een weg met slechte verlichting. Hoe pas je je rijgedrag aan?",
   opts:["Je rijdt dezelfde snelheid, je hebt goede koplampen","Je rijdt langzamer zodat je altijd kunt stoppen binnen de afstand die je kunt overzien","Je rijdt sneller om snel door het gevaarlijke stuk te komen","Je zet groot licht aan en rijdt gewoon door"],
   correct:1, explain:"Je moet altijd binnen de afstand kunnen stoppen die je kunt overzien. 's Nachts of bij slecht zicht betekent dit een lagere snelheid."},

  {cat:"Snelheid", q:"Er staat een bord met '30' in een rode cirkel. Wat geldt hier?",
   opts:["Aanbevolen maximumsnelheid van 30 km/u","Verplichte maximumsnelheid van 30 km/u","Minimumsnelheid van 30 km/u","Snelheidsbeperking geldt alleen voor vrachtwagens"],
   correct:1, explain:"Een getal in een rode cirkel is een verplichte maximumsnelheid. Je mag niet sneller dan 30 km/u rijden."},

  // ===== CATEGORIE: Verkeersborden =====
  {cat:"Verkeersborden", q:"Wat betekent een rond blauw bord met een witte pijl die omhoog wijst?",
   opts:["Eenrichtingsverkeer, je mag alleen rechtdoor","Verplichte rijrichting rechtdoor","Verbod om te stoppen","Aanbevolen rijrichting"],
   correct:1, explain:"Een rond blauw bord met een witte pijl is een gebodsbord. De pijl naar boven betekent: je moet rechtdoor rijden."},

  {cat:"Verkeersborden", q:"Wat betekent een driehoekig bord met rode rand en een uitroepteken?",
   opts:["Stop, gevaar voor overstekers","Algemeen gevaar, pas op","Verboden doorgang","Waarschuwing: werk aan de weg"],
   correct:1, explain:"Een driehoek met rode rand is een waarschuwingsbord. Een uitroepteken betekent: algemeen gevaar. Wees voorzichtig."},

  {cat:"Verkeersborden", q:"Wat is het verschil tussen een stopbord en een verleenbord (haaientanden)?",

  { id:"Afstand",       icon:"📏", color:"#10b981" },
  { id:"Alcohol & Drugs",icon:"🚫", color:"#dc2626" },
  { id:"Parkeren",      icon:"🅿️", color:"#6366f1" },
  { id:"Rijbaan",       icon:"🛣️", color:"#0891b2" },
  { id:"Milieu",        icon:"🌿", color:"#16a34a" },
  { id:"Voertuig",      icon:"🔧", color:"#d97706" },
  { id:"Gevaarherkenning",icon:"⚠️", color:"#b45309" },
  { id:"Regels",        icon:"📋", color:"#7c3aed" },
];

// ============================================================
// STATE
// ============================================================
let state = {
  xp: 0, totalAnswered: 0, totalCorrect: 0, streak: 0, maxStreak: 0,
  catProgress: {},
  session: { questions:[], current:0, correct:0, wrong:0, streak:0, maxStreak:0, xpEarned:0, isExam:false, cat:"" }
};

function loadState() {
  try {
    const s = localStorage.getItem('cbrState');
    if (s) state = JSON.parse(s);
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('cbrState', JSON.stringify(state)); } catch(e) {}
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadState();
  renderHome();
}

function renderHome() {
  document.getElementById('xpDisplay').textContent = state.xp;
  document.getElementById('statTotal').textContent = state.totalAnswered;
  document.getElementById('statCorrect').textContent = state.totalCorrect;
  document.getElementById('statStreak').textContent = state.maxStreak;
  document.getElementById('timerWrap').classList.remove('exam-mode');

  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const qs = QUESTIONS.filter(q => q.cat === cat.id);
    if (!qs.length) return;
    const prog = state.catProgress[cat.id] || { done:0, correct:0 };
    const pct = qs.length > 0 ? Math.round((prog.correct / qs.length) * 100) : 0;

    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-info">
        <div class="cat-name" style="color:${cat.color}">${cat.id}</div>
        <div class="cat-sub">${qs.length} vragen • ${pct}% goed</div>
        <div class="cat-progress">
          <div class="cat-progress-fill" style="width:${pct}%; background: linear-gradient(90deg, ${cat.color}88, ${cat.color})"></div>
        </div>
      </div>
      <div class="cat-arrow">›</div>`;
    card.onclick = () => startCategory(cat.id);
    grid.appendChild(card);
  });
}

// ============================================================
// START SESSION
// ============================================================
function startCategory(catId) {
  const qs = shuffle(QUESTIONS.filter(q => q.cat === catId));
  beginSession(qs, false, catId);
}

function startExam() {
  const qs = shuffle([...QUESTIONS]).slice(0, Math.min(65, QUESTIONS.length));
  beginSession(qs, true, "Oefenexamen");
}

function beginSession(qs, isExam, cat) {
  state.session = {
    questions: qs, current: 0, correct: 0, wrong: 0,
    streak: 0, maxStreak: 0, xpEarned: 0, isExam, cat
  };
  showScreen('quizScreen');
  if (isExam) {
    startTimer(25 * 60);
  } else {
    clearInterval(timerInterval);
    document.getElementById('timerWrap').classList.remove('exam-mode');
  }
  showQuestion();
}

// ============================================================
// TIMER
// ============================================================
let timerInterval = null;
let timerSeconds = 0;
function startTimer(sec) {
  timerSeconds = sec;
  document.getElementById('timerWrap').classList.add('exam-mode');
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) { clearInterval(timerInterval); finishSession(); }
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerText').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if (timerSeconds < 120) document.getElementById('timerText').style.color = 'var(--red)';
}

// ============================================================
// QUESTIONS
// ============================================================
function showQuestion() {
  const sess = state.session;
  const q = sess.questions[sess.current];
  const total = sess.questions.length;
  const pct = (sess.current / total) * 100;

  document.getElementById('quizProgressFill').style.width = pct + '%';
  document.getElementById('quizCounter').textContent = `Vraag ${sess.current + 1} van ${total}`;
  document.getElementById('streakBadge').textContent = `🔥 ${sess.streak}`;
  document.getElementById('questionCat').textContent = q.cat;
  document.getElementById('questionText').textContent = q.q;

  const optWrap = document.getElementById('optionsWrap');
  optWrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    optWrap.appendChild(btn);
  });

  const fb = document.getElementById('feedbackCard');
  fb.style.display = 'none';
  fb.className = 'feedback-card';
  document.getElementById('nextBtn').style.display = 'none';

  // Animate in
  const qCard = document.getElementById('questionCard');
  qCard.classList.remove('slide-in');
  void qCard.offsetWidth;
  qCard.classList.add('slide-in');
}

function selectAnswer(idx, btn) {
  const sess = state.session;
  const q = sess.questions[sess.current];
  const isCorrect = idx === q.correct;
  const allBtns = document.querySelectorAll('.option-btn');

  allBtns.forEach(b => b.disabled = true);
  allBtns[q.correct].classList.add('correct');
  if (!isCorrect) btn.classList.add('wrong');

  const fb = document.getElementById('feedbackCard');
  if (isCorrect) {
    fb.className = 'feedback-card correct';
    fb.innerHTML = `<div class="feedback-icon">✅</div><strong>Goed!</strong> ${q.explain}`;
    sess.correct++;
    sess.streak++;
    sess.xpEarned += 10;
    if (sess.streak > sess.maxStreak) sess.maxStreak = sess.streak;
    state.totalCorrect++;
    showXPToast('+10 XP');
    // Update cat progress
    if (!state.catProgress[q.cat]) state.catProgress[q.cat] = { done:0, correct:0 };
    state.catProgress[q.cat].correct++;
  } else {
    fb.className = 'feedback-card wrong';
    fb.innerHTML = `<div class="feedback-icon">❌</div><strong>Fout.</strong> ${q.explain}`;
    sess.wrong++;
    sess.streak = 0;
  }
  if (!state.catProgress[q.cat]) state.catProgress[q.cat] = { done:0, correct:0 };
  state.catProgress[q.cat].done++;
  state.totalAnswered++;
  if (sess.streak > state.maxStreak) state.maxStreak = sess.streak;

  fb.style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('streakBadge').textContent = `🔥 ${sess.streak}`;
  saveState();
}

function nextQuestion() {
  const sess = state.session;
  sess.current++;
  if (sess.current >= sess.questions.length) {
    finishSession();
  } else {
    showQuestion();
  }
}

// ============================================================
// RESULTS
// ============================================================
function finishSession() {
  clearInterval(timerInterval);
  document.getElementById('timerWrap').classList.remove('exam-mode');
  const sess = state.session;
  const total = sess.questions.length;
  const pct = total > 0 ? Math.round((sess.correct / total) * 100) : 0;
  const pass = sess.isExam ? sess.correct >= 50 : pct >= 70;

  // XP
  state.xp += sess.xpEarned;
  if (pass) state.xp += 50;
  document.getElementById('xpDisplay').textContent = state.xp;

  showScreen('resultsScreen');

  // Icons & text
  document.getElementById('resultsIcon').textContent = pass ? (pct === 100 ? '🏆' : '🎉') : '📚';
  const titleEl = document.getElementById('resultsTitle');
  titleEl.textContent = pass ? 'GESLAAGD!' : 'Nog niet klaar';
  titleEl.className = 'results-title ' + (pass ? 'pass' : 'fail');

  if (sess.isExam) {
    document.getElementById('resultsSub').textContent =
      pass ? `${sess.correct}/65 goed — je haalt je CBR-examen!` : `${sess.correct}/65 goed — je hebt minimaal 50 nodig.`;
  } else {
    document.getElementById('resultsSub').textContent =
      `${pct}% goed in categorie ${sess.cat}`;
  }

  // Score ring
  const circumference = 377;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('ringCircle').style.strokeDashoffset = offset;
  }, 100);
  document.getElementById('scorePct').textContent = pct + '%';

  document.getElementById('resCorrect').textContent = sess.correct;
  document.getElementById('resWrong').textContent = sess.wrong;
  document.getElementById('resXP').textContent = sess.xpEarned + (pass ? '+50' : '');
  document.getElementById('resStreak').textContent = sess.maxStreak;

  document.getElementById('retryBtn').textContent =
    sess.isExam ? '🎯 Nieuw examen' : `🔄 ${sess.cat} opnieuw`;

  saveState();
}

function retrySession() {
  if (state.session.isExam) startExam();
  else startCategory(state.session.cat);
}

// ============================================================
// NAVIGATION
// ============================================================
function goHome() {
  clearInterval(timerInterval);
  showScreen('homeScreen');
  renderHome();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function showXPToast(msg) {
  const t = document.getElementById('xpToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1200);
}

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
