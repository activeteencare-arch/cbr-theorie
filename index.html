<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Theorie — rijbewijs B</title>
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0E1217; --surface:#161B22; --surface2:#1C232E; --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13); --gold:#C9A24B; --gold2:#E2C580; --text:#ECEAE4;
  --muted:#969DA8; --dim:#6B7280; --good:#46B48A; --bad:#DD7367;
  --r:14px; --r-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;justify-content:center}
#shell{width:100%;max-width:480px;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;padding:0 18px 110px}
h1,h2,h3,.font-d{font-family:'Outfit',sans-serif;font-weight:500}
.label{font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:500}
.muted{color:var(--muted)}
.dim{color:var(--dim)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* top bar */
.topbar{display:flex;align-items:center;gap:11px;padding:22px 2px 18px;position:sticky;top:0;background:linear-gradient(var(--bg) 78%,transparent);z-index:20}
.topbar .mark{width:34px;height:34px;flex:none}
.topbar .wm{font-family:'Outfit';font-weight:500;font-size:18px;letter-spacing:.5px}
.topbar .wm b{color:var(--gold);font-weight:500}
.topbar .sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.back{margin-left:auto;width:38px;height:38px;border-radius:50%;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;transition:.15s}
.back:hover{border-color:var(--gold);color:var(--gold)}

/* cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);transition:.15s}
.card:hover{border-color:var(--line2)}
.row{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);width:100%;text-align:left;transition:.15s;margin-bottom:10px}
.row:hover{border-color:var(--gold);background:var(--surface2)}
.row .idx{font-family:'Outfit';color:var(--gold);font-size:15px;font-weight:500;width:26px;flex:none}
.row .ttl{flex:1;font-size:14.5px}
.row .chev{color:var(--dim);font-size:17px}
.row .done{color:var(--good);font-size:17px}

/* hero / home */
.hero{display:flex;align-items:center;gap:18px;margin:6px 0 26px;padding:20px;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface)}
.ring{width:74px;height:74px;flex:none}
.hero .h-t{font-family:'Outfit';font-size:20px;font-weight:500;line-height:1.25;margin-bottom:5px}
.hero .h-s{font-size:13px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 16px 16px;text-align:left;transition:.15s;display:flex;flex-direction:column;gap:10px;min-height:118px}
.tile:hover{border-color:var(--gold);transform:translateY(-2px)}
.tile .ic{font-size:24px;color:var(--gold)}
.tile .tl{font-family:'Outfit';font-size:16px;font-weight:500}
.tile .ts{font-size:12px;color:var(--muted);line-height:1.45}
.tile.wide{grid-column:1/3;flex-direction:row;align-items:center;min-height:auto;gap:14px}
.tile.wide .ic{font-size:22px}
.tile.wide .tx{flex:1}

/* section / leerstof */
.sec{padding:18px 17px;margin-bottom:13px}
.sec h3{font-size:16.5px;margin-bottom:11px;display:flex;align-items:center;gap:9px}
.sec h3 .n{color:var(--gold);font-size:13px}
.sec p{font-size:14.5px;line-height:1.72;color:#D7D5CE;margin-bottom:11px}
.kern{border-left:2px solid var(--gold);padding:3px 0 3px 13px;margin:13px 0 6px}
.kern li{list-style:none;font-size:13.5px;line-height:1.6;color:var(--text);margin-bottom:5px;position:relative;padding-left:15px}
.kern li:before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.bron{font-size:11.5px;color:var(--dim);margin-top:9px;font-style:italic}
.tools{display:flex;gap:8px;margin-top:13px}
.tbtn{display:inline-flex;align-items:center;gap:7px;font-family:'Outfit';font-size:12.5px;font-weight:500;color:var(--gold);border:1px solid var(--line2);border-radius:30px;padding:8px 14px;transition:.15s}
.tbtn:hover{border-color:var(--gold);background:rgba(201,162,75,.08)}
.tbtn.loading{opacity:.55;pointer-events:none}
.tbtn i{font-size:15px}

/* hoofdstuk header */
.chap-head{margin:4px 0 18px}
.chap-head .n{font-family:'Outfit';font-size:40px;font-weight:300;color:var(--gold);line-height:1}
.chap-head h2{font-size:21px;margin-top:6px}

/* quiz */
.q-meta{display:flex;justify-content:space-between;align-items:center;margin:6px 0 16px;font-size:12.5px;color:var(--muted)}
.qbar{height:4px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:20px}
.qbar i{display:block;height:100%;background:var(--gold);transition:.3s;width:0}
.q-txt{font-family:'Outfit';font-size:18px;font-weight:400;line-height:1.4;margin-bottom:20px}
.opt{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;margin-bottom:11px;font-size:14.5px;transition:.13s;line-height:1.4}
.opt:hover{border-color:var(--line2)}
.opt.good{border-color:var(--good);background:rgba(70,180,138,.1)}
.opt.bad{border-color:var(--bad);background:rgba(221,115,103,.1)}
.opt.dimmed{opacity:.5}
.fb{border-radius:var(--r);padding:14px 15px;margin:4px 0 16px;font-size:13.5px;line-height:1.6;border:1px solid var(--line)}
.fb.ok{border-color:rgba(70,180,138,.4);background:rgba(70,180,138,.07)}
.fb.no{border-color:rgba(221,115,103,.4);background:rgba(221,115,103,.07)}
.fb .h{font-family:'Outfit';font-weight:500;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.fb.ok .h{color:var(--good)} .fb.no .h{color:var(--bad)}

/* primary button */
.pbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:var(--gold);color:#1A1407;font-family:'Outfit';font-weight:500;font-size:15px;border-radius:var(--r);padding:15px;transition:.15s;margin-top:6px}
.pbtn:hover{background:var(--gold2)}
.pbtn.ghost{background:transparent;color:var(--gold);border:1px solid var(--line2)}
.pbtn.ghost:hover{border-color:var(--gold);background:rgba(201,162,75,.07)}

/* exam result */
.score{text-align:center;padding:26px 0 18px}
.score .big{font-family:'Outfit';font-size:54px;font-weight:300;line-height:1}
.score .big b{font-weight:500}
.score .verdict{font-family:'Outfit';font-size:20px;font-weight:500;margin-top:10px}
.score .verdict.pass{color:var(--good)} .score .verdict.fail{color:var(--bad)}
.score .sub{font-size:13px;color:var(--muted);margin-top:7px}

/* coach */
.coach-card{padding:22px 20px;text-align:center}
.coach-card .av{width:60px;height:60px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--gold);font-size:26px}
.coach-card h2{font-size:19px;margin-bottom:8px}
.coach-card p{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:6px}

.sec-title{display:flex;align-items:baseline;justify-content:space-between;margin:8px 2px 14px}
.sec-title .label{}
.sec-title .cnt{font-size:12px;color:var(--dim)}
.fade{animation:f .25s ease}
@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.center-note{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://yigzycbutzpgelmjzgdn.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ilo8tba3rHsheaXO-cx1Ng_TZ1IhUcv";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let user = null;
let coachConv = null;
let coachTopic = null, coachLeerstof = null, besprokenNu = null;
function coachOver(kop, tekst){ coachTopic = kop; coachLeerstof = tekst||null; go(coach); if(coachConv){ try{coachConv.endSession()}catch(e){} coachConv=null; } toggleCoach(); }
function logBesproken(){ if(besprokenNu){ P.besproken=P.besproken||[]; if(!P.besproken.includes(besprokenNu)){ P.besproken.push(besprokenNu); saveP(); } besprokenNu=null; } }
const LEERSTOF = [{"hoofdstuk": 1, "titel": "Verkeersdeelnemer en mens", "secties": [{"kop": "De rijtaak en jouw verantwoordelijkheid", "tekst": "Autorijden is een taak die je hele aandacht vraagt. Je kijkt, je beslist en je handelt — steeds opnieuw, vaak meerdere keren per seconde. Dat noemen we de rijtaak.\n\nAls bestuurder ben je verantwoordelijk voor je voertuig en voor de veiligheid van anderen. Je moet zo rijden dat je geen gevaar veroorzaakt en het verkeer niet hindert. Ook als een ander een fout maakt, blijf jij verplicht om ongelukken te voorkomen waar dat kan.\n\nDie verantwoordelijkheid betekent ook dat je alleen rijdt als je daartoe in staat bent: uitgerust, nuchter en met je aandacht op de weg. Twijfel je of je veilig kunt rijden, dan rijd je niet.", "kernpunten": ["De rijtaak = steeds kijken, beslissen en handelen", "Je mag geen gevaar veroorzaken of het verkeer hinderen", "Voorkom ongelukken, ook als een ander een fout maakt", "Rijd alleen als je veilig kunt rijden"], "bron": "RVV 1990 art. 5; WVW 1994 art. 5 (gevaar/hinder op de weg); CBR exameneisen rijbewijs B"}, {"kop": "Vermoeidheid en concentratie", "tekst": "Vermoeidheid is gevaarlijk in het verkeer. Als je moe bent reageer je langzamer, let je minder goed op en kun je zelfs heel even wegvallen zonder het te merken. Dat heet een microslaap en kan al een paar seconden duren — genoeg voor een ongeluk.\n\nSignalen van vermoeidheid zijn geeuwen, branderige ogen, je laatste stukken weg niet meer kunnen herinneren of moeite hebben je rijstrook te houden. Negeer die signalen niet.\n\nHet enige dat echt helpt is stoppen en rusten. Even een raampje open of de radio harder zetten werkt niet. Een korte pauze, eventueel met een powernap, maakt je weer alerter. Plan bij lange ritten op tijd pauzes in.", "kernpunten": ["Moe rijden = trager reageren en risico op microslaap", "Let op signalen: geeuwen, branderige ogen, slingeren", "Alleen stoppen en rusten helpt echt", "Plan pauzes bij lange ritten"], "bron": "CBR exameneisen rijbewijs B (mens en rijtaak); SWOV-kennis over vermoeidheid; RVV 1990 art. 5 (geen gevaar veroorzaken)"}, {"kop": "Alcohol achter het stuur", "tekst": "Alcohol en autorijden gaan niet samen. Alcohol maakt je reactietijd langer, je inschatting slechter en je zelfvertrouwen ten onrechte groter. Je merkt zelf vaak niet hoe veel slechter je rijdt.\n\nIn Nederland geldt voor een ervaren bestuurder een grens van 0,5 promille alcohol in het bloed. Voor een beginnende bestuurder is de grens strenger: 0,2 promille. Je bent beginnende bestuurder gedurende de eerste 5 jaar nadat je je rijbewijs hebt gehaald. Haal je je rijbewijs vóór je 18e (zoals via 2toDrive), dan duurt die periode 7 jaar.\n\nVoor jou betekent 0,2 promille in de praktijk: niet drinken als je nog moet rijden. Eén glas kan je er al overheen brengen. Rijden boven de grens is strafbaar volgens artikel 8 van de Wegenverkeerswet en kan leiden tot een boete, een rijontzegging of inname van je rijbewijs.", "kernpunten": ["Ervaren bestuurder: maximaal 0,5 promille", "Beginnende bestuurder: maximaal 0,2 promille (5 jaar, of 7 jaar als je je rijbewijs vóór je 18e haalt, zoals bij 2toDrive)", "0,2 promille betekent in de praktijk: niet drinken en rijden", "Rijden onder invloed is strafbaar (art. 8 WVW)"], "bron": "WVW 1994 art. 8 (strafbaarstelling); grenswaarden 0,5 / 0,2 promille beginnende bestuurder; CBR exameneisen rijbewijs B"}, {"kop": "Drugs en medicijnen", "tekst": "Niet alleen alcohol beïnvloedt je rijgedrag. Drugs maken je rijden onvoorspelbaar en gevaarlijk: ze kunnen je traag, onrustig of overmoedig maken. Rijden onder invloed van drugs is verboden en strafbaar, net als bij alcohol.\n\nOok medicijnen kunnen je rijvaardigheid aantasten. Sommige medicijnen maken je slaperig of verminderen je concentratie. Op de verpakking of bijsluiter staat een waarschuwing, vaak met een gele sticker. Een gele sticker betekent: wees voorzichtig. Een rode of zwarte waarschuwing betekent meestal: niet rijden.\n\nTwijfel je over een medicijn? Vraag het aan je arts of apotheker voordat je gaat rijden.", "kernpunten": ["Rijden onder invloed van drugs is verboden en strafbaar", "Medicijnen kunnen je slaperig en minder alert maken", "Let op de waarschuwingssticker op de verpakking", "Twijfel? Vraag arts of apotheker"], "bron": "WVW 1994 art. 8 (onder invloed van stoffen die de rijvaardigheid verminderen); CBR exameneisen rijbewijs B; medicijnwaarschuwingssystematiek (KNMP/CBG)"}, {"kop": "Afleiding en de telefoon", "tekst": "Afleiding is een belangrijke oorzaak van ongelukken. Alles wat je aandacht van de weg haalt — je telefoon, eten, het instellen van de navigatie of een druk gesprek — vergroot het risico.\n\nHet is verboden om tijdens het rijden een mobiel elektronisch apparaat vast te houden. Denk aan een telefoon, tablet of mediaspeler. Vasthouden is het probleem: ook bij stilstaan voor een rood licht mag je het apparaat niet in je hand hebben.\n\nJe telefoon gebruiken mag wél als die in een houder zit en je hem niet vasthoudt, bijvoorbeeld voor navigatie. Maar ook dan geldt: je aandacht hoort bij de weg. Stel alles in voordat je wegrijdt.", "kernpunten": ["Een mobiel apparaat vasthouden tijdens het rijden is verboden", "Het verbod geldt ook bij stilstaan voor een rood licht", "In een houder gebruiken mag, vasthouden niet", "Stel navigatie en muziek in vóór je wegrijdt"], "bron": "RVV 1990 art. 61a (verbod vasthouden mobiel elektronisch apparaat, geldend sinds 1-7-2019); CBR exameneisen rijbewijs B"}, {"kop": "Rijbewijs en verplichte documenten", "tekst": "Als bestuurder moet je een aantal documenten bij je hebben en kunnen tonen als de politie daarom vraagt: je rijbewijs, het kentekenbewijs (vaak digitaal te controleren) en een geldig identiteitsbewijs.\n\nJe haalt je rijbewijs B in stappen. Via 2toDrive mag je vanaf 16 jaar theorie-examen doen, vanaf 16,5 jaar rijles nemen en vanaf 17 jaar praktijkexamen doen. Haal je je rijbewijs op je 17e, dan mag je tot je 18e alleen rijden met een begeleider naast je. Je kunt maximaal vijf begeleiders aanwijzen; zij staan op een verplichte begeleiderspas die je bij je moet hebben.\n\nRijd nooit zonder geldig rijbewijs. Rijden zonder (geldig) rijbewijs is strafbaar.", "kernpunten": ["Bij je: rijbewijs en geldig identiteitsbewijs", "2toDrive: theorie vanaf 16, rijles vanaf 16,5, praktijk vanaf 17", "Rijbewijs op je 17e: tot 18e rijden met begeleider en begeleiderspas", "Maximaal vijf begeleiders aanwijzen"], "bron": "WVW 1994 art. 107 (rijbewijsplicht) en art. 160 (tonen documenten); CBR informatie 2toDrive en begeleidersregeling rijbewijs B"}]}, {"hoofdstuk": 2, "titel": "De auto rijklaar maken", "secties": [{"kop": "Banden: profiel en spanning", "tekst": "Je banden zijn het enige contact tussen je auto en de weg. Goede banden remmen korter en houden beter grip, zeker bij regen.\n\nDe wettelijke minimale profieldiepte voor de banden van een personenauto is 1,6 mm, gemeten in de hoofdgroeven over de hele omtrek. Onder die grens word je afgekeurd bij de APK en mag je niet rijden. Voor de veiligheid wordt vaak aangeraden om al eerder nieuwe banden te nemen.\n\nNaast het profiel is de bandenspanning belangrijk. Te zachte banden slijten sneller, verbruiken meer brandstof en kunnen klapper. Controleer de spanning regelmatig en houd de waarde aan die de fabrikant adviseert (te vinden in het instructieboekje of op een sticker bij het portier).", "kernpunten": ["Minimale profieldiepte: 1,6 mm (wettelijk)", "Te weinig profiel = afkeur bij de APK", "Goed profiel = kortere remweg en meer grip, vooral bij regen", "Houd de juiste bandenspanning aan volgens de fabrikant"], "bron": "Regeling voertuigen art. 5.2.27 (minimale profieldiepte 1,6 mm hoofdgroeven); RDW; CBR exameneisen rijbewijs B"}, {"kop": "Verlichting: welk licht wanneer", "tekst": "Met de juiste verlichting zie je beter en word je beter gezien. Bij duisternis en bij slecht zicht overdag moet je verlichting voeren.\n\nDimlicht gebruik je in het donker en bij slecht zicht. Groot licht (grootlicht) mag je gebruiken als er geen tegenliggers zijn en je geen voorganger verblindt; dim het op tijd. Het achterlicht en de kentekenplaatverlichting branden altijd mee met dimlicht, grootlicht, stadslicht of mistlicht.\n\nVoor mistlicht gelden aparte regels. Mistlicht vóór mag je gebruiken bij mist, sneeuw of regen die het zicht ernstig beperkt. Mistlicht achter mag je alleen gebruiken als het zicht door mist of sneeuw minder is dan 50 meter — anders verblindt het de mensen achter je. Zet het mistachterlicht weer uit zodra het zicht beter wordt.", "kernpunten": ["Dimlicht bij duisternis en slecht zicht", "Grootlicht alleen zonder tegenligger of voorganger; tijdig dimmen", "Mistlicht vóór bij ernstig beperkt zicht", "Mistlicht achter pas bij zicht onder 50 meter"], "bron": "RVV 1990 art. 32 (verlichting/achterlicht), art. 34 (mistlicht achter bij zicht < 50 m); RVV 1990 art. 35-38 (gebruik licht); CBR exameneisen rijbewijs B"}, {"kop": "Remmen", "tekst": "Een goed remsysteem is letterlijk levensbelangrijk. Je remmen moeten je auto betrouwbaar en recht tot stilstand kunnen brengen.\n\nLet op waarschuwingssignalen: een zacht of wegzakkend rempedaal, piepende of schurende geluiden, of een auto die bij het remmen naar één kant trekt. Merk je zoiets, laat de remmen dan controleren.\n\nVeel auto's hebben ABS (antiblokkeersysteem). Daarmee blijven de wielen tijdens hard remmen draaien, zodat je kunt blijven sturen. Bij een noodstop met ABS trap je het rempedaal stevig in en blijf je sturen; het pedaal kan dan trillen, dat is normaal.", "kernpunten": ["Remmen moeten recht en betrouwbaar stoppen", "Let op piepen, schuren, zacht pedaal of trekken naar één kant", "ABS houdt de wielen draaiend zodat je kunt blijven sturen", "Noodstop met ABS: stevig intrappen en blijven sturen"], "bron": "Regeling voertuigen (eisen reminrichting, hoofdstuk 5); CBR exameneisen rijbewijs B (techniek en bediening)"}, {"kop": "Zicht: ruiten en spiegels", "tekst": "Je moet goed naar buiten kunnen kijken. Houd je ruiten schoon, van binnen en van buiten, en zorg dat de ruitenwissers en de sproeiers werken. Bevroren of beslagen ruiten maak je eerst helemaal vrij voordat je wegrijdt — een klein kijkgaatje is niet genoeg en is niet veilig.\n\nStel je spiegels goed af voordat je wegrijdt: de binnenspiegel en beide buitenspiegels. Daarmee overzie je het verkeer achter en naast je.\n\nElke auto heeft een dode hoek: het gebied naast en schuin achter je dat je niet in je spiegels ziet. Voordat je van rijstrook wisselt of afslaat, kijk je daarom ook even over je schouder.", "kernpunten": ["Houd ruiten schoon en maak ze helemaal vrij van ijs of condens", "Stel binnen- en buitenspiegels goed af vóór vertrek", "Elke auto heeft een dode hoek", "Kijk over je schouder bij wisselen van strook of afslaan"], "bron": "Regeling voertuigen (eisen ruiten, zicht en spiegels); RVV 1990 art. 5 (geen gevaar); CBR exameneisen rijbewijs B"}, {"kop": "APK: de periodieke keuring", "tekst": "De APK (Algemene Periodieke Keuring) controleert of je auto veilig is en niet te veel vervuilt. Zonder een geldige APK mag je niet de weg op.\n\nVoor een personenauto op benzine of elektrisch geldt: de eerste keuring na 4 jaar, daarna twee keer na 2 jaar, en vanaf 8 jaar elk jaar. Voor een auto op diesel of gas is de eerste keuring na 3 jaar en daarna elk jaar.\n\nJij blijft als bestuurder verantwoordelijk dat de auto rijklaar is, ook tussen de keuringen door. Een geldige APK betekent niet automatisch dat alles in orde blijft.", "kernpunten": ["Zonder geldige APK mag je niet rijden", "Benzine/elektrisch: 4-2-2-1 (eerst na 4 jaar, dan 2, 2, jaarlijks)", "Diesel/gas: eerste keuring na 3 jaar, daarna jaarlijks", "Jij blijft verantwoordelijk voor een veilige auto, ook tussendoor"], "bron": "RDW APK-regelgeving (keuringsfrequentie personenauto); WVW 1994 art. 72 (APK-plicht); CBR exameneisen rijbewijs B"}, {"kop": "Lading en beladen", "tekst": "Hoe je je auto belaadt, beïnvloedt hoe hij rijdt. Een zwaar beladen auto remt langer en reageert anders in bochten. Verdeel het gewicht zo laag en gelijkmatig mogelijk.\n\nLading moet goed vastzitten, zodat er niets kan verschuiven, vallen of van de auto af waaien. Losse spullen in de auto kunnen bij hard remmen gevaarlijke projectielen worden.\n\nJe auto heeft een maximaal toegestaan gewicht; daar mag je niet overheen. Ook mag de lading niet zo ver of zo breed uitsteken dat het gevaarlijk wordt. Steekt lading meer dan een meter achter de auto uit, dan moet je die markeren.", "kernpunten": ["Beladen verandert remweg en weggedrag", "Zet lading goed vast; niets mag verschuiven of vallen", "Blijf onder het maximaal toegestane gewicht", "Ver uitstekende lading markeren"], "bron": "RVV 1990 art. 5 (geen gevaar/hinder); Regeling voertuigen / WVW (eisen lading en afmetingen); CBR exameneisen rijbewijs B"}, {"kop": "Gordels, hoofdsteunen en kinderbeveiliging", "tekst": "De veiligheidsgordel is je belangrijkste bescherming bij een botsing. Iedereen in de auto moet de gordel dragen — bestuurder en passagiers, voor- en achterin. Als bestuurder ben je er verantwoordelijk voor dat kinderen goed vastzitten.\n\nKinderen die kleiner zijn dan 1,35 meter moeten in een goedgekeurd kinderbeveiligingssysteem (kinderzitje of stoelverhoger) zitten dat bij hun lengte en gewicht past. Is er geen kinderzitje aanwezig, dan mogen kinderen onder de 1,35 meter niet voorin, maar moeten ze achterin met de gordel.\n\nStel ook je hoofdsteun goed af: de bovenkant ongeveer op ooghoogte. Een goede hoofdsteun beschermt je nek bij een aanrijding van achteren.", "kernpunten": ["Gordel verplicht voor iedereen, voor- en achterin", "Kinderen < 1,35 m: goedgekeurd kinderbeveiligingssysteem", "Bestuurder is verantwoordelijk dat kinderen goed vastzitten", "Hoofdsteun op ooghoogte beschermt je nek"], "bron": "RVV 1990 art. 59 (autogordel, kinderbeveiligingssysteem, grens 1,35 m); CBR exameneisen rijbewijs B"}, {"kop": "Milieu en zuinig rijden", "tekst": "Hoe je rijdt, bepaalt hoeveel brandstof je verbruikt en hoeveel je uitstoot. Zuinig rijden is beter voor het milieu én voor je portemonnee.\n\nEnkele eenvoudige gewoontes helpen: schakel op tijd naar een hogere versnelling en rijd in een zo hoog mogelijke versnelling, houd een rustige snelheid aan en kijk vooruit zodat je rustig kunt remmen en optrekken. Onnodig optrekken en afremmen kost veel brandstof.\n\nLaat de motor niet onnodig stationair draaien en zorg voor de juiste bandenspanning; te zachte banden verbruiken meer. Haal ook onnodig gewicht en bijvoorbeeld een lege dakkoffer van de auto.", "kernpunten": ["Schakel op tijd op en rijd in een hoge versnelling", "Kijk vooruit en rijd gelijkmatig: minder remmen en optrekken", "Juiste bandenspanning verlaagt verbruik", "Geen onnodig gewicht of onnodig stationair draaien"], "bron": "CBR exameneisen rijbewijs B (Het Nieuwe Rijden / milieubewust rijden); RDW; ANWB-rijtips"}]}, {"hoofdstuk": 3, "titel": "Wegen en weggedeelten", "secties": [{"kop": "Rijbaan, rijstrook en weggedeelte", "tekst": "Om de regels goed te begrijpen, moet je de woorden voor de weg kennen. De hele verharde weg waarover het verkeer rijdt heet de rijbaan. Een rijbaan kan zijn verdeeld in rijstroken: de banen die door strepen van elkaar zijn gescheiden en waar een rij voertuigen op past.\n\nEen weg kan uit meerdere weggedeelten bestaan: bijvoorbeeld een rijbaan voor auto's, een fietspad en een trottoir. Elk weggedeelte heeft zijn eigen regels en is voor een bepaalde groep weggebruikers.\n\nWeet je welk weggedeelte je voor je hebt, dan weet je ook wie er hoort te rijden en wat je mag verwachten.", "kernpunten": ["Rijbaan = het deel van de weg waarover gereden wordt", "Rijstrook = een door strepen begrensde baan voor één rij voertuigen", "Een weg kan meerdere weggedeelten hebben (rijbaan, fietspad, trottoir)", "Elk weggedeelte heeft eigen regels en gebruikers"], "bron": "RVV 1990 art. 1 (begripsbepalingen rijbaan, rijstrook, weg); CBR exameneisen rijbewijs B"}, {"kop": "Fietsstrook en fietspad", "tekst": "Een fietsstrook is een deel van de rijbaan dat met strepen is gemarkeerd en waarop fietssymbolen staan. De fietsstrook hoort bij de rijbaan en is bedoeld voor fietsers (en bestuurders van invalidenvoertuigen).\n\nIs de fietsstrook begrensd met een doorgetrokken streep, dan mag je daar als automobilist niet op rijden. Bij een onderbroken streep mag je de fietsstrook wel kruisen of er overheen rijden als dat nodig is, maar je mag er niet op stilstaan of parkeren.\n\nEen fietspad is iets anders: dat ligt vrij van de rijbaan en hoort er niet bij. Een fietspad herken je aan het blauwe bord met een fiets of aan een bord met de tekst 'fietspad'. Daar mogen auto's niet komen.", "kernpunten": ["Fietsstrook hoort bij de rijbaan, met fietssymbolen", "Doorgetrokken streep: niet op rijden; onderbroken streep: niet op stilstaan/parkeren", "Fietspad ligt vrij van de rijbaan; auto's mogen er niet komen", "Fietspad herken je aan het blauwe bord G11/G12 of tekstbord"], "bron": "RVV 1990 art. 1 (fietsstrook), art. 5 en 10 (plaats op de weg); RVV 1990 borden G11/G13 (fietspad); CBR exameneisen rijbewijs B"}, {"kop": "Busstrook en busbaan", "tekst": "Een busstrook is een deel van de rijbaan dat met strepen is gemarkeerd en waarop het woord 'BUS' of 'LIJNBUS' op het wegdek staat. Een busbaan is een hele rijbaan met die markering.\n\nEen busstrook of busbaan is bedoeld voor bussen (lijnbussen) en soms voor trams. Als gewone automobilist mag je er niet op rijden, tenzij een bord een uitzondering toelaat.\n\nOp en naast een busstrook mag je niet stilstaan of parkeren. Naast een busbaan mag stilstaan en parkeren wel, tenzij andere regels of borden dat verbieden.", "kernpunten": ["Busstrook/busbaan herken je aan 'BUS' of 'LIJNBUS' op het wegdek", "Alleen voor bussen (en soms trams); auto's niet, tenzij een bord het toestaat", "Op en naast een busstrook: niet stilstaan of parkeren", "Naast een busbaan mag stilstaan/parkeren meestal wel"], "bron": "RVV 1990 art. 1 (busstrook/busbaan) en art. 73 en 81 (gebruik en stilstaan); CBR exameneisen rijbewijs B"}, {"kop": "Voetpad en trottoir", "tekst": "Een trottoir of voetpad is bedoeld voor voetgangers. Als bestuurder van een auto hoor je daar niet en mag je er niet rijden, stilstaan of parkeren.\n\nSoms moet je het trottoir wel even kruisen, bijvoorbeeld om een inrit of parkeerplaats te bereiken. Dan laat je voetgangers altijd voorgaan; zij hebben daar voorrang.\n\nRijd je een uitrit of inrit op of af, kijk dan goed uit voor voetgangers en fietsers die over het trottoir of fietspad langskomen.", "kernpunten": ["Trottoir en voetpad zijn voor voetgangers", "Auto's mogen er niet rijden, stilstaan of parkeren", "Bij het kruisen van een trottoir: voetgangers gaan voor", "Let extra op bij in- en uitritten"], "bron": "RVV 1990 art. 1 (voetpad/trottoir), art. 4 en 5; CBR exameneisen rijbewijs B"}, {"kop": "Het erf", "tekst": "Een erf is een woon- of verblijfsgebied met een speciaal blauw bord. Op een erf wonen en spelen mensen, en voetgangers mogen de hele breedte van de weg gebruiken.\n\nOp een erf mag je niet harder rijden dan 15 km/u. Je rijdt er dus heel rustig en houd je extra rekening met spelende kinderen, die plotseling de weg op kunnen komen.\n\nParkeren mag op een erf alleen op de plekken die daarvoor zijn aangegeven, vaak met een P of een blauwe streep. Buiten die plekken parkeren is niet toegestaan.", "kernpunten": ["Erf = woon-/verblijfsgebied met blauw erfbord", "Maximumsnelheid op een erf: 15 km/u", "Voetgangers mogen de hele breedte gebruiken; let op spelende kinderen", "Parkeren alleen op aangegeven plekken"], "bron": "RVV 1990 art. 44 (voetgangers op erf) en art. 45 (max. 15 km/u op erf); CBR exameneisen rijbewijs B"}, {"kop": "Autoweg en autosnelweg", "tekst": "De autoweg en de autosnelweg zijn wegen voor doorgaand, snel verkeer. Je herkent ze aan hun eigen borden: de autoweg aan een rood-wit bord met een auto, de autosnelweg aan een blauw bord met een wegbeeld.\n\nDeze wegen zijn alleen toegankelijk voor snelle motorvoertuigen. Op de autoweg moet je voertuig minstens 50 km/u kunnen en mogen rijden; op de autosnelweg minstens 60 km/u. Langzame voertuigen, fietsers, bromfietsen en voetgangers mogen er niet komen.\n\nHet grote verschil: een autosnelweg heeft meestal gescheiden rijbanen en geen gelijkvloerse kruisingen, en is bedoeld voor de hoogste snelheden. De autoweg is iets eenvoudiger en kan wel kruisingen hebben.", "kernpunten": ["Autoweg: rood-wit bord; voertuig moet minstens 50 km/u kunnen/mogen", "Autosnelweg: blauw bord; voertuig moet minstens 60 km/u kunnen/mogen", "Geen fietsers, bromfietsen of voetgangers", "Autosnelweg: gescheiden rijbanen, geen gelijkvloerse kruisingen"], "bron": "RVV 1990 art. 1 (autoweg/autosnelweg) en art. 42 (minimumsnelheid-eis: autosnelweg 60 km/u, autoweg 50 km/u), art. 43 (gedrag op autosnelweg/autoweg); borden G1-G4; CBR exameneisen rijbewijs B"}, {"kop": "In- en uitvoegstrook", "tekst": "Om veilig de snelweg op te komen gebruik je de invoegstrook (oprit). Daar pas je je snelheid aan die van het verkeer op de snelweg, kijk je goed in je spiegels en over je schouder, en voeg je in op een veilig gat. Je past je snelheid aan het overige verkeer aan; de auto's op de snelweg hoeven niet voor jou te remmen.\n\nWil je de snelweg af, dan gebruik je de uitvoegstrook (afrit). Je gaat tijdig naar de uitvoegstrook en remt pas af als je daarop rijdt, niet op de doorgaande rijbaan.\n\nGebruik altijd je richtingaanwijzer, zowel bij invoegen als bij uitvoegen, zodat anderen weten wat je van plan bent.", "kernpunten": ["Invoegstrook: snelheid aanpassen en invoegen op een veilig gat", "Doorgaand verkeer hoeft niet voor jou te remmen", "Uitvoegstrook: tijdig erop gaan en daar pas afremmen", "Altijd richting aangeven bij in- en uitvoegen"], "bron": "RVV 1990 art. 43 (gedrag op autosnelweg/autoweg), art. 5 en art. 17-18 (snelheid/inhalen-context); CBR exameneisen rijbewijs B"}, {"kop": "Vluchtstrook en pechhaven", "tekst": "De vluchtstrook is de strook helemaal rechts op de autosnelweg. Die is bedoeld voor noodgevallen: bij pech of een ongeval. Je mag er normaal niet op rijden of stilstaan.\n\nKrijg je pech, stuur dan zo ver mogelijk naar rechts de vluchtstrook op, zet je alarmlichten aan en stap aan de veilige kant uit (meestal de rechterkant), achter de vangrail. Bel daarna voor hulp.\n\nSommige wegen hebben een pechhaven: een verbrede plek aan de kant van de weg waar je veiliger kunt stoppen bij pech. Gebruik die als die er is.", "kernpunten": ["Vluchtstrook is alleen voor noodgevallen, niet om op te rijden", "Bij pech: naar rechts, alarmlichten aan, veilig uitstappen achter de vangrail", "Bel daarna voor hulp", "Een pechhaven is een veilige stopplek bij pech"], "bron": "RVV 1990 art. 43 lid 3 (verbod gebruik vluchtstrook behalve noodgeval); CBR exameneisen rijbewijs B"}]}, {"hoofdstuk": 4, "titel": "Algemene verkeersregels", "secties": [{"kop": "Plaats op de weg: rechts houden", "tekst": "De basisregel in Nederland is: je houdt zo veel mogelijk rechts. Op een gewone weg rijd je dus aan de rechterkant van de rijbaan.\n\nOp een autosnelweg of autoweg met meerdere rijstroken rijd je op de meest rechtse vrije rijstrook. De stroken links daarvan zijn bedoeld om in te halen; ben je klaar met inhalen, dan ga je weer naar rechts.\n\nDoor rechts te houden houd je het verkeer overzichtelijk en geef je sneller verkeer de ruimte om links in te halen.", "kernpunten": ["Basisregel: zo veel mogelijk rechts houden", "Op meerdere rijstroken: rijd op de meest rechtse vrije strook", "Linkerstroken zijn om in te halen", "Na inhalen weer netjes naar rechts"], "bron": "RVV 1990 art. 3 (rechts houden); CBR exameneisen rijbewijs B"}, {"kop": "In- en uitvoegen", "tekst": "Bij invoegen kom je vanaf een invoegstrook de doorgaande rijbaan op. Je past je snelheid aan, kijkt in je spiegels en over je schouder naar de dode hoek, geeft richting aan en voegt in op een veilig gat. De auto's op de doorgaande baan hebben hier geen voorrang die jij moet afdwingen, maar in de praktijk pas jij je aan hun snelheid aan en dring je je niet op.\n\nBij uitvoegen verlaat je de doorgaande rijbaan via een uitvoegstrook. Geef op tijd richting aan en ga rustig naar de uitvoegstrook. Je remt pas af als je op de uitvoegstrook rijdt, niet op de doorgaande baan, zodat je het verkeer achter je niet verrast.\n\nKijk bij elke strookwisseling altijd even over je schouder naar de dode hoek.", "kernpunten": ["Invoegen: snelheid aanpassen, dode hoek checken, richting aangeven, veilig gat kiezen", "Uitvoegen: tijdig richting aangeven en naar de uitvoegstrook", "Afremmen pas op de uitvoegstrook, niet op de doorgaande baan", "Altijd over je schouder kijken bij strookwisseling"], "bron": "RVV 1990 art. 3 en art. 17-18 (rijstrook wisselen/inhalen-context); RVV 1990 art. 5 (geen gevaar/hinder); CBR exameneisen rijbewijs B"}, {"kop": "Ritsen", "tekst": "Ritsen doe je waar twee rijstroken samenkomen tot één, bijvoorbeeld bij een wegversmalling of een afgesloten rijstrook. Het werkt als de tanden van een ritssluiting: om en om voegt steeds één auto in.\n\nBij langzaam rijdend of stilstaand verkeer is ritsen verplicht, ook als er geen bord staat. Je rijdt dan op de wegvallende rijstrook door tot vlak bij het einde en voegt daar pas in. De bestuurders op de doorgaande strook laten om beurten één auto invoegen.\n\nRitsen voorkomt dat het verkeer vroeg op één rijstrook gaat samendringen, en houdt de doorstroming juist beter op gang.", "kernpunten": ["Ritsen: om en om invoegen waar twee stroken samenkomen", "Bij langzaam of stilstaand verkeer is ritsen verplicht, ook zonder bord", "Rij door tot vlak bij het einde van de wegvallende strook", "Op de doorgaande strook: laat om beurten één auto invoegen"], "bron": "RVV 1990 art. 54 (invoegen/voorrang bij van rijstrook wisselen) en de ritsplicht bij filevorming; CBR exameneisen rijbewijs B 2026. NB: SCHEMA noemt 'art. 43'; de feitelijke ritsbepaling staat in art. 54 RVV 1990."}, {"kop": "Gebruik van claxon en lichtsignaal", "tekst": "De claxon (toeter) en het knipperen met je groot licht zijn geen middelen om je ongeduld te uiten. Je mag ze alleen gebruiken om dreigend gevaar af te wenden, dus om iemand te waarschuwen voor een gevaarlijke situatie.\n\nBinnen de bebouwde kom mag je 's nachts geen geluidssignaal geven, behalve om gevaar te voorkomen. Toeteren uit boosheid of om iemand te laten opschieten is dus niet toegestaan.\n\nGebruik je signalen kort en gericht. Een onnodig signaal kan andere weggebruikers juist laten schrikken.", "kernpunten": ["Claxon en lichtsignaal alleen om dreigend gevaar af te wenden", "Niet toeteren uit ongeduld of boosheid", "Binnen de bebouwde kom 's nachts geen geluidssignaal (behalve bij gevaar)", "Houd signalen kort en gericht"], "bron": "RVV 1990 art. 28 (geluids- en knippersignalen ter afwending van dreigend gevaar); CBR exameneisen rijbewijs B"}, {"kop": "Doelgroepstroken", "tekst": "Sommige rijstroken zijn gereserveerd voor een bepaalde groep weggebruikers. Dat heten doelgroepstroken. Bekende voorbeelden zijn de busstrook (voor lijnbussen) en de fietsstrook (voor fietsers).\n\nOp het wegdek of met een bord staat aangegeven voor wie de strook bedoeld is, bijvoorbeeld het woord 'BUS'. Als gewone automobilist mag je zo'n strook niet gebruiken, tenzij een bord uitdrukkelijk een uitzondering maakt.\n\nLet goed op de markering en de borden, zodat je niet per ongeluk op een strook rijdt waar je niet hoort.", "kernpunten": ["Doelgroepstrook = rijstrook voor een specifieke groep (bus, fiets)", "Herkenbaar aan markering op het wegdek of een bord", "Auto's mogen er niet op, tenzij een bord het toestaat", "Let op markering en borden"], "bron": "RVV 1990 art. 1 (busstrook/fietsstrook) en art. 73 (gebruik busstrook); CBR exameneisen rijbewijs B"}, {"kop": "Bijzondere weggedeelten", "tekst": "Naast de gewone rijbaan kom je bijzondere weggedeelten tegen met hun eigen regels. Denk aan het erf (maximaal 15 km/u, voetgangers overal), de voetgangerszone, of een gebied met een geslotenverklaring voor bepaald verkeer.\n\nOok markeringen op de weg vragen aandacht: een doorgetrokken streep mag je niet overschrijden, en blokmarkering (grote blokken) geeft de scheiding tussen een doorgaande strook en een in- of uitvoegstrook aan.\n\nLet bij elk bijzonder weggedeelte op de borden en markeringen die erbij horen. Die vertellen je precies wat er geldt en wie er voorrang heeft.", "kernpunten": ["Bijzondere weggedeelten hebben eigen regels (erf, voetgangerszone)", "Doorgetrokken streep: niet overschrijden", "Blokmarkering scheidt de doorgaande strook van in-/uitvoegstrook", "Volg altijd de bijbehorende borden en markeringen"], "bron": "RVV 1990 art. 76-77 (wegmarkeringen, doorgetrokken streep), art. 44-45 (erf); CBR exameneisen rijbewijs B"}]}, {"hoofdstuk": 5, "titel": "Snelheid en afstand", "secties": [{"kop": "Maximumsnelheden per wegtype", "tekst": "In Nederland geldt voor elk wegtype een eigen standaard maximumsnelheid. Die snelheid geldt ook als er geen bord staat. Een bord kan de snelheid verlagen, en op de snelweg ook verhogen.\n\nDe standaardlimieten voor een personenauto zijn: binnen de bebouwde kom 50 km/u, buiten de bebouwde kom 80 km/u, op de autoweg 100 km/u en op de autosnelweg 130 km/u.\n\nDe bebouwde kom begint bij het blauwe plaatsnaambord en eindigt bij hetzelfde bord met een rode streep erdoor. Binnen de kom kan een bord 30 km/u aangeven, bijvoorbeeld in een woonwijk.\n\nLet op het verschil tussen autoweg en autosnelweg. De autoweg heeft een bord met een witte auto op blauw; de autosnelweg een bord met een viaduct/brug op blauw. Op de autoweg is de standaard 100, op de autosnelweg 130.", "kernpunten": ["Bebouwde kom: 50 km/u", "Buiten de bebouwde kom: 80 km/u", "Autoweg: 100 km/u", "Autosnelweg: 130 km/u (standaard), maar let op de borden"], "bron": "RVV 1990 art. 20 (binnen bebouwde kom), art. 21 (buiten bebouwde kom, autoweg, autosnelweg), art. 22 RVV 1990"}, {"kop": "Snelheid op de autosnelweg overdag en 's nachts", "tekst": "Sinds 16 maart 2020 geldt op het grootste deel van de Nederlandse autosnelwegen overdag, tussen 06.00 en 19.00 uur, een maximumsnelheid van 100 km/u. Dit is een belangrijke en veelgetoetste regel.\n\nBuiten die uren (tussen 19.00 en 06.00) mag je op die wegen vaak harder, meestal 120 of 130 km/u. Wat geldt, lees je altijd af van het bord. Een bord met '100' en daaronder een venster '6-19 h' betekent: 100 km/u tussen 06.00 en 19.00, daarbuiten de standaard van die weg.\n\nOp sommige stukken snelweg geldt 130 km/u de hele dag, en op een enkel traject ook overdag een hogere limiet. De enige zekerheid is het bord langs de weg. Staat er geen bord, dan geldt de standaard van 130 km/u.\n\nOnthoud de logica: overdag rustiger (100), 's nachts ruimer (tot 130), maar altijd binnen wat het bord aangeeft.", "kernpunten": ["Op de meeste snelwegen: 100 km/u tussen 06.00-19.00 uur (sinds 16 maart 2020)", "'s Nachts (19.00-06.00) vaak 120 of 130 km/u", "Het bord is altijd leidend, ook bij een tijdvenster (bijv. 6-19 h)", "Zonder bord geldt de standaard van 130 km/u"], "bron": "Rijkswaterstaat, maximumsnelheid (sinds 16 maart 2020); RVV 1990 art. 21-22; snelheid altijd per bord (RVV 1990 art. 62, bord A)"}, {"kop": "Aangepaste snelheid: niet altijd zo hard als mag", "tekst": "De maximumsnelheid is een bovengrens, geen verplichting. Je moet je snelheid aanpassen aan de omstandigheden: het weer, het zicht, de drukte en de staat van de weg.\n\nBij regen, mist, sneeuw of gladheid moet je langzamer rijden, ook al staat er een hoger bord. Hetzelfde geldt bij druk verkeer, bij een school, in een bocht of als je de weg niet goed kunt overzien.\n\nDe basisregel staat in de wet: je moet je voertuig kunnen stoppen binnen de afstand die je kunt overzien en die vrij is. Zie je maar 30 meter ver door mist, dan moet je binnen die 30 meter kunnen stoppen.\n\nTe hard rijden voor de situatie is gevaarlijk, ook als je onder de limiet blijft. Aangepaste snelheid is een kernonderdeel van veilig rijden.", "kernpunten": ["De maximumsnelheid is een grens, geen doel", "Pas je snelheid aan bij slecht weer, slecht zicht of drukte", "Je moet kunnen stoppen binnen de afstand die je kunt overzien en die vrij is", "Te hard voor de situatie kan ook onder de limiet zijn"], "bron": "RVV 1990 art. 19 (stoppen binnen de te overziene en vrije afstand); WVW 1994 art. 5 (geen gevaar of hinder)"}, {"kop": "Volgafstand: de 2-secondenregel", "tekst": "Achter een ander voertuig houd je genoeg afstand om op tijd te kunnen stoppen. De vuistregel hiervoor is de 2-secondenregel.\n\nZo doe je dat: kies een vast punt langs de weg, bijvoorbeeld een lantaarnpaal of een bord. Op het moment dat je voorligger dat punt passeert, tel je 'eenentwintig, tweeentwintig'. Ben je bij het punt voordat je klaar bent met tellen, dan rij je te dicht op je voorligger.\n\nBij slecht weer of slecht zicht (regen, mist, ijs) verdubbel je dit naar minstens 3 tot 4 seconden. De remweg is dan langer en je hebt meer ruimte nodig.\n\nTe weinig afstand houden heet bumperkleven. Dat is gevaarlijk en strafbaar, omdat je bij plotseling remmen niet op tijd tot stilstand komt.", "kernpunten": ["Houd minimaal 2 seconden afstand tot je voorligger", "Tel vanaf een vast punt: 'eenentwintig, tweeentwintig'", "Bij slecht weer of zicht: 3 tot 4 seconden", "Te dicht volgen (bumperkleven) is gevaarlijk en strafbaar"], "bron": "CBR exameneisen rijbewijs B (2-secondenregel als praktijknorm); RVV 1990 art. 19 (voldoende afstand om te kunnen stoppen)"}, {"kop": "Reactieafstand, remafstand en stopafstand", "tekst": "De totale afstand die je nodig hebt om stil te staan, bestaat uit twee delen: de reactieafstand en de remafstand. Samen vormen ze de stopafstand.\n\nDe reactieafstand is de afstand die je aflegt vanaf het moment dat je een gevaar ziet tot het moment dat je echt op de rem trapt. In die tijd rij je gewoon door. Hoe sneller je rijdt, hoe groter deze afstand.\n\nDe remafstand is de afstand vanaf het intrappen van de rem tot stilstand. Belangrijk: de remafstand neemt niet recht evenredig toe, maar veel sneller. Bij verdubbeling van je snelheid wordt de remafstand ongeveer vier keer zo lang.\n\nStopafstand = reactieafstand + remafstand. Vermoeidheid, alcohol en afleiding maken vooral de reactieafstand langer. Een natte of gladde weg maakt de remafstand langer. Daarom: hoe hoger de snelheid en hoe slechter de omstandigheden, hoe meer ruimte je nodig hebt.", "kernpunten": ["Stopafstand = reactieafstand + remafstand", "Reactieafstand: de weg die je aflegt voordat je remt", "Remafstand: van remmen tot stilstand; groeit veel sneller dan de snelheid (dubbele snelheid ≈ 4x remweg)", "Vermoeidheid, alcohol en afleiding verlengen de reactieafstand; nat/glad wegdek verlengt de remafstand"], "bron": "CBR exameneisen rijbewijs B (stopafstand, reactie- en remafstand); natuurkundige verhouding remweg-snelheid (kwadratisch)"}, {"kop": "Snelheid met een aanhanger of caravan", "tekst": "Rijd je met een aanhanger of caravan, dan gelden lagere maximumsnelheden. Het gespan is zwaarder en langer, waardoor remmen en sturen lastiger worden.\n\nMet een aanhanger geldt buiten de bebouwde kom een maximum van 80 km/u, ook op de autoweg en de autosnelweg, tenzij een bord een lagere snelheid aangeeft. Binnen de bebouwde kom blijft 50 km/u gelden.\n\nDoor het extra gewicht is de remweg langer. Houd dus meer volgafstand dan normaal. Ook zijslingeren kan optreden bij hoge snelheid of wind; rustig en gelijkmatig rijden voorkomt dat.\n\nMet het gewone rijbewijs B mag je een aanhanger trekken tot bepaalde gewichtsgrenzen; daarboven heb je rijbewijs BE of code 96 nodig.", "kernpunten": ["Met aanhanger buiten de bebouwde kom: maximaal 80 km/u (ook op autoweg en autosnelweg)", "Binnen de bebouwde kom: 50 km/u", "Langere remweg: houd extra volgafstand", "Boven bepaalde gewichten is rijbewijs BE of code 96 nodig"], "bron": "RVV 1990 art. 21-22 (lagere maximumsnelheid voor voertuigen met aanhangwagen); CBR/RDW rijbewijscategorieën B, BE, code 96"}]}, {"hoofdstuk": 6, "titel": "Inhalen", "secties": [{"kop": "Wat is inhalen en hoe doe je het", "tekst": "Inhalen is het voorbijrijden van een voertuig dat dezelfde kant op rijdt als jij. De hoofdregel is duidelijk: inhalen gebeurt links.\n\nVoordat je inhaalt, kijk je goed: in je spiegels en over je schouder (de dode hoek), en je geeft op tijd richting aan. Je haalt alleen in als de weg ver genoeg vrij en overzichtelijk is, en als je vlot terug naar rechts kunt zonder de ingehaalde te hinderen.\n\nNa het inhalen ga je weer netjes naar rechts, maar pas als je de ingehaalde in je binnenspiegel volledig ziet. Snijd nooit af.\n\nInhalen kost ruimte en tijd. Twijfel je of het past, doe het dan niet. Een gemiste inhaalmanoeuvre is nooit een probleem; een mislukte wel.", "kernpunten": ["Inhalen gebeurt links", "Kijk in spiegels en dode hoek, geef op tijd richting aan", "Haal alleen in als de weg vrij en overzichtelijk is", "Ga pas terug naar rechts als je de ingehaalde in je spiegel ziet"], "bron": "RVV 1990 art. 11 lid 1 (inhalen geschiedt links)"}, {"kop": "Waar je niet mag inhalen", "tekst": "Op sommige plekken is inhalen verboden of onverstandig, omdat je het tegemoetkomende verkeer of de overzichtelijkheid niet kunt vertrouwen.\n\nJe mag niet over een doorgetrokken streep heen rijden om in te halen. De doorgetrokken streep mag je niet overschrijden. Een onderbroken streep mag je wel overschrijden als het veilig kan.\n\nJe mag niet inhalen vlak voor of op een voetgangersoversteekplaats. Voetgangers kunnen dan plotseling oversteken en achter het ingehaalde voertuig vandaan komen.\n\nVerder haal je niet in bij onoverzichtelijke situaties: in een bocht, vlak voor de top van een heuvel, bij een kruispunt of als je niet ver genoeg vooruit kunt kijken. Een bord 'inhaalverbod' (rode auto naast zwarte auto) maakt inhalen expliciet verboden.", "kernpunten": ["Niet inhalen over een doorgetrokken streep", "Niet inhalen vlak voor of op een voetgangersoversteekplaats", "Niet inhalen in bochten, bij heuveltoppen of onoverzichtelijke plekken", "Een inhaalverbodsbord (C13/borden) maakt het expliciet verboden"], "bron": "RVV 1990 art. 12 (verbod inhalen voor/op voetgangersoversteekplaats); RVV 1990 art. 76-77 (doorgetrokken en onderbroken strepen); RVV 1990 bijlage 1, bord F1/F3 (inhaalverbod)"}, {"kop": "Rechts inhalen: verboden, met uitzonderingen", "tekst": "De hoofdregel is dat je links inhaalt. Rechts inhalen mag dus in principe niet. Toch zijn er duidelijke uitzonderingen waarin het wel is toegestaan.\n\nJe mag rechts inhalen als de bestuurder voor je links heeft voorgesorteerd en richting links heeft aangegeven om af te slaan of een weg op te draaien. Je passeert hem dan rechts.\n\nJe mag een tram rechts inhalen, omdat een tram meestal in het midden van de weg rijdt.\n\nBij rijstroken die in een file langzaam rijden, mag het verkeer rechts sneller gaan dan links. Dat telt formeel niet als verboden inhalen. Sta je in de file en gaat jouw strook sneller, dan hoef je niet te wachten.\n\nOok bij een blokmarkering mag de bestuurder rechts daarvan de bestuurder links daarvan rechts passeren.", "kernpunten": ["Rechts inhalen is in principe verboden", "Wel toegestaan: voorligger sorteert links voor om af te slaan", "Een tram mag je rechts inhalen", "In een file mag een rechterstrook sneller rijden dan links"], "bron": "RVV 1990 art. 11 lid 2 (uitzonderingen: links voorgesorteerd, tram, blokmarkering); RVV 1990 art. 13 (filerijden: rechts sneller toegestaan)"}, {"kop": "Inhalen van langere en langzame voertuigen", "tekst": "Vrachtwagens, bussen en tractoren zijn lang en rijden vaak langzamer. Ze inhalen kost meer tijd en afstand dan het inhalen van een personenauto.\n\nSchat goed in hoeveel weg je nodig hebt. Achter een lang voertuig zie je bovendien minder van de weg vooruit. Houd daarom eerst extra afstand, zodat je beter langs het voertuig heen kunt kijken voordat je begint.\n\nLandbouwvoertuigen mogen niet op de autosnelweg en de autoweg komen. Tegenkomen doe je ze dus vooral op gewone wegen buiten de bebouwde kom. Ze kunnen plotseling een erf of veld opdraaien; let op hun richtingaanwijzers en op vrij brede afmetingen.\n\nBegin nooit aan het inhalen van een lang voertuig als je twijfelt of je het op tijd en veilig afrondt.", "kernpunten": ["Lange voertuigen inhalen kost meer weg en tijd", "Houd extra afstand zodat je beter vooruit kunt kijken", "Landbouwverkeer mag niet op de autoweg/autosnelweg", "Let op brede afmetingen en plotseling afslaan naar een erf of veld"], "bron": "CBR exameneisen rijbewijs B (inhalen langere/langzame voertuigen, afstand inschatten); RVV 1990 art. 11 (inhalen); RVV 1990 art. 43 (verbod landbouwverkeer op autosnelweg/autoweg)"}]}, {"hoofdstuk": 7, "titel": "Voorrang en voor laten gaan", "secties": [{"kop": "Verschil tussen voorrang verlenen en voor laten gaan", "tekst": "Deze twee begrippen lijken op elkaar, maar betekenen iets anders. Het verschil is een vaste examenval.\n\nVoorrang verlenen betekent: een andere bestuurder ongehinderd zijn weg laten vervolgen. Je moet hem laten gaan zonder dat hij hoeft te remmen of van richting te veranderen. Voorrang gaat altijd over bestuurders (auto's, fietsers, bromfietsers).\n\nVoor laten gaan gebruik je bij voetgangers. Bij een voetgangersoversteekplaats moet je voetgangers (en bestuurders van een gehandicaptenvoertuig) voor laten gaan.\n\nKort gezegd: bestuurders verleen je voorrang, voetgangers laat je voorgaan. Het praktische gevolg is hetzelfde, namelijk dat jij wacht, maar de juiste term kan in een examenvraag het verschil maken.", "kernpunten": ["Voorrang verlenen: een bestuurder ongehinderd door laten gaan", "Voor laten gaan: geldt voor voetgangers (en gehandicaptenvoertuigen)", "Bestuurders verleen je voorrang, voetgangers laat je voorgaan", "In beide gevallen wacht jij"], "bron": "RVV 1990 art. 1 (begripsbepaling voorrang verlenen); RVV 1990 art. 49 (voetgangers op oversteekplaats voor laten gaan)"}, {"kop": "Gelijkwaardig kruispunt: rechts gaat voor", "tekst": "Een gelijkwaardig kruispunt is een kruispunt zonder voorrangsborden, zonder haaientanden en zonder werkende verkeerslichten. De wegen zijn dan gelijk in rang.\n\nOp zo'n kruispunt geldt de rechtsregel: je verleent voorrang aan bestuurders die van rechts komen. Komt er dus iemand van rechts, dan laat jij hem gaan.\n\nDeze regel geldt voor alle bestuurders, dus ook voor fietsers en bromfietsers van rechts. Een fietser van rechts heeft op een gelijkwaardig kruispunt evengoed voorrang.\n\nLet op een veelgemaakte fout: ook als de weg rechts smaller of minder belangrijk lijkt, geldt rechts voor, zolang het kruispunt gelijkwaardig is. Alleen borden, haaientanden of verkeerslichten veranderen dat.", "kernpunten": ["Gelijkwaardig kruispunt: geen borden, geen haaientanden, geen werkend verkeerslicht", "Rechtsregel: verkeer van rechts heeft voorrang", "Geldt ook voor fietsers en bromfietsers van rechts", "Een smallere weg rechts maakt het kruispunt niet ongelijkwaardig"], "bron": "RVV 1990 art. 15 lid 1 (op kruispunten verlenen bestuurders voorrang aan voor hen van rechts komende bestuurders)"}, {"kop": "Voorrangsweg, voorrangsborden en haaientanden", "tekst": "Een kruispunt kan ongelijkwaardig zijn gemaakt met borden en wegmarkering. Dan geldt niet de rechtsregel, maar wat de borden aangeven.\n\nDe belangrijkste voorrangsborden zijn: een gele ruit (voorrangsweg, jij hebt voorrang op deze weg), dezelfde ruit met zwarte streep (einde voorrangsweg), een omgekeerde driehoek (verleen voorrang aan al het verkeer op de kruisende weg) en een 'STOP'-bord (achthoekig: je moet volledig stilstaan en dan voorrang verlenen).\n\nHaaientanden zijn witte driehoeken op het wegdek met de punt naar jou toe. Ze betekenen: verleen voorrang aan het verkeer op de kruisende weg. Ze staan vaak samen met de omgekeerde driehoek.\n\nZie je een gele ruit op jouw weg, dan ben jij de voorrangsweg en hoef je niet te wachten, tenzij borden of een verkeersregelaar anders aangeven.", "kernpunten": ["Gele ruit = voorrangsweg (jij hebt voorrang)", "Omgekeerde driehoek = verleen voorrang aan kruisend verkeer", "STOP-bord = volledig stilstaan en dan voorrang verlenen", "Haaientanden (punt naar jou) = voorrang verlenen aan de kruisende weg"], "bron": "RVV 1990 bijlage 1, borden B1-B7 (voorrang, o.a. B1 voorrangsweg, B6 verleen voorrang, B7 stop); RVV 1990 art. 80 (haaientanden: voorrang verlenen aan bestuurders op de kruisende weg)"}, {"kop": "Voorrangsvoertuigen: ambulance, politie, brandweer", "tekst": "Een voorrangsvoertuig is een voertuig dat zowel blauw zwaailicht als een sirene (tweetonige hoorn) voert. Dat zijn meestal politie, brandweer en ambulance op een spoedrit.\n\nVoor zo'n voertuig moet je altijd ruimte maken en het voor laten gaan, ongeacht wie er normaal voorrang heeft. Ga rustig naar rechts, rem gecontroleerd en blokkeer geen kruispunt.\n\nLet op: alleen zwaailicht zonder sirene maakt het nog geen voorrangsvoertuig (bijvoorbeeld een wegsleepauto of een langzaam werkvoertuig). Dan hoef je geen voorrang te verlenen, maar wel rekening te houden.\n\nPanikeer niet. Kijk waar het voertuig vandaan komt en waar het heen wil, en maak op een veilige manier ruimte. Sta je voor rood, dan mag je niet zomaar door rood rijden om plaats te maken; doe het alleen als het veilig kan en je geen gevaar veroorzaakt.", "kernpunten": ["Voorrangsvoertuig = blauw zwaailicht EN sirene samen", "Altijd ruimte maken en voor laten gaan", "Alleen zwaailicht (zonder sirene) is geen voorrangsvoertuig", "Maak veilig plaats; rijd niet onnodig gevaarlijk door rood"], "bron": "RVV 1990 art. 1 (begrip voorrangsvoertuig: blauw zwaailicht en tweetonige hoorn); RVV 1990 art. 50 (weggebruikers verlenen voorrang aan bestuurders van een voorrangsvoertuig)"}, {"kop": "Tram heeft bijna altijd voorrang", "tekst": "De tram is een bijzonder geval. In de meeste situaties moet je een tram voor laten gaan, ook als jij volgens de rechtsregel of de borden eigenlijk voorrang zou hebben.\n\nDe reden is praktisch: een tram rijdt op rails en kan niet uitwijken, en zijn remweg is lang. Daarom geldt: bestuurders laten een tram voorgaan als dat nodig is.\n\nEr zijn enkele uitzonderingen, bijvoorbeeld als een verkeersbord of verkeerslicht speciaal voor de tram iets anders aangeeft. Maar als vuistregel voor het examen: bij twijfel laat je de tram gaan.\n\nLet ook op trams bij haltes en op kruisende rails. Steek nooit vlak voor een naderende tram over.", "kernpunten": ["Vuistregel: laat de tram voorgaan", "Een tram kan niet uitwijken en heeft een lange remweg", "Geldt vaak ook als jij volgens rechts of bord voorrang zou hebben", "Steek nooit vlak voor een naderende tram over"], "bron": "RVV 1990 art. 15a (bestuurders laten een tram voorgaan als dat nodig is voor een veilige doorgang)"}, {"kop": "Afslaan ten opzichte van tegenliggers", "tekst": "Bij het afslaan op een kruispunt kun je in de buurt komen van het tegemoetkomende verkeer. Hier geldt een vaste regel.\n\nWil je naar links afslaan, dan moet je het tegemoetkomende verkeer dat rechtdoor gaat of naar rechts afslaat, voor laten gaan. Jij kruist immers hun rijbaan; zij niet die van jou.\n\nWil je naar rechts afslaan, dan blijf je aan jouw kant van de weg en hoef je tegenliggers niet voor te laten gaan. Wel let je op fietsers en voetgangers die rechtdoor gaan; die kunnen rechts naast je rijden of oversteken.\n\nGeef bij elk afslaan op tijd richting aan, kijk in je spiegels en controleer de dode hoek, vooral op fietsers en bromfietsers naast je.", "kernpunten": ["Linksaf: tegenliggers (rechtdoor of rechtsaf) voor laten gaan", "Rechtsaf: je blijft aan je eigen kant, tegenliggers hoef je niet voor te laten gaan", "Let bij afslaan altijd op fietsers en bromfietsers (dode hoek)", "Geef op tijd richting aan"], "bron": "RVV 1990 art. 18 (bij afslaan voorrang/voor laten gaan van tegemoetkomend verkeer en bestuurders die zich aan de zijkant bevinden)"}, {"kop": "Lijnbus die wegrijdt uit een halte", "tekst": "Binnen de bebouwde kom heeft een lijnbus die uit een halte wil wegrijden, een bijzondere positie.\n\nGeeft de buschauffeur met de richtingaanwijzer aan dat hij de halte wil verlaten, dan moet je hem de gelegenheid geven om weg te rijden. Je laat de bus dus voorgaan, ook al naderde jij eerder.\n\nDeze regel geldt alleen binnen de bebouwde kom. Buiten de bebouwde kom geldt deze plicht niet; daar voert de bus een gewone manoeuvre uit en gelden de normale regels.\n\nWees alert bij bushaltes: rem op tijd af, houd afstand en geef de bus ruimte zodra je zijn richtingaanwijzer ziet knipperen.", "kernpunten": ["Binnen de bebouwde kom: laat een lijnbus uit de halte wegrijden", "Voorwaarde: de buschauffeur geeft richting aan", "Buiten de bebouwde kom geldt deze plicht NIET", "Let bij haltes op de richtingaanwijzer van de bus"], "bron": "RVV 1990 art. 56 (binnen de bebouwde kom gelegenheid geven aan een autobus om van een halte weg te rijden bij gegeven richtingaanwijzer). LET OP: de opdracht noemde art. 54a; de actuele bron plaatst deze regel in art. 56 RVV 1990."}]}, {"hoofdstuk": 8, "titel": "Kruispunten en verkeerslichten", "secties": [{"kop": "Verkeerslichten: rood, geel en groen", "tekst": "Een driekleurig verkeerslicht regelt wie er mag rijden. De betekenis is wettelijk vastgelegd.\n\nGroen betekent: doorgaan. Geel betekent: stoppen. Alleen als je het licht al zo dicht genaderd bent dat veilig stoppen redelijkerwijs niet meer kan, mag je doorrijden. Geel is dus geen sein om nog snel door te schieten.\n\nRood betekent: stoppen. Je stopt voor de stopstreep. Door rood rijden is een ernstige overtreding en een veelvoorkomende oorzaak van zware ongevallen op kruispunten.\n\nLet ook op de volgorde: een verkeerslicht springt van groen naar geel naar rood. Anticipeer op groen dat al lang brandt; dat kan zo op geel springen.", "kernpunten": ["Groen: doorgaan", "Geel: stoppen, tenzij stoppen redelijkerwijs niet meer veilig kan", "Rood: stoppen voor de stopstreep", "Geel is geen sein om te versnellen"], "bron": "RVV 1990 art. 68 lid 1 (groen: doorgaan; geel: stop, tenzij stoppen redelijkerwijs niet meer mogelijk; rood: stop)"}, {"kop": "Pijlverkeerslichten en aparte lichten", "tekst": "Naast de gewone ronde lichten bestaan er verkeerslichten met een pijl. Die gelden alleen voor de richting waar de pijl heen wijst.\n\nEen groene pijl naar links betekent: je mag naar links, en het kruisende verkeer voor die richting staat stil. Een rode pijl betekent: voor die richting moet je stoppen, ook als een ander licht groen is.\n\nEr zijn ook aparte verkeerslichten voor fietsers (vaak met een fietssymbool), voetgangers (rood/groen poppetje) en het openbaar vervoer. Houd alleen het licht aan dat voor jou als automobilist geldt.\n\nKnipperend geel betekent: het licht is buiten werking als regelaar; je moet zelf de normale voorrangsregels en borden toepassen. Wees dan extra voorzichtig.", "kernpunten": ["Pijllicht geldt alleen voor de aangegeven richting", "Groene pijl: die richting mag, kruisend verkeer staat stil", "Aparte lichten bestaan voor fietsers, voetgangers en OV", "Knipperend geel: licht buiten werking, pas zelf de gewone regels en borden toe"], "bron": "RVV 1990 art. 68 (driekleurige verkeerslichten en pijlen); RVV 1990 art. 69-72 (aparte lichten voor o.a. fietsers en voetgangers); RVV 1990 art. 73 (knipperend geel)"}, {"kop": "De rotonde", "tekst": "Een rotonde is een rond kruispunt waar het verkeer in een kring rijdt (in Nederland tegen de klok in). Rotondes verlagen de snelheid en verminderen ernstige ongevallen.\n\nBij de meeste rotondes heeft het verkeer dat al op de rotonde rijdt voorrang. Dat staat aangegeven met haaientanden en het bord 'verleen voorrang' bij de oprit. Je verleent dan voorrang aan wie al rondrijdt voordat je de rotonde op gaat.\n\nGeef richting aan bij het verlaten van de rotonde, zodat anderen weten dat je eraf gaat. Bij meerstrooks rotondes kies je tijdig de juiste strook.\n\nLet bijzonder op fietsers op de rotonde of op een fietspad eromheen: afhankelijk van de inrichting kunnen zij voorrang hebben. Kijk goed naar de haaientanden en borden ter plaatse.", "kernpunten": ["Op een rotonde rijd je tegen de klok in", "Meestal heeft verkeer op de rotonde voorrang (haaientanden + bord bij oprit)", "Geef richting aan bij het verlaten van de rotonde", "Let goed op fietsers; hun voorrang hangt af van de inrichting en borden"], "bron": "RVV 1990 art. 80 (haaientanden); RVV 1990 bijlage 1, bord D1 (verplichte rijrichting rotonde) en B6 (verleen voorrang); voorrang op rotonde volgt uit de plaatselijke borden en markering"}, {"kop": "Verkeersregelaar en agent gaan boven alles", "tekst": "Soms regelt een mens het verkeer in plaats van een licht of een bord: een politieagent of een bevoegde verkeersregelaar, bijvoorbeeld bij een ongeluk, een evenement of wegwerkzaamheden.\n\nHun aanwijzingen gaan boven de verkeerstekens en boven de gewone verkeersregels. Geeft een agent je een stopteken terwijl het licht groen is, dan stop je. Wijst hij je door terwijl het rood is, dan rijd je voorzichtig door.\n\nDe rangorde is: aanwijzingen van een bevoegd persoon staan bovenaan, daarna verkeerslichten, dan verkeerstekens (borden en strepen), en als laatste de gewone verkeersregels.\n\nLet op gebaren: een opgeheven arm betekent stop voor iedereen; een arm zijwaarts uitgestrekt betekent stop voor het verkeer dat erop af komt. Volg altijd wat de regelaar aangeeft.", "kernpunten": ["Aanwijzingen van agent of verkeersregelaar gaan boven licht en borden", "Rangorde: persoon > verkeerslicht > verkeerstekens > verkeersregels", "Stopteken van een agent volg je, ook bij groen licht", "Let op de gebaren (opgeheven arm = stop)"], "bron": "RVV 1990 art. 84 (rangorde: aanwijzingen gaan boven verkeerstekens en verkeersregels); RVV 1990 art. 82 (plicht aanwijzingen van bevoegd persoon op te volgen); RVV 1990 art. 83 (gebaren/tekens verkeersregelaar)"}]}, {"hoofdstuk": 9, "titel": "Stilstaan en parkeren", "secties": [{"kop": "Het verschil tussen stilstaan en parkeren", "tekst": "Stilstaan en parkeren lijken op elkaar, maar de wet maakt een duidelijk verschil. Parkeren is je voertuig laten staan, behalve voor het onmiddellijk in- of uitstappen van mensen of het onmiddellijk laden of lossen van goederen. Sta je dus stil om iemand te laten uitstappen of om snel een paar tassen in te laden, dan parkeer je niet.\n\nStilstaan is alle andere gevallen waarin je voertuig niet rijdt, maar je niet parkeert. Denk aan wachten voor een rood licht of even stoppen om iemand te laten instappen.\n\nWaarom is dit verschil belangrijk? Omdat er plaatsen zijn waar je wel mag stilstaan, maar niet mag parkeren, en omgekeerd plaatsen waar zelfs stilstaan verboden is. Voor het examen moet je weten welk verbod waar geldt.", "kernpunten": ["Parkeren = laten staan, behalve direct in-/uitstappen of laden/lossen", "Stilstaan = niet rijden en ook niet parkeren", "Een parkeerverbod betekent niet automatisch een stopverbod"], "bron": "RVV 1990 art. 1 (begripsbepalingen 'parkeren')"}, {"kop": "Waar je niet mag stilstaan (stopverbod)", "tekst": "Op sommige plaatsen mag je je voertuig helemaal niet laten stilstaan. Dat geldt onder andere op een kruispunt of overweg, op een fietspad of op de rijbaan langs een fietspad, en op een voetgangersoversteekplaats of binnen vijf meter daarvoor.\n\nOok in een tunnel mag je niet stilstaan, en niet bij een bushalte ter hoogte van de markering. Is er geen markering, dan geldt een afstand van twaalf meter aan weerszijden van het bord.\n\nEen belangrijk teken is de gele doorgetrokken streep langs de kant van de weg of op de stoeprand: daar geldt een stopverbod. Je mag er dus niet stilstaan en ook niet parkeren.", "kernpunten": ["Niet stilstaan: kruispunt, overweg, fietspad, voetgangersoversteekplaats en 5 m ervoor, tunnel", "Gele doorgetrokken streep = stopverbod (niet stilstaan, niet parkeren)", "Bushalte: niet stilstaan bij de markering, of binnen 12 m van het bord"], "bron": "RVV 1990 art. 23 lid 1; art. 24 lid 1 onder f (gele doorgetrokken streep = stopverbod)"}, {"kop": "Waar je niet mag parkeren (parkeerverbod)", "tekst": "Bij een parkeerverbod mag je nog wel kort stilstaan om iemand te laten in- of uitstappen of om te laden en lossen, maar je mag je voertuig er niet laten staan.\n\nJe mag niet parkeren bij een kruispunt op een afstand van minder dan vijf meter daarvan. Ook niet voor een inrit of uitrit, en niet op een plek waar je het verkeer hindert of in gevaar brengt.\n\nDe gele onderbroken streep langs de kant van de weg betekent: parkeerverbod. Stilstaan om iemand te laten in- of uitstappen mag daar dus nog wel, parkeren niet.", "kernpunten": ["Niet parkeren binnen 5 meter van een kruispunt", "Niet parkeren voor een in- of uitrit", "Gele onderbroken streep = parkeerverbod (stilstaan mag, parkeren niet)"], "bron": "RVV 1990 art. 24 lid 1 onder a (5 m kruising), onder e (in-/uitrit); art. 24 lid 1 onder e (gele onderbroken streep = parkeerverbod)"}, {"kop": "Parkeerschijf en blauwe zone", "tekst": "In een parkeerschijfzone (de blauwe zone) mag je alleen parkeren op plekken met een blauwe streep of een aangeduid parkeervak. Je moet dan een duidelijk zichtbare parkeerschijf gebruiken.\n\nOp de parkeerschijf zet je het tijdstip waarop je begon met parkeren. Je rondt dat naar boven af op het eerstvolgende hele of halve uur. Hoe lang je mag blijven staan, staat op het bord van de blauwe zone.\n\nGebruik je geen parkeerschijf of staat hij verkeerd ingesteld, dan ben je in overtreding.", "kernpunten": ["Blauwe zone: alleen parkeren met zichtbare parkeerschijf", "Zet de begintijd erop, naar boven afgerond op heel/half uur", "Maximale parkeertijd staat op het bord"], "bron": "RVV 1990 art. 25"}, {"kop": "Gehandicaptenparkeerplaats", "tekst": "Een gehandicaptenparkeerplaats herken je aan bord E6: een blauw bord met een witte P en een rolstoelsymbool. Op zo'n plek mag je alleen parkeren als je een geldige gehandicaptenparkeerkaart duidelijk zichtbaar achter de voorruit hebt liggen.\n\nHeb je die kaart niet, dan mag je er niet parkeren, ook niet heel even. Onterecht op een gehandicaptenparkeerplaats staan levert een stevige boete op.\n\nStaat er een kenteken op het bord, dan is de plek gereserveerd voor één bepaald voertuig.", "kernpunten": ["Bord E6 = gehandicaptenparkeerplaats", "Parkeren alleen met geldige, zichtbare gehandicaptenparkeerkaart", "Kenteken op het bord = gereserveerd voor dat ene voertuig"], "bron": "RVV 1990 bijlage 1, bord E6; RVV 1990 art. 26 (gebruik gehandicaptenparkeerplaats)"}, {"kop": "Parkeerzones en parkeerborden", "tekst": "Een parkeerverbodszone (bord E1 met 'zone') geldt voor een heel gebied, niet voor één straat. Vanaf het bord tot het bord met 'einde zone' mag je nergens parkeren, behalve in de vakken die daarvoor zijn aangegeven.\n\nLet ook op de borden E1 (parkeerverbod) en E2 (verbod stil te staan). E1 verbiedt alleen parkeren, E2 verbiedt zowel stilstaan als parkeren.\n\nMet bord E4 wordt juist een parkeergelegenheid aangegeven: hier mag je wel parkeren. Soms staat er een onderbord met voorwaarden, bijvoorbeeld een maximale tijd of alleen voor vergunninghouders.", "kernpunten": ["Zonebord geldt voor een heel gebied tot 'einde zone'", "E1 = parkeerverbod; E2 = verbod stil te staan (strenger)", "E4 = parkeergelegenheid; let op onderborden met voorwaarden"], "bron": "RVV 1990 bijlage 1, borden E1, E2, E4; art. 24 en art. 23"}]}, {"hoofdstuk": 10, "titel": "Bijzondere weggebruikers", "secties": [{"kop": "Voetgangers en de oversteekplaats", "tekst": "Voetgangers zijn kwetsbaar: ze hebben geen bescherming en zijn soms slecht te zien. Als bestuurder moet je extra op hen letten, vooral bij oversteekplaatsen.\n\nVoetgangers en bestuurders van een gehandicaptenvoertuig die op een voetgangersoversteekplaats (zebrapad) oversteken of duidelijk op het punt staan dat te doen, moet je voor laten gaan. Je stopt dus en wacht tot ze veilig over zijn.\n\nLet op: 'voor laten gaan' is iets anders dan 'voorrang'. Bij voorrang gaat het om bestuurders onderling op een kruising. Voetgangers op een zebrapad laat je altijd voorgaan, ongeacht van welke kant ze komen.", "kernpunten": ["Voetgangers op een zebrapad: voor laten gaan (art. 49)", "Geldt ook voor wie duidelijk op het punt staat over te steken", "Gehandicaptenvoertuigen op de oversteekplaats: ook voor laten gaan"], "bron": "RVV 1990 art. 49 lid 2"}, {"kop": "Blinden en mensen die zich moeilijk voortbewegen", "tekst": "Sommige weggebruikers verdienen extra bescherming. Blinden met een witte stok met één of meer rode ringen moet je altijd voor laten gaan, ook buiten een oversteekplaats.\n\nHetzelfde geldt voor mensen die zich moeilijk voortbewegen, bijvoorbeeld ouderen met een rollator of mensen die slecht ter been zijn. Geef hun de tijd en ruimte om veilig over te steken.\n\nDeze regel vraagt vooral oplettendheid: je moet deze mensen op tijd zien aankomen en je snelheid aanpassen.", "kernpunten": ["Blinde met witte stok (rode ringen): altijd voor laten gaan", "Ook mensen die zich moeilijk voortbewegen voor laten gaan", "Geldt ook buiten een officiële oversteekplaats"], "bron": "RVV 1990 art. 49 lid 1"}, {"kop": "Fietsers, snorfietsers en bromfietsers", "tekst": "Fietsers en snorfietsers rijden meestal op het fietspad, bromfietsers vaak op het fiets-/bromfietspad of op de rijbaan. Binnen de bebouwde kom rijdt een bromfietser in principe op de rijbaan, buiten de bebouwde kom op het fiets-/bromfietspad.\n\nEen snorfiets mag niet harder dan 25 km/h. Een bromfiets mag op de rijbaan maximaal 45 km/h. Op zowel brom- als snorfiets is een helm verplicht; voor de snorfiets geldt dat sinds 1 januari 2023.\n\nAls bestuurder van een auto houd je rekening met hun lagere snelheid en hun kwetsbaarheid. Houd voldoende afstand bij het inhalen.", "kernpunten": ["Snorfiets: max 25 km/h, meestal op het fietspad", "Bromfiets: binnen kom op de rijbaan, buiten kom op fiets-/bromfietspad", "Helm verplicht op brom- en snorfiets (snorfiets sinds 1-1-2023)"], "bron": "RVV 1990 art. 5, art. 6; borden G11, G12a; helmplicht snorfiets per 1-1-2023 (RVV 1990 art. 60, Helmen)"}, {"kop": "Gehandicaptenvoertuigen, landbouwverkeer en ruiters", "tekst": "Een gehandicaptenvoertuig (zoals een scootmobiel) mag op het trottoir, het fietspad of de rijbaan rijden, afhankelijk van de snelheid. Houd er rekening mee dat deze voertuigen langzaam zijn.\n\nLandbouwverkeer, zoals tractoren, rijdt langzaam en is breed. Buiten de bebouwde kom kun je het op de rijbaan tegenkomen. Haal alleen in als je goed zicht hebt en genoeg ruimte.\n\nRuiters te paard zijn ook weggebruikers. Een paard kan schrikken, dus rij rustig, houd afstand en vermijd hard claxonneren of plotseling gas geven in de buurt van een paard.", "kernpunten": ["Gehandicaptenvoertuigen zijn langzaam; geef ruimte", "Landbouwverkeer is breed en traag; inhalen alleen met goed zicht", "Rijd rustig en kalm langs paarden; ze kunnen schrikken"], "bron": "RVV 1990 art. 1 (gehandicaptenvoertuig), art. 87 (ontheffingen); algemene zorgvuldigheidsplicht WVW 1994 art. 5"}, {"kop": "Kinderen en ouderen", "tekst": "Kinderen gedragen zich onvoorspelbaar in het verkeer. Ze kunnen plotseling de straat oprennen achter een bal aan en overzien gevaar nog niet goed. Bij een school, speelplaats of woonwijk verlaag je je snelheid en ben je extra alert.\n\nOuderen reageren vaak trager en hebben meer tijd nodig om over te steken. Geef hun die tijd en wees geduldig.\n\nDe kern is: pas je snelheid en je oplettendheid aan op de mensen die je verwacht. Bij een speelplaats of school is de kans op onverwacht gedrag groter.", "kernpunten": ["Kinderen zijn onvoorspelbaar; mind je snelheid bij school en speelplaats", "Ouderen hebben meer tijd nodig; wees geduldig", "Anticipeer op onverwacht gedrag van kwetsbare weggebruikers"], "bron": "WVW 1994 art. 5 (gevaar of hinder voorkomen); CBR exameneisen rijbewijs B (gevaarherkenning)"}, {"kop": "Motorrijders en de blinde hoek", "tekst": "Motorrijders zijn smal en daardoor makkelijk over het hoofd te zien, zeker bij het afslaan of van rijstrook wisselen. Kijk daarom altijd extra goed en gebruik je spiegels én een schouderblik.\n\nDe blinde hoek (dode hoek) is het gebied naast en schuin achter je auto dat je niet in je spiegels ziet. Vooral motorrijders en fietsers kunnen zich daar bevinden.\n\nVoor vrachtwagens is de blinde hoek nog groter, vooral rechtsvoor. Als automobilist en zeker als fietser moet je beseffen dat een vrachtwagenchauffeur jou bij het rechts afslaan misschien niet ziet. Blijf uit die blinde hoek.", "kernpunten": ["Motorrijders zijn smal; kijk extra goed bij afslaan en wisselen van strook", "Blinde hoek = naast en schuin achter je, niet in de spiegel zichtbaar", "Schouderblik geven naast spiegelgebruik"], "bron": "RVV 1990 art. 17, art. 18 (afslaan, ander weggedeelte oprijden); WVW 1994 art. 5; CBR exameneisen rijbewijs B (blinde hoek)"}]}, {"hoofdstuk": 11, "titel": "Bijzondere verkeerssituaties", "secties": [{"kop": "Spoorwegovergang", "tekst": "Bij een spoorwegovergang (overweg) heeft de trein altijd voorrang. Een bewaakte overweg heeft bomen (slagbomen) en rode knipperlichten, soms met een bel. Een onbewaakte overweg heeft die niet; daar moet je zelf goed kijken en luisteren.\n\nJe moet stoppen als de rode lichten knipperen, als de bomen dichtgaan of dicht zijn, of als er een trein nadert. Dat geldt ook als de bomen nog open zijn maar de lichten al knipperen.\n\nRijd nooit een overweg op als je er niet zeker overheen kunt komen, bijvoorbeeld door een file aan de overkant. Sta je vast op de overweg, dan kun je klem komen te staan.", "kernpunten": ["Trein heeft altijd voorrang op de overweg", "Stoppen bij rode knipperlichten, sluitende of gesloten bomen, of naderende trein", "Rij de overweg pas op als je er zeker overheen kunt"], "bron": "RVV 1990 art. 15a (trein laten voorgaan); art. 71 jo. bijlage 2 (rood overweglicht = stoppen)"}, {"kop": "Rijden in een tunnel", "tekst": "In een tunnel rijd je met dimlicht aan, ook overdag. Houd voldoende afstand en let op de matrixborden en signalen boven de weg.\n\nKrijg je pech in een tunnel, probeer dan eerst de tunnel uit te rijden. Lukt dat niet, zet je auto dan zo veel mogelijk rechts of tegen de tunnelwand, zet je alarmlichten aan en zet de motor uit. Laat de sleutel in het contact.\n\nGebruik bij een noodgeval de praatpaal of hulptelefoon in de tunnel in plaats van je mobiel: die geeft je locatie automatisch door. Hoor je een oproep om de tunnel te verlaten, ga dan direct via de dichtstbijzijnde vluchtdeur naar buiten.", "kernpunten": ["Dimlicht aan in de tunnel, ook overdag", "Bij pech: probeer eruit te rijden; lukt dat niet, rechts/tegen de wand, alarmlichten aan, motor uit", "Gebruik de praatpaal en verlaat de tunnel bij een oproep via de vluchtdeur"], "bron": "RVV 1990 art. 32 (dimlicht; gebruik verlichting, ook in tunnel); matrixsignalen boven de weg zijn verkeerstekens (RVV 1990 art. 62 e.v.); Rijkswaterstaat instructies tunnelveiligheid. NB: 'art. 43a' bestaat niet in het huidige RVV 1990 en is geschrapt."}, {"kop": "Pech onderweg en de gevarendriehoek", "tekst": "Krijg je pech, probeer dan je auto op een veilige plek te zetten, zoals de vluchtstrook of een pechhaven. Zet je alarmlichten aan zodat anderen je op tijd zien.\n\nVormt je auto een gevaar of obstakel voor andere bestuurders, dan plaats je een gevarendriehoek op voldoende afstand vóór je voertuig, zodat het verkeer je op tijd ziet. Op een snelweg plaats je hem verder weg dan in de stad, omdat het verkeer er sneller rijdt.\n\nOp de snelweg ga je zelf niet bij de auto staan, maar achter de vangrail wachten op hulp. Sta nooit op de rijbaan tussen het verkeer.", "kernpunten": ["Bij pech: veilige plek (vluchtstrook/pechhaven) en alarmlichten aan", "Gevarendriehoek plaatsen als je een obstakel vormt, op afstand vóór de auto", "Op de snelweg: wacht achter de vangrail, niet bij de auto"], "bron": "RVV 1990 art. 58 (gevarendriehoek/knipperend waarschuwingslicht bij stilstaand voertuig); afstand niet wettelijk vastgelegd"}, {"kop": "Bij een ongeval", "tekst": "Kom je bij een ongeval, dan ben je verplicht te stoppen als je erbij betrokken bent. Wegrijden na een ongeval waar jij bij betrokken bent, is strafbaar.\n\nZorg eerst voor de veiligheid: zet je alarmlichten aan, trek een veiligheidshesje aan en plaats zo nodig een gevarendriehoek. Bel 112 bij gewonden of gevaar.\n\nVerleen hulp waar je kunt en geef je gegevens als dat nodig is voor de afhandeling. Verplaats gewonden alleen als ze in direct gevaar zijn, bijvoorbeeld bij brand.", "kernpunten": ["Betrokken bij een ongeval: je moet stoppen (wegrijden is strafbaar)", "Beveilig de plek: alarmlichten, hesje, eventueel gevarendriehoek", "Bel 112 bij gewonden of gevaar; verleen hulp"], "bron": "WVW 1994 art. 7 (verbod doorrijden na ongeval); WVW 1994 art. 5"}, {"kop": "Slecht weer: gladheid, mist, regen en sneeuw", "tekst": "Bij slecht weer pas je je snelheid en je afstand aan. Een natte of gladde weg verlengt je remweg, dus houd meer afstand dan normaal.\n\nBij mist gebruik je mistlampen. Mistachterlicht mag je alleen voeren als het zicht minder is dan 50 meter; bij beter zicht zet je het uit, want het verblindt anderen. Rijd bij dichte mist langzaam en houd extra afstand.\n\nBij regen en aquaplaning kan je auto gaan glijden over een laag water. Verminder dan rustig snelheid en stuur niet abrupt. Bij sneeuw en ijzel rijd je voorzichtig, rem je zacht en vermijd je plotselinge stuur- of rembewegingen.", "kernpunten": ["Slecht weer: snelheid omlaag, afstand vergroten (langere remweg)", "Mistachterlicht alleen bij zicht minder dan 50 meter", "Bij aquaplaning of ijzel: geen abrupte stuur- of rembewegingen"], "bron": "RVV 1990 art. 19 (afstand/aanpassen snelheid); RVV 1990 art. 34-37 (mistlicht; mistachterlicht bij zicht
