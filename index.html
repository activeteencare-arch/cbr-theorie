 dakkoffer of dakrek vangt wind en geeft extra luchtweerstand. Daardoor moet de motor harder werken en verbruik je meer. Gebruik je het niet, haal het er dan af.", "bron": "CBR exameneisen rijbewijs B (milieubewust rijden); leerstof hfst 2 'Milieu en zuinig rijden'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "mc", "vraag": "Hoe vaak controleer je het best je bandenspanning om zuinig en veilig te rijden?", "opties": ["Alleen bij de APK", "Regelmatig, volgens de waarde die de fabrikant adviseert", "Nooit, dat regelt de garage wel"], "correct": 1, "uitleg": "Controleer je bandenspanning regelmatig en houd de waarde aan die de fabrikant opgeeft. Die vind je in het instructieboekje of op een sticker bij het portier. Goede spanning betekent minder verbruik en meer grip.", "bron": "Regeling voertuigen art. 5.2.27 (banden); CBR exameneisen rijbewijs B; leerstof hfst 2 'Banden: profiel en spanning'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 14, "type": "mc", "vraag": "Je nadert een woonwijk met spelende kinderen. Wat hoort bij verantwoord en risicobewust rijden?", "opties": ["Op de maximumsnelheid blijven want dat mag", "Snelheid minderen en rekenen op een kind dat plots oversteekt", "Toeteren zodat de kinderen aan de kant gaan"], "correct": 1, "uitleg": "Verantwoord rijden betekent dat je je snelheid aanpast aan de situatie, niet aan wat maximaal mag. Bij kwetsbare weggebruikers als kinderen neem je minder snelheid en meer ruimte, zodat je op tijd kunt stoppen.", "bron": "RVV 1990 art. 19 (snelheid aanpassen, tijdig stoppen); CBR exameneisen rijbewijs B; leerstof hfst 14 'Anticiperen en risico inschatten'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 14, "type": "janee", "vraag": "Een bal die de straat op rolt is een signaal om alvast gas los te laten en op een kind te rekenen. Doe je dat terecht?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Een bal op straat kan betekenen dat er zo een kind achteraan rent. Door vooruit te denken en het gas los te laten ben je voorbereid en kun je op tijd reageren in plaats van plots hard te moeten remmen.", "bron": "CBR exameneisen rijbewijs B (anticiperen, risico-inschatting); leerstof hfst 14 'Anticiperen en risico inschatten'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "mc", "vraag": "Wat is naast minder uitstoot het directe voordeel van zuinig rijden voor jou?", "opties": ["Je auto gaat harder", "Je bent minder geld kwijt aan brandstof", "Je hoeft geen APK meer"], "correct": 1, "uitleg": "Hoe je rijdt bepaalt hoeveel brandstof je verbruikt. Zuinig rijden is beter voor het milieu en scheelt je geld aan de pomp. De APK blijft gewoon verplicht.", "bron": "CBR exameneisen rijbewijs B (milieubewust rijden); leerstof hfst 2 'Milieu en zuinig rijden'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 5, "type": "mc", "vraag": "Je rijdt op een rustige weg buiten de bebouwde kom. Wat is vanuit milieu en veiligheid een goede keuze?", "opties": ["Altijd precies de maximumsnelheid rijden", "Een rustige, gelijkmatige snelheid aanhouden", "Steeds versnellen en weer afremmen"], "correct": 1, "uitleg": "Een rustige, gelijkmatige snelheid is zowel veiliger als zuiniger. Steeds versnellen en weer afremmen kost veel brandstof en geeft onnodige uitstoot. De maximumsnelheid is een bovengrens, geen doel.", "bron": "RVV 1990 art. 19 (snelheid aanpassen); CBR exameneisen rijbewijs B (milieubewust rijden); leerstof hfst 5 'Aangepaste snelheid'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "invul", "vraag": "Hoeveel minuten stilstaan is ongeveer de grens waarboven je de motor beter uitzet om brandstof te besparen? Vul het hele getal in minuten in.", "opties": [], "correct": "1", "uitleg": "Sta je langer dan ongeveer een minuut stil, zet de motor dan uit. Onnodig stationair draaien verspilt brandstof en geeft uitstoot voor niets. Veel auto's doen dit zelf met een start-stopsysteem.", "bron": "CBR exameneisen rijbewijs B (milieubewust rijden, onnodig stationair draaien)"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "janee", "vraag": "Je auto net gestart en meteen flink gas geven om hem warm te rijden, is dat een zuinige gewoonte?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Een moderne motor warm je het best rijdend op, rustig en zonder veel gas. Stilstaand laten warmdraaien of meteen hoog in de toeren gaan kost juist extra brandstof en geeft onnodige uitstoot.", "bron": "CBR exameneisen rijbewijs B (Het Nieuwe Rijden / milieubewust rijden)"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 3, "type": "mc", "vraag": "In veel binnensteden geldt een milieuzone, aangegeven met een bord. Wat betekent dat?", "opties": ["Daar mag iedereen altijd vrij parkeren", "Vervuilende voertuigen mogen die zone niet in", "Daar geldt geen maximumsnelheid"], "correct": 1, "uitleg": "Een milieuzone houdt de meest vervuilende voertuigen uit de binnenstad om de lucht schoner te houden. Of jouw auto erin mag hangt af van de uitstootklasse. Let op het bord en de onderborden die de regels aangeven.", "bron": "RVV 1990 bord C22e (milieuzone en nul-emissiezone, per 1-1-2026); gemeentelijke milieuzones; CBR exameneisen rijbewijs B"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "multi", "vraag": "Welke van deze keuzes maken je rijden schoner of zuiniger? Meerdere antwoorden kunnen goed zijn.", "opties": ["Vroeg opschakelen naar een hoge versnelling", "De motor onnodig stationair laten draaien", "Vooruit kijken en gelijkmatig rijden", "Een ongebruikte fietsendrager eraf halen"], "correct": [0, 2, 3], "uitleg": "Vroeg opschakelen, gelijkmatig rijden en onnodige luchtweerstand weghalen verlagen je verbruik. De motor onnodig laten draaien doet het omgekeerde: dat verspilt brandstof zonder dat je een meter opschiet.", "bron": "CBR exameneisen rijbewijs B (Het Nieuwe Rijden); leerstof hfst 2 'Milieu en zuinig rijden'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "mc", "vraag": "Wat is een belangrijke reden dat de auto ook op uitstoot gekeurd wordt bij de APK?", "opties": ["Om te zien of de auto snel genoeg is", "Om te controleren of de auto niet te veel vervuilt", "Om de kleur van de auto vast te leggen"], "correct": 1, "uitleg": "De APK controleert of je auto veilig is en of hij niet te veel vervuilt. Een auto die te veel uitstoot is slecht voor de lucht en wordt afgekeurd. Zonder geldige APK mag je niet de weg op.", "bron": "WVW 1994 art. 72 (APK-plicht); RDW APK-regelgeving; leerstof hfst 2 'APK: de periodieke keuring'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 5, "type": "janee", "vraag": "Harder rijden dan nodig kost niet alleen meer brandstof, maar verlengt ook je remweg. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Hoe harder je rijdt, hoe meer je verbruikt en hoe langer je remweg wordt. Verdubbel je je snelheid, dan wordt de remweg ongeveer vier keer zo lang. Rustig rijden is dus zowel zuiniger als veiliger.", "bron": "CBR exameneisen rijbewijs B (stopafstand, milieubewust rijden); leerstof hfst 5 'Reactieafstand, remafstand en stopafstand'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "mc", "vraag": "Je merkt dat je vaak vlak voor een file of stoplicht nog versnelt en dan hard remt. Hoe pak je dat milieubewuster aan?", "opties": ["Eerder gas loslaten en rustig uitrollen", "Juist harder rijden om er sneller te zijn", "Constant tussen gas en rem wisselen"], "correct": 0, "uitleg": "Kijk ver vooruit en laat op tijd het gas los, dan rol je rustig uit. Onnodig optrekken en weer afremmen kost veel brandstof. Vloeiend rijden is beter voor je verbruik en voor de doorstroming.", "bron": "CBR exameneisen rijbewijs B (anticiperen, milieubewust rijden); leerstof hfst 2 'Milieu en zuinig rijden'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "invul", "vraag": "Goed onderhouden banden met de juiste spanning verlagen je verbruik. Welke spanning houd je aan: die van de fabrikant of een willekeurige? Vul in: fabrikant of willekeurig.", "opties": [], "correct": "fabrikant", "uitleg": "Je houdt altijd de bandenspanning aan die de fabrikant adviseert. Te zacht verbruikt meer en slijt sneller, te hard geeft minder grip. De juiste waarde staat in het boekje of op een sticker bij het portier.", "bron": "Regeling voertuigen art. 5.2.27 (banden); CBR exameneisen rijbewijs B; leerstof hfst 2 'Banden: profiel en spanning'"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Waar staan alle officiële verkeersborden netjes op een rij, geordend met een letter en een nummer?", "opties": ["In Bijlage 1 van het RVV 1990", "In de Wegenverkeerswet 1994", "In de Regeling voertuigen"], "correct": 0, "uitleg": "Alle borden staan in Bijlage 1 van het RVV 1990, met een letter en een nummer zoals A1 of B6. De letter vertelt je het soort bord, en dat helpt je nieuwe borden sneller herkennen.", "bron": "RVV 1990 Bijlage 1 (Verkeersborden)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je ziet een rond bord met een rode rand en een witte achtergrond met daarop het getal 50. Wat betekent dat?", "opties": ["Adviessnelheid 50 km/u", "Maximumsnelheid 50 km/u", "Einde maximumsnelheid 50 km/u"], "correct": 1, "uitleg": "Dit is bord A1: de maximumsnelheid. Hier mag je niet harder dan 50 km/u. Staat er een schuine streep doorheen of het woord einde, dan stopt die maximumsnelheid juist.", "bron": "RVV 1990 Bijlage 1, hoofdstuk A, bord A1"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Een A1-bord met een schuine streep er doorheen geeft het einde van de maximumsnelheid aan. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. Een A1 met een schuine streep of het woord einde betekent dat die maximumsnelheid ophoudt. Vanaf dat punt geldt weer de standaardsnelheid van de wegsoort.", "bron": "RVV 1990 Bijlage 1, hoofdstuk A, bord A1"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je nadert een driehoekig bord met de punt naar beneden en een rode rand. Wat moet je doen?", "opties": ["Stoppen en daarna pas weer rijden", "Voorrang verlenen aan bestuurders op de kruisende weg", "Je hebt zelf voorrang"], "correct": 1, "uitleg": "Dit is bord B6, de omgekeerde driehoek. Die zegt: verleen voorrang aan bestuurders op de kruisende weg. Je hoeft niet per se te stoppen, maar je laat het kruisende verkeer wel voorgaan.", "bron": "RVV 1990 Bijlage 1, hoofdstuk B, bord B6"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Wat moet je doen bij bord B7, het stopbord?", "opties": ["Voorrang verlenen, maar doorrijden mag", "Verplicht stoppen en daarna voorrang verlenen", "Alleen je snelheid minderen"], "correct": 1, "uitleg": "Bij B7 ben je verplicht te stoppen, ook als er niemand aankomt. Daarna verleen je voorrang aan het verkeer op de kruisende weg. Even helemaal stilstaan dus, geen rollende stop.", "bron": "RVV 1990 Bijlage 1, hoofdstuk B, bord B7"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Bord B1 geeft aan dat je op een voorrangsweg rijdt. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. B1 vertelt je dat je op een voorrangsweg rijdt. Het kruisende verkeer moet jou dan voor laten gaan. Handig om te weten wie er aan zet is op een kruising.", "bron": "RVV 1990 Bijlage 1, hoofdstuk B, bord B1"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Wat is het kenmerk van een C-bord en wat zegt het?", "opties": ["Driehoekig met rode rand, een waarschuwing", "Rond met rode rand, een geslotenverklaring of verbod", "Rond en blauw, een gebod"], "correct": 1, "uitleg": "C-borden zijn rond met een rode rand. Die rode rand is het signaal: hier mag iets niet. Ze verklaren een weg gesloten of verbieden iets, soms voor een bepaald type voertuig.", "bron": "RVV 1990 Bijlage 1, hoofdstuk C (Geslotenverklaring)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Wat betekent bord C1?", "opties": ["Gesloten in beide richtingen voor voertuigen, ruiters en geleiders van vee", "Eenrichtingsverkeer", "Gesloten voor vrachtauto's"], "correct": 0, "uitleg": "C1 betekent gesloten in beide richtingen voor voertuigen, ruiters en geleiders van vee. Je mag er dus van geen kant in. De rode rand zonder symbool sluit zo goed als alles uit.", "bron": "RVV 1990 Bijlage 1, hoofdstuk C, bord C1"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Bij bord C12, gesloten voor alle motorvoertuigen, mogen fietsers en voetgangers er nog wel langs. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. C12 sluit alleen motorvoertuigen uit. Fietsers en voetgangers mogen er gewoon door. Let dus altijd op welk symbool of welke tekst er op het bord staat.", "bron": "RVV 1990 Bijlage 1, hoofdstuk C, bord C12"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je ziet een rond blauw bord met een witte pijl die recht omhoog wijst. Wat betekent dat?", "opties": ["Verboden rechtdoor te rijden", "Je moet rechtdoor", "Advies om rechtdoor te gaan"], "correct": 1, "uitleg": "Dit is een D-bord, een gebod. Rond en blauw met een witte pijl betekent: dit moet je doen. Pijl recht omhoog is dus verplicht rechtdoor.", "bron": "RVV 1990 Bijlage 1, hoofdstuk D (Rijrichting / gebod)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Wat is het verschil tussen een blauw rond bord en een rond bord met een rode rand?", "opties": ["Blauw rond is een gebod (moet), rood omrand is een verbod (mag niet)", "Beide zijn verboden", "Blauw rond is een waarschuwing, rood omrand een gebod"], "correct": 0, "uitleg": "Blauw en rond met een witte pijl is een gebod: dit moet je doen. Rond met een rode rand is een verbod: dit mag niet. Aan de kleur en vorm zie je dus al wat het bord van je wil.", "bron": "RVV 1990 Bijlage 1, hoofdstukken C en D"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Wat betekent bord E1?", "opties": ["Parkeergelegenheid", "Parkeerverbod", "Verbod stil te staan"], "correct": 1, "uitleg": "E1 is het parkeerverbod. Stilstaan om snel iemand te laten in of uitstappen mag hier nog wel, maar parkeren niet. Dat is het verschil met het stopverbod.", "bron": "RVV 1990 Bijlage 1, hoofdstuk E, bord E1"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Bord E2 betekent verbod stil te staan. Wat mag je daar dus ook niet?", "opties": ["Inhalen", "Parkeren", "Keren"], "correct": 1, "uitleg": "Als je niet eens mag stilstaan, dan mag je er zeker niet parkeren. E2 verbiedt allebei. Stilstaan is namelijk de lichtere variant, en die mag hier al niet.", "bron": "RVV 1990 Bijlage 1, hoofdstuk E, bord E2"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Bord E6 wijst een gehandicaptenparkeerplaats aan. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. E6 is de gehandicaptenparkeerplaats. Daar mag je alleen staan met een geldige gehandicaptenparkeerkaart. Anders blijf je er af, ook al staat de plek leeg.", "bron": "RVV 1990 Bijlage 1, hoofdstuk E, bord E6"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "multi", "vraag": "Welke van deze betekenissen horen bij een E-bord? Meerdere antwoorden kunnen goed zijn.", "opties": ["Parkeerverbod (E1)", "Verbod stil te staan (E2)", "Maximumsnelheid (E1)", "Parkeergelegenheid (E4)", "Gehandicaptenparkeerplaats (E6)"], "correct": [0, 1, 3, 4], "uitleg": "E-borden draaien om parkeren en stilstaan: E1 parkeerverbod, E2 stopverbod, E4 parkeergelegenheid en E6 gehandicaptenplaats. Maximumsnelheid hoort bij de A-borden, niet bij E.", "bron": "RVV 1990 Bijlage 1, hoofdstuk E, borden E1, E2, E4, E6"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Onder een E-bord zie je een pijl staan. Waar dient die pijl voor?", "opties": ["Hij geeft de rijrichting aan", "Hij geeft aan vanaf of tot waar het verbod of de plek geldt", "Hij wijst naar de dichtstbijzijnde parkeermeter"], "correct": 1, "uitleg": "Pijlen onder een E-bord vertellen je het bereik: vanaf hier, tot hier, of langs deze kant. Lees dat onderbord altijd even, anders sta je zo verkeerd geparkeerd.", "bron": "RVV 1990 Bijlage 1, hoofdstuk E (onderborden en pijlen)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Wat voor soort regels vind je terug bij de F-borden?", "opties": ["Overige geboden en verboden, zoals bij smalle doorgangen en inhaalverboden", "Alleen snelheidsregels", "Alleen voorrangsregels"], "correct": 0, "uitleg": "F is de verzamelcategorie. Hier zitten de overige geboden en verboden in, zoals regels bij een smalle doorgang en inhaalverboden voor bijvoorbeeld vrachtauto's. Let bij verboden goed op het paar begin en einde.", "bron": "RVV 1990 Bijlage 1, hoofdstuk F (Overige geboden en verboden)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Een inhaalverbod voor vrachtauto's valt onder de F-borden. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. Inhaalverboden, ook het verbod voor vrachtauto's om in te halen en het einde daarvan, vallen onder de F-borden. F is de verzamelcategorie voor doorgaan, wachten en inhalen.", "bron": "RVV 1990 Bijlage 1, hoofdstuk F (Overige geboden en verboden)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Waar gaan de G-borden over?", "opties": ["Parkeren", "De soort weg en welke regels daar gelden", "Waarschuwingen voor gevaar"], "correct": 1, "uitleg": "G-borden tonen op wat voor soort weg je rijdt, bijvoorbeeld autosnelweg of erf. De wegsoort bepaalt onder andere de standaardsnelheid en wie er mag rijden. Zie je het bord, dan weet je meteen welke regels gelden.", "bron": "RVV 1990 Bijlage 1, hoofdstuk G (Verkeersregels)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je rijdt een gebied binnen waar bord G5 staat, het erf. Wat geldt daar?", "opties": ["Je mag 50 km/u rijden", "Je rijdt stapvoets en voetgangers mogen de hele weg gebruiken", "Alleen fietsers mogen er rijden"], "correct": 1, "uitleg": "Op een erf rijd je stapvoets, dus ongeveer wandeltempo, en voetgangers mogen de hele weg gebruiken. Een erf is bedoeld om te wonen en spelen, niet om snel doorheen te rijden.", "bron": "RVV 1990 Bijlage 1, hoofdstuk G, bord G5 (erf)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Bord G11 geeft een verplicht fietspad aan. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. G11 is het verplichte fietspad. Fietsers moeten daar rijden, en als bestuurder van een auto hoor je daar niet thuis. De wegsoort bepaalt wie er mag.", "bron": "RVV 1990 Bijlage 1, hoofdstuk G, bord G11"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je ziet een driehoekig bord met een rode rand en een zwart symbool op een witte achtergrond. Wat voor soort bord is dit?", "opties": ["Een verbodsbord", "Een gebodsbord", "Een waarschuwingsbord"], "correct": 2, "uitleg": "Dit is een J-bord, een waarschuwing. Het verbiedt of gebiedt niets, maar zegt: let op, er komt een gevaar of bijzondere situatie aan. Verlaag zo nodig je snelheid en blijf alert.", "bron": "RVV 1990 Bijlage 1, hoofdstuk J (Waarschuwing)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Voor welk gevaar waarschuwt bord J10?", "opties": ["Spelende kinderen", "Een spoorwegovergang met overwegbomen", "Een voetgangersoversteekplaats"], "correct": 1, "uitleg": "J10 waarschuwt voor een spoorwegovergang met overwegbomen. Pas je snelheid aan en let goed op, want een trein stopt niet voor jou.", "bron": "RVV 1990 Bijlage 1, hoofdstuk J, bord J10"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je rijdt langs een school en ziet bord J21. Waar waarschuwt dat voor?", "opties": ["Een spoorwegovergang", "Spelende kinderen", "Een gladde weg"], "correct": 1, "uitleg": "J21 waarschuwt voor kinderen, bijvoorbeeld spelende kinderen bij een school. Kinderen doen onverwachte dingen, dus minder gas en wees extra voorzichtig.", "bron": "RVV 1990 Bijlage 1, hoofdstuk J, bord J21"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Een J-bord verplicht je te stoppen. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Een J-bord is een waarschuwing en verbiedt of gebiedt niets. Het zegt alleen: let op, er komt iets aan. Je past je rijgedrag aan, maar stoppen hoeft niet per se.", "bron": "RVV 1990 Bijlage 1, hoofdstuk J (Waarschuwing)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "multi", "vraag": "Welke van deze borden zijn waarschuwingsborden uit categorie J? Meerdere antwoorden kunnen goed zijn.", "opties": ["J10 spoorwegovergang met bomen", "J21 kinderen", "E1 parkeerverbod", "B6 voorrangskruising"], "correct": [0, 1], "uitleg": "J10 en J21 zijn allebei waarschuwingsborden uit categorie J. E1 is een parkeerbord en B6 een voorrangsbord, die horen er niet bij. De letter J verraadt de waarschuwingscategorie.", "bron": "RVV 1990 Bijlage 1, hoofdstuk J (waarschuwingsborden)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "multi", "vraag": "Koppel de letter aan het juiste soort bord. Welke combinaties kloppen? Meerdere antwoorden kunnen goed zijn.", "opties": ["A = snelheid", "B = voorrang", "C = geslotenverklaring en verboden", "J = parkeren", "D = gebod (verplichte rijrichting)"], "correct": [0, 1, 2, 4], "uitleg": "A is snelheid, B voorrang, C geslotenverklaring en verboden, en D het gebod met de verplichte rijrichting. J gaat over waarschuwingen, niet over parkeren. Parkeren zit bij de E-borden.", "bron": "RVV 1990 Bijlage 1, indeling hoofdstukken A t/m J"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Er ligt een doorgetrokken streep in het midden van de weg. Wat mag je daarmee?", "opties": ["Je mag hem overschrijden om in te halen", "Je mag hem niet overschrijden en er niet op rijden", "Je mag er alleen overheen bij een obstakel"], "correct": 1, "uitleg": "Een doorgetrokken streep mag je niet overschrijden en je mag er ook niet op rijden. Je blijft netjes aan je eigen kant. Inhalen waar zo'n streep ligt is dus niet toegestaan.", "bron": "RVV 1990 art. 76 (markeringen, doorgetrokken streep)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Een onderbroken streep mag je overschrijden om in te halen, als het veilig kan. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. Een onderbroken streep mag je overschrijden, bijvoorbeeld om in te halen, zolang het veilig is. De onderbreking geeft je die ruimte, anders dan de doorgetrokken streep.", "bron": "RVV 1990 art. 76-77 (onderbroken streep)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Er ligt een doorgetrokken en een onderbroken streep naast elkaar. Welke geldt voor jou?", "opties": ["Altijd de doorgetrokken streep", "De streep die het dichtst bij jou ligt", "Altijd de onderbroken streep"], "correct": 1, "uitleg": "Bij zo'n dubbele streep geldt voor jou de streep die het dichtst bij jou ligt. Ligt de doorgetrokken aan jouw kant, dan mag je er niet overheen. Ligt de onderbroken aan jouw kant, dan mag je inhalen als het veilig is.", "bron": "RVV 1990 art. 76-77 (markeringen)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je ziet driehoeken op het wegdek, met de punt naar je toe gericht. Wat betekenen deze haaientanden?", "opties": ["Je hebt voorrang", "Verleen voorrang aan bestuurders op de kruisende weg", "Verboden door te rijden"], "correct": 1, "uitleg": "Haaientanden met de punt naar je toe betekenen: verleen voorrang aan bestuurders op de kruisende weg. Ze horen vaak bij het bord B6 en versterken dezelfde boodschap.", "bron": "RVV 1990 art. 80 (haaientanden = voorrang verlenen)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je ziet grote blokken op het wegdek, een blokmarkering. Wat geeft dat meestal aan?", "opties": ["Een parkeervak", "De grens van een busbaan of een verdrijvingsvlak, waar je niet zomaar mag rijden", "Een fietsoversteek"], "correct": 1, "uitleg": "Een blokmarkering markeert bijvoorbeeld de grens van een busbaan of een verdrijvingsvlak. Daar mag je niet zomaar rijden. De grote blokken zijn het signaal: hier hoor je met je auto niet.", "bron": "RVV 1990 art. 76-78 (markeringen, blokmarkering)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "multi", "vraag": "Welke uitspraken over strepen en tekens op het wegdek kloppen? Meerdere antwoorden kunnen goed zijn.", "opties": ["Een doorgetrokken streep mag je niet overschrijden", "Een onderbroken streep mag je overschrijden als het veilig is", "Haaientanden betekenen dat jij voorrang hebt", "Bij een dubbele streep geldt de streep het dichtst bij jou", "Op een blokmarkering van een busbaan mag je niet zomaar rijden"], "correct": [0, 1, 3, 4], "uitleg": "Doorgetrokken niet overschrijden, onderbroken wel als het veilig is, bij dubbele streep telt die het dichtst bij jou, en op een blokmarkering rij je niet zomaar. Haaientanden betekenen juist dat jij voorrang moet verlenen, niet dat je voorrang hebt.", "bron": "RVV 1990 art. 76-80 (markeringen en haaientanden)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Het verkeerslicht staat op geel. Wat moet je doen?", "opties": ["Altijd doorrijden", "Stoppen, tenzij dat niet meer veilig kan", "Altijd stoppen, ook als je er bovenop staat"], "correct": 1, "uitleg": "Geel betekent stoppen, tenzij dat niet meer veilig kan. Sta je al zo dichtbij dat hard remmen gevaarlijk is, dan rijd je rustig door. Anders stop je netjes voor de streep.", "bron": "RVV 1990 art. 68 (driekleurige verkeerslichten)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Je ziet een verkeerslicht met een groene pijl naar rechts. Wat betekent dat?", "opties": ["Alle richtingen mogen rijden", "Alleen rechtsaf is vrij", "Je moet stoppen"], "correct": 1, "uitleg": "Een pijllicht geldt alleen voor de richting van de pijl. Een groene pijl naar rechts betekent dus dat alleen rechtsaf vrij is. Wil je rechtdoor, dan moet je daarvoor het eigen licht afwachten.", "bron": "RVV 1990 art. 68 (verkeerslichten, pijllichten)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Een verkeerslicht knippert geel. Wat betekent dat?", "opties": ["Stoppen en wachten op groen", "Let op, je mag doorrijden en de normale voorrangsregels gelden", "De weg is afgesloten"], "correct": 1, "uitleg": "Knipperend geel betekent: let op, maar je mag doorrijden. Het licht regelt het verkeer dan niet meer, dus gelden de gewone voorrangsregels. Kijk dus goed wie er van rechts komt of op een voorrangsweg rijdt.", "bron": "RVV 1990 art. 70 (knipperend geel)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Een apart verkeerslicht voor fietsers geldt ook voor jou als automobilist. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Aparte lichten voor fietsers, voetgangers of bussen gelden alleen voor die groep. Jij let als automobilist op het licht dat voor jouw rijstrook bedoeld is.", "bron": "RVV 1990 art. 68 (verkeerslichten voor bepaalde groepen)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "multi", "vraag": "Welke uitspraken over verkeerslichten kloppen? Meerdere antwoorden kunnen goed zijn.", "opties": ["Rood betekent stoppen", "Geel betekent stoppen tenzij dat niet meer veilig kan", "Groen betekent dat je altijd moet doorrijden", "Een pijllicht geldt alleen voor die richting", "Knipperend geel betekent dat je moet stoppen"], "correct": [0, 1, 3], "uitleg": "Rood is stoppen, geel is stoppen tenzij het niet meer veilig kan, en een pijllicht geldt alleen voor die ene richting. Groen is geen plicht maar mag als het vrij is, en knipperend geel betekent juist oppassen en doorrijden, niet stoppen.", "bron": "RVV 1990 art. 68 en art. 70 (verkeerslichten)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Een verkeersregelaar geeft een ander teken dan het verkeerslicht aangeeft. Wat volg je?", "opties": ["Het verkeerslicht", "De verkeersregelaar", "Het verkeersbord"], "correct": 1, "uitleg": "Je volgt de verkeersregelaar. Aanwijzingen van een regelaar of agent gaan boven verkeerslichten, borden en de gewone verkeersregels. Wijkt het teken af van het licht, dan is de regelaar de baas.", "bron": "RVV 1990 art. 84 (rangorde aanwijzingen boven verkeerstekens)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "mc", "vraag": "Wat is het algemene stopteken van een verkeersregelaar?", "opties": ["Beide armen omlaag", "Eén arm omhoog met de handpalm naar voren", "Met een vlag zwaaien"], "correct": 1, "uitleg": "Het algemene stopteken is één arm omhoog met de handpalm naar voren. Het verkeer dat die kant op nadert moet dan stoppen. Een duidelijk gebaar dat je altijd moet kunnen herkennen.", "bron": "RVV 1990 art. 83 (gebaren verkeersregelaar)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "janee", "vraag": "Je bent verplicht de aanwijzingen van een bevoegde, herkenbare verkeersregelaar op te volgen. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. De aanwijzingen van een bevoegde, herkenbare verkeersregelaar volg je altijd op, dat is wettelijk verplicht. Ook als je het er niet mee eens bent, je doet wat hij aangeeft.", "bron": "RVV 1990 art. 82 (plicht aanwijzingen bevoegd persoon op te volgen)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "invul", "vraag": "Welke letter hebben de borden die over snelheid gaan? Vul de letter in.", "opties": [], "correct": "A", "uitleg": "De A-borden gaan over snelheid, zoals de maximumsnelheid of het einde daarvan. Onthoud de letter, dan herken je het soort bord meteen.", "bron": "RVV 1990 Bijlage 1, hoofdstuk A (Snelheid)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "invul", "vraag": "Welke letter hebben de waarschuwingsborden, die driehoekig zijn met een rode rand? Vul de letter in.", "opties": [], "correct": "J", "uitleg": "De J-borden zijn de waarschuwingsborden: driehoekig, rode rand, zwart symbool op wit. Ze waarschuwen voor een gevaar verderop, zoals een spoorwegovergang of spelende kinderen.", "bron": "RVV 1990 Bijlage 1, hoofdstuk J (Waarschuwing)"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "invul", "vraag": "Welke bordcode heeft het stopbord, waarbij je verplicht moet stoppen en daarna voorrang verlenen? Vul de code in.", "opties": [], "correct": "B7", "uitleg": "B7 is het stopbord. Je stopt altijd, ook als er niemand aankomt, en daarna verleen je voorrang. De B verraadt dat het om voorrang gaat.", "bron": "RVV 1990 Bijlage 1, hoofdstuk B, bord B7"}, {"onderwerp": "Verkeerstekens en aanwijzingen", "hoofdstukref": 14, "type": "invul", "vraag": "Welke letter hebben de borden over parkeren en stilstaan? Vul de letter in.", "opties": [], "correct": "E", "uitleg": "De E-borden gaan over parkeren en stilstaan, zoals het parkeerverbod E1 en de gehandicaptenplaats E6. Kijk altijd even naar de pijlen op het onderbord voor het bereik.", "bron": "RVV 1990 Bijlage 1, hoofdstuk E (Parkeren en stilstaan)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "mc", "vraag": "Wat wordt bedoeld met de rijtaak?", "opties": ["Alleen het sturen en schakelen", "Steeds kijken, beslissen en handelen tijdens het rijden", "De route die je naar je bestemming volgt"], "correct": 1, "uitleg": "De rijtaak is alles wat je achter het stuur continu doet: kijken, de situatie lezen, beslissen en bijsturen. Vaak meerdere keren per seconde. Dat vraagt je volle aandacht, niet alleen je handen aan het stuur.", "bron": "RVV 1990 art. 5; WVW 1994 art. 5; CBR exameneisen rijbewijs B (mens en rijtaak)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "janee", "vraag": "Een ander maakt een fout in het verkeer. Blijf jij dan toch verplicht om het ongeluk te voorkomen als dat kan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ja. Ook als een ander een fout maakt, ben jij verplicht een ongeluk te voorkomen zolang dat in jouw macht ligt. Je rijdt zo dat je niemand in gevaar brengt, los van wat een ander doet.", "bron": "RVV 1990 art. 5; WVW 1994 art. 5 (gevaar/hinder op de weg)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "mc", "vraag": "Je merkt onderweg dat je moe wordt. Wat helpt echt om weer alert te worden?", "opties": ["Een raampje openzetten", "De radio harder zetten", "Stoppen en even rusten"], "correct": 2, "uitleg": "Alleen stoppen en rusten helpt echt. Een raampje open of de radio harder doet niets aan vermoeidheid. Een korte pauze, eventueel met een powernap, maakt je weer scherp.", "bron": "CBR exameneisen rijbewijs B (mens en rijtaak); SWOV-kennis over vermoeidheid; RVV 1990 art. 5"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "multi", "vraag": "Welke van deze signalen kunnen erop wijzen dat je te moe bent om veilig door te rijden? Meerdere antwoorden kunnen goed zijn.", "opties": ["Je geeuwt vaak", "Je ogen worden branderig", "Je kunt je het laatste stuk weg niet meer herinneren", "Je voelt je fris en uitgerust"], "correct": [0, 1, 2], "uitleg": "Geeuwen, branderige ogen en je het afgelegde stuk niet meer kunnen herinneren zijn duidelijke signalen van vermoeidheid. Schuif ze niet opzij. Je fris voelen is juist geen waarschuwing.", "bron": "CBR exameneisen rijbewijs B (mens en rijtaak); SWOV-kennis over vermoeidheid"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "invul", "vraag": "Liam heeft zijn rijbewijs vóór zijn 18e gehaald via 2toDrive. Wat is voor hem de maximale hoeveelheid alcohol in promille die hij in zijn bloed mag hebben als hij rijdt?", "opties": [], "correct": "0,2", "uitleg": "Voor een beginnende bestuurder geldt 0,2 promille. Haal je je rijbewijs vóór je 18e, zoals via 2toDrive, dan duurt die strengere periode 7 jaar. In de praktijk betekent dat: niet drinken als je nog moet rijden, want één glas kan je er al overheen brengen.", "bron": "WVW 1994 art. 8; grenswaarde 0,2 promille beginnende bestuurder (7 jaar bij rijbewijs vóór 18e); CBR exameneisen rijbewijs B"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "mc", "vraag": "Liam heeft zijn rijbewijs via 2toDrive vóór zijn 18e gehaald. Hoe lang geldt voor hem de strengere alcoholgrens van 0,2 promille?", "opties": ["3 jaar", "5 jaar", "7 jaar"], "correct": 2, "uitleg": "Normaal ben je 5 jaar beginnend bestuurder, maar als je je rijbewijs vóór je 18e haalt loopt die periode tot 7 jaar. Liam zit dus zeven jaar lang aan de 0,2 promille vast.", "bron": "Grenswaarde 0,2 promille beginnende bestuurder; verlengde periode van 7 jaar bij rijbewijs vóór 18e (2toDrive); CBR exameneisen rijbewijs B"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "janee", "vraag": "Maakt alcohol je reactietijd langer en je inschatting slechter, ook al heb je zelf het idee dat je nog prima rijdt?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ja. Alcohol maakt je reactietijd langer en je inschatting slechter, terwijl je zelfvertrouwen juist stijgt. Daardoor merk je vaak zelf niet hoeveel slechter je rijdt, en dat maakt het extra gevaarlijk.", "bron": "WVW 1994 art. 8; CBR exameneisen rijbewijs B (mens en rijtaak)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "mc", "vraag": "Op de verpakking van een medicijn staat een gele waarschuwingssticker. Wat betekent die voor het autorijden?", "opties": ["Wees voorzichtig met rijden", "Je mag absoluut niet rijden", "Het medicijn heeft geen invloed op je rijden"], "correct": 0, "uitleg": "Een gele sticker betekent: wees voorzichtig. De sticker kent meerdere niveaus, van een lichte waarschuwing tot het advies om niet te rijden. Weet je het niet zeker, vraag het dan aan je arts of apotheker voordat je instapt.", "bron": "WVW 1994 art. 8; medicijnwaarschuwingssystematiek (KNMP/CBG); CBR exameneisen rijbewijs B"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "janee", "vraag": "Je staat stil voor een rood verkeerslicht. Mag je dan je telefoon even in je hand pakken?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Een mobiel apparaat vasthouden tijdens het rijden is verboden, en dat geldt ook als je stilstaat voor een rood licht. Het vasthouden is het probleem. In een houder gebruiken mag wel.", "bron": "RVV 1990 art. 61a (verbod vasthouden mobiel elektronisch apparaat)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 1, "type": "mc", "vraag": "Wanneer stel je je navigatie en muziek het beste in?", "opties": ["Onderweg, als er een rustig stuk weg komt", "Voordat je wegrijdt", "Tijdens het rijden, zolang je in een houder bedient"], "correct": 1, "uitleg": "Stel alles in voordat je wegrijdt. Ook met je telefoon in een houder hoort je aandacht bij de weg, niet bij het scherm. Onderweg instellen haalt je aandacht van het verkeer en dat vergroot het risico.", "bron": "RVV 1990 art. 61a; CBR exameneisen rijbewijs B (afleiding)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "mc", "vraag": "Welk licht gebruik je in het donker en bij slecht zicht?", "opties": ["Stadslicht", "Dimlicht", "Mistlicht achter"], "correct": 1, "uitleg": "Dimlicht gebruik je in het donker en bij slecht zicht. Daarmee zie je beter en word je beter gezien. Grootlicht mag alleen zonder tegenligger of voorganger, en mistlicht achter heeft zijn eigen strenge regel.", "bron": "RVV 1990 art. 32 en art. 35-38 (gebruik licht)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "invul", "vraag": "Beneden welk zicht in meters mag je het mistachterlicht aanzetten? Vul het getal in.", "opties": [], "correct": "50", "uitleg": "Mistlicht achter mag je alleen gebruiken als het zicht door mist of sneeuw minder is dan 50 meter. Anders verblind je de mensen achter je. Wordt het zicht beter, zet het dan meteen weer uit.", "bron": "RVV 1990 art. 34 (mistlicht achter bij zicht < 50 m)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "janee", "vraag": "Mag je grootlicht gebruiken terwijl er een tegenligger aankomt?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Grootlicht mag alleen als er geen tegenligger is en je je voorganger niet verblindt. Komt er iemand aan, dan dim je op tijd, anders verblind je hem en wordt het juist gevaarlijk.", "bron": "RVV 1990 art. 35-38 (gebruik licht, dimmen voor tegenliggers)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "mc", "vraag": "Je maakt een noodstop in een auto met ABS. Wat doe je?", "opties": ["Het rempedaal voorzichtig pompen", "Het rempedaal stevig intrappen en blijven sturen", "Het rempedaal kort intrappen en weer loslaten"], "correct": 1, "uitleg": "Bij een noodstop met ABS trap je het rempedaal stevig in en blijf je sturen. ABS houdt de wielen draaiend, zodat je kunt blijven sturen. Dat het pedaal daarbij trilt is normaal.", "bron": "Regeling voertuigen hoofdstuk 5 (reminrichting); CBR exameneisen rijbewijs B (techniek en bediening)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "multi", "vraag": "Welke signalen kunnen wijzen op een probleem met je remmen? Meerdere antwoorden kunnen goed zijn.", "opties": ["Een zacht of wegzakkend rempedaal", "Piepende of schurende geluiden bij het remmen", "De auto trekt bij het remmen naar één kant", "Een trillend pedaal tijdens een ABS-noodstop"], "correct": [0, 1, 2], "uitleg": "Een zacht pedaal, piepen of schuren en trekken naar één kant zijn signalen om je remmen te laten controleren. Een trillend pedaal tijdens een ABS-noodstop is juist normaal en hoort erbij.", "bron": "Regeling voertuigen hoofdstuk 5 (eisen reminrichting); CBR exameneisen rijbewijs B"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "janee", "vraag": "Je ruit is beslagen. Mag je wegrijden zodra je een klein kijkgaatje hebt vrijgemaakt?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Je maakt de ruit eerst helemaal vrij voordat je wegrijdt. Een klein kijkgaatje is niet genoeg en niet veilig, want je overziet het verkeer dan lang niet volledig.", "bron": "Regeling voertuigen (eisen ruiten, zicht en spiegels); RVV 1990 art. 5 (geen gevaar)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "mc", "vraag": "Waarom kijk je over je schouder voordat je van rijstrook wisselt of afslaat?", "opties": ["Om je nek los te maken", "Omdat je spiegels de dode hoek niet tonen", "Omdat dat verplicht is bij elke handeling"], "correct": 1, "uitleg": "Elke auto heeft een dode hoek: het gebied naast en schuin achter je dat je niet in je spiegels ziet. Daarom kijk je voor een strookwissel of het afslaan even over je schouder, anders kun je een fietser of auto missen.", "bron": "Regeling voertuigen (zicht en spiegels); RVV 1990 art. 54 (dode hoek bij manoeuvres)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "invul", "vraag": "Tot welke lengte in meters moet een kind in een goedgekeurd kinderbeveiligingssysteem zitten? Vul het getal in.", "opties": [], "correct": "1,35", "uitleg": "Kinderen die kleiner zijn dan 1,35 meter horen in een goedgekeurd kinderzitje of stoelverhoger dat bij hun lengte en gewicht past. Als bestuurder ben jij ervoor verantwoordelijk dat ze goed vastzitten.", "bron": "RVV 1990 art. 59 (autogordel, kinderbeveiligingssysteem, grens 1,35 m)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "janee", "vraag": "Moet iedereen in de auto de gordel dragen, dus ook de passagiers achterin?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ja. De gordel is verplicht voor iedereen, bestuurder en passagiers, voorin en achterin. De gordel is je belangrijkste bescherming bij een botsing.", "bron": "RVV 1990 art. 59 (autogordel)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 2, "type": "mc", "vraag": "Waar stel je de bovenkant van je hoofdsteun het beste op af?", "opties": ["Op schouderhoogte", "Ongeveer op ooghoogte", "Zo laag mogelijk"], "correct": 1, "uitleg": "De bovenkant van de hoofdsteun staat het beste ongeveer op ooghoogte. Zo beschermt hij je nek als je van achteren wordt aangereden. Te laag afgesteld doet de hoofdsteun zijn werk niet goed.", "bron": "RVV 1990 art. 59; CBR exameneisen rijbewijs B (gordels en zitplaatsen)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 3, "type": "mc", "vraag": "Je krijgt pech op de autosnelweg. Wat doe je als eerste?", "opties": ["Midden op de rijbaan stoppen en je telefoon pakken", "Zo ver mogelijk naar rechts de vluchtstrook op sturen en je alarmlichten aanzetten", "Achteruit naar de dichtstbijzijnde afrit rijden"], "correct": 1, "uitleg": "Bij pech stuur je zo ver mogelijk naar rechts de vluchtstrook op en zet je je alarmlichten aan. Daarna stap je uit aan de veilige kant, achter de vangrail, en bel je voor hulp. Zo breng je jezelf en anderen niet in gevaar.", "bron": "RVV 1990 art. 43 lid 3 (gebruik vluchtstrook bij noodgeval); CBR exameneisen rijbewijs B"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 3, "type": "janee", "vraag": "Mag je op een gewone, vrije autosnelweg op de vluchtstrook rijden om sneller vooruit te komen?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. De vluchtstrook is alleen voor noodgevallen, bij pech of een ongeval. Normaal mag je er niet op rijden of stilstaan, ook niet als de weg vrij is.", "bron": "RVV 1990 art. 43 lid 3 (verbod gebruik vluchtstrook behalve noodgeval)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 3, "type": "mc", "vraag": "Je bent na pech veilig op de vluchtstrook gestopt. Aan welke kant stap je uit?", "opties": ["Aan de kant van het verkeer, want dat gaat sneller", "Aan de veilige kant, meestal rechts, achter de vangrail", "Je blijft zitten en wacht in de auto op de rijbaan"], "correct": 1, "uitleg": "Je stapt uit aan de veilige kant, meestal rechts, en gaat achter de vangrail staan. Aan de kant van het langsrazende verkeer uitstappen is levensgevaarlijk. Bel daarna voor hulp.", "bron": "RVV 1990 art. 43 lid 3; CBR exameneisen rijbewijs B (reageren bij pech)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 4, "type": "mc", "vraag": "Wanneer mag je de claxon of een lichtsignaal met je grootlicht gebruiken?", "opties": ["Om je ongeduld te laten merken", "Om iemand te laten opschieten", "Om dreigend gevaar af te wenden"], "correct": 2, "uitleg": "De claxon en het knipperen met grootlicht zijn alleen bedoeld om dreigend gevaar af te wenden, dus om iemand te waarschuwen. Toeteren uit ongeduld of boosheid is niet toegestaan en laat anderen juist schrikken.", "bron": "RVV 1990 art. 28 (geluids- en knippersignalen ter afwending van dreigend gevaar)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 4, "type": "janee", "vraag": "Mag je binnen de bebouwde kom 's nachts toeteren om iemand te laten opschieten?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Binnen de bebouwde kom mag je 's nachts geen geluidssignaal geven, behalve om gevaar te voorkomen. Toeteren uit ongeduld valt daar niet onder.", "bron": "RVV 1990 art. 28 (geluidssignalen)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 13, "type": "multi", "vraag": "Uit welke drie stappen bestaat gevaarherkenning? Kies de drie stappen.", "opties": ["Waarnemen", "Voorspellen", "Handelen", "Vergeten"], "correct": [0, 1, 2], "uitleg": "Gevaarherkenning draait om waarnemen (wat zie ik?), voorspellen (wat kan er gebeuren?) en handelen (wat doe ik nu?). Kijk je ver vooruit en schat je gevaren alvast in, dan heb je meer tijd om veilig te reageren.", "bron": "CBR exameneisen theorie-examen rijbewijs B (gevaarherkenning: waarnemen, voorspellen, handelen)"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 13, "type": "mc", "vraag": "In een animatievraag zie je een bal de straat oprollen voor een rij geparkeerde auto's. Wat is hier de beste keuze?", "opties": ["Niets doen, want er is nog niets aan de hand", "Remmen, want er kan zo een kind achter de bal aan rennen", "Gas geven om er snel voorbij te zijn"], "correct": 1, "uitleg": "Een bal op straat kan betekenen dat er zo een kind achteraan rent. Dat is een direct gevaar, dus je remt. Vooruitdenken over wat een ander kan doen, hoort bij goede gevaarherkenning.", "bron": "CBR exameneisen rijbewijs B (voorspellen, anticiperen, risico-inschatting); CBR gevaarherkenning"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 13, "type": "mc", "vraag": "Bij de animatievragen kies je vaak voor 'gas loslaten'. Wanneer is dat de juiste keuze?", "opties": ["Bij een direct gevaar waarvoor je hard moet stoppen", "Bij een mogelijk gevaar dat zich nog niet meteen voordoet", "Als je de situatie volledig overziet en er niets dreigt"], "correct": 1, "uitleg": "Gas loslaten kies je bij een mogelijk gevaar dat zich nog niet meteen voordoet, zodat je alvast snelheid mindert en voorbereid bent. Remmen is voor direct gevaar, niets doen voor een veilige, overzichtelijke situatie.", "bron": "CBR nieuws 'Vernieuwd theorie-examen B-rijbewijs vanaf 7 april' (cbr.nl); CBR exameneisen gevaarherkenning"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 13, "type": "janee", "vraag": "Je rijdt langs een school terwijl kinderen naar buiten komen. Pas je je snelheid hierop aan, ook al staat er een hoger snelheidsbord?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ja. De maximumsnelheid is een bovengrens, geen doel. Bij een school reken je op kinderen die plotseling oversteken, dus je rijdt rustiger. Minder snelheid geeft je meer tijd om te reageren en een kortere remweg.", "bron": "RVV 1990 art. 19 (snelheid aanpassen, tijdig stoppen); CBR exameneisen gevaarherkenning"}, {"onderwerp": "Veilig rijden en reageren in noodsituaties", "hoofdstukref": 13, "type": "mc", "vraag": "Je nadert een grote vrachtwagen die rechtsaf wil. Waarom is dat een risicovolle situatie voor fietsers?", "opties": ["Omdat de vrachtwagen sneller optrekt dan jij", "Omdat de vrachtwagen een grote dode hoek heeft waarin fietsers onzichtbaar zijn", "Omdat fietsers altijd voorrang nemen"], "correct": 1, "uitleg": "Vrachtwagens en bussen hebben een grote dode hoek. Een fietser dicht naast de cabine is voor de chauffeur soms onzichtbaar. Houd daarom afstand van grote voertuigen die rechtsaf willen.", "bron": "RVV 1990 art. 54 (dode hoek bij manoeuvres); CBR exameneisen rijbewijs B (kwetsbare weggebruikers)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "invul", "vraag": "Wat is de wettelijke minimale profieldiepte van de banden van een personenauto, in millimeters?", "opties": [], "correct": "1,6", "uitleg": "De hoofdgroeven van je banden moeten over de hele omtrek minstens 1,6 mm profiel hebben. Kom je daaronder, dan keurt de APK je af en mag je niet rijden. Minder profiel betekent een langere remweg, vooral als het regent.", "bron": "Regeling voertuigen art. 5.2.27"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Wat gebeurt er met je auto bij de APK als het profiel van een band onder de 1,6 mm zit?", "opties": ["Hij wordt afgekeurd en je mag niet rijden", "Je krijgt een waarschuwing maar mag nog een jaar rijden", "Niets, 1,6 mm is alleen een advies"], "correct": 0, "uitleg": "1,6 mm is geen advies maar een wettelijke eis. Zit je eronder, dan word je bij de APK afgekeurd en is de auto niet toegestaan op de weg. Veel mensen vervangen hun banden al eerder, want bij regen merk je het verschil meteen.", "bron": "Regeling voertuigen art. 5.2.27; RDW APK-eisen"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "janee", "vraag": "Te zachte banden verbruiken meer brandstof en slijten sneller. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. Een te lage bandenspanning zorgt voor meer rolweerstand, dus meer verbruik, snellere slijtage en in het ergste geval een klapband. Houd de waarde aan die de fabrikant adviseert, die staat in het instructieboekje of op een sticker bij het portier.", "bron": "Regeling voertuigen hoofdstuk 5 (banden); CBR exameneisen rijbewijs B"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Je rijdt in het donker buiten de bebouwde kom en er komt een tegenligger aan. Welk licht voer je?", "opties": ["Grootlicht", "Dimlicht", "Alleen stadslicht"], "correct": 1, "uitleg": "Met een tegenligger erbij gebruik je dimlicht, anders verblind je de ander. Grootlicht mag alleen als er geen tegenligger of voorganger is, en je dimt het op tijd. Stadslicht alleen is te weinig om goed te zien en gezien te worden.", "bron": "RVV 1990 art. 32; art. 35 t/m 38 (gebruik verlichting)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "invul", "vraag": "Onder welke zichtafstand in meters mag je je mistachterlicht pas aanzetten?", "opties": [], "correct": "50", "uitleg": "Het mistachterlicht mag pas aan als het zicht door mist of sneeuw minder is dan 50 meter. Anders verblind je de mensen achter je. Wordt het zicht beter, zet het dan meteen weer uit.", "bron": "RVV 1990 art. 34"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "janee", "vraag": "Mag je je mistlicht achter aanzetten bij een flinke regenbui waarbij je nog ruim 100 meter ver kunt kijken?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Het mistachterlicht mag alleen aan als het zicht door mist of sneeuw onder de 50 meter zakt. Bij regen waarbij je nog 100 meter ziet, verblind je de mensen achter je alleen maar. Mistlicht vóór mag wel als regen het zicht ernstig beperkt.", "bron": "RVV 1990 art. 34"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Je maakt een noodstop in een auto met ABS. Wat doe je met het rempedaal?", "opties": ["Voorzichtig pompen met het pedaal", "Stevig intrappen en blijven sturen", "Kort intrappen en weer loslaten"], "correct": 1, "uitleg": "Bij ABS trap je het rempedaal in één keer stevig in en blijf je sturen. Het systeem zorgt dat de wielen niet blokkeren, zodat je kunt blijven sturen. Dat het pedaal daarbij trilt is normaal, gewoon ingetrapt houden. Pompen hoort bij oude auto's zonder ABS.", "bron": "Regeling voertuigen hoofdstuk 5 (reminrichting); CBR exameneisen rijbewijs B (techniek en bediening)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Wat is het belangrijkste voordeel van ABS bij hard remmen?", "opties": ["Je remweg wordt op elk wegdek korter", "De wielen blijven draaien zodat je kunt blijven sturen", "De motor schakelt automatisch terug"], "correct": 1, "uitleg": "ABS voorkomt dat de wielen blokkeren tijdens hard remmen. Daardoor houd je grip om te blijven sturen en kun je nog om een obstakel heen. Een kortere remweg is niet gegarandeerd, op los grind of sneeuw kan de remweg met ABS zelfs iets langer zijn.", "bron": "Regeling voertuigen hoofdstuk 5; CBR exameneisen rijbewijs B (rijhulpsystemen)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "janee", "vraag": "Een trillend rempedaal tijdens een noodstop met ABS betekent dat er iets kapot is. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee, dat trillen is juist normaal. Het is het ABS dat snel knijpt en lost om de wielen draaiend te houden. Blijf gewoon stevig intrappen en sturen. Schrik er niet van en laat het pedaal niet los.", "bron": "CBR exameneisen rijbewijs B (ABS, bediening bij noodstop)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Je rijdt met cruise control op de snelweg en je nadert een file. Wat moet je doen?", "opties": ["Niets, gewone cruise control remt zelf", "Zelf afremmen, gewone cruise control houdt alleen je snelheid vast", "De cruise control op een lagere snelheid zetten en doorrijden"], "correct": 1, "uitleg": "Gewone cruise control houdt alleen je snelheid vast en remt niet voor een file. Jij blijft verantwoordelijk en remt zelf. Alleen adaptieve cruise control past de snelheid aan op je voorligger, maar ook dan blijf je opletten en grijp je in als het moet.", "bron": "CBR exameneisen rijbewijs B (rijhulpsystemen, cruise control)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Wat doet adaptieve cruise control (ACC) wat gewone cruise control niet doet?", "opties": ["Hij stuurt de auto zelf door de bocht", "Hij past je snelheid aan op de afstand tot je voorligger", "Hij leest verkeersborden en past de snelheid daarop aan"], "correct": 1, "uitleg": "Adaptieve cruise control houdt niet alleen je snelheid vast, maar meet ook de afstand tot je voorligger en remt of versnelt mee om die afstand te bewaren. Sturen doet het systeem niet, en jij blijft altijd verantwoordelijk om in te grijpen.", "bron": "CBR exameneisen rijbewijs B (rijhulpsystemen, adaptieve cruise control)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "janee", "vraag": "Met rijhulpsystemen zoals ACC en een dodehoekwaarschuwing blijf je zelf eindverantwoordelijk voor veilig rijden. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. Rijhulpsystemen helpen je, maar nemen het sturen niet van je over. Ze kunnen falen of iets missen, dus jij blijft eindverantwoordelijk: kijken, beslissen en ingrijpen blijft jouw taak.", "bron": "CBR exameneisen rijbewijs B (rijhulpsystemen, verantwoordelijkheid bestuurder); WVW 1994 art. 5"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Tijdens het rijden gaat het rode lampje voor de motoroliedruk branden. Wat doe je?", "opties": ["Gewoon doorrijden tot je thuis bent", "Zo snel mogelijk veilig stoppen en de motor uitzetten", "De radio zachter zetten en verder rijden"], "correct": 1, "uitleg": "Een rood waarschuwingslampje betekent gevaar: stoppen. Bij te lage oliedruk kan de motor binnen korte tijd vastlopen en onherstelbaar kapotgaan. Stop zo snel als het veilig kan en zet de motor uit. Oranje lampjes mogen wachten, rode niet.", "bron": "CBR exameneisen rijbewijs B (dashboardsymbolen en waarschuwingslampjes)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Wat is het verschil tussen een rood en een oranje of geel waarschuwingslampje op je dashboard?", "opties": ["Rood is ernstiger en vraagt om direct stoppen, oranje is een waarschuwing", "Oranje is ernstiger dan rood", "Er is geen verschil, alle lampjes betekenen hetzelfde"], "correct": 0, "uitleg": "Kleur zegt alles. Rood betekent een ernstig probleem: stop zo snel als het veilig kan. Oranje of geel is een waarschuwing dat er iets aandacht nodig heeft, maar je hoeft niet meteen aan de kant. Negeer ook oranje niet te lang, laat het op tijd nakijken.", "bron": "CBR exameneisen rijbewijs B (dashboardsymbolen en waarschuwingslampjes)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "multi", "vraag": "Welke van deze zaken moet je controleren voordat je veilig de weg op gaat? Meerdere antwoorden kunnen goed zijn.", "opties": ["Bandenspanning en profiel", "De kleur van je auto", "Werking van je verlichting", "Of de ruiten schoon en vrij zijn"], "correct": [0, 2, 3], "uitleg": "Banden, verlichting en schoon zicht bepalen je veiligheid en moet je checken voor vertrek. De kleur van je auto doet niets ter zake. Maak een bevroren of beslagen ruit ook helemaal vrij, een kijkgaatje is niet genoeg.", "bron": "Regeling voertuigen hoofdstuk 5; RVV 1990 art. 32 t/m 38 (verlichting)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "multi", "vraag": "Welke signalen kunnen wijzen op een probleem met je remmen? Meerdere antwoorden kunnen goed zijn.", "opties": ["Een zacht of wegzakkend rempedaal", "Een piepend of schurend geluid bij het remmen", "De auto trekt bij remmen naar één kant", "Het rempedaal is wat stug op een koude ochtend"], "correct": [0, 1, 2], "uitleg": "Een zacht of wegzakkend pedaal, piepen of schuren, en trekken naar één kant zijn alarmsignalen, laat de remmen dan nakijken. Een pedaal dat even stug aanvoelt op een koude ochtend is op zich geen alarm, maar blijf wel alert op de rest.", "bron": "Regeling voertuigen hoofdstuk 5 (reminrichting); CBR exameneisen rijbewijs B"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "janee", "vraag": "Voordat je van rijstrook wisselt is een blik in je spiegels genoeg, want die laten alles naast je zien. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. Elke auto heeft een dode hoek, het gebied naast en schuin achter je dat je niet in je spiegels ziet. Daar kan net een motorrijder of fietser zitten. Kijk daarom voor het wisselen ook even over je schouder.", "bron": "Regeling voertuigen hoofdstuk 5 (zicht en spiegels); CBR exameneisen rijbewijs B (dode hoek)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Wat is de dode hoek van je auto?", "opties": ["Het gebied recht voor je dat je door de motorkap niet ziet", "Het gebied naast en schuin achter je dat je niet in je spiegels ziet", "Het gebied dat je alleen 's nachts niet kunt zien"], "correct": 1, "uitleg": "De dode hoek is het gebied naast en schuin achter je dat geen enkele spiegel je toont. Juist motorrijders en fietsers verdwijnen daarin. Een schouderblik voor het wisselen of afslaan lost dat op.", "bron": "Regeling voertuigen hoofdstuk 5 (zicht en spiegels); CBR exameneisen rijbewijs B"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Hoe stel je je hoofdsteun goed af voor de beste bescherming?", "opties": ["Zo laag mogelijk, ongeveer op nekhoogte", "Met de bovenkant ongeveer op ooghoogte", "Zo hoog mogelijk, boven je hoofd uit"], "correct": 1, "uitleg": "De bovenkant van de hoofdsteun hoort ongeveer op ooghoogte te staan. Zo vangt hij je hoofd op en beschermt hij je nek als je van achteren wordt aangereden. Te laag afgesteld werkt de hoofdsteun juist averechts.", "bron": "RVV 1990 art. 59; CBR exameneisen rijbewijs B (zit en hoofdsteun)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "invul", "vraag": "Tot welke lengte in meters moet een kind in een goedgekeurd kinderzitje of stoelverhoger?", "opties": [], "correct": "1,35", "uitleg": "Kinderen kleiner dan 1,35 meter horen in een goedgekeurd kinderbeveiligingssysteem dat bij hun lengte en gewicht past. Als bestuurder ben jij ervoor verantwoordelijk dat ze goed vastzitten.", "bron": "RVV 1990 art. 59"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "janee", "vraag": "Geldt de gordelplicht ook voor passagiers die achterin zitten?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ja. Iedereen in de auto draagt de gordel, voorin én achterin, bestuurder en passagiers. De gordel is je belangrijkste bescherming bij een botsing. Voor kinderen geldt daarbovenop de regel van het kinderzitje.", "bron": "RVV 1990 art. 59"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Hoe verdeel je zware lading het beste in of op je auto?", "opties": ["Zo hoog mogelijk en aan één kant", "Zo laag en gelijkmatig mogelijk", "Maakt niet uit, als het maar in de auto past"], "correct": 1, "uitleg": "Leg zware lading zo laag en gelijkmatig mogelijk. Dan blijft de auto stabiel in de bocht en bij het remmen. Hoog of scheef beladen maakt de auto onvoorspelbaar. En zet alles goed vast, want los spul wordt bij hard remmen een projectiel.", "bron": "RVV 1990 art. 5; Regeling voertuigen (eisen lading); CBR exameneisen rijbewijs B"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "mc", "vraag": "Vanaf hoeveel uitsteken achter de auto moet je je lading markeren?", "opties": ["Vanaf een halve meter", "Vanaf één meter", "Markeren hoeft nooit, als het maar vastzit"], "correct": 1, "uitleg": "Steekt lading meer dan een meter achter je auto uit, dan moet je die markeren zodat anderen het op tijd zien. En je blijft altijd onder het maximaal toegestane gewicht van je auto, want te zwaar beladen verlengt je remweg flink.", "bron": "RVV 1990 art. 5; Regeling voertuigen / WVW 1994 (eisen lading en afmetingen)"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "janee", "vraag": "Een geldige APK betekent dat je auto het hele jaar gegarandeerd in orde blijft. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. De APK is een momentopname. Jij blijft als bestuurder verantwoordelijk dat de auto ook tussen de keuringen door rijklaar is, dus banden, verlichting en remmen op orde. Een geldige APK ontslaat je daar niet van.", "bron": "WVW 1994 art. 72 (APK-plicht); RDW; CBR exameneisen rijbewijs B"}, {"onderwerp": "Voertuigkennis", "hoofdstukref": 2, "type": "multi", "vraag": "Welke gewoontes zorgen voor zuiniger en milieubewuster rijden? Meerdere antwoorden kunnen goed zijn.", "opties": ["Op tijd opschakelen naar een hogere versnelling", "Vooruitkijken zodat je rustig remt en optrekt", "De motor lang stationair laten draaien om hem warm te houden", "De juiste bandenspanning aanhouden"], "correct": [0, 1, 3], "uitleg": "Op tijd opschakelen, vooruitkijken zodat je gelijkmatig rijdt en de juiste bandenspanning houden je verbruik laag. Lang stationair draaien kost juist onnodig brandstof. Haal ook overbodig gewicht uit de auto, zoals een lege dakkoffer.", "bron": "CBR exameneisen rijbewijs B (Het Nieuwe Rijden / milieubewust rijden); RDW"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Wat betekent 'voorrang verlenen' precies?", "opties": ["Een andere bestuurder ongehinderd zijn weg laten vervolgen", "Altijd volledig stoppen en wachten", "Een voetganger laten oversteken"], "correct": 0, "uitleg": "Voorrang verlenen betekent dat je een andere bestuurder gewoon door laat rijden zonder dat hij voor jou hoeft te remmen of uit te wijken. Het gaat over bestuurders onderling, niet over voetgangers.", "bron": "RVV 1990 art. 1 (begripsbepaling voorrang verlenen)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "Je nadert een kruispunt van gelijkwaardige wegen. Een bestuurder komt van rechts. Moet jij hem voor laten gaan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Op een gelijkwaardig kruispunt geldt de rechtsregel. Verkeer van rechts gaat voor, dus jij wacht en laat hem gaan.", "bron": "RVV 1990 art. 15 lid 1"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Wanneer is een kruispunt gelijkwaardig?", "opties": ["Als er geen voorrangsborden, geen haaientanden en geen werkend verkeerslicht staan", "Als beide wegen even breed zijn", "Als er geen zebrapad ligt"], "correct": 0, "uitleg": "Een kruispunt is gelijkwaardig zolang niets de rang verandert. Geen borden, geen haaientanden, geen werkend verkeerslicht. Dan en alleen dan geldt de rechtsregel.", "bron": "RVV 1990 art. 15 lid 1"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "Op een gelijkwaardig kruispunt komt een fietser van rechts. Heeft die fietser voorrang?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "De rechtsregel geldt voor alle bestuurders, dus ook voor fietsers en bromfietsers. Een fietser van rechts gaat net zo goed voor.", "bron": "RVV 1990 art. 15 lid 1"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "De weg rechts van je is duidelijk smaller en lijkt minder belangrijk, maar er staan geen borden of haaientanden. Heeft het verkeer van rechts dan toch voorrang?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Een smallere weg maakt een kruispunt niet ongelijkwaardig. Zolang er geen borden, haaientanden of verkeerslichten staan, gaat rechts voor. Dat is een klassieke valkuil.", "bron": "RVV 1990 art. 15 lid 1"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Je ziet een gele ruit langs jouw weg. Wat betekent dat bord?", "opties": ["Voorrangsweg, jij hebt voorrang", "Verleen voorrang aan kruisend verkeer", "Einde van de voorrangsweg"], "correct": 0, "uitleg": "De gele ruit betekent dat je op een voorrangsweg rijdt. Jij hebt voorrang en hoeft niet te wachten, tenzij een bord of verkeersregelaar iets anders aangeeft.", "bron": "RVV 1990 bijlage 1, bord B1 (voorrangsweg)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Je nadert een kruispunt met haaientanden op het wegdek, de punten wijzen naar jou toe. Wat moet je doen?", "opties": ["Voorrang verlenen aan het verkeer op de kruisende weg", "Volledig stilstaan en daarna doorrijden", "Doorrijden, jij hebt voorrang"], "correct": 0, "uitleg": "Haaientanden met de punt naar jou betekenen: verleen voorrang aan het verkeer op de kruisende weg. Stilstaan hoeft niet per se, voorrang geven wel.", "bron": "RVV 1990 art. 80 (haaientanden)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Wat betekent een omgekeerde driehoek (punt naar beneden) als verkeersbord?", "opties": ["Verleen voorrang aan al het verkeer op de kruisende weg", "Jij hebt voorrang", "Stop verplicht en daarna voorrang verlenen"], "correct": 0, "uitleg": "De omgekeerde driehoek betekent dat je voorrang verleent aan al het verkeer op de kruisende weg. Volledig stilstaan hoeft alleen bij een STOP-bord.", "bron": "RVV 1990 bijlage 1, bord B6 (verleen voorrang)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Je nadert een achthoekig STOP-bord. Wat moet je doen?", "opties": ["Volledig stilstaan en daarna voorrang verlenen", "Alleen voorrang verlenen, doorrijden mag", "Doorrijden als de weg vrij oogt"], "correct": 0, "uitleg": "Bij een STOP-bord moet je echt helemaal stilstaan, ook als de weg vrij lijkt. Daarna verleen je voorrang aan het kruisende verkeer.", "bron": "RVV 1990 bijlage 1, bord B7 (stop)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "multi", "vraag": "Welke van deze zaken maken een kruispunt ongelijkwaardig, zodat de rechtsregel niet meer geldt? Meerdere antwoorden kunnen goed zijn.", "opties": ["Voorrangsborden", "Haaientanden op het wegdek", "Een werkend verkeerslicht", "Een smallere weg aan één kant", "Een zebrapad vlakbij"], "correct": [0, 1, 2], "uitleg": "Alleen borden, haaientanden en een werkend verkeerslicht veranderen de voorrang. Een smallere weg of een zebrapad in de buurt doen dat niet.", "bron": "RVV 1990 art. 15 lid 1; art. 80 (haaientanden); bijlage 1 borden B1-B7"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Wanneer is een naderend voertuig een voorrangsvoertuig waarvoor je moet wijken?", "opties": ["Als het zowel een blauw zwaailicht als een sirene voert", "Zodra het een zwaailicht heeft", "Alleen als het een ambulance is"], "correct": 0, "uitleg": "Een voorrangsvoertuig voert blauw zwaailicht en sirene samen. Alleen een zwaailicht, zoals bij een wegsleepauto, maakt het nog geen voorrangsvoertuig.", "bron": "RVV 1990 art. 1 (begrip voorrangsvoertuig)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "Een voertuig nadert met alleen een blauw zwaailicht aan, maar zonder sirene. Moet je dit voertuig voorrang verlenen als voorrangsvoertuig?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Zonder sirene is het geen voorrangsvoertuig. Denk aan een wegsleepauto of werkvoertuig. Je hoeft geen voorrang te geven, maar je houdt er natuurlijk wel rekening mee.", "bron": "RVV 1990 art. 1 (begrip voorrangsvoertuig); art. 50"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Je staat voor een rood verkeerslicht en achter je nadert een ambulance met zwaailicht en sirene. Wat doe je?", "opties": ["Veilig ruimte maken en de ambulance voor laten gaan, alleen door rood als het zonder gevaar kan", "Direct hard door rood rijden om plaats te maken", "Niets doen, je staat immers voor rood"], "correct": 0, "uitleg": "Je maakt altijd ruimte voor een voorrangsvoertuig, maar je veroorzaakt geen gevaar. Door rood rijden om plaats te maken mag alleen als dat echt veilig kan.", "bron": "RVV 1990 art. 50 (voorrang voorrangsvoertuig)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "Op een gelijkwaardig kruispunt nader je van rechts en er komt een tram aan. Moet jij de tram voor laten gaan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Een tram rijdt op rails, kan niet uitwijken en heeft een lange remweg. Daarom laat je een tram op een gelijkwaardig kruispunt voorgaan, ook als jij van rechts komt.", "bron": "RVV 1990 art. 15 lid 2 (tram voor laten gaan op gelijkwaardig kruispunt)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Je wilt op een kruispunt linksaf slaan. Er komt verkeer recht op je af dat rechtdoor wil. Wat moet je doen?", "opties": ["Het tegemoetkomende verkeer voor laten gaan", "Snel afslaan voordat zij er zijn", "Doorrijden, jij gaat tenslotte afslaan"], "correct": 0, "uitleg": "Bij linksaf kruis je de rijbaan van de tegenliggers. Daarom laat je tegemoetkomend verkeer dat rechtdoor gaat of rechtsaf slaat eerst voorgaan.", "bron": "RVV 1990 art. 18 (afslaan)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "Je slaat rechtsaf op een kruispunt. Moet je het tegemoetkomende verkeer voor laten gaan?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Bij rechtsaf blijf je aan je eigen kant van de weg en kruis je de tegenliggers niet. Je hoeft ze dus niet voor te laten gaan. Wel let je goed op fietsers en voetgangers naast je.", "bron": "RVV 1990 art. 18 (afslaan)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "multi", "vraag": "Je gaat op een kruispunt linksaf. Op wie moet je letten en wie laat je voorgaan? Meerdere antwoorden kunnen goed zijn.", "opties": ["Tegemoetkomend verkeer dat rechtdoor gaat", "Tegemoetkomend verkeer dat rechtsaf slaat", "Fietsers en bromfietsers in je dode hoek", "Een auto die ver achter je rijdt"], "correct": [0, 1, 2], "uitleg": "Bij linksaf laat je tegenliggers die rechtdoor gaan of rechtsaf slaan voorgaan, en je controleert je dode hoek op fietsers en bromfietsers. Een auto ver achter je speelt hier geen rol.", "bron": "RVV 1990 art. 18 (afslaan)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Binnen de bebouwde kom wil een lijnbus uit een halte wegrijden en geeft daarvoor richting aan. Wat doe je?", "opties": ["Je geeft de bus de gelegenheid om weg te rijden", "Je rijdt door, jij was er eerder", "Je toetert dat de bus moet wachten"], "correct": 0, "uitleg": "Binnen de bebouwde kom moet je een lijnbus die met richtingaanwijzer aangeeft de halte te willen verlaten, voor laten gaan. Ook al naderde jij eerder.", "bron": "RVV 1990 art. 56 (gelegenheid geven aan autobus om van halte weg te rijden)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "Buiten de bebouwde kom wil een lijnbus met richtingaanwijzer uit een halte wegrijden. Ben je verplicht hem voor te laten gaan?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "De plicht om een wegrijdende lijnbus voor te laten gaan geldt alleen binnen de bebouwde kom. Buiten de kom gelden de normale regels en hoeft het niet.", "bron": "RVV 1990 art. 56"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Er staat een voetganger duidelijk op het punt om over te steken op een zebrapad. Wat doe je?", "opties": ["Je laat de voetganger voorgaan en wacht", "Je rijdt door, je had geen stopbord", "Je toetert zodat hij wacht"], "correct": 0, "uitleg": "Voetgangers die op een zebrapad oversteken of daar duidelijk op het punt van staan, laat je voorgaan. Dat heet voor laten gaan en geldt voor elke richting waaruit ze komen.", "bron": "RVV 1990 art. 49 lid 2"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "janee", "vraag": "Een blinde voetganger met een witte stok met rode ringen wil oversteken, maar niet op een zebrapad. Moet je hem voor laten gaan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Een blinde met een witte stok met rode ringen laat je altijd voorgaan, ook buiten een oversteekplaats. Dat geldt net zo voor mensen die zich moeilijk voortbewegen.", "bron": "RVV 1990 art. 49 lid 1"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "mc", "vraag": "Wat is het verschil tussen 'voorrang verlenen' en 'voor laten gaan'?", "opties": ["Voorrang verlenen geldt voor bestuurders, voor laten gaan voor voetgangers", "Er is geen verschil, het is hetzelfde", "Voorrang verlenen geldt alleen op de snelweg"], "correct": 0, "uitleg": "Bestuurders zoals auto's, fietsers en bromfietsers verleen je voorrang. Voetgangers en gehandicaptenvoertuigen laat je voorgaan. Voor jou komt het op hetzelfde neer, jij wacht, maar de term kan in een examenvraag het verschil maken.", "bron": "RVV 1990 art. 1 (voorrang verlenen); art. 49 (voor laten gaan voetgangers)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "multi", "vraag": "Wie laat je voorgaan in plaats van voorrang te verlenen? Het gaat om 'voor laten gaan'. Meerdere antwoorden kunnen goed zijn.", "opties": ["Een voetganger op het zebrapad", "Een gehandicaptenvoertuig op de oversteekplaats", "Een blinde met witte stok met rode ringen", "Een auto van rechts op een gelijkwaardig kruispunt"], "correct": [0, 1, 2], "uitleg": "Voor laten gaan hoort bij voetgangers en gehandicaptenvoertuigen. Een auto van rechts verleen je voorrang, dat is een andere term.", "bron": "RVV 1990 art. 49; art. 1 (voorrang verlenen bestuurders)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "mc", "vraag": "Het verkeerslicht voor jou springt op geel terwijl je het nog veilig kunt stoppen. Wat doe je?", "opties": ["Je stopt voor de stopstreep", "Je geeft gas om er nog door te schieten", "Je rijdt door, geel betekent doorrijden"], "correct": 0, "uitleg": "Geel betekent stoppen. Alleen als stoppen echt niet meer veilig kan, mag je doorrijden. Geel is geen sein om te versnellen.", "bron": "RVV 1990 art. 68 lid 1"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "janee", "vraag": "Een verkeersregelaar geeft je een stopteken, terwijl het verkeerslicht op groen staat. Moet je stoppen?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Aanwijzingen van een bevoegde verkeersregelaar of agent gaan boven de verkeerslichten en boven de borden. Geeft hij stop, dan stop je, ook bij groen.", "bron": "RVV 1990 art. 84 (rangorde); art. 82 (plicht aanwijzingen op te volgen)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "mc", "vraag": "Wat is de juiste rangorde van wat je opvolgt in het verkeer, van hoog naar laag?", "opties": ["Aanwijzingen bevoegd persoon, dan verkeerslichten, dan verkeerstekens, dan verkeersregels", "Verkeerslichten, dan een agent, dan borden, dan de regels", "Verkeerstekens, dan verkeerslichten, dan de agent"], "correct": 0, "uitleg": "De rangorde is: aanwijzingen van een bevoegd persoon bovenaan, daarna verkeerslichten, dan verkeerstekens zoals borden en strepen, en als laatste de gewone verkeersregels.", "bron": "RVV 1990 art. 84 (rangorde)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "mc", "vraag": "Je nadert een kruispunt waar het verkeerslicht knipperend geel laat zien. Wat betekent dat?", "opties": ["Het licht werkt niet als regelaar, je past zelf de gewone voorrangsregels en borden toe", "Je moet altijd stoppen", "Je hebt altijd voorrang"], "correct": 0, "uitleg": "Knipperend geel betekent dat het licht niet meer regelt. Je kijkt dan naar de borden en de gewone voorrangsregels, en je bent extra voorzichtig.", "bron": "RVV 1990 art. 73 (knipperend geel)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "janee", "vraag": "Je nadert een rotonde met haaientanden en een bord 'verleen
