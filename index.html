ed kijken en luisteren.\n\nJe moet stoppen als de rode lichten knipperen, als de bomen dichtgaan of dicht zijn, of als er een trein nadert. Dat geldt ook als de bomen nog open zijn terwijl de lichten al knipperen.\n\nRijd nooit een overweg op als je er niet zeker overheen kunt komen, bijvoorbeeld door een file aan de overkant. Sta je vast op de overweg, dan kun je klem komen te staan.", "kernpunten": ["Trein heeft altijd voorrang op de overweg", "Stoppen bij rode knipperlichten, sluitende of gesloten bomen, of naderende trein", "Rij de overweg pas op als je er zeker overheen kunt"], "bron": "RVV 1990 art. 15a (trein laten voorgaan); art. 71 jo. bijlage 2 (rood overweglicht = stoppen)"}, {"kop": "Rijden in een tunnel", "tekst": "In een tunnel rijd je met je dimlicht aan, ook overdag. Houd genoeg afstand en let op de matrixborden en signalen boven de weg.\n\nKrijg je pech in een tunnel, probeer dan eerst de tunnel uit te rijden. Lukt dat niet, zet je auto dan zo veel mogelijk rechts of tegen de tunnelwand, zet je alarmlichten aan en zet de motor uit. Laat de sleutel in het contact.\n\nGebruik bij een noodgeval de praatpaal of hulptelefoon in de tunnel en niet je mobiel, want die geeft je locatie automatisch door. Hoor je een oproep om de tunnel te verlaten, ga dan meteen via de dichtstbijzijnde vluchtdeur naar buiten.", "kernpunten": ["Dimlicht aan in de tunnel, ook overdag", "Bij pech: probeer eruit te rijden; lukt dat niet, rechts/tegen de wand, alarmlichten aan, motor uit", "Gebruik de praatpaal en verlaat de tunnel bij een oproep via de vluchtdeur"], "bron": "RVV 1990 art. 32 (dimlicht; gebruik verlichting, ook in tunnel); matrixsignalen boven de weg zijn verkeerstekens (RVV 1990 art. 62 e.v.); Rijkswaterstaat instructies tunnelveiligheid. NB: 'art. 43a' bestaat niet in het huidige RVV 1990 en is geschrapt."}, {"kop": "Pech onderweg en de gevarendriehoek", "tekst": "Krijg je pech, zet je auto dan op een veilige plek, zoals de vluchtstrook of een pechhaven. Zet je alarmlichten aan zodat anderen je op tijd zien.\n\nVormt je auto een gevaar of een obstakel voor andere bestuurders, dan plaats je een gevarendriehoek op voldoende afstand vóór je voertuig, zodat het verkeer je op tijd ziet. Op een snelweg plaats je hem verder weg dan in de stad, omdat het verkeer er sneller rijdt.\n\nOp de snelweg ga je zelf niet bij de auto staan, maar wacht je achter de vangrail op hulp. Sta nooit op de rijbaan tussen het verkeer.", "kernpunten": ["Bij pech: veilige plek (vluchtstrook/pechhaven) en alarmlichten aan", "Gevarendriehoek plaatsen als je een obstakel vormt, op afstand vóór de auto", "Op de snelweg: wacht achter de vangrail, niet bij de auto"], "bron": "RVV 1990 art. 58 (gevarendriehoek/knipperend waarschuwingslicht bij stilstaand voertuig); afstand niet wettelijk vastgelegd"}, {"kop": "Bij een ongeval", "tekst": "Kom je bij een ongeval terecht waar je zelf bij betrokken bent, dan ben je verplicht te stoppen. Wegrijden na zo'n ongeval is strafbaar.\n\nZorg eerst voor de veiligheid: zet je alarmlichten aan, trek een veiligheidshesje aan en plaats zo nodig een gevarendriehoek. Bel 112 als er gewonden zijn of als er gevaar dreigt.\n\nVerleen hulp waar je kunt en geef je gegevens als dat nodig is voor de afhandeling. Een gewonde verplaats je alleen als die in direct gevaar is, bijvoorbeeld bij brand.", "kernpunten": ["Betrokken bij een ongeval: je moet stoppen (wegrijden is strafbaar)", "Beveilig de plek: alarmlichten, hesje, eventueel gevarendriehoek", "Bel 112 bij gewonden of gevaar; verleen hulp"], "bron": "WVW 1994 art. 7 (verbod doorrijden na ongeval); WVW 1994 art. 5"}, {"kop": "Slecht weer: gladheid, mist, regen en sneeuw", "tekst": "Bij slecht weer pas je je snelheid en je afstand aan. Een natte of gladde weg verlengt je remweg, dus houd meer afstand dan normaal.\n\nBij mist gebruik je je mistlampen. Je mistachterlicht mag je alleen voeren als het zicht minder is dan 50 meter, en bij beter zicht zet je het uit, want het verblindt anderen. Rijd bij dichte mist langzaam en houd extra afstand.\n\nBij regen en aquaplaning kan je auto gaan glijden over een laag water. Neem dan rustig gas terug en stuur niet abrupt. Bij sneeuw en ijzel rijd je voorzichtig, rem je zacht en vermijd je plotselinge stuur- of rembewegingen.", "kernpunten": ["Slecht weer: snelheid omlaag, afstand vergroten (langere remweg)", "Mistachterlicht alleen bij zicht minder dan 50 meter", "Bij aquaplaning of ijzel: geen abrupte stuur- of rembewegingen"], "bron": "RVV 1990 art. 19 (afstand/aanpassen snelheid); RVV 1990 art. 34-37 (mistlicht; mistachterlicht bij zicht < 50 m); WVW 1994 art. 5"}, {"kop": "De tram", "tekst": "Een tram is een bijzonder voertuig dat over rails rijdt en niet kan uitwijken. Daarom heeft een tram vaak voorrang.\n\nOp een gelijkwaardig kruispunt gaat een tram vóór. Ook als je van rechts komt, moet je een tram voor laten gaan. Een tram kan niet remmen zoals een auto en heeft een lange remweg.\n\nLet ook op trampassagiers die in- en uitstappen. Staat er een tram of bus stil bij een halte en stappen er mensen uit, dan houd je daar rekening mee en geef je hun de ruimte.", "kernpunten": ["Tram rijdt op rails en kan niet uitwijken; lange remweg", "Op een gelijkwaardig kruispunt gaat de tram voor, ook van links", "Let op in- en uitstappende passagiers bij haltes"], "bron": "RVV 1990 art. 15 lid 2 (tram voor laten gaan op gelijkwaardig kruispunt)"}]}, {"hoofdstuk": 12, "titel": "Manoeuvres en bijzondere verrichtingen", "secties": [{"kop": "Wegrijden", "tekst": "Wegrijden is een bijzondere manoeuvre, want je gaat van stilstaan naar rijden en je mengt je tussen het verkeer dat al rijdt. Voorrang heb je daarbij niet. Het verkeer dat er al is mag gewoon doorrijden, dus jij wacht tot het veilig kan.\n\nVoor je wegrijdt kijk je in je binnenspiegel, dan je buitenspiegel, en daarna over je schouder in de dode hoek. Geef altijd richting aan, zodat anderen zien wat je gaat doen.\n\nLet vooral op fietsers en bromfietsers die je rechts kunnen inhalen, want die zie je zo over het hoofd. Pas als de weg vrij is en je niemand ophoudt, rijd je rustig weg.", "kernpunten": ["Bij wegrijden heb je geen voorrang; bestaand verkeer gaat voor", "Eerst spiegels, dan over de schouder in de dode hoek kijken", "Geef richting aan en let op fietsers/bromfietsers"], "bron": "RVV 1990 art. 54 (bijzondere manoeuvres, o.a. wegrijden, ander verkeer voor laten gaan); CBR exameneisen rijbewijs B"}, {"kop": "Keren", "tekst": "Keren is een bijzondere manoeuvre waarbij je je rijrichting omdraait, bijvoorbeeld met een driepuntsdraai of door achteruit een inrit in te steken. Ook hierbij laat je al het andere verkeer voorgaan, want voorrang heb je niet.\n\nKies een plek waar je goed overzicht hebt. Keren mag niet als het onveilig is, dus niet in een onoverzichtelijke bocht, niet vlak voor of op een kruising, en niet waar een doorgetrokken streep ligt.\n\nKijk goed rond voor en tijdens het keren, geef op tijd richting aan en voer de manoeuvre rustig uit. Liever twee keer steken en veilig blijven dan in één keer en risico nemen.", "kernpunten": ["Bij keren laat je al het andere verkeer voorgaan", "Niet keren op onoverzichtelijke of gevaarlijke plekken", "Goed rondkijken, richting aangeven, rustig uitvoeren"], "bron": "RVV 1990 art. 54 (ander verkeer voor laten gaan bij o.a. keren); CBR exameneisen rijbewijs B"}, {"kop": "Achteruitrijden", "tekst": "Achteruitrijden is een van de lastigste manoeuvres, omdat je zicht naar achteren beperkt is. Ook hierbij laat je al het andere verkeer voorgaan.\n\nKijk voor je begint goed rond: achterom door de achterruit, in je spiegels en in de dode hoeken. Let vooral op kleine kinderen, fietsers en voetgangers die laag of dicht achter de auto kunnen zitten.\n\nRijd langzaam en houd tijdens het rijden zicht op de ruimte achter je. Een achteruitrijcamera of parkeersensoren helpen, maar ze vervangen je eigen blik niet. Twijfel je, dan stop je en kijk je opnieuw.", "kernpunten": ["Bij achteruitrijden laat je al het andere verkeer voorgaan", "Eerst rondkijken: achterruit, spiegels en dode hoeken", "Langzaam rijden; let op kinderen en fietsers laag achter de auto"], "bron": "RVV 1990 art. 54 (ander verkeer voor laten gaan bij o.a. achteruitrijden); CBR exameneisen rijbewijs B"}, {"kop": "Veilig in- en uitstappen: het portier openen", "tekst": "Een open portier is gevaarlijk voor fietsers en bromfietsers die langsrijden. Rijden zij tegen een openslaand portier aan, dan kan dat ernstig misgaan. Dat heet 'dooring'. Daarom open je het portier altijd voorzichtig en pas nadat je hebt gekeken.\n\nEen handige techniek is de 'Dutch reach': je opent het portier met de hand die het verst van het portier zit. Als bestuurder pak je het linker portier dus met je rechterhand. Daardoor draaien je bovenlichaam en je hoofd vanzelf mee en kijk je over je schouder naar achteren. Zo zie je aankomende fietsers eerder.\n\nDe Dutch reach is niet wettelijk verplicht en ook niet verplicht op het rijexamen, maar het is een sterk aanbevolen gewoonte. Bij het praktijkexamen kan het CBR wel letten op of je veilig en met aandacht uitstapt.", "kernpunten": ["Open het portier voorzichtig; let op fietsers/bromfietsers ('dooring')", "Dutch reach: openen met de hand het verst van het portier (bestuurder: rechterhand)", "Niet wettelijk verplicht, maar wel een sterk aanbevolen veilige gewoonte"], "bron": "CBR informatie praktijkexamen rijbewijs B (Dutch reach niet verplicht, wel aanbevolen); algemene verkeersveiligheidsregel veilig uitstappen"}, {"kop": "Slepen en pech onderweg", "tekst": "Krijg je pech of moet een ander voertuig je slepen, dan zijn er een paar dingen waar je op let. Heb je pech op een gewone weg, dan zet je de auto zo veilig mogelijk aan de kant, je zet de alarmlichten aan en je plaatst zo nodig een gevarendriehoek om anderen te waarschuwen.\n\nBij slepen rijd je rustig en houd je extra afstand, want het gesleepte voertuig stuurt en remt minder goed. Het gesleepte voertuig moet bestuurd worden door iemand met een geldig rijbewijs.\n\nOp de autosnelweg en de autoweg gelden strengere regels: een voertuig dat door pech de minimumsnelheid niet haalt, hoort daar in principe niet thuis. Heb je daar pech, gebruik dan de vluchtstrook of een pechhaven en bel zo nodig de wegenwacht of de hulpdiensten.", "kernpunten": ["Bij pech: veilig aan de kant, alarmlichten aan, zo nodig gevarendriehoek", "Bij slepen: rustig rijden, extra afstand; bestuurder gesleept voertuig met geldig rijbewijs", "Op snelweg/autoweg vluchtstrook of pechhaven gebruiken bij pech"], "bron": "RVV 1990 (gebruik vluchtstrook/pechhaven, alarmsignaal); WVW 1994 (rijbewijsplicht bestuurder); CBR exameneisen rijbewijs B"}, {"kop": "Bijzondere verrichtingen op het praktijkexamen", "tekst": "Op het praktijkexamen vraagt de examinator een aantal 'bijzondere verrichtingen'. Dat zijn manoeuvres die je beheerst moet uitvoeren, met aandacht voor de omgeving en de veiligheid van anderen.\n\nDenk aan keren op de weg, een parkeervak in- en uitrijden (vooruit of achteruit), een file- of stopsimulatie, en wegrijden op een helling. Welke verrichtingen je doet, kan per examen verschillen.\n\nBij elke verrichting geldt hetzelfde: goed kijken voor en tijdens de manoeuvre, andere weggebruikers voor laten gaan, op tijd richting aangeven en rustig en gecontroleerd rijden. Techniek telt, maar veiligheid en overzicht wegen het zwaarst.", "kernpunten": ["Bijzondere verrichtingen toetsen beheersing én veilig handelen", "Voorbeelden: keren, in-/uitparkeren, wegrijden op een helling", "Altijd: kijken, anderen voor laten gaan, richting aangeven, rustig rijden"], "bron": "CBR exameneisen praktijkexamen rijbewijs B (bijzondere verrichtingen)"}]}, {"hoofdstuk": 13, "titel": "Gevaarherkenning", "secties": [{"kop": "Wat is gevaarherkenning", "tekst": "Gevaarherkenning is een gevaarlijke situatie op tijd zien aankomen, zodat je er rustig op kunt reageren. Een goede bestuurder reageert niet pas als het al misgaat, maar zorgt dat het zover niet komt.\n\nHet draait om drie stappen: waarnemen (wat zie ik?), voorspellen (wat kan er gebeuren?) en handelen (wat doe ik nu?). Kijk je ver vooruit en schat je mogelijke gevaren alvast in, dan heb je meer tijd om veilig te handelen.\n\nGevaarherkenning is een vast en belangrijk onderdeel van het theorie-examen rijbewijs B.", "kernpunten": ["Gevaarherkenning = gevaar op tijd zien en voorkomen", "Drie stappen: waarnemen, voorspellen, handelen", "Vast onderdeel van het theorie-examen B"], "bron": "CBR exameneisen theorie-examen rijbewijs B (gevaarherkenning: waarnemen, voorspellen, handelen)"}, {"kop": "Examenvorm: animaties met drie keuzes", "tekst": "In het vernieuwde theorie-examen (sinds 7 april 2025) wordt gevaarherkenning onder andere getoetst met korte animatiefilmpjes zonder geluid. Je ziet een realistische verkeerssituatie vanuit de plek van de bestuurder.\n\nBij dit soort vragen kies je meestal uit drie antwoorden: remmen, gas loslaten of niets doen.\n\nKies 'remmen' als je flink snelheid moet minderen of moet stoppen door een direct gevaar. Kies 'gas loslaten' als er een mogelijk gevaar is dat zich nog niet meteen voordoet, zodat je alvast voorbereid bent. Kies 'niets doen' als je de situatie goed overziet en er geen gevaar dreigt.", "kernpunten": ["Sinds 7 april 2025: gevaarherkenning ook met korte animaties zonder geluid", "Meestal drie keuzes: remmen, gas loslaten, niets doen", "Remmen = direct gevaar; gas loslaten = mogelijk gevaar; niets doen = veilig overzicht"], "bron": "CBR nieuws 'Vernieuwd theorie-examen B-rijbewijs vanaf 7 april' (cbr.nl); CBR exameneisen gevaarherkenning"}, {"kop": "Kijktechniek: ver vooruit en spiegels", "tekst": "Goed kijken is de basis van gevaarherkenning. Kijk niet alleen vlak voor de auto, maar ver vooruit, zodat je situaties al ziet aankomen voordat je er bent.\n\nLaat je blik bewegen: ver vooruit, dan dichterbij, dan naar links en rechts, en regelmatig in je spiegels. Zo houd je een compleet beeld van wat er om je heen gebeurt.\n\nVoor elke handeling waarmee je je rijrichting of je snelheid verandert, controleer je je spiegels en zo nodig de dode hoek. Kijken kost een seconde, niet kijken kan een ongeluk kosten.", "kernpunten": ["Kijk ver vooruit om situaties op tijd te zien", "Laat je blik bewegen: ver, dichtbij, opzij, spiegels", "Voor elke wijziging eerst spiegels (en dode hoek) controleren"], "bron": "CBR exameneisen rijbewijs B (kijktechniek, waarnemen); RVV 1990 art. 54 (dode hoek bij manoeuvres)"}, {"kop": "Anticiperen en risico inschatten", "tekst": "Anticiperen is vooruitdenken: je bedenkt wat andere weggebruikers zouden kunnen doen en houdt daar rekening mee. Een bal op straat kan betekenen dat er zo een kind achteraan rent. Een geparkeerde auto met mensen erin kan een openslaand portier betekenen.\n\nNiet elk gevaar is even groot. Schat in hoe waarschijnlijk het is en hoe ernstig een situatie kan worden. Is er een kwetsbare weggebruiker dichtbij, zoals een kind, een fietser of een voetganger, dan neem je meer ruimte en minder snelheid dan bij een verre, overzichtelijke situatie.\n\nDoor vooruit te denken reageer je rustig en op tijd, in plaats van plotseling en hard te moeten remmen.", "kernpunten": ["Anticiperen = vooruitdenken over wat anderen kunnen doen", "Let op signalen: bal op straat, inzittenden in geparkeerde auto", "Schat kans én ernst in; kwetsbare weggebruikers vragen extra ruimte"], "bron": "CBR exameneisen rijbewijs B (voorspellen, anticiperen, risico-inschatting)"}, {"kop": "Snelheid aanpassen aan de situatie", "tekst": "De maximumsnelheid is een bovengrens, geen verplichting. Bij gevaar of slecht overzicht pas je je snelheid daaraan aan, ook al rijd je dan langzamer dan is toegestaan.\n\nMinder snelheid geeft je meer tijd om te kijken, te beslissen en te remmen, en je remweg wordt korter. In een woonwijk, bij een school, bij mist of regen, of op een drukke, onoverzichtelijke weg rijd je dus rustiger.\n\nIn de animatievragen kies je vaak 'gas loslaten' juist om alvast snelheid te minderen, zodat je voorbereid bent als het gevaar zich ontwikkelt.", "kernpunten": ["Maximumsnelheid is een grens, geen doel; pas aan de situatie aan", "Lagere snelheid = meer tijd om te reageren en kortere remweg", "Gas loslaten bereidt je voor op een mogelijk gevaar"], "bron": "RVV 1990 art. 19 (snelheid kunnen aanpassen, tijdig stoppen); CBR exameneisen gevaarherkenning"}, {"kop": "Blinde hoek en kwetsbare weggebruikers", "tekst": "De dode hoek, ook wel blinde hoek, is het gebied dat je niet via je spiegels ziet. Bij vrachtwagens en bussen is die hoek groot, waardoor fietsers en voetgangers dicht bij het voertuig voor de bestuurder soms onzichtbaar zijn.\n\nKijk daarom altijd zelf over je schouder in de dode hoek voordat je naar links of rechts gaat, en houd afstand van grote voertuigen die rechtsaf willen.\n\nWees extra alert bij kinderen en bij scholen. Kinderen zijn klein, onvoorspelbaar en ze overzien het verkeer nog niet. Bij een school, een speelplek of een oversteekplaats verlaag je je snelheid en reken je op kinderen die plotseling oversteken.", "kernpunten": ["Dode hoek: gebied dat spiegels niet tonen; zelf over de schouder kijken", "Vrachtwagens/bussen hebben grote dode hoeken; houd afstand bij afslaan", "Bij scholen en kinderen: snelheid omlaag, reken op plots overstekenden"], "bron": "RVV 1990 art. 54 (dode hoek bij manoeuvres); CBR exameneisen rijbewijs B (kwetsbare weggebruikers, gevaarherkenning)"}]}, {"hoofdstuk": 14, "titel": "Verkeersborden en verkeerstekens", "secties": [{"kop": "Hoe verkeersborden zijn ingedeeld", "tekst": "Alle officiële verkeersborden staan in Bijlage 1 van het RVV 1990. Ze zijn geordend in categorieën, elk met een letter en een nummer, bijvoorbeeld A1, B6, C1.\n\nDe letter vertelt je het soort bord: A gaat over snelheid, B over voorrang, C over geslotenverklaringen en verboden, D over geboden (verplichte rijrichting), E over parkeren en stilstaan, F over overige geboden en verboden, G over verkeersregels (soort weg), en J over waarschuwingen.\n\nKen je de betekenis van een categorie, dan herken je nieuwe borden binnen die categorie sneller. Hieronder lopen we de categorieën langs.", "kernpunten": ["Alle borden staan in Bijlage 1 RVV 1990, met letter + nummer", "Letter = soort bord (A snelheid, B voorrang, C verbod, D gebod, enz.)", "Categorie kennen helpt nieuwe borden snel herkennen"], "bron": "RVV 1990 Bijlage 1 (Verkeersborden), indeling in hoofdstukken A t/m J"}, {"kop": "Categorie A: Snelheid", "tekst": "A-borden gaan over snelheid. Ze geven een maximumsnelheid aan, of het einde daarvan.\n\nVoorbeelden: A1 geeft een maximumsnelheid aan, bijvoorbeeld 'maximum 50' of 'maximum 130'. Een A1-bord met een schuine streep of het woord 'einde' geeft het einde van die maximumsnelheid aan. Ook adviessnelheden vallen hieronder.\n\nLet op: ook zonder bord geldt een maximumsnelheid, afhankelijk van de soort weg, bijvoorbeeld 50 binnen de bebouwde kom.", "kernpunten": ["A-borden = maximumsnelheid of einde maximumsnelheid", "A1 toont de toegestane maximumsnelheid (bv. 50, 130)", "Zonder bord geldt de standaardsnelheid van de wegsoort"], "bron": "RVV 1990 Bijlage 1, hoofdstuk A (Snelheid), o.a. bord A1"}, {"kop": "Categorie B: Voorrang", "tekst": "B-borden regelen de voorrang. Ze maken duidelijk wie voorrang heeft op een kruising of weg.\n\nVoorbeelden: B1 geeft aan dat je op een voorrangsweg rijdt. B6, het driehoekige bord met de punt naar beneden, betekent 'verleen voorrang aan bestuurders op de kruisende weg'. B7 is het stopbord, waarbij je verplicht moet stoppen en daarna voorrang verlenen.\n\nB-borden horen vaak samen met haaientanden op het wegdek, zie de sectie over wegmarkeringen.", "kernpunten": ["B-borden regelen voorrang op kruising of weg", "B1 = voorrangsweg; B6 = voorrang verlenen; B7 = stoppen en voorrang verlenen", "Vaak gecombineerd met haaientanden op de weg"], "bron": "RVV 1990 Bijlage 1, hoofdstuk B (Voorrang), o.a. borden B1, B6, B7"}, {"kop": "Categorie C: Geslotenverklaring en verboden", "tekst": "C-borden zijn rond en hebben een rode rand. Ze verklaren een weg geheel of voor bepaalde voertuigen gesloten, of ze verbieden iets.\n\nVoorbeelden: C1 betekent 'gesloten in beide richtingen voor voertuigen, ruiters en geleiders van vee'. Een rond bord met een rode rand en een voertuigsymbool sluit dat type voertuig uit. C12 betekent 'gesloten voor alle motorvoertuigen', waarbij fietsers en voetgangers er nog wel langs mogen.\n\nDe rode rand is het signaal: hier mag iets niet.", "kernpunten": ["C-borden: rond met rode rand = geslotenverklaring of verbod", "C1 = gesloten in beide richtingen voor (bijna) alle voertuigen", "Voertuigsymbool in het bord = dat type voertuig mag er niet in"], "bron": "RVV 1990 Bijlage 1, hoofdstuk C (Geslotenverklaring), o.a. bord C1"}, {"kop": "Categorie D: Gebod (verplichte rijrichting)", "tekst": "D-borden zijn rond en blauw, met witte pijlen. Ze geven een gebod: je moet de aangegeven richting volgen.\n\nVoorbeelden: een D-bord met een pijl recht omhoog betekent 'rechtdoor'. Een pijl naar rechts betekent 'verplicht rechtsaf'. Het ronde blauwe bord bij een rotonde of een obstakel geeft aan welke kant je het voorbij moet, dus een gebod om die rijrichting te volgen.\n\nBlauw en rond met een witte pijl betekent dus: dit moet je doen.", "kernpunten": ["D-borden: rond, blauw, witte pijl = verplichte rijrichting", "Pijl toont welke richting je moet volgen (rechtdoor, rechtsaf, enz.)", "Blauw + rond = gebod (moet), tegenover rood-omrand verbod (mag niet)"], "bron": "RVV 1990 Bijlage 1, hoofdstuk D (Rijrichting / gebod), o.a. borden D-reeks"}, {"kop": "Categorie E: Parkeren en stilstaan", "tekst": "E-borden gaan over parkeren en stilstaan. Ze geven aan waar je wel of niet mag parkeren of stilstaan.\n\nVoorbeelden: E1 betekent 'parkeerverbod'. E2 betekent 'verbod stil te staan', en dus ook niet parkeren. E4 geeft een parkeergelegenheid aan en E6 wijst een gehandicaptenparkeerplaats aan.\n\nPijlen onder een E-bord geven aan vanaf of tot waar het verbod of de plek geldt. Let dus altijd op de onderborden.", "kernpunten": ["E-borden regelen parkeren en stilstaan", "E1 = parkeerverbod; E2 = stopverbod; E4 = parkeergelegenheid; E6 = gehandicaptenplaats", "Pijlen/onderborden geven het begin, einde of bereik aan"], "bron": "RVV 1990 Bijlage 1, hoofdstuk E (Parkeren en stilstaan), o.a. borden E1, E2, E4, E6"}, {"kop": "Categorie F: Overige geboden en verboden", "tekst": "F-borden bevatten overige geboden en verboden die niet onder de andere letters vallen.\n\nVoorbeelden: F1 'verbod voor bestuurders door te gaan bij nadering van verkeer uit tegengestelde richting'. F5 'verbod voor bestuurders door te gaan bij nadering van verkeer uit tegengestelde richting', oftewel een wachtplicht. F7 geeft juist voorrang bij een smalle doorgang. Ook inhaalverboden, zoals het verbod voor vrachtauto's om in te halen, en het einde daarvan vallen onder F.\n\nF is dus de verzamelcategorie voor regels over doorgaan, wachten en inhalen.", "kernpunten": ["F-borden = overige geboden en verboden", "Bevatten o.a. regels bij smalle doorgangen en inhaalverboden", "Let op de paren 'begin' en 'einde' van een F-verbod"], "bron": "RVV 1990 Bijlage 1, hoofdstuk F (Overige geboden en verboden); specifieke bordnummers TE VERIFIEREN: exacte F-nummers per voorbeeld niet één-op-één in zoekresultaat bevestigd"}, {"kop": "Categorie G: Verkeersregels (soort weg)", "tekst": "G-borden geven aan op wat voor soort weg je rijdt en welke regels daar gelden. De wegsoort bepaalt onder andere de standaardsnelheid en wie er mag rijden.\n\nVoorbeelden: G1 'autosnelweg' en het einde ervan. G3 'autoweg'. G5 'erf', waar je stapvoets rijdt en voetgangers de hele weg mogen gebruiken, en G6 'einde erf'. G11 'verplicht fietspad' en G7 'voetpad'.\n\nZodra je zo'n bord ziet, weet je meteen welke verkeersregels en welke snelheid daar horen.", "kernpunten": ["G-borden tonen de wegsoort en de bijbehorende regels", "G1 autosnelweg, G3 autoweg, G5 erf (stapvoets), G11 verplicht fietspad", "Wegsoort bepaalt standaardsnelheid en toegestane voertuigen"], "bron": "RVV 1990 Bijlage 1, hoofdstuk G (Verkeersregels), o.a. borden G1, G3, G5, G7, G11"}, {"kop": "Categorie J: Waarschuwing", "tekst": "J-borden zijn driehoekig, met een rode rand en een zwart symbool op een witte achtergrond. Ze waarschuwen voor een gevaar of een bijzondere situatie verderop.\n\nVoorbeelden: J1 'slecht wegdek' of een bocht, J10 'spoorwegovergang met overwegbomen', en J21 'kinderen' dat waarschuwt voor spelende kinderen, bijvoorbeeld bij een school.\n\nEen J-bord verbiedt of gebiedt niets, maar zegt: let op, pas je rijgedrag aan. Verlaag zo nodig je snelheid en wees extra alert.", "kernpunten": ["J-borden: driehoekig, rode rand, zwart symbool = waarschuwing", "Voorbeelden: J10 spoorwegovergang met bomen, J21 kinderen", "Waarschuwt voor gevaar verderop; pas je rijgedrag aan"], "bron": "RVV 1990 Bijlage 1, hoofdstuk J (Waarschuwing), o.a. borden J10, J21"}, {"kop": "Wegmarkeringen op het wegdek", "tekst": "Naast borden geven ook strepen en tekens op de weg regels aan. De belangrijkste moet je goed kennen.\n\nEen doorgetrokken streep mag je niet overschrijden en er ook niet op rijden: je blijft aan je kant. Een onderbroken streep mag je wel overschrijden, bijvoorbeeld om in te halen, als het veilig is. Liggen er een doorgetrokken en een onderbroken streep naast elkaar, dan geldt voor jou de streep die het dichtst bij jou ligt.\n\nHaaientanden, driehoeken met de punt naar je toe, betekenen: verleen voorrang aan bestuurders op de kruisende weg. Een blokmarkering, dus grote blokken, markeert bijvoorbeeld de grens van een busbaan of een verdrijvingsvlak, en daar mag je niet zomaar rijden. Het woord 'BUS' of een busbaanmarkering geeft aan dat de strook voor bussen is.", "kernpunten": ["Doorgetrokken streep: niet overschrijden; onderbroken streep: mag wel als veilig", "Bij dubbele streep geldt de streep het dichtst bij jou", "Haaientanden = voorrang verlenen; blokmarkering = busbaan/verdrijvingsvlak, niet op rijden"], "bron": "RVV 1990 art. 76-78 (markeringen, doorgetrokken/onderbroken strepen); RVV 1990 art. 80 (haaientanden = voorrang verlenen)"}, {"kop": "Verkeerslichten", "tekst": "Verkeerslichten regelen wie er mag rijden. Rood betekent stoppen, geel betekent stoppen tenzij dat niet meer veilig kan, en groen betekent doorrijden als de weg vrij is.\n\nNaast gewone ronde lichten zijn er pijllichten, en die gelden alleen voor de richting van de pijl. Een groene pijl naar rechts betekent bijvoorbeeld dat alleen rechtsaf vrij is.\n\nKnipperend geel betekent: let op, maar je mag doorrijden, en dan gelden de normale voorrangsregels. Aparte lichten voor fietsers, voetgangers en bussen gelden alleen voor die groep.", "kernpunten": ["Rood = stoppen; geel = stoppen tenzij niet veilig; groen = doorrijden als vrij", "Pijllichten gelden alleen voor die richting", "Knipperend geel: oppassen, normale voorrangsregels gelden"], "bron": "RVV 1990 art. 68 (driekleurige verkeerslichten); RVV 1990 art. 70 (knipperend geel)"}, {"kop": "Gebaren van de verkeersregelaar", "tekst": "Een verkeersregelaar of een politieagent kan het verkeer met gebaren regelen. Hun aanwijzingen gaan boven verkeerslichten, verkeersborden en de gewone verkeersregels. Geeft de regelaar dus een ander teken dan het verkeerslicht, dan volg je de regelaar.\n\nHet algemene stopteken is: één arm omhoog met de handpalm naar voren. Verkeer dat die kant op nadert, moet stoppen. Houdt de regelaar beide armen of één arm zijwaarts gestrekt, dan moet het verkeer dat op die arm afkomt stoppen, terwijl verkeer evenwijdig aan de armen mag doorrijden.\n\nDe aanwijzingen van een bevoegde, herkenbare verkeersregelaar volg je altijd op. Dat is wettelijk verplicht.", "kernpunten": ["Aanwijzingen verkeersregelaar/agent gaan boven licht, borden én regels", "Arm omhoog, handpalm naar voren = stopteken", "Aanwijzingen van een bevoegde, herkenbare regelaar zijn verplicht op te volgen"], "bron": "RVV 1990 art. 84 (rangorde: aanwijzingen gaan boven verkeerstekens en verkeersregels); RVV 1990 art. 82 (plicht aanwijzingen van een bevoegd persoon op te volgen); RVV 1990 art. 83 (gebaren/tekens verkeersregelaar)"}]}];
const VRAGEN = [{"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Een voetganger staat duidelijk op het punt om over te steken op een zebrapad. Wat doe je?", "opties": ["Je laat de voetganger voorgaan en wacht tot hij veilig over is", "Je hebt voorrang en mag gewoon doorrijden", "Je laat hem alleen voorgaan als hij van rechts komt"], "correct": 0, "uitleg": "Op een zebrapad laat je een voetganger altijd voorgaan, ook als hij nog net op de stoep staat maar duidelijk wil oversteken. Van welke kant hij komt maakt niet uit. Je stopt en wacht tot hij veilig over is.", "bron": "RVV 1990 art. 49 lid 2"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "janee", "vraag": "Een blinde met een witte stok met rode ringen wil oversteken, maar er is hier geen zebrapad. Moet je hem voor laten gaan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Een blinde met een witte stok met rode ringen laat je altijd voorgaan, ook buiten een oversteekplaats. Deze mensen verdienen extra bescherming, dus je past je snelheid op tijd aan en geeft ze de ruimte.", "bron": "RVV 1990 art. 49 lid 1"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "invul", "vraag": "Wat is de maximumsnelheid op een erf in kilometer per uur?", "opties": [], "correct": "15", "uitleg": "Op een erf mag je niet harder dan 15 km/u. Mensen wonen en spelen er, en voetgangers mogen de hele breedte van de weg gebruiken. Dus rij je er stapvoets en houd je rekening met kinderen die zo de straat op kunnen komen.", "bron": "RVV 1990 art. 45 (max. 15 km/u op erf)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "mc", "vraag": "Je rijdt een erf op. Waar mag je je auto parkeren?", "opties": ["Overal waar plek is langs de weg", "Alleen op de plekken die daarvoor zijn aangegeven", "Nergens, op een erf mag je niet parkeren"], "correct": 1, "uitleg": "Op een erf parkeer je alleen op de plekken die daarvoor zijn aangegeven, vaak met een P of een blauwe streep. Buiten die plekken parkeren mag niet, want de ruimte is er voor de mensen die er wonen en spelen.", "bron": "RVV 1990 art. 44 en 45 (erf); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "janee", "vraag": "Op een erf mogen voetgangers de hele breedte van de weg gebruiken. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Op een erf mogen voetgangers de hele breedte van de weg gebruiken. Dat is precies waarom je er niet harder dan 15 km/u mag en extra alert bent op spelende kinderen.", "bron": "RVV 1990 art. 44 (voetgangers op erf)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Hoe hard mag een snorfiets maximaal rijden?", "opties": ["25 km/u", "45 km/u", "30 km/u"], "correct": 0, "uitleg": "Een snorfiets mag niet harder dan 25 km/u en rijdt meestal op het fietspad. Een bromfiets mag op de rijbaan tot 45 km/u. Goed om uit elkaar te houden, want hun snelheid bepaalt waar ze rijden en hoeveel afstand je houdt bij inhalen.", "bron": "RVV 1990 art. 1 (definitie snorfiets en bromfiets, constructiesnelheid)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "janee", "vraag": "Geldt er sinds 1 januari 2023 een helmplicht op de snorfiets?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Sinds 1 januari 2023 is een helm ook op de snorfiets verplicht. Op de bromfiets was dat al langer zo. Dus zowel brom- als snorfietsers horen een helm te dragen.", "bron": "Helmplicht snorfiets per 1-1-2023 (RVV 1990 art. 60)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Waar rijdt een bromfietser binnen de bebouwde kom in principe?", "opties": ["Op het trottoir", "Op de rijbaan", "Altijd op het fietspad"], "correct": 1, "uitleg": "Binnen de bebouwde kom rijdt een bromfietser in principe op de rijbaan. Buiten de bebouwde kom hoort hij juist op het fiets-/bromfietspad. Handig om te weten, zo verwacht je hem op de juiste plek.", "bron": "RVV 1990 art. 5, art. 6; borden G11, G12a"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Je nadert een ruiter te paard. Wat is verstandig?", "opties": ["Hard toeteren zodat het paard opzij gaat", "Flink gas geven om er snel langs te zijn", "Rustig rijden, afstand houden en niet hard claxonneren"], "correct": 2, "uitleg": "Een paard kan schrikken van geluid of plotselinge bewegingen. Dus rij je rustig langs, houd je afstand en vermijd je hard claxonneren of plotseling gas geven. Een geschrokken paard is voor iedereen gevaarlijk.", "bron": "RVV 1990 art. 1 (ruiter); algemene zorgvuldigheidsplicht WVW 1994 art. 5"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Je wilt landbouwverkeer, bijvoorbeeld een tractor, inhalen op een weg buiten de bebouwde kom. Wanneer doe je dat?", "opties": ["Altijd zo snel mogelijk, tractoren zijn traag", "Alleen als je goed zicht hebt en genoeg ruimte", "Inhalen van landbouwverkeer mag nooit"], "correct": 1, "uitleg": "Landbouwverkeer is breed en traag. Inhalen mag, maar alleen als je goed zicht hebt en genoeg ruimte. Een tractor kan ook plotseling een erf of veld in afslaan, dus blijf alert.", "bron": "RVV 1990 art. 11 en 12 (inhalen); WVW 1994 art. 5 (zorgvuldigheid)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Wat is de blinde hoek (dode hoek) van je auto?", "opties": ["Het gebied recht voor je auto dat je niet ziet", "Het gebied naast en schuin achter je dat je niet in je spiegels ziet", "Het stuk weg dat door tegenliggers wordt verborgen"], "correct": 1, "uitleg": "De blinde hoek is het gebied naast en schuin achter je auto dat je niet in je spiegels ziet. Juist fietsers en motorrijders kunnen zich daar bevinden. Daarom geef je naast je spiegelblik ook een schouderblik.", "bron": "RVV 1990 art. 17, art. 18 (afslaan, ander weggedeelte oprijden); CBR exameneisen rijbewijs B (blinde hoek)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "janee", "vraag": "Bij een vrachtwagen is de blinde hoek het grootst aan de rechtervoorkant. Als fietser blijf je daar dus beter uit. Klopt dit?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Bij een vrachtwagen is de blinde hoek juist rechtsvoor het grootst. Een chauffeur ziet je bij het rechts afslaan daar misschien niet. Als fietser en als automobilist blijf je dus uit die hoek.", "bron": "RVV 1990 art. 17, art. 18; CBR exameneisen rijbewijs B (blinde hoek)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "multi", "vraag": "Welke weggebruikers laat je voorgaan of geef je extra ruimte, ook buiten een officiële oversteekplaats? Meerdere antwoorden kunnen goed zijn.", "opties": ["Een blinde met een witte stok met rode ringen", "Een gewone fietser op het fietspad", "Iemand die zich moeilijk voortbeweegt, zoals een oudere met een rollator", "Een snelle motorrijder op de rijbaan"], "correct": [0, 2], "uitleg": "Een blinde met een witte stok met rode ringen en iemand die zich moeilijk voortbeweegt laat je altijd voorgaan, ook zonder zebrapad. Een gewone fietser of motorrijder valt hier niet onder, die behandel je volgens de normale voorrangsregels.", "bron": "RVV 1990 art. 49 lid 1"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Je rijdt langs een speelplaats en een school. Hoe pas je je rijgedrag aan?", "opties": ["Niets, kinderen weten heus wel hoe het verkeer werkt", "Je haalt je snelheid eraf en bent extra alert op onverwacht gedrag", "Je rijdt juist sneller om snel weg te zijn"], "correct": 1, "uitleg": "Kinderen gedragen zich onvoorspelbaar en overzien gevaar nog niet goed. Bij een school of speelplaats haal je je snelheid eraf en ben je extra alert. Eentje kan zo de straat op rennen achter een bal aan.", "bron": "WVW 1994 art. 5 (gevaar of hinder voorkomen); CBR exameneisen rijbewijs B (gevaarherkenning)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "mc", "vraag": "Je staat op de invoegstrook van de snelweg. Wie past zich aan wie aan?", "opties": ["Het verkeer op de snelweg moet voor jou remmen", "Jij past je snelheid aan op het verkeer en voegt in op een veilig gat", "Je voegt gewoon in, ze zien je wel"], "correct": 1, "uitleg": "Op de invoegstrook pas jij je aan. Je past je snelheid aan op die van het verkeer op de snelweg, kijkt goed in je spiegels en over je schouder, en voegt in op een veilig gat. De auto's op de doorgaande baan hoeven niet voor jou te remmen.", "bron": "RVV 1990 art. 43 (gedrag op autosnelweg/autoweg), art. 5; CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "mc", "vraag": "Je wilt de snelweg af via de uitvoegstrook. Waar rem je af?", "opties": ["Al op de doorgaande rijbaan, ruim voor de afrit", "Pas als je op de uitvoegstrook rijdt", "Je remt helemaal niet, dat regelt de afrit"], "correct": 1, "uitleg": "Je gaat op tijd naar de uitvoegstrook en remt pas af als je daarop rijdt, niet op de doorgaande rijbaan. Zo verras je het verkeer achter je niet. En richting aangeven doe je natuurlijk op tijd.", "bron": "RVV 1990 art. 43 (gedrag op autosnelweg/autoweg); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "janee", "vraag": "Je hebt geen pech, maar het is druk. Mag je dan even op de vluchtstrook gaan rijden om sneller op te schieten?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "De vluchtstrook is alleen voor noodgevallen, bij pech of een ongeval. Erop rijden of stilstaan zonder noodzaak mag niet. Druk verkeer is geen noodgeval.", "bron": "RVV 1990 art. 43 lid 3 (verbod gebruik vluchtstrook behalve noodgeval)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "mc", "vraag": "Je krijgt pech op de snelweg en kunt nog naar de kant. Wat doe je?", "opties": ["Midden op de rijbaan stoppen en de alarmlichten aanzetten", "Naar rechts de vluchtstrook op, alarmlichten aan, uitstappen achter de vangrail", "Op de linkerstrook stoppen, daar zie je hulp het snelst"], "correct": 1, "uitleg": "Bij pech stuur je zo ver mogelijk naar rechts de vluchtstrook op, zet je de alarmlichten aan en stap je uit aan de veilige kant, achter de vangrail. Daarna bel je voor hulp. Op de rijbaan blijven is levensgevaarlijk.", "bron": "RVV 1990 art. 43 lid 3 (vluchtstrook bij noodgeval); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "invul", "vraag": "Hoeveel kilometer per uur moet je voertuig minstens kunnen en mogen rijden om op de autosnelweg te mogen? Vul het getal in.", "opties": [], "correct": "60", "uitleg": "Op de autosnelweg moet je voertuig minstens 60 km/u kunnen en mogen rijden. Op de autoweg is dat 50 km/u. Langzame voertuigen, fietsers en voetgangers horen er niet thuis.", "bron": "RVV 1990 art. 42 (minimumsnelheid-eis: autosnelweg 60 km/u, autoweg 50 km/u)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 4, "type": "mc", "vraag": "Twee rijstroken komen samen tot één en het verkeer rijdt langzaam. Hoe hoort het ritsen te gaan?", "opties": ["Je voegt zo vroeg mogelijk in op de doorgaande strook", "Je rijdt door tot vlak bij het einde en voegt daar om en om in", "Wie het hardst doorrijdt, mag eerst"], "correct": 1, "uitleg": "Ritsen werkt als de tanden van een ritssluiting. Je rijdt op de wegvallende strook door tot vlak bij het einde en voegt daar om en om in. De bestuurders op de doorgaande strook laten om beurten één auto voorgaan. Zo blijft de doorstroming juist beter.", "bron": "RVV 1990 art. 54 (van rijstrook wisselen en invoegen); CBR exameneisen rijbewijs B (ritsen)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 4, "type": "janee", "vraag": "Bij langzaam rijdend of stilstaand verkeer is ritsen verplicht, ook als er geen bord staat. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Bij langzaam rijdend of stilstaand verkeer is ritsen verplicht, ook zonder bord. Vroeg samendringen op één strook zorgt juist voor meer file. Om en om invoegen vlak bij het einde houdt het verkeer beter op gang.", "bron": "RVV 1990 art. 54 (van rijstrook wisselen en invoegen); CBR exameneisen rijbewijs B (ritsen)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "mc", "vraag": "Je gaat wegrijden vanaf de stoeprand tussen geparkeerde auto's. Heb je daarbij voorrang?", "opties": ["Ja, want je geeft netjes richting aan", "Nee, het verkeer dat er al rijdt gaat voor", "Alleen op een drukke weg heb je voorrang"], "correct": 1, "uitleg": "Wegrijden is een bijzondere manoeuvre en daarbij heb je geen voorrang. Het verkeer dat er al rijdt mag gewoon doorrijden, dus jij wacht tot het veilig kan. Richting aangeven betekent niet dat je voorrang krijgt.", "bron": "RVV 1990 art. 54 (bijzondere manoeuvres, ander verkeer voor laten gaan); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "mc", "vraag": "In welke volgorde kijk je vlak voordat je wegrijdt?", "opties": ["Alleen even in de binnenspiegel", "Binnenspiegel, buitenspiegel, dan over de schouder in de dode hoek", "Eerst over de schouder, spiegels zijn niet nodig"], "correct": 1, "uitleg": "Voor je wegrijdt kijk je in je binnenspiegel, dan je buitenspiegel, en daarna over je schouder in de dode hoek. Geef richting aan en let vooral op fietsers en bromfietsers die je rechts kunnen inhalen, want die zie je zo over het hoofd.", "bron": "RVV 1990 art. 54 (wegrijden); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "janee", "vraag": "Je wilt keren op de weg. Moet je daarbij al het andere verkeer voor laten gaan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Keren is een bijzondere manoeuvre en daarbij heb je geen voorrang. Je laat al het andere verkeer voorgaan. Kies een plek met goed overzicht, kijk goed rond en voer het rustig uit. Liever twee keer steken dan risico nemen.", "bron": "RVV 1990 art. 54 (ander verkeer voor laten gaan bij keren); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "multi", "vraag": "Op welke plekken mag je niet keren? Meerdere antwoorden kunnen goed zijn.", "opties": ["In een onoverzichtelijke bocht", "Op een rustige, brede weg met goed zicht", "Vlak voor of op een kruising", "Waar een doorgetrokken streep ligt"], "correct": [0, 2, 3], "uitleg": "Keren mag niet als het onveilig is. Dus niet in een onoverzichtelijke bocht, niet vlak voor of op een kruising, en niet waar een doorgetrokken streep ligt. Op een rustige, brede weg met goed zicht kan het juist wel.", "bron": "RVV 1990 art. 54 (keren) en art. 76 (doorgetrokken streep); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "mc", "vraag": "Je gaat achteruitrijden om in te parkeren. Waar let je vooral op?", "opties": ["Alleen op auto's, die zie je het makkelijkst", "Op kleine kinderen, fietsers en voetgangers die laag of dicht achter de auto zitten", "Niets, de achteruitrijcamera doet het werk"], "correct": 1, "uitleg": "Bij achteruitrijden is je zicht naar achteren beperkt. Let vooral op kleine kinderen, fietsers en voetgangers die laag of dicht achter de auto kunnen zitten. Een camera of sensoren helpen, maar ze vervangen je eigen blik niet. Twijfel je, dan stop je en kijk je opnieuw.", "bron": "RVV 1990 art. 54 (achteruitrijden, ander verkeer voor laten gaan); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "janee", "vraag": "Je gaat achteruitrijden. Moet je daarbij al het andere verkeer voor laten gaan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ook bij achteruitrijden laat je al het andere verkeer voorgaan, net als bij wegrijden en keren. Het zijn allemaal bijzondere manoeuvres zonder voorrang voor jou. Eerst goed rondkijken, dan langzaam en gecontroleerd rijden.", "bron": "RVV 1990 art. 54 (achteruitrijden); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "mc", "vraag": "Wat houdt de 'Dutch reach' in bij het openen van je portier als bestuurder?", "opties": ["Je opent het portier met je linkerhand, dat gaat sneller", "Je opent het portier met je rechterhand, zodat je vanzelf over je schouder kijkt", "Je opent het portier pas als de motor uit is"], "correct": 1, "uitleg": "Bij de Dutch reach open je het portier met de hand die het verst van het portier zit. Als bestuurder pak je het linker portier dus met je rechterhand. Daardoor draait je bovenlichaam mee en kijk je vanzelf over je schouder naar aankomende fietsers. Zo voorkom je dooring.", "bron": "CBR informatie praktijkexamen rijbewijs B (Dutch reach niet verplicht, wel aanbevolen)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "janee", "vraag": "Is de Dutch reach wettelijk verplicht op het rijexamen?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "De Dutch reach is niet wettelijk verplicht en ook niet verplicht op het rijexamen, maar het is wel een sterk aanbevolen gewoonte. Bij het praktijkexamen let het CBR wel op of je veilig en met aandacht uitstapt.", "bron": "CBR informatie praktijkexamen rijbewijs B (Dutch reach niet verplicht, wel aanbevolen)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "multi", "vraag": "Welke van deze manoeuvres zijn bijzondere manoeuvres waarbij je al het andere verkeer voor laat gaan? Meerdere antwoorden kunnen goed zijn.", "opties": ["Wegrijden vanaf de kant", "Keren op de weg", "Rechtdoor rijden op een voorrangsweg", "Achteruitrijden"], "correct": [0, 1, 3], "uitleg": "Wegrijden, keren en achteruitrijden zijn bijzondere manoeuvres. Daarbij heb je geen voorrang en laat je al het andere verkeer voorgaan. Gewoon rechtdoor rijden op een voorrangsweg is geen bijzondere manoeuvre.", "bron": "RVV 1990 art. 54 (bijzondere manoeuvres); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "mc", "vraag": "De examinator vraagt je een bijzondere verrichting uit te voeren, bijvoorbeeld keren of inparkeren. Wat weegt het zwaarst?", "opties": ["Dat je het in één keer en zo snel mogelijk doet", "Veiligheid en overzicht: goed kijken en anderen voor laten gaan", "Dat je perfect tussen de lijntjes staat, de rest telt niet"], "correct": 1, "uitleg": "Bij bijzondere verrichtingen telt techniek mee, maar veiligheid en overzicht wegen het zwaarst. Dus goed kijken voor en tijdens de manoeuvre, anderen voor laten gaan, op tijd richting aangeven en rustig en gecontroleerd rijden.", "bron": "CBR exameneisen praktijkexamen rijbewijs B (bijzondere verrichtingen)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 12, "type": "mc", "vraag": "Je sleept een ander voertuig dat door pech niet meer rijdt. Waar let je op?", "opties": ["Je rijdt extra hard zodat het slepen snel klaar is", "Je rijdt rustig en houdt extra afstand; het gesleepte voertuig stuurt en remt minder goed", "In het gesleepte voertuig hoeft niemand te zitten"], "correct": 1, "uitleg": "Bij slepen rijd je rustig en houd je extra afstand, want het gesleepte voertuig stuurt en remt minder goed. En het gesleepte voertuig moet bestuurd worden door iemand met een geldig rijbewijs.", "bron": "RVV 1990 art. 53 (slepen); WVW 1994 (rijbewijsplicht bestuurder)"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "janee", "vraag": "Een gehandicaptenvoertuig, zoals een scootmobiel, mag afhankelijk van de snelheid op het trottoir, het fietspad of de rijbaan rijden. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Klopt. Een gehandicaptenvoertuig mag op het trottoir, het fietspad of de rijbaan rijden, afhankelijk van de snelheid. Het is een langzaam voertuig, dus geef het de ruimte en houd er rekening mee dat het traag is.", "bron": "RVV 1990 art. 1 (gehandicaptenvoertuig); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 10, "type": "mc", "vraag": "Je gaat afslaan en wisselt van rijstrook. Waarom zijn motorrijders dan een aandachtspunt?", "opties": ["Ze rijden altijd te hard", "Ze zijn smal en daardoor makkelijk over het hoofd te zien", "Ze hebben nooit voorrang"], "correct": 1, "uitleg": "Motorrijders zijn smal en daardoor makkelijk over het hoofd te zien, zeker bij afslaan of van rijstrook wisselen. Kijk daarom altijd extra goed: gebruik je spiegels én geef een schouderblik in de dode hoek.", "bron": "RVV 1990 art. 17, art. 18 (afslaan, ander weggedeelte oprijden); CBR exameneisen rijbewijs B"}, {"onderwerp": "Bijzondere wegen, weggedeelten, weggebruikers en manoeuvres", "hoofdstukref": 3, "type": "janee", "vraag": "Mag een fietser op de autosnelweg rijden?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Nee. De autosnelweg is alleen voor snelle motorvoertuigen die minstens 60 km/u kunnen en mogen rijden. Langzame voertuigen, fietsers, bromfietsen en voetgangers mogen er niet komen.", "bron": "RVV 1990 art. 1 (autosnelweg) en art. 42 (minimumsnelheid-eis)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "mc", "vraag": "Je rijdt overdag op de snelweg en er staat geen bord dat iets anders aangeeft. Wat is hier je maximumsnelheid?", "opties": ["100 km/u", "120 km/u", "130 km/u"], "correct": 0, "uitleg": "Sinds 16 maart 2020 geldt overdag tussen 06.00 en 19.00 uur standaard 100 km/u op de snelweg. Staat er een bord, dan is dat bord leidend.", "bron": "Rijkswaterstaat, maximumsnelheid sinds 16 maart 2020; RVV 1990 art. 21"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "mc", "vraag": "Je rijdt 's nachts om 02.00 uur op de snelweg. Er staat geen enkel bord. Welke snelheid mag je dan aanhouden?", "opties": ["100 km/u", "120 km/u", "130 km/u"], "correct": 2, "uitleg": "Het verlaagde maximum van 100 geldt alleen tussen 06.00 en 19.00 uur. Buiten die uren val je terug op de standaard van de weg, en zonder bord is dat 130.", "bron": "Rijkswaterstaat, maximumsnelheid sinds 16 maart 2020; RVV 1990 art. 21-22"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "invul", "vraag": "Wat is de standaard maximumsnelheid voor een personenauto binnen de bebouwde kom, in km/u?", "opties": [], "correct": "50", "uitleg": "Binnen de bebouwde kom geldt standaard 50 km/u. Een bord kan dat verlagen naar bijvoorbeeld 30 in een woonwijk, maar zonder bord is het 50.", "bron": "RVV 1990 art. 20"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "invul", "vraag": "Wat is de standaard maximumsnelheid buiten de bebouwde kom op een gewone weg, in km/u?", "opties": [], "correct": "80", "uitleg": "Buiten de bebouwde kom rijd je standaard 80 km/u, tenzij een bord iets anders aangeeft. De autoweg en autosnelweg hebben hun eigen hogere limieten.", "bron": "RVV 1990 art. 21"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "mc", "vraag": "Je rijdt op een autoweg. Welke standaardsnelheid hoort daarbij als er geen bord staat?", "opties": ["80 km/u", "100 km/u", "130 km/u"], "correct": 1, "uitleg": "Op de autoweg is de standaard 100 km/u. Let op het verschil met de autosnelweg, waar de standaard 130 is. De borden onderscheiden de twee wegen.", "bron": "RVV 1990 art. 21"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "janee", "vraag": "Het is mistig en je ziet maar zo'n 40 meter ver. Mag je dan toch de toegestane 80 km/u blijven rijden omdat het bord dat aangeeft?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "De maximumsnelheid is een bovengrens, geen verplichting. Je moet kunnen stoppen binnen de afstand die je kunt overzien en die vrij is. Bij 40 meter zicht is 80 km/u veel te hard.", "bron": "RVV 1990 art. 19"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "invul", "vraag": "Hoeveel seconden volgafstand houd je minimaal tot je voorligger onder normale, droge omstandigheden?", "opties": [], "correct": "2", "uitleg": "De vuistregel is de 2-secondenregel: tel vanaf een vast punt eenentwintig, tweeentwintig. Ben je er eerder dan je tellen klaar is, dan zit je te dicht erop. Bij slecht weer maak je er 3 tot 4 van.", "bron": "CBR exameneisen rijbewijs B; RVV 1990 art. 19"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "mc", "vraag": "Het regent en de weg is nat. Welke volgafstand is hier verstandig tot je voorligger?", "opties": ["1 seconde", "2 seconden", "3 tot 4 seconden"], "correct": 2, "uitleg": "Bij regen of slecht zicht verdubbel je de 2-secondenregel naar 3 tot 4 seconden. Je remweg is op een natte weg langer, dus je hebt meer ruimte nodig om op tijd te stoppen.", "bron": "CBR exameneisen rijbewijs B; RVV 1990 art. 19"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "mc", "vraag": "Waaruit bestaat de stopafstand van je auto?", "opties": ["Alleen de remafstand", "Reactieafstand plus remafstand", "Reactieafstand plus volgafstand"], "correct": 1, "uitleg": "De stopafstand is de reactieafstand plus de remafstand. De reactieafstand is de weg die je aflegt voordat je echt remt, de remafstand is van remmen tot stilstand.", "bron": "CBR exameneisen rijbewijs B (stopafstand, reactie- en remafstand)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "janee", "vraag": "Je verdubbelt je snelheid van 50 naar 100 km/u. Wordt je remafstand daardoor ongeveer vier keer zo lang?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "De remafstand groeit niet recht evenredig met je snelheid maar veel sneller. Verdubbel je je snelheid, dan wordt de remafstand ongeveer vier keer zo lang. Daarom is hard rijden zo verraderlijk.", "bron": "CBR exameneisen rijbewijs B; natuurkundige verhouding remweg-snelheid (kwadratisch)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "multi", "vraag": "Welke factoren maken vooral je reactieafstand langer? Meerdere antwoorden kunnen goed zijn.", "opties": ["Vermoeidheid", "Alcohol", "Een nat wegdek", "Afleiding door je telefoon"], "correct": [0, 1, 3], "uitleg": "Vermoeidheid, alcohol en afleiding maken je trager met reageren, dus die verlengen de reactieafstand. Een nat wegdek doet iets anders: dat verlengt juist je remafstand.", "bron": "CBR exameneisen rijbewijs B (reactie- en remafstand)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "mc", "vraag": "Je rijdt met een caravan achter je auto op de snelweg. Welke maximumsnelheid geldt voor jou, als geen bord iets lagers aangeeft?", "opties": ["80 km/u", "90 km/u", "100 km/u"], "correct": 1, "uitleg": "Met een aanhanger of caravan mag je op de autosnelweg en de autoweg maximaal 90 km/u. Op andere wegen buiten de bebouwde kom is het 80. Je gespan is zwaarder en langer, dus remmen en sturen gaan lastiger.", "bron": "RVV 1990 art. 22 onder e (maximumsnelheid auto met aanhangwagen)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 5, "type": "multi", "vraag": "Wanneer vergroot je je volgafstand tot meer dan 2 seconden? Meerdere antwoorden kunnen goed zijn.", "opties": ["Bij regen op een natte weg", "Bij mist en slecht zicht", "Op een droge weg bij helder weer", "Bij gladheid door ijzel"], "correct": [0, 1, 3], "uitleg": "Bij regen, mist of gladheid is je remweg langer, dus maak je van de 2 seconden 3 tot 4. Op een droge weg bij helder weer volstaat de gewone 2-secondenregel. Te dicht volgen heet bumperkleven en is strafbaar.", "bron": "CBR exameneisen rijbewijs B; RVV 1990 art. 19 (voldoende afstand)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "mc", "vraag": "Je rijdt op een autosnelweg met drie rijstroken en je hoeft niemand in te halen. Op welke strook hoor je te rijden?", "opties": ["De meest rechtse vrije strook", "De middelste strook", "Maakt niet uit, kies zelf"], "correct": 0, "uitleg": "De basisregel is rechts houden. Op meerdere rijstroken rijd je op de meest rechtse vrije strook. De stroken links daarvan zijn om in te halen, en daarna ga je weer naar rechts.", "bron": "RVV 1990 art. 3 (rechts houden)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "janee", "vraag": "De basisregel in Nederland is dat je zo veel mogelijk rechts houdt op de rijbaan.", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Rechts houden is de basisregel. Zo blijft het verkeer overzichtelijk en geef je sneller verkeer de ruimte om links in te halen.", "bron": "RVV 1990 art. 3"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "mc", "vraag": "Je voegt vanaf de oprit de snelweg op. Wat doe je?", "opties": ["Je snelheid aanpassen aan het verkeer en invoegen op een veilig gat", "Vol gas geven zodat het doorgaande verkeer voor jou remt", "Stoppen aan het eind van de invoegstrook tot er ruimte is"], "correct": 0, "uitleg": "Op de invoegstrook pas jij je snelheid aan die van het verkeer op de snelweg en voeg je in op een veilig gat. Het doorgaande verkeer hoeft niet voor jou te remmen, dus stoppen aan het eind is gevaarlijk.", "bron": "RVV 1990 art. 43 (gedrag op autosnelweg)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "janee", "vraag": "Je wilt de snelweg verlaten. Mag je al afremmen op de doorgaande rijbaan, vlak voordat je de uitvoegstrook op gaat?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Je remt pas af als je echt op de uitvoegstrook rijdt, niet op de doorgaande baan. Anders verras je het verkeer achter je. Geef op tijd richting aan en ga rustig naar de uitvoegstrook.", "bron": "RVV 1990 art. 43; RVV 1990 art. 5 (geen gevaar/hinder)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "janee", "vraag": "Twee rijstroken komen samen tot één en het verkeer staat vast. Is ritsen dan verplicht, ook al staat er geen bord?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Bij langzaam rijdend of stilstaand verkeer is ritsen verplicht, ook zonder bord. Je rijdt door tot vlak bij het einde van de wegvallende strook en voegt daar pas in, om en om.", "bron": "RVV 1990 art. 54 (van rijstrook wisselen en invoegen); CBR exameneisen rijbewijs B (ritsen)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "mc", "vraag": "Hoe werkt ritsen waar twee rijstroken samenkomen tot één?", "opties": ["Iedereen voegt zo vroeg mogelijk samen op één strook", "Om en om voegt steeds één auto in, vlak bij het einde", "Het verkeer rechts heeft altijd voorrang"], "correct": 1, "uitleg": "Ritsen werkt als de tanden van een ritssluiting: om en om voegt steeds één auto in. Je rijdt door tot vlak bij het einde van de wegvallende strook, zo blijft de doorstroming beter op gang.", "bron": "RVV 1990 art. 54 (van rijstrook wisselen en invoegen); CBR exameneisen rijbewijs B (ritsen)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "multi", "vraag": "Wat doe je altijd voordat je van rijstrook wisselt? Meerdere antwoorden kunnen goed zijn.", "opties": ["In je spiegels kijken", "Over je schouder in de dode hoek kijken", "Op tijd richting aangeven", "Hard toeteren"], "correct": [0, 1, 2], "uitleg": "Bij elke strookwisseling kijk je in je spiegels, controleer je de dode hoek met een schouderblik en geef je op tijd richting aan. Toeteren hoort daar niet bij, dat is alleen voor dreigend gevaar.", "bron": "RVV 1990 art. 3 en art. 17-18; RVV 1990 art. 5"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 4, "type": "mc", "vraag": "Wanneer mag je je claxon of je grootlicht als signaal gebruiken?", "opties": ["Als iemand voor je te langzaam rijdt", "Alleen om dreigend gevaar af te wenden", "Om te groeten"], "correct": 1, "uitleg": "De claxon en het lichtsignaal zijn er alleen om dreigend gevaar af te wenden, dus om iemand voor een gevaarlijke situatie te waarschuwen. Toeteren uit ongeduld of boosheid mag niet.", "bron": "RVV 1990 art. 28"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "mc", "vraag": "Aan welke kant haal je in op een gewone weg?", "opties": ["Rechts", "Links", "Maakt niet uit"], "correct": 1, "uitleg": "De hoofdregel is helder: inhalen doe je links. Eerst kijk je in je spiegels, dan over je schouder voor de dode hoek, en je geeft op tijd richting aan.", "bron": "RVV 1990 art. 11 lid 1 (inhalen geschiedt links)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "janee", "vraag": "Je hebt iemand ingehaald. Mag je meteen weer naar rechts gaan zodra je voorbij bent?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Je gaat pas weer naar rechts als je de ingehaalde volledig in je binnenspiegel ziet. Anders snijd je hem af. Wacht dus tot je genoeg ruimte hebt en ga rustig terug.", "bron": "RVV 1990 art. 11 (inhalen); RVV 1990 art. 3 (rechts houden)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "janee", "vraag": "Mag je over een doorgetrokken streep heen rijden om iemand in te halen?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Een doorgetrokken streep mag je niet overschrijden, dus ook niet om in te halen. Bij een onderbroken streep mag dat wel, zolang het veilig kan.", "bron": "RVV 1990 art. 76-77 (doorgetrokken streep)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "multi", "vraag": "Op welke plekken haal je beter niet in? Meerdere antwoorden kunnen goed zijn.", "opties": ["In een onoverzichtelijke bocht", "Vlak voor een voetgangersoversteekplaats", "Op een lange rechte weg met goed zicht", "Vlak voor de top van een heuvel"], "correct": [0, 1, 3], "uitleg": "In een bocht, vlak voor een zebrapad of vlak voor een heuveltop kun je niet ver genoeg vooruit kijken of komen er plotseling voetgangers vandaan. Op een lange rechte weg met goed zicht mag je juist wel inhalen.", "bron": "RVV 1990 art. 12 (inhaalverbod bij voetgangersoversteekplaats); CBR exameneisen rijbewijs B"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "mc", "vraag": "De bestuurder voor je heeft links voorgesorteerd en geeft met zijn richtingaanwijzer aan dat hij linksaf gaat. Mag je hem dan rechts passeren?", "opties": ["Nee, inhalen mag alleen links", "Ja, je passeert hem dan rechts", "Alleen als er een bord staat"], "correct": 1, "uitleg": "Dit is een van de uitzonderingen op de regel dat je links inhaalt. Sorteert je voorligger links voor om af te slaan, dan passeer je hem rechts. Een tram mag je trouwens ook rechts inhalen.", "bron": "RVV 1990 art. 11 lid 2 (uitzonderingen rechts inhalen)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "janee", "vraag": "Je staat in de file. Jouw rijstrook rijdt sneller dan de strook links van je. Mag je dan toch doorrijden?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "In een file mag een rechterstrook sneller rijden dan een linkerstrook, en dat telt formeel niet als verboden rechts inhalen. Je hoeft dus niet te wachten als jouw strook sneller gaat.", "bron": "RVV 1990 art. 13 (filerijden: rechts sneller toegestaan)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "mc", "vraag": "Je wilt een lange, langzame vrachtwagen inhalen. Waarom houd je eerst wat extra afstand?", "opties": ["Om brandstof te besparen", "Om beter langs het voertuig vooruit te kunnen kijken", "Omdat dat wettelijk verplicht is op 100 meter"], "correct": 1, "uitleg": "Achter een lang voertuig zie je minder van de weg vooruit. Door eerst wat extra afstand te houden kijk je beter langs het voertuig en kun je inschatten of het veilig is om te beginnen.", "bron": "CBR exameneisen rijbewijs B (inhalen langere voertuigen); RVV 1990 art. 11"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 6, "type": "janee", "vraag": "Je twijfelt of je een inhaalmanoeuvre veilig op tijd afrondt. Is het dan beter om er niet aan te beginnen?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Bij twijfel doe je het niet. Een inhaalmanoeuvre die je laat schieten is nooit een probleem, een mislukte wel. Inhalen kost ruimte en tijd, dus begin alleen als je zeker weet dat het past.", "bron": "RVV 1990 art. 11; CBR exameneisen rijbewijs B"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 3, "type": "mc", "vraag": "Wat is een rijstrook?", "opties": ["De hele verharde weg waarover gereden wordt", "Een door strepen begrensde baan voor één rij voertuigen", "Het pad voor voetgangers"], "correct": 1, "uitleg": "Een rijstrook is een door strepen begrensde baan waar één rij voertuigen op past. De hele verharde weg waarover gereden wordt heet de rijbaan, en die kan uit meerdere stroken bestaan.", "bron": "RVV 1990 art. 1 (begripsbepalingen rijbaan, rijstrook)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 3, "type": "janee", "vraag": "Een fietsstrook is begrensd met een doorgetrokken streep. Mag je als automobilist op die strook rijden?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Bij een doorgetrokken streep mag je niet op de fietsstrook rijden. Bij een onderbroken streep mag je hem wel kruisen of er overheen rijden als dat nodig is, maar stilstaan of parkeren mag er nooit.", "bron": "RVV 1990 art. 1 (fietsstrook), art. 10"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 3, "type": "mc", "vraag": "Waaraan herken je een busstrook op het wegdek?", "opties": ["Aan een gele streep", "Aan het woord BUS of LIJNBUS op het wegdek", "Aan een rood kruis"], "correct": 1, "uitleg": "Een busstrook herken je aan het woord BUS of LIJNBUS op het wegdek. Als gewone automobilist mag je er niet op rijden, tenzij een bord uitdrukkelijk een uitzondering maakt.", "bron": "RVV 1990 art. 1 (busstrook), art. 73"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 3, "type": "invul", "vraag": "Wat is de maximumsnelheid op een erf, in km/u?", "opties": [], "correct": "15", "uitleg": "Op een erf mag je niet harder dan 15 km/u. Voetgangers mogen er de hele breedte van de weg gebruiken en er spelen vaak kinderen, dus je rijdt er stapvoets en blijft alert.", "bron": "RVV 1990 art. 45 (max. 15 km/u op erf)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 3, "type": "janee", "vraag": "Mag je op een erf overal parkeren waar je een plekje vindt?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Op een erf mag je alleen parkeren op de plekken die daarvoor zijn aangegeven, vaak met een P of een blauwe streep. Buiten die plekken parkeren mag niet, want voetgangers gebruiken de hele breedte.", "bron": "RVV 1990 art. 44-45 (erf)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 3, "type": "mc", "vraag": "Wat is de vluchtstrook op de autosnelweg bedoeld voor?", "opties": ["Om sneller te rijden bij drukte", "Alleen voor noodgevallen, zoals pech of een ongeval", "Om te parkeren"], "correct": 1, "uitleg": "De vluchtstrook helemaal rechts is er alleen voor noodgevallen, bij pech of een ongeval. Normaal mag je er niet op rijden of stilstaan. Bij pech stuur je er zo ver mogelijk naar rechts op.", "bron": "RVV 1990 art. 43 lid 3 (verbod gebruik vluchtstrook behalve noodgeval)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 3, "type": "multi", "vraag": "Welke weggebruikers mogen niet op de autosnelweg komen? Meerdere antwoorden kunnen goed zijn.", "opties": ["Fietsers", "Bromfietsers", "Personenauto's", "Voetgangers"], "correct": [0, 1, 3], "uitleg": "De autosnelweg is alleen voor snelle motorvoertuigen. Fietsers, bromfietsers, voetgangers en langzame voertuigen mogen er niet komen. Een personenauto mag er natuurlijk wel rijden.", "bron": "RVV 1990 art. 42-43 (gedrag op autosnelweg/autoweg)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "mc", "vraag": "Wat is volgens de wet het verschil tussen stilstaan en parkeren?", "opties": ["Parkeren is langer dan vijf minuten stilstaan", "Parkeren is laten staan, behalve direct in- of uitstappen of laden en lossen", "Stilstaan mag alleen met de motor uit"], "correct": 1, "uitleg": "Parkeren is je voertuig laten staan, behalve als je iemand onmiddellijk laat in- of uitstappen of direct laadt of lost. Doe je dat wel, dan parkeer je niet maar sta je stil.", "bron": "RVV 1990 art. 1 (begripsbepaling parkeren)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "mc", "vraag": "Wat betekent een gele doorgetrokken streep langs de kant van de weg?", "opties": ["Parkeerverbod, maar stilstaan mag", "Stopverbod: je mag er niet stilstaan en niet parkeren", "Je mag er alleen met een parkeerschijf staan"], "correct": 1, "uitleg": "Een gele doorgetrokken streep is een stopverbod. Je mag er niet stilstaan en niet parkeren. De gele onderbroken streep is minder streng: dat is alleen een parkeerverbod, stilstaan mag daar nog wel.", "bron": "RVV 1990 art. 23 (gele doorgetrokken streep, verbod stil te staan)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "mc", "vraag": "Wat betekent een gele onderbroken streep langs de kant van de weg?", "opties": ["Stopverbod: je mag er niet stilstaan", "Parkeerverbod: stilstaan om iemand te laten in- of uitstappen mag nog wel", "Hier mag je gratis parkeren"], "correct": 1, "uitleg": "De gele onderbroken streep is een parkeerverbod. Je voertuig laten staan mag niet, maar even stilstaan om iemand te laten in- of uitstappen of om te laden en lossen mag nog wel.", "bron": "RVV 1990 art. 24 lid 1 onder e (gele onderbroken streep = parkeerverbod)"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "invul", "vraag": "Binnen hoeveel meter van een kruispunt mag je niet parkeren?", "opties": [], "correct": "5", "uitleg": "Je mag niet parkeren binnen vijf meter van een kruispunt. Dat houdt het zicht vrij voor het verkeer dat de kruising nadert. Ook voor een in- of uitrit mag je niet parkeren.", "bron": "RVV 1990 art. 24 lid 1 onder a"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "multi", "vraag": "Op welke plekken mag je helemaal niet stilstaan? Meerdere antwoorden kunnen goed zijn.", "opties": ["Op een kruispunt", "Op een fietspad", "In een gewoon parkeervak", "Op een voetgangersoversteekplaats"], "correct": [0, 1, 3], "uitleg": "Op een kruispunt, een fietspad en een voetgangersoversteekplaats geldt een stopverbod, daar mag je niet stilstaan. In een gewoon parkeervak mag je natuurlijk wel staan.", "bron": "RVV 1990 art. 23 lid 1"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "multi", "vraag": "Wat geldt er voor parkeren in een blauwe zone? Meerdere antwoorden kunnen goed zijn.", "opties": ["Je gebruikt een duidelijk zichtbare parkeerschijf", "Je parkeert alleen op plekken met een blauwe streep of parkeervak", "Je mag er onbeperkt blijven staan", "De maximale parkeertijd staat op het bord"], "correct": [0, 1, 3], "uitleg": "In een blauwe zone parkeer je alleen op de plekken met een blauwe streep of een parkeervak, met een duidelijk zichtbare parkeerschijf. Onbeperkt blijven staan mag niet: de maximale tijd lees je op het bord.", "bron": "RVV 1990 art. 25"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "mc", "vraag": "Je komt om 14.10 uur aan en wilt parkeren in een blauwe zone. Welke tijd zet je op je parkeerschijf?", "opties": ["14.00 uur", "14.10 uur", "14.30 uur"], "correct": 2, "uitleg": "Op de parkeerschijf rond je je aankomsttijd naar boven af op het eerstvolgende hele of halve uur. Om 14.10 uur wordt dat dus 14.30 uur. Zo blijf je netjes binnen de regels van de zone.", "bron": "RVV 1990 art. 25"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "mc", "vraag": "Je ziet bord E6, een blauw bord met een witte P en een rolstoelsymbool. Wanneer mag je daar parkeren?", "opties": ["Altijd, het is een gewone parkeerplaats", "Alleen met een geldige, zichtbare gehandicaptenparkeerkaart", "Alleen 's avonds en in het weekend"], "correct": 1, "uitleg": "Bord E6 is een gehandicaptenparkeerplaats. Je mag er alleen parkeren met een geldige gehandicaptenparkeerkaart duidelijk zichtbaar achter de voorruit. Heb je die niet, dan mag je er niet staan, ook niet even.", "bron": "RVV 1990 bijlage 1, bord E6; art. 26"}, {"onderwerp": "Gebruik van de weg", "hoofdstukref": 9, "type": "mc", "vraag": "Wat is het verschil tussen bord E1 en bord E2?", "opties": ["E1 verbiedt alleen parkeren, E2 verbiedt zowel stilstaan als parkeren", "E1 is strenger dan E2", "Ze betekenen precies hetzelfde"], "correct": 0, "uitleg": "E1 is een parkeerverbod, dus alleen parkeren is verboden. E2 is strenger: dat verbiedt zowel stilstaan als parkeren. Let dus goed op welk van de twee borden er staat.", "bron": "RVV 1990 bijlage 1, borden E1 en E2"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "mc", "vraag": "Je wilt zuiniger gaan rijden. Wat helpt het meest om je verbruik omlaag te brengen?", "opties": ["Zo lang mogelijk in een lage versnelling blijven", "Op tijd opschakelen en in een hoge versnelling rijden", "Steeds krachtig optrekken en weer afremmen"], "correct": 1, "uitleg": "Op tijd opschakelen en in een zo hoog mogelijke versnelling rijden houdt het toerental laag, en een laag toerental verbruikt minder brandstof. Lang in een lage versnelling blijven of telkens hard optrekken kost juist extra.", "bron": "CBR exameneisen rijbewijs B (Het Nieuwe Rijden / milieubewust rijden); leerstof hfst 2 'Milieu en zuinig rijden'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "janee", "vraag": "Te zachte banden zorgen voor een hoger brandstofverbruik. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Te zachte banden hebben meer rolweerstand, en daardoor verbruik je meer brandstof. Ze slijten ook sneller en kunnen klappen. Houd dus de bandenspanning aan die de fabrikant adviseert.", "bron": "Regeling voertuigen art. 5.2.27 (banden); CBR exameneisen rijbewijs B; leerstof hfst 2 'Banden: profiel en spanning'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "mc", "vraag": "Je staat een paar minuten stil voor een gesloten spoorboom. Wat is het zuinigst en het schoonst?", "opties": ["De motor laten draaien zodat je snel weg kunt", "De motor uitzetten en weer starten als de boom opengaat", "Af en toe wat gas geven om de motor warm te houden"], "correct": 1, "uitleg": "Onnodig stationair draaien verspilt brandstof en geeft uitstoot voor niets. Sta je langer stil, zet dan de motor uit. Veel moderne auto's doen dat zelf met start-stop.", "bron": "CBR exameneisen rijbewijs B (milieubewust rijden); leerstof hfst 2 'Milieu en zuinig rijden'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 14, "type": "mc", "vraag": "Je ziet ver vooruit dat het verkeerslicht op rood staat. Wat is de zuinigste manier om het te naderen?", "opties": ["Doorrijden en pas vlak voor de stopstreep flink remmen", "Vroeg het gas loslaten en rustig uitrollen naar het licht", "Versnellen om er misschien nog door te kunnen"], "correct": 1, "uitleg": "Door vroeg gas los te laten rol je op de motor uit en gebruik je nauwelijks brandstof. Je hoeft dan ook minder hard te remmen. Dat is precies wat anticiperen oplevert: minder remmen en optrekken.", "bron": "CBR exameneisen rijbewijs B (anticiperen, milieubewust rijden); leerstof hfst 14 'Anticiperen en risico inschatten'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "multi", "vraag": "Welke gewoontes zorgen voor een lager brandstofverbruik? Meerdere antwoorden kunnen goed zijn.", "opties": ["Vooruit kijken en gelijkmatig rijden", "Een lege dakkoffer altijd op de auto laten", "De juiste bandenspanning aanhouden", "Onnodig gewicht uit de auto halen"], "correct": [0, 2, 3], "uitleg": "Gelijkmatig rijden, de juiste bandenspanning en zo min mogelijk gewicht drukken je verbruik. Een lege dakkoffer laten zitten doet het tegenovergestelde: die geeft extra luchtweerstand en kost dus juist brandstof.", "bron": "CBR exameneisen rijbewijs B (Het Nieuwe Rijden); leerstof hfst 2 'Milieu en zuinig rijden'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 14, "type": "janee", "vraag": "Anticiperend rijden, dus vooruitdenken op wat anderen doen, helpt om minder te hoeven remmen en optrekken. Klopt dat?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Als je vooruitdenkt, zie je situaties op tijd aankomen en pas je rustig je snelheid aan. Je hoeft dan minder vaak hard te remmen en weer op te trekken, en dat scheelt brandstof en uitstoot.", "bron": "CBR exameneisen rijbewijs B (anticiperen, milieubewust rijden); leerstof hfst 14 'Anticiperen en risico inschatten'"}, {"onderwerp": "Verantwoorde en milieubewuste verkeersdeelname", "hoofdstukref": 2, "type": "mc", "vraag": "Waarom is een dakkoffer of dakrek waar je niets aan hebt slecht voor je verbruik?", "opties": ["Het geeft extra luchtweerstand", "Het maakt de motor kouder", "Het verlaagt de bandenspanning"], "correct": 0, "uitleg": "Een
