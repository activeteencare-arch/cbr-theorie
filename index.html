voorrang' bij de oprit. Moet je voorrang geven aan het verkeer dat al op de rotonde rijdt?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Bij de meeste rotondes geven de haaientanden en het bord aan dat het verkeer op de rotonde voorrang heeft. Voordat je erop gaat, laat je iedereen die al rondrijdt voorgaan.", "bron": "RVV 1990 art. 80 (haaientanden); bijlage 1 bord B6"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "mc", "vraag": "In welke richting rijdt het verkeer op een rotonde in Nederland?", "opties": ["Tegen de klok in", "Met de klok mee", "Dat mag je zelf kiezen"], "correct": 0, "uitleg": "Op een Nederlandse rotonde rijd je altijd tegen de klok in. Bij het verlaten geef je richting aan zodat anderen weten dat je eraf gaat.", "bron": "RVV 1990 bijlage 1, bord D1 (verplichte rijrichting rotonde)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "mc", "vraag": "Wat betekent een groene pijl naar links in een verkeerslicht?", "opties": ["Je mag naar links, het kruisende verkeer voor die richting staat stil", "Je moet juist stoppen voor links", "Alle richtingen mogen rijden"], "correct": 0, "uitleg": "Een pijllicht geldt alleen voor de richting waar de pijl heen wijst. Een groene pijl naar links betekent dat jij naar links mag en dat het kruisende verkeer voor die richting staat.", "bron": "RVV 1990 art. 68 (driekleurige verkeerslichten en pijlen)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "janee", "vraag": "Het ronde verkeerslicht is groen, maar de aparte rode pijl voor jouw richting brandt. Mag je die kant op rijden?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Een rode pijl betekent stoppen voor die richting, ook al is een ander licht groen. Het pijllicht is leidend voor de richting waar de pijl voor geldt.", "bron": "RVV 1990 art. 68 (pijlverkeerslichten)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "multi", "vraag": "Bij welke situaties op een spoorwegovergang moet je stoppen? Meerdere antwoorden kunnen goed zijn.", "opties": ["De rode lichten knipperen", "De bomen gaan dicht of zijn dicht", "Er nadert een trein", "Het is rustig en de bomen staan open zonder knipperlicht"], "correct": [0, 1, 2], "uitleg": "Je stopt bij knipperende rode lichten, bij sluitende of gesloten bomen, of als er een trein nadert. De trein heeft altijd voorrang. Staan de bomen open en knippert niets, dan mag je na goed kijken door.", "bron": "RVV 1990 art. 15a (trein laten voorgaan); art. 71 (rood overweglicht)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "invul", "vraag": "Vul in: op een gelijkwaardig kruispunt heeft verkeer van ... voorrang. (één woord)", "opties": [], "correct": "rechts", "uitleg": "Op een gelijkwaardig kruispunt geldt de rechtsregel. Verkeer van rechts gaat voor. Borden, haaientanden of verkeerslichten kunnen dat veranderen.", "bron": "RVV 1990 art. 15 lid 1"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 7, "type": "invul", "vraag": "Een voorrangsvoertuig herken je aan twee dingen samen: een blauw zwaailicht en een ... (één woord).", "opties": [], "correct": "sirene", "uitleg": "Pas als blauw zwaailicht en sirene allebei aanstaan, is het een voorrangsvoertuig waarvoor je ruimte maakt. Alleen een zwaailicht is niet genoeg.", "bron": "RVV 1990 art. 1 (begrip voorrangsvoertuig)"}, {"onderwerp": "Voorrang en voor laten gaan", "hoofdstukref": 8, "type": "mc", "vraag": "Een agent staat midden op het kruispunt met zijn arm recht omhoog. Wat betekent dat gebaar?", "opties": ["Stop voor iedereen", "Doorrijden voor iedereen", "Alleen het verkeer van rechts mag"], "correct": 0, "uitleg": "Een opgeheven arm van een agent of verkeersregelaar betekent stop voor iedereen. Je volgt altijd wat hij aangeeft, want dat gaat boven licht en borden.", "bron": "RVV 1990 art. 83 (gebaren verkeersregelaar)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "mc", "vraag": "Liam heeft zijn rijbewijs gehaald toen hij 17 was, via 2toDrive. Welke alcoholgrens geldt voor hem?", "opties": ["0,2 promille", "0,5 promille", "0,8 promille"], "correct": 0, "uitleg": "Voor een beginnend bestuurder geldt 0,2 promille. Liam haalde zijn rijbewijs vóór zijn 18e, dus die grens geldt voor hem zelfs 7 jaar lang. In de praktijk betekent dat: niet drinken als je nog moet rijden, want één glas brengt je er al overheen.", "bron": "WVW 1994 art. 8; grenswaarde 0,2 promille beginnend bestuurder (7 jaar bij rijbewijs vóór 18e)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "janee", "vraag": "Je hebt je rijbewijs vijf jaar geleden gehaald, op je 25e. Geldt voor jou nu nog de grens van 0,2 promille?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "De strenge grens van 0,2 promille geldt voor beginnende bestuurders. Bij een rijbewijs gehaald na je 18e duurt die periode 5 jaar. Die zijn nu voorbij, dus voor jou geldt de gewone grens van 0,5 promille.", "bron": "WVW 1994 art. 8; beginnersregeling 5 jaar (rijbewijs ná 18e)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "invul", "vraag": "Hoeveel promille alcohol mag een ervaren bestuurder maximaal in zijn bloed hebben? Vul het getal in.", "opties": [], "correct": "0,5", "uitleg": "Voor een ervaren bestuurder ligt de grens op 0,5 promille. Voor een beginnend bestuurder is dat strenger: 0,2. Boven de grens ben je strafbaar volgens artikel 8 van de Wegenverkeerswet.", "bron": "WVW 1994 art. 8; grenswaarde 0,5 promille ervaren bestuurder"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "mc", "vraag": "Welke wet stelt rijden onder invloed van alcohol of drugs strafbaar?", "opties": ["RVV 1990", "Wegenverkeerswet 1994 (WVW)", "Reglement voertuigen"], "correct": 1, "uitleg": "Rijden onder invloed is strafbaar gesteld in artikel 8 van de Wegenverkeerswet 1994. Dat geldt voor alcohol én voor drugs en andere stoffen die je rijvaardigheid verminderen.", "bron": "WVW 1994 art. 8"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "multi", "vraag": "Welke documenten moet je als bestuurder bij je hebben en kunnen tonen als de politie erom vraagt? Meerdere antwoorden kunnen goed zijn.", "opties": ["Je rijbewijs", "Een geldig identiteitsbewijs", "Je verzekeringspolis op papier", "Het kentekenbewijs"], "correct": [0, 1, 3], "uitleg": "Je rijbewijs, een geldig identiteitsbewijs en het kentekenbewijs horen erbij. De politie controleert de verzekering tegenwoordig digitaal via het kenteken, dus de papieren polis hoef je niet te kunnen laten zien.", "bron": "WVW 1994 art. 160 (tonen documenten); art. 107 (rijbewijsplicht)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "mc", "vraag": "Vanaf welke leeftijd mag je via 2toDrive je praktijkexamen voor rijbewijs B afleggen?", "opties": ["16 jaar", "16,5 jaar", "17 jaar"], "correct": 2, "uitleg": "Via 2toDrive mag je vanaf 16 theorie doen, vanaf 16,5 rijles nemen en vanaf 17 praktijkexamen doen. Slaag je, dan rijd je tot je 18e wel alleen met een begeleider naast je.", "bron": "CBR informatie 2toDrive; WVW 1994 (rijbewijsregeling)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "invul", "vraag": "Liam haalt zijn rijbewijs op zijn 17e. Hoeveel begeleiders mag hij maximaal aanwijzen op zijn begeleiderspas? Vul het getal in.", "opties": [], "correct": "5", "uitleg": "Tot zijn 18e rijdt Liam alleen met een begeleider naast zich. Hij mag maximaal vijf begeleiders aanwijzen, en die staan op een verplichte begeleiderspas die hij bij zich moet hebben.", "bron": "CBR begeleidersregeling 2toDrive (maximaal 5 begeleiders, verplichte begeleiderspas)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "janee", "vraag": "Je staat stil voor een rood verkeerslicht. Mag je dan even je telefoon vasthouden om een bericht te lezen?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Een mobiel apparaat vasthouden tijdens het rijden is verboden, en dat verbod geldt ook als je stilstaat voor een rood licht. Het vasthouden is het probleem. In een houder gebruiken mag wel, maar dan stel je alles in voordat je wegrijdt.", "bron": "RVV 1990 art. 61a (verbod vasthouden mobiel elektronisch apparaat)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "mc", "vraag": "Op de verpakking van je medicijn staat een gele waarschuwingssticker. Wat betekent dat voor het rijden?", "opties": ["Je mag nooit rijden met dit medicijn", "Wees voorzichtig, je rijvaardigheid kan verminderd zijn", "Het heeft geen invloed op je rijden"], "correct": 1, "uitleg": "Een gele sticker betekent: wees voorzichtig, want het medicijn kan je rijvaardigheid aantasten. Een rode of zwarte waarschuwing betekent meestal: niet rijden. Twijfel je, vraag het dan aan je arts of apotheker.", "bron": "WVW 1994 art. 8 (onder invloed van stoffen); medicijnwaarschuwingssystematiek (KNMP/CBG)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 2, "type": "mc", "vraag": "Welke wet verplicht je om je auto te laten keuren met de APK?", "opties": ["RVV 1990", "Wegenverkeerswet 1994 (WVW)", "Wet aansprakelijkheidsverzekering motorrijtuigen (WAM)"], "correct": 1, "uitleg": "De APK-plicht staat in de Wegenverkeerswet 1994, artikel 72. Zonder geldige APK mag je niet de weg op. De keuring controleert of je auto veilig is en niet te veel vervuilt.", "bron": "WVW 1994 art. 72 (APK-plicht); RDW APK-regelgeving"}, {"onderwerp": "Wetgeving", "hoofdstukref": 2, "type": "mc", "vraag": "Wanneer moet een personenauto op benzine voor het eerst APK gekeurd worden?", "opties": ["Na 1 jaar", "Na 3 jaar", "Na 4 jaar"], "correct": 2, "uitleg": "Voor een benzine- of elektrische personenauto geldt de eerste keuring na 4 jaar, daarna twee keer na 2 jaar, en vanaf 8 jaar elk jaar. Bij diesel of gas is dat strenger: eerste keuring na 3 jaar, daarna elk jaar.", "bron": "RDW APK-regelgeving (benzine/elektrisch 4-2-2-1); WVW 1994 art. 72"}, {"onderwerp": "Wetgeving", "hoofdstukref": 2, "type": "janee", "vraag": "Je auto heeft een geldige APK. Betekent dat dat je hem niet meer zelf hoeft te controleren?", "opties": ["Ja", "Nee"], "correct": 1, "uitleg": "Een geldige APK zegt alleen iets over het moment van de keuring. Jij blijft als bestuurder verantwoordelijk dat je auto rijklaar en veilig is, ook tussen de keuringen door. Denk aan je banden, je verlichting en je remmen.", "bron": "WVW 1994 art. 72 (APK-plicht); RVV 1990 art. 5 (geen gevaar)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 2, "type": "invul", "vraag": "Wat is de wettelijke minimale profieldiepte van de banden van een personenauto, in millimeters? Vul het getal in.", "opties": [], "correct": "1,6", "uitleg": "De banden moeten over de hele omtrek minstens 1,6 millimeter profiel hebben, gemeten in de hoofdgroeven. Kom je daaronder, dan word je afgekeurd bij de APK en mag je niet rijden. Voor de veiligheid wissel je vaak al eerder.", "bron": "Regeling voertuigen art. 5.2.27 (minimale profieldiepte 1,6 mm)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "mc", "vraag": "Je rijdt met een auto zonder geldige verzekering op de openbare weg. Wat klopt?", "opties": ["Dat mag, zolang je voorzichtig rijdt", "Een motorrijtuig moet verplicht verzekerd zijn; rijden zonder verzekering is strafbaar", "Verzekeren is alleen verplicht op de snelweg"], "correct": 1, "uitleg": "Voor elk motorrijtuig geldt een verzekeringsplicht. Die staat in de Wet aansprakelijkheidsverzekering motorrijtuigen, de WAM. Rijden zonder geldige verzekering is strafbaar, en de RDW controleert dat via het kenteken.", "bron": "WAM art. 2 (verzekeringsplicht motorrijtuig)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "janee", "vraag": "Geldt de verplichte verzekering voor een motorrijtuig ook als de auto alleen op de openbare weg geparkeerd staat en niet rijdt?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ja. De verzekeringsplicht uit de WAM hangt aan het motorrijtuig zelf, niet aan de vraag of je ermee rijdt. Staat de auto met kenteken op de openbare weg, dan moet hij verzekerd zijn.", "bron": "WAM art. 2 (verzekeringsplicht motorrijtuig)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "mc", "vraag": "Wat regelt de kentekenplicht in de Wegenverkeerswet?", "opties": ["Dat elk motorrijtuig een kenteken moet voeren", "Dat je maximaal 50 km/u mag in de kom", "Dat je je gordel om moet"], "correct": 0, "uitleg": "De kentekenplicht betekent dat elk motorrijtuig voorzien moet zijn van een kenteken. Via dat kenteken zijn de eigenaar, de APK en de verzekering te controleren. De regel staat in artikel 36 van de Wegenverkeerswet.", "bron": "WVW 1994 art. 36 (kentekenplicht)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "multi", "vraag": "Wie is aansprakelijk en verantwoordelijk in deze situaties? Meerdere antwoorden kunnen goed zijn.", "opties": ["De bestuurder is verantwoordelijk dat kinderen in de auto goed vastzitten", "De bestuurder moet voorkomen dat hij gevaar of hinder veroorzaakt", "De passagier achterin bepaalt zelf of hij zijn gordel omdoet", "De bestuurder blijft verantwoordelijk voor een rijklare auto"], "correct": [0, 1, 3], "uitleg": "Als bestuurder draag jij de verantwoordelijkheid: voor een veilige auto, voor het voorkomen van gevaar en hinder, en ervoor dat kinderen goed vastzitten. Een volwassen passagier is zelf strafbaar als hij geen gordel draagt, dus dat bepaalt hij niet vrijblijvend.", "bron": "WVW 1994 art. 5 (gevaar/hinder); RVV 1990 art. 59 (gordel en kinderbeveiliging)"}, {"onderwerp": "Wetgeving", "hoofdstukref": 1, "type": "janee", "vraag": "Een ander maakt een fout in het verkeer. Ben jij dan nog verplicht om het ongeluk te voorkomen als dat kan?", "opties": ["Ja", "Nee"], "correct": 0, "uitleg": "Ja. De wet legt de verantwoordelijkheid breed neer: je rijdt zo dat je niemand in gevaar brengt of ophoudt. Maakt een ander een fout, dan blijf jij verplicht het ongeluk te voorkomen als dat in jouw mogelijkheid ligt.", "bron": "WVW 1994 art. 5; RVV 1990 art. 5 (geen gevaar of hinder)"}, {"onderwerp": "Wetgeving /* ---- audio ---- */
let audio=null, audioBtn=null;
async function speak(text,btn){
  if(audio){ audio.pause(); audio=null; const prev=audioBtn; audioBtn=null; if(prev) prev.innerHTML=prev._orig; if(prev===btn) return; }
  audioBtn=btn;
  if(btn){ btn._orig=btn._orig||btn.innerHTML; btn.innerHTML='<i class="ti ti-loader-2"></i> Laden…'; }
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text.slice(0,1490)})});
    if(!r.ok) throw 0;
    const b=await r.blob();
    audio=new Audio(URL.createObjectURL(b));
    audio.onended=()=>{ audio=null; if(audioBtn){ audioBtn.innerHTML=audioBtn._orig; audioBtn=null; } };
    await audio.play();
    if(btn) btn.innerHTML='<i class="ti ti-player-stop"></i> Stop';
  }catch(e){ if(btn) btn.innerHTML=btn._orig; audioBtn=null; }
}
function stopAudio(){ if(audio){audio.pause();audio=null} if(audioBtn){ audioBtn.innerHTML=audioBtn._orig; audioBtn=null; } }

let SEL=[];
function vraagBody(q, pick){
  SEL=[];
  if(q.type==='invul'){

    return `<div id="opts"><input id="invulveld" class="invul" autocomplete="off" placeholder="Typ je antwoord" onkeydown="if(event.key==='Enter')${chk}"></div>`;
  }

    return `<div id="opts">${q.opties.map((o,k)=>`<button class="opt" onclick="toggleSel(${k},this)">${esc(o)}</button>`).join('')}</div>`;
  }
  return `<div id="opts">${q.opties.map((o,k)=>`<button class="opt" onclick="${pick}(${k})">${esc(o)}</button>`).join('')}</div>`;

function toggleSel(k,el){ if(el.classList.contains('locked'))return; const i=SEL.indexOf(k); if(i<0){SEL.push(k);el.classList.add('sel');}else{SEL.splice(i,1);el.classList.remove('sel');} }
function evalQ(q,given){
  if(q.type==='multi'){ const a=[...given].sort((x,y)=>x-y), b=[...q.correct].sort((x,y)=>x-y); return a.length===b.length&&a.every((x,i)=>x===b[i]); }
  if(q.type==='invul'){ const norm=s=>String(s).toLowerCase().replace(/km\/u|km\/h|meter|\bmm\b|\bm\b/g,'').replace(/\./g,',').replace(/\s/g,'').trim(); return norm(given)===norm(q.correct); }
  return given===q.correct;
}
function markQ(q,given){
  if(q.type==='invul'){ const inp=document.getElementById('invulveld'); if(inp){inp.disabled=true;inp.classList.add(evalQ(q,given)?'good':'bad');} return; }
  const cor=q.type==='multi'?q.correct:[q.correct], giv=q.type==='multi'?given:[given];
  document.querySelectorAll('#opts .opt').forEach((el,idx)=>{el.onclick=null;el.classList.add('locked','dimmed');el.classList.remove('sel');
    if(cor.includes(idx)){el.classList.remove('dimmed');el.classList.add('good');}
    if(giv.includes(idx)&&!cor.includes(idx)){el.classList.remove('dimmed');el.classList.add('bad');}});
}
function goedAntwoord(q){ if(q.type==='invul')return q.correct; if(q.type==='multi')return q.correct.map(i=>q.opties[i]).join(', '); return q.opties[q.correct]; }
function fbBlock(q,ok){ return `<div class="fb ${ok?'ok':'no'}"><div class="h"><i class="ti ti-${ok?'circle-check':'alert-circle'}"></i>${ok?'Goed':'Niet juist'}</div>${esc(q.uitleg)}<div class="bron" style="margin-top:9px">${esc(q.bron)}</div></div>`; }

let Q={};
function quiz(list,titel){ Q={list,titel,i:0,answered:false}; quizStep(); }
function quizStep(){
  const q=Q.list[Q.i]; backBtn.style.display='flex';
  app.innerHTML = `
   <div class="q-meta"><span>${esc(Q.titel)}</span><span>${Q.i+1} / ${Q.list.length}</span></div>
   <div class="qbar"><i style="width:${(Q.i)/Q.list.length*100}%"></i></div>
   <div class="qtype">${TYPELABEL[q.type]||''}</div>
   <div class="q-txt">${esc(q.vraag)}</div>
   ${vraagBody(q,'answer')}
   ${(q.type==='multi'||q.type==='invul')?`<button class="pbtn" id="checkbtn" onclick="doCheck()"><i class="ti ti-check"></i> Controleer</button>`:''}
   <div id="fbslot"></div>`;
}
function doCheck(){ if(Q.answered)return; const q=Q.list[Q.i]; answer(q.type==='multi'?SEL.slice():document.getElementById('invulveld').value); }
function answer(given){
  if(Q.answered)return; Q.answered=true;
  const q=Q.list[Q.i]; const cb=document.getElementById('checkbtn'); if(cb)cb.remove();
  markQ(q,given); const ok=evalQ(q,given);
  if(!ok){ P.fouten=P.fouten||{}; P.fouten[q.onderwerp]=(P.fouten[q.onderwerp]||0)+1; saveP(); }
  document.getElementById('fbslot').innerHTML=fbBlock(q,ok)
   +`<button class="tbtn lesbtn" style="margin-bottom:11px" onclick="oefenCoach(${JSON.stringify(q.vraag).replace(/"/g,'&quot;')}, ${JSON.stringify(q.uitleg).replace(/"/g,'&quot;')}, this)"><i class="ti ti-player-play"></i> Start de uitleg</button>`
   +`<button class="pbtn" onclick="nextQ()">${Q.i<Q.list.length-1?'Volgende vraag':'Klaar'}</button>`;
}
function oefenCoach(vraag, uitleg, btn){
  if(coachConv){ stopCoach(); return; }
  const opening = `${vraag} Het zit zo. ${uitleg} Leg eens in je eigen woorden uit waarom dit het juiste antwoord is.`;
  startCoach(opening, 'oefenvraag', (state)=>lesBtnUI(btn, state, 'Start de uitleg'));
}
function nextQ(){ stopAudio(); if(coachConv)stopCoach(); if(Q.i<Q.list.length-1){Q.i++;Q.answered=false;quizStep();window.scrollTo(0,0);} else { reset(home); } }

/* ---- examen ---- */
function examenStart(){
  app.innerHTML=`
   <div class="sec-title"><span class="label">Examen</span></div>

     <button class="pbtn" onclick="startExam(true)"><i class="ti ti-player-play"></i> Start examen op tijd</button>

     <button class="pbtn ghost" onclick="startExam(false)"><i class="ti ti-book"></i> Start rustig</button>

}
let EX={};
function startExam(timed){
  const pool=shuffle(VRAGEN).slice(0,Math.min(EXAM_N,VRAGEN.length));
  EX={list:pool,i:0,goed:0,answered:false,fout:[],timed:!!timed,endAt:timed?Date.now()+EXAM_MIN*60000:0,_iv:null};
  if(timed) startTimer();
  examStep();
}
function startTimer(){
  clearInterval(EX._iv);
  EX._iv=setInterval(()=>{
    const left=EX.endAt-Date.now(), el=document.getElementById('timer');
    if(el){ const m=Math.max(0,Math.floor(left/60000)), s=Math.max(0,Math.floor(left/1000)%60); el.textContent=m+':'+String(s).padStart(2,'0'); el.classList.toggle('warn',left<120000); }
    if(left<=0){ clearInterval(EX._iv); examResult(); }
  },400);
}
function examStep(){
  const q=EX.list[EX.i]; backBtn.style.display='none';
  app.innerHTML=`
   <div class="q-meta"><span>Examen${EX.timed?' op tijd':''}</span><span>${EX.timed?`<span id="timer" class="timer">--:--</span> &middot; `:''}${EX.i+1} / ${EX.list.length}${EX.timed?'':' &middot; '+EX.goed+' goed'}</span></div>
   <div class="qbar"><i style="width:${EX.i/EX.list.length*100}%"></i></div>
   <div class="qtype">${TYPELABEL[q.type]||''}</div>
   <div class="q-txt">${esc(q.vraag)}</div>
   ${vraagBody(q,'examAnswer')}
   ${(q.type==='multi'||q.type==='invul')?`<button class="pbtn" id="checkbtn" onclick="doExamCheck()"><i class="ti ti-check"></i> ${EX.timed?'Bevestig':'Controleer'}</button>`:''}
   <div id="fbslot"></div>`;
}
function doExamCheck(){ if(EX.answered)return; const q=EX.list[EX.i]; examAnswer(q.type==='multi'?SEL.slice():document.getElementById('invulveld').value); }
function examAnswer(given){
  if(EX.answered)return; EX.answered=true;
  const q=EX.list[EX.i]; const cb=document.getElementById('checkbtn'); if(cb)cb.remove();
  const ok=evalQ(q,given);
  if(ok)EX.goed++; else { EX.fout.push(q); P.fouten=P.fouten||{}; P.fouten[q.onderwerp]=(P.fouten[q.onderwerp]||0)+1; }
  const last=EX.i>=EX.list.length-1;
  if(EX.timed){
    document.querySelectorAll('#opts .opt').forEach(el=>{el.onclick=null;el.classList.add('locked');});
    const inp=document.getElementById('invulveld'); if(inp)inp.disabled=true;
    document.getElementById('fbslot').innerHTML=`<button class="pbtn" onclick="examNext()">${last?'Bekijk uitslag':'Volgende'}</button>`;
  } else {
    markQ(q,given);
    document.getElementById('fbslot').innerHTML=fbBlock(q,ok)+`<button class="pbtn" onclick="examNext()">${last?'Bekijk uitslag':'Volgende'}</button>`;
  }
}
function examNext(){ stopAudio(); if(coachConv)stopCoach(); if(EX.i<EX.list.length-1){EX.i++;EX.answered=false;examStep();window.scrollTo(0,0);} else examResult(); }
function examResult(){
  clearInterval(EX._iv);
  const total=EX.list.length, pass=EX.goed>=PASS;
  P.examens.push({score:EX.goed,total,date:Date.now(),timed:EX.timed}); saveP(P);
  const zwak=[...new Set(EX.fout.map(q=>q.onderwerp))].slice(0,3);
  app.innerHTML=`
   <div class="score">
     <div class="big"><b>${EX.goed}</b> / ${total}</div>
     <div class="verdict ${pass?'pass':'fail'}">${pass?'Geslaagd!':'Net niet'}</div>

   </div>
   ${EX.fout.length?`<button class="pbtn" onclick="coachNabespreking(${JSON.stringify(zwak).replace(/"/g,'&quot;')})" style="margin-bottom:10px"><i class="ti ti-microphone"></i> Bespreek met je coach</button>`:''}

   <button class="pbtn ghost" onclick="reset(home)">Naar start</button>
   ${EX.fout.length?`<div class="sec-title" style="margin-top:26px"><span class="label">Terugkijken</span><span class="cnt">${EX.fout.length} fout</span></div>`+EX.fout.map(q=>`<div class="card sec"><div class="qtype">${TYPELABEL[q.type]||''}</div><div class="q-txt" style="font-size:15px">${esc(q.vraag)}</div><div class="fb ok"><div class="h"><i class="ti ti-circle-check"></i>${esc(goedAntwoord(q))}</div>${esc(q.uitleg)}<div class="bron" style="margin-top:9px">${esc(q.bron)}</div></div></div>`).join(''):''}`;
}
function coachNabespreking(zwak){
  go(coach);
  const opening = (zwak&&zwak.length)
    ? `Goed dat je het examen hebt afgemaakt. Ik zie dat je de meeste moeite had met ${zwak.join(', ')}. Zullen we daar samen even induiken? Vertel eens wat daarvan het lastigst voelde.`
    : 'Knap gedaan, je had bijna alles goed. Wil je nog een onderwerp nakijken of gewoon even doorpraten?';

function voortgangSamenvatting(){
  const totaal=LEERSTOF.length, gelezenN=P.gelezen.length;
  const gelezenT=LEERSTOF.filter(h=>P.gelezen.includes(h.hoofdstuk)).map(h=>h.titel).join(', ')||'nog niets';
  const niet=LEERSTOF.filter(h=>!P.gelezen.includes(h.hoofdstuk)).map(h=>h.titel);
  const last=P.examens[P.examens.length-1];
  const ex=last?`${last.score} van ${last.total} goed (${last.score>=PASS?'geslaagd':'nog niet geslaagd'})`:'nog geen oefenexamen gedaan';
  const zwak=Object.entries(P.fouten||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  const besproken=(P.besproken&&P.besproken.length)?P.besproken.join(', '):'nog niets';
  return `Liam heeft ${gelezenN} van de ${totaal} hoofdstukken gelezen: ${gelezenT}. Nog te lezen: ${niet.join(', ')||'alles gelezen'}. Laatste oefenexamen: ${ex}. Onderwerpen waar hij de meeste fouten maakt: ${zwak.length?zwak.join(', '):'nog niet bekend'}. Eerder met jou (de coach) besproken: ${besproken}.`;
}
async function stopCoach(){
  if(coachConv){ try{await coachConv.endSession()}catch(e){} }
  coachConv=null; logBesproken(); if(coachUI) coachUI('stopped');
}
async function startCoach(opening, topic, ui){
  coachUI = ui; besprokenNu = topic||null; ui('connecting');
  try{
    const { Conversation } = await import('https://esm.sh/@elevenlabs/client');
    coachConv = await Conversation.startSession({
      agentId:'agent_6801kv3dsj3xfh0sr08k806tvs9r',
      connectionType:'webrtc',
      dynamicVariables:{ voortgang: voortgangSamenvatting(), opening: opening },
      onModeChange:({mode})=>{ const s=(mode==='speaking')?'speaking':'listening'; if(coachConv)coachConv._mode=s; if(coachUI)coachUI(s); },
      onStatusChange:({status})=>{ if(status==='disconnected'){ coachConv=null; logBesproken(); if(coachUI)coachUI('stopped'); } },
      onError:()=>{ coachConv=null; if(coachUI)coachUI('error'); }
    });
  }catch(e){ coachConv=null; if(coachUI)coachUI('error'); }
}
/* Coach-scherm (algemene vragen vanuit Home) */
function toggleCoach(){
  if(coachConv){ stopCoach(); return; }
  const opening='Hoi Liam! Ik ben je theoriecoach. Waar wil je het over hebben: voorrang, verkeersborden, snelheid, of iets anders?';
  startCoach(opening, null, (state)=>setCoachUI(state));
}
/* Theorieles ter plekke op de theoriepagina, tekst blijft zichtbaar om mee te lezen */
function lesToggle(kop, tekst, kern, btn){
  if(coachConv){ stopCoach(); return; }
  const kernTxt = (Array.isArray(kern)&&kern.length) ? ` Even de kern op een rij. ${kern.join('. ')}.` : '';
  const opening = `${kop}. ${tekst}${kernTxt} Nu een korte controlevraag, zodat we zeker weten dat het blijft hangen. Vertel eens in je eigen woorden terug wat je hier net van hebt opgepikt.`;
  startCoach(opening, kop, (state)=>lesBtnUI(btn, state));
}
function lesBtnUI(btn, state, startLabel){
  if(!btn||!btn.isConnected) return;
  startLabel = startLabel || 'Start de theorieles';
  const stopLabel = startLabel.replace(/^Start/, 'Stop');
  const active=(state==='listening'||state==='speaking'||state==='connecting');
  const m={ connecting:['Verbinden…','ti-loader-2'], listening:[stopLabel,'ti-player-stop'], speaking:[stopLabel,'ti-player-stop'], error:['Mislukt, tik opnieuw','ti-microphone'], stopped:[startLabel,'ti-player-play'] };
  const [txt,ic]=m[state]||[startLabel,'ti-player-play'];
  btn.innerHTML=`<i class="ti ${ic}"></i> ${txt}`;
  btn.style.borderColor=active?'#46B48A':''; btn.style.color=active?'#46B48A':'';
}

/* ---- auth + login ---- */
function convai(show){ const c=document.querySelector('elevenlabs-convai'); if(c) c.style.display = show?'':'none'; }
function loginScreen(){
  stack=[]; backBtn.style.display='none'; convai(false);
  app.className='fade'; void app.offsetWidth; app.classList.add('fade');
  app.innerHTML = `
   <div style="height:7vh"></div>
   <div style="text-align:center;margin-bottom:22px">
     <svg width="56" height="56" viewBox="0 0 100 100" style="margin:0 auto"><g fill="none" stroke="#C9A24B" stroke-linecap="round"><circle cx="50" cy="50" r="38" stroke-width="2.6"/><line x1="50" y1="57" x2="50" y2="84" stroke-width="2.2"/><line x1="43.9" y1="46.5" x2="20.6" y2="33" stroke-width="2.2"/><line x1="56.1" y1="46.5" x2="79.4" y2="33" stroke-width="2.2"/></g><circle cx="50" cy="50" r="7" fill="#C9A24B"/><circle cx="50" cy="16" r="2.4" fill="#C9A24B"/></svg>
   </div>
   <div class="card" style="padding:24px 22px">
     <div class="label" style="margin-bottom:9px">Welkom</div>
     <h2 style="font-size:20px;margin-bottom:6px">Log in om te leren</h2>
     <p class="muted" style="font-size:13.5px;line-height:1.6;margin-bottom:20px">Je voortgang wordt veilig bewaard en is alleen voor jou zichtbaar.</p>
     <input id="em" type="email" placeholder="E-mailadres" autocomplete="email" style="width:100%;background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:14px;color:var(--text);font-size:15px;margin-bottom:11px;outline:none">
     <input id="pw" type="password" placeholder="Wachtwoord" autocomplete="current-password" style="width:100%;background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:14px;color:var(--text);font-size:15px;margin-bottom:8px;outline:none">
     <div id="autherr" style="color:var(--bad);font-size:13px;min-height:18px;margin-bottom:6px"></div>
     <button class="pbtn" onclick="doAuth('in')">Inloggen</button>
     <button class="pbtn ghost" style="margin-top:10px" onclick="doAuth('up')">Nieuw account aanmaken</button>
   </div>`;
  window.scrollTo(0,0);
}
async function doAuth(mode){
  const em=(document.getElementById('em').value||'').trim();
  const pw=document.getElementById('pw').value||'';
  const err=document.getElementById('autherr'); err.textContent='';
  if(!em||!pw){ err.textContent='Vul je e-mail en wachtwoord in.'; return; }
  if(mode==='up'&&pw.length<6){ err.textContent='Kies een wachtwoord van minstens 6 tekens.'; return; }
  const {error} = mode==='up'
    ? await sb.auth.signUp({email:em,password:pw})
    : await sb.auth.signInWithPassword({email:em,password:pw});
  if(error){ err.textContent = /invalid/i.test(error.message)?'E-mail of wachtwoord klopt niet.':error.message; }
}
async function logout(){ stopAudio(); await sb.auth.signOut(); }

sb.auth.onAuthStateChange((event, session)=>{
  if(session && session.user){
    user=session.user;
    P = cacheLoad();
    reset(home);
    loadProgress();
  } else {
    user=null; loginScreen();
  }
});
</script>
