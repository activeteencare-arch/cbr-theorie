<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CBR Theorie Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c2636;
      --bg2: #1f2d42;
      --bg3: #243347;
      --accent: #1a8cff;
      --accent2: #4da6ff;
      --green: #22c55e;
      --red: #e84040;
      --yellow: #d4a520;
      --text: #eef1f5;
      --muted: #c2cdd8;
      --border: #47586e;
      --card: #1f2d42;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; max-width: 480px; margin: 0 auto;
      position: relative; overflow-x: hidden;
    }
    .header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-size: 16px; font-weight: 700; color: var(--accent2); letter-spacing: 0.5px; }
    .xp-badge {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px; font-size: 13px;
      font-weight: 600; color: var(--yellow);
    }
    .screen { display: none; padding: 16px; min-height: calc(100vh - 57px); }
    .screen.active { display: block; }
    .hero { text-align: center; padding: 28px 0 20px; }
    .hero-icon { font-size: 56px; line-height: 1; margin-bottom: 10px; }
    .hero h1 {
      letter-spacing: -0.02em;
      font-size: 24px; font-weight: 800;
      background: linear-gradient(135deg, #1a8cff, #d4a520);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 6px;
    }
    .hero p { color: var(--muted); font-size: 14px; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 800; color: var(--accent2); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .category-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .cat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; overflow: hidden;
    }
    .cat-card:active { transform: scale(0.98); }
    .cat-card:hover { border-color: var(--accent2); background: var(--bg3); }
    .cat-icon { font-size: 28px; flex-shrink: 0; }
    .cat-info { flex: 1; }
    .cat-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .cat-sub { font-size: 11px; color: var(--muted); }
    .cat-progress { width: 100%; height: 4px; background: var(--bg3); border-radius: 4px; margin-top: 6px; overflow: hidden; }
    .cat-progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .cat-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .cat-btn-learn {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none; border-radius: 8px; padding: 6px 10px;
      color: white; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .cat-btn-quiz {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; color: var(--text);
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .exam-btn {
      width: 100%; background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none; border-radius: 14px; padding: 16px; color: white;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 8px; transition: opacity 0.2s;
    }
    .exam-btn:active { opacity: 0.85; }

    /* ===== THEORY SCREEN ===== */
    .theory-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); font-size: 18px; flex-shrink: 0;
    }
    .theory-cat-title { font-size: 20px; font-weight: 800; flex: 1; }
    .theory-svg-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 16px;
      display: flex; justify-content: center;
    }
    .theory-rules { margin-bottom: 16px; }
    .theory-rule {
      background: var(--bg3); border-left: 3px solid var(--accent);
      border-radius: 0 10px 10px 0; padding: 10px 14px;
      margin-bottom: 8px; font-size: 14px; line-height: 1.5;
    }
    .theory-rule strong { color: var(--accent2); }
    .tts-btn {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 14px; color: var(--yellow); font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .tts-btn:active { background: var(--bg2); }
    .yt-btn {
      width: 100%; background: #1f2d42; border: 1px solid #47586e; color: #eef1f5; border-radius: 12px;
      padding: 12px; color: white; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .theory-action-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .start-quiz-btn {
      flex: 1; background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none; border-radius: 12px; padding: 14px;
      color: white; font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* ===== QUIZ SCREEN ===== */
    .quiz-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .quiz-progress-wrap { flex: 1; }
    .quiz-progress-bar { width: 100%; height: 6px; background: var(--bg3); border-radius: 6px; overflow: hidden; }
    .quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 6px; transition: width 0.4s ease; }
    .quiz-counter { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .streak-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 13px; font-weight: 700; color: var(--yellow); flex-shrink: 0; }
    .timer-wrap { display: none; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--yellow); padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
    .timer-wrap.exam-mode { display: flex; }
    .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
    .question-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .question-category { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent2); }
    .q-tts-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; color: var(--yellow); font-size: 13px; cursor: pointer; flex-shrink: 0; }
    .question-text { font-size: 16px; font-weight: 600; line-height: 1.45; color: var(--text); }
    .question-svg { margin-top: 12px; display: flex; justify-content: center; }
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .option-btn {
      background: var(--bg3); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 13px 15px; text-align: left; cursor: pointer; font-size: 14px;
      color: var(--text); transition: border-color 0.15s, background 0.15s;
      display: flex; align-items: center; gap: 12px; position: relative;
    }
    .option-btn:active { transform: scale(0.99); }
    .option-letter {
      width: 27px; height: 27px; border-radius: 7px; background: var(--bg2);
      border: 1px solid var(--border); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; color: var(--muted);
    }
    .option-btn.correct { border-color: var(--green); background: rgba(34,197,94,0.1); }
    .option-btn.correct .option-letter { background: var(--green); color: white; border-color: var(--green); }
    .option-btn.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); }
    .option-btn.wrong .option-letter { background: var(--red); color: white; border-color: var(--red); }
    .option-btn:disabled { cursor: default; }
    .feedback-card { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: none; font-size: 14px; line-height: 1.5; }
    .feedback-card.correct { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .feedback-card.wrong { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .feedback-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .next-btn { width: 100%; background: var(--accent); border: none; border-radius: 12px; padding: 14px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; display: none; transition: opacity 0.2s; }
    .next-btn:active { opacity: 0.85; }

    /* ===== RESULTS ===== */
    .results-hero { text-align: center; padding: 28px 0 20px; }
    .results-icon { font-size: 64px; line-height: 1; margin-bottom: 10px; }
    .results-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .results-title.pass { color: var(--green); }
    .results-title.fail { color: var(--red); }
    .results-sub { color: var(--muted); font-size: 15px; }
    .score-ring-wrap { display: flex; justify-content: center; margin: 16px 0; }
    .score-ring { width: 130px; height: 130px; position: relative; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-pct { font-size: 30px; font-weight: 800; color: var(--text); }
    .score-pct-label { font-size: 11px; color: var(--muted); }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .result-stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
    .result-stat-num { font-size: 26px; font-weight: 800; }
    .result-stat-num.green { color: var(--green); }
    .result-stat-num.red { color: var(--red); }
    .result-stat-num.yellow { color: var(--yellow); }
    .result-stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .action-btns { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), #2563eb); border: none; border-radius: 12px; padding: 15px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-secondary { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }

    /* ===== ANIMATIONS ===== */
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.25s ease forwards; }
    .xp-toast { position: fixed; top: 70px; right: 16px; background: var(--yellow); color: #1a1a00; font-weight: 800; font-size: 14px; border-radius: 20px; padding: 6px 14px; z-index: 999; opacity: 0; transform: translateY(-10px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
    .xp-toast.show { opacity: 1; transform: translateY(0); }
    .tts-loading { color: var(--muted); }
  </style>
</head>
<body>

<div class="xp-toast" id="xpToast">+10 XP</div>

<div class="header">
  <div class="header-title">🚗 CBR Trainer</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="timer-wrap" id="timerWrap">⏱ <span id="timerText">25:00</span></div>
    <div class="xp-badge">⚡ <span id="xpDisplay">0</span> XP</div>
  </div>
</div>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="hero">
    <div class="hero-icon">🏁</div>
    <h1>CBR Theorie Trainer</h1>
    <p>Leer het. Snap het. Haal je rijbewijs.</p>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Gedaan</div></div>
    <div class="stat-card"><div class="stat-num" id="statCorrect" style="color:var(--green)">0</div><div class="stat-label">Goed</div></div>
    <div class="stat-card"><div class="stat-num" id="statStreak" style="color:var(--yellow)">0</div><div class="stat-label">Streak 🔥</div></div>
  </div>
  <div class="section-title">Kies een onderwerp</div>
  <div class="category-grid" id="categoryGrid"></div>
  <button class="exam-btn" onclick="startExam()">🎯 Oefenexamen (65 vragen)</button>
</div>

<!-- THEORY -->
<div class="screen" id="theoryScreen">
  <div class="theory-header">
    <div class="back-btn" onclick="goHome()">←</div>
    <div class="theory-cat-title" id="theoryCatTitle"></div>
  </div>
  <div id="theoryContent"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="quizScreen">
  <div class="quiz-header">
    <div class="back-btn" onclick="goHome()">←</div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
      <div class="quiz-counter" id="quizCounter">Vraag 1 van 10</div>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 0</div>
  </div>
  <div class="question-card slide-in" id="questionCard">
    <div class="question-top">
      <div class="question-category" id="questionCat"></div>
      <button class="q-tts-btn" onclick="speakQuestion()" title="Lees voor">🔊</button>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="question-svg" id="questionSvg"></div>
  </div>
  <div class="options" id="optionsWrap"></div>
  <div class="feedback-card" id="feedbackCard">
    <div class="feedback-top">
      <div id="feedbackText"></div>
      <button class="q-tts-btn" onclick="speakFeedback()" title="Lees uitleg voor">🔊</button>
    </div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Volgende →</button>
</div>

<!-- RESULTS -->
<div class="screen" id="resultsScreen">
  <div class="results-hero">
    <div class="results-icon" id="resultsIcon"></div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-sub" id="resultsSub"></div>
  </div>
  <div class="score-ring-wrap">
    <div class="score-ring">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle cx="65" cy="65" r="55" fill="none" stroke="var(--bg3)" stroke-width="12"/>
        <circle cx="65" cy="65" r="55" fill="none" stroke="url(#rg)" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="345" stroke-dashoffset="345" id="ringCircle"/>
        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#22c55e"/>
        </linearGradient></defs>
      </svg>
      <div class="score-ring-text">
        <div class="score-pct" id="scorePct">0%</div>
        <div class="score-pct-label">score</div>
      </div>
    </div>
  </div>
  <div class="results-grid">
    <div class="result-stat"><div class="result-stat-num green" id="resCorrect">0</div><div class="result-stat-label">✅ Goed</div></div>
    <div class="result-stat"><div class="result-stat-num red" id="resWrong">0</div><div class="result-stat-label">❌ Fout</div></div>
    <div class="result-stat"><div class="result-stat-num yellow" id="resXP">0</div><div class="result-stat-label">⚡ XP</div></div>
    <div class="result-stat"><div class="result-stat-num" id="resStreak">0</div><div class="result-stat-label">🔥 Streak</div></div>
  </div>
  <div class="action-btns">
    <button class="btn-primary" id="retryBtn" onclick="retrySession()">🔄 Opnieuw</button>
    <button class="btn-secondary" onclick="goHome()">🏠 Terug</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const ELEVENLABS_KEY = 'sk_3fe72655c78cfe96308adeff28e1857b9770252c40bdf59c';
const ELEVENLABS_VOICE = 'NdtOrwerUtgX4njPdLo7';

// ============================================================
// TTS
// ============================================================
function stripHtml(html) { return html.replace(/<[^>]+>/g, ''); }

let currentAudio = null;
let currentBtn = null;

async function speak(text, btnEl) {
  if (currentAudio && currentBtn === btnEl) {
    currentAudio.pause();
    currentAudio = null;
    if (currentBtn) { currentBtn.textContent = '🔊'; currentBtn.disabled = false; currentBtn = null; }
    return;
  }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (currentBtn) { currentBtn.textContent = '🔊'; currentBtn.disabled = false; }
  currentBtn = btnEl;
  if (btnEl) { btnEl.textContent = '⏳'; btnEl.disabled = true; }
  try {
    const cleanText = stripHtml(text);
    const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE}`, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVENLABS_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: cleanText, model_id: 'eleven_turbo_v2_5', voice_settings: { stability: 0.5, similarity_boost: 0.75, speed: 1.1 } })
    });
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    if (btnEl) { btnEl.textContent = '⏹'; btnEl.disabled = false; }
    currentAudio.play();
    currentAudio.onended = () => {
      URL.revokeObjectURL(url);
      currentAudio = null;
      if (currentBtn) { currentBtn.textContent = '🔊'; currentBtn.disabled = false; currentBtn = null; }
    };
  } catch(e) {
    console.error('TTS error:', e);
    if (btnEl) { btnEl.textContent = '🔊'; btnEl.disabled = false; }
    currentBtn = null;
  }
}
function speakQuestion() {
  const q = state.session.questions[state.session.current];
  if (q) speak(q.q, event.currentTarget);
}
function speakFeedback() {
  const el = document.getElementById('feedbackText');
  if (el) speak(el.innerText, event.currentTarget);
}
function speakTheory(catId, btnEl) {
  const t = THEORY[catId];
  if (!t) return;
  const txt = stripHtml(t.title + '. ' + t.rules.join('. '));
  speak(txt, btnEl || (typeof event !== 'undefined' ? event.currentTarget : null));
}

// ============================================================
// THEORY DATA
// ============================================================
const THEORY = {
  "Voorrang": {
    title: "Voorrangsregels",
    rules: [
      "<strong>Rechts gaat voor</strong> — Op een gelijkwaardige kruising heeft het verkeer van rechts altijd voorrang.",
      "<strong>Haaientanden</strong> — Driehoeken op het wegdek betekenen: jij verleent voorrang.",
      "<strong>Voorrangsweg</strong> — Een gele ruitvorm geeft aan dat jij op een voorrangsweg rijdt en voorrang hebt.",
      "<strong>Linksaf slaan</strong> — Als je linksaf slaat moet je tégenliggers die rechtdoor gaan laten gaan.",
      "<strong>Voorrangsvoertuigen</strong> — Ambulances, brandweer en politie met sirene gaan altijd voor. Wijk naar rechts."
    ],
    ytSearch: "cbr theorie voorrang kruispunt nederland",
    svg: `<svg width="240" height="200" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="240" height="200" fill="#1a1a35"/>
  <!-- Horizontale weg -->
  <rect x="0" y="85" width="240" height="30" fill="#2d2d5e"/>
  <line x1="0" y1="100" x2="100" y2="100" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,6"/>
  <line x1="140" y1="100" x2="240" y2="100" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- Verticale weg -->
  <rect x="105" y="0" width="30" height="200" fill="#2d2d5e"/>
  <line x1="120" y1="0" x2="120" y2="85" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,6"/>
  <line x1="120" y1="115" x2="120" y2="200" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- Haaientanden -->
  <polygon points="105,115 120,130 135,115" fill="#ef4444" opacity="0.8"/>
  <!-- Auto van rechts (heeft voorrang) -->
  <rect x="155" y="88" width="32" height="14" rx="4" fill="#22c55e"/>
  <rect x="159" y="90" width="10" height="8" rx="2" fill="#0d0d1a" opacity="0.6"/>
  <rect x="173" y="90" width="10" height="8" rx="2" fill="#0d0d1a" opacity="0.6"/>
  <!-- Pijl auto rechts -->
  <path d="M 155 95 L 140 95" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- Auto van onderen (moet wachten) -->
  <rect x="113" y="140" width="14" height="28" rx="4" fill="#ef4444" opacity="0.8"/>
  <rect x="115" y="145" width="10" height="8" rx="2" fill="#0d0d1a" opacity="0.6"/>
  <!-- Pijl auto onderen (kleiner, gestopt) -->

// ============================================================
// CATEGORIES
// ============================================================
const CATEGORIES = [
  { id:"Voorrang",        icon:"🚦", color:"#ef4444" },
  { id:"Snelheid",        icon:"⚡", color:"#f59e0b" },
  { id:"Verkeersborden",  icon:"🛑", color:"#3b82f6" },
  { id:"Inhalen",         icon:"🏎️", color:"#8b5cf6" },
  { id:"Lichten",         icon:"💡", color:"#06b6d4" },
  { id:"Afstand",         icon:"📏", color:"#10b981" },
  { id:"Alcohol & Drugs", icon:"🚫", color:"#dc2626" },
  { id:"Parkeren",        icon:"🅿️", color:"#6366f1" },
  { id:"Rijbaan",         icon:"🛣️", color:"#0891b2" },
  { id:"Milieu",          icon:"🌿", color:"#16a34a" },
  { id:"Voertuig",        icon:"🔧", color:"#d97706" },
  { id:"Gevaarherkenning",icon:"⚠️", color:"#b45309" },
  { id:"Regels",          icon:"📋", color:"#7c3aed" },
];

// ============================================================
// STATE
// ============================================================
let state = {
  xp: 0, totalAnswered: 0, totalCorrect: 0, streak: 0, maxStreak: 0,
  catProgress: {},
  session: { questions:[], current:0, correct:0, wrong:0, streak:0, maxStreak:0, xpEarned:0, isExam:false, cat:"" }
};
function loadState() { try { const s = localStorage.getItem("cbrStateV2"); if (s) state = JSON.parse(s); } catch(e){} }
function saveState() { try { localStorage.setItem("cbrStateV2", JSON.stringify(state)); } catch(e){} }

// ============================================================
// INIT
// ============================================================
function init() { loadState(); renderHome(); }

function renderHome() {
  document.getElementById("xpDisplay").textContent = state.xp;
  document.getElementById("statTotal").textContent = state.totalAnswered;
  document.getElementById("statCorrect").textContent = state.totalCorrect;
  document.getElementById("statStreak").textContent = state.maxStreak;
  document.getElementById("timerWrap").classList.remove("exam-mode");
  const grid = document.getElementById("categoryGrid");
  grid.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const qs = QUESTIONS.filter(q => q.cat === cat.id);
    if (!qs.length) return;
    const prog = state.catProgress[cat.id] || { done:0, correct:0 };
    const pct = qs.length > 0 ? Math.round((prog.correct / qs.length) * 100) : 0;
    const card = document.createElement("div");
    card.className = "cat-card";
    card.innerHTML = `
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-info">
        <div class="cat-name" style="color:#4da6ff">${cat.id}</div>
        <div class="cat-sub">${qs.length} vragen &bull; ${pct}% goed</div>
        <div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${cat.color}88,${cat.color})"></div></div>
      </div>
      <div class="cat-btns">
        <button class="cat-btn-learn" onclick="event.stopPropagation();showTheory('${cat.id}')">📖 Leer</button>
        <button class="cat-btn-quiz" onclick="event.stopPropagation();startCategory('${cat.id}')">▶ Oefen</button>
      </div>`;
    grid.appendChild(card);
  });
}

// ============================================================
// THEORY SCREEN
// ============================================================
function showTheory(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const t = THEORY[catId];
  if (!t) { startCategory(catId); return; }
  document.getElementById("theoryCatTitle").innerHTML = `${cat ? cat.icon : ""} ${catId}`;
  const ytUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(t.ytSearch)}`;
  const rulesHtml = t.rules.map(r => `<div class="theory-rule">${r}</div>`).join("");
  document.getElementById("theoryContent").innerHTML = `
    <div class="theory-svg-wrap">${t.svg}</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="tts-btn" onclick="speakTheory('${catId}',this)">🔊 Lees voor</button>
      <a href="${ytUrl}" target="_blank" style="flex:1;text-decoration:none;">
        <button class="yt-btn" style="margin:0;width:100%;">▶ YouTube uitleg</button>
      </a>
    </div>
    <div class="theory-rules">${rulesHtml}</div>
    <button class="start-quiz-btn" onclick="startCategory('${catId}')">▶ Start oefenvragen</button>`;
  showScreen("theoryScreen");
}

// ============================================================
// QUIZ
// ============////////////////////////////////////////////////
function startCategory(catId) {
  const qs = shuffle(QUESTIONS.filter(q => q.cat === catId));
  beginSession(qs, false, catId);
}
function startExam() {
  const qs = shuffle([...QUESTIONS]).slice(0, Math.min(65, QUESTIONS.length));
  beginSession(qs, true, "Oefenexamen");
}
function beginSession(qs, isExam, cat) {
  state.session = { questions: qs, current: 0, correct: 0, wrong: 0, streak: 0, maxStreak: 0, xpEarned: 0, isExam, cat };
  showScreen("quizScreen");
  if (isExam) { startTimer(25 * 60); } else { clearInterval(timerInterval); document.getElementById("timerWrap").classList.remove("exam-mode"); }
  showQuestion();
}
let timerInterval = null, timerSeconds = 0;
function startTimer(sec) {
  timerSeconds = sec;
  document.getElementById("timerWrap").classList.add("exam-mode");
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => { timerSeconds--; updateTimerDisplay(); if (timerSeconds <= 0) { clearInterval(timerInterval); finishSession(); } }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60), s = timerSeconds % 60;
  document.getElementById("timerText").textContent = `${m}:${s.toString().padStart(2,"0")}`;
  if (timerSeconds < 120) document.getElementById("timerText").style.color = "var(--red)";
}
function showQuestion() {
  const sess = state.session, q = sess.questions[sess.current], total = sess.questions.length;
  const pct = (sess.current / total) * 100;
  document.getElementById("quizProgressFill").style.width = pct + "%";
  document.getElementById("quizCounter").textContent = `Vraag ${sess.current + 1} van ${total}`;
  document.getElementById("streakBadge").textContent = `🔥 ${sess.streak}`;
  document.getElementById("questionCat").textContent = q.cat;
  document.getElementById("questionText").textContent = q.q;
  const svgWrap = document.getElementById("questionSvg");
  svgWrap.innerHTML = q.svg ? q.svg : "";
  const optWrap = document.getElementById("optionsWrap");
  optWrap.innerHTML = "";
  const letters = ["A","B","C","D"];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = `<div class="option-letter">${letters[i]}</div><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    optWrap.appendChild(btn);
  });
  const fb = document.getElementById("feedbackCard");
  fb.style.display = "none"; fb.className = "feedback-card";
  document.getElementById("nextBtn").style.display = "none";
  const qCard = document.getElementById("questionCard");
  qCard.classList.remove("slide-in"); void qCard.offsetWidth; qCard.classList.add("slide-in");
}
function selectAnswer(idx, btn) {
  const sess = state.session, q = sess.questions[sess.current], isCorrect = idx === q.correct;
  const allBtns = document.querySelectorAll(".option-btn");
  allBtns.forEach(b => b.disabled = true);
  allBtns[q.correct].classList.add("correct");
  if (!isCorrect) btn.classList.add("wrong");
  const fb = document.getElementById("feedbackCard");
  const icon = isCorrect ? "✅" : "❌";
  const prefix = isCorrect ? "<strong>Goed!</strong> " : "<strong>Fout.</strong> ";
  document.getElementById("feedbackText").innerHTML = icon + " " + prefix + q.explain;
  fb.className = "feedback-card " + (isCorrect ? "correct" : "wrong");
  if (isCorrect) {
    sess.correct++; sess.streak++; sess.xpEarned += 10;
    if (sess.streak > sess.maxStreak) sess.maxStreak = sess.streak;
    state.totalCorrect++;
    showXPToast("+10 XP");
    if (!state.catProgress[q.cat]) state.catProgress[q.cat] = { done:0, correct:0 };
    state.catProgress[q.cat].correct++;
  } else {
    sess.wrong++; sess.streak = 0;
    if (!q._retried) {
      q._retried = true;
      sess.questions.push(Object.assign({}, q));
    }
  }
  if (!state.catProgress[q.cat]) state.catProgress[q.cat] = { done:0, correct:0 };
  state.catProgress[q.cat].done++;
  state.totalAnswered++;
  if (sess.streak > state.maxStreak) state.maxStreak = sess.streak;
  fb.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("streakBadge").textContent = `🔥 ${sess.streak}`;
  saveState();
}
function nextQuestion() {
  const sess = state.session;
  sess.current++;
  if (sess.current >= sess.questions.length) finishSession();
  else showQuestion();
}
function finishSession() {
  clearInterval(timerInterval);
  document.getElementById("timerWrap").classList.remove("exam-mode");
  const sess = state.session, total = sess.questions.length;
  const pct = total > 0 ? Math.round((sess.correct / total) * 100) : 0;
  const pass = sess.isExam ? sess.correct >= 50 : pct >= 70;
  state.xp += sess.xpEarned + (pass ? 50 : 0);
  document.getElementById("xpDisplay").textContent = state.xp;
  showScreen("resultsScreen");
  document.getElementById("resultsIcon").textContent = pass ? (pct === 100 ? "🏆" : "🎉") : "📚";
  const titleEl = document.getElementById("resultsTitle");
  titleEl.textContent = pass ? "GESLAAGD!" : "Nog niet klaar";
  titleEl.className = "results-title " + (pass ? "pass" : "fail");
  document.getElementById("resultsSub").textContent = sess.isExam
    ? (pass ? `${sess.correct}/65 goed — je haalt je CBR-examen!` : `${sess.correct}/65 goed — je hebt minimaal 50 nodig.`)
    : `${pct}% goed in ${sess.cat}`;
  const offset = 345 - (pct / 100) * 345;
  setTimeout(() => { document.getElementById("ringCircle").style.strokeDashoffset = offset; }, 100);
  document.getElementById("scorePct").textContent = pct + "%";
  document.getElementById("resCorrect").textContent = sess.correct;
  document.getElementById("resWrong").textContent = sess.wrong;
  document.getElementById("resXP").textContent = sess.xpEarned + (pass ? "+50" : "");
  document.getElementById("resStreak").textContent = sess.maxStreak;
  document.getElementById("retryBtn").textContent = sess.isExam ? "🎯 Nieuw examen" : `🔄 ${sess.cat} opnieuw`;
  saveState();
}
function retrySession() { if (state.session.isExam) startExam(); else startCategory(state.session.cat); }
function goHome() { clearInterval(timerInterval); showScreen("homeScreen"); renderHome(); }
function showScreen(id) { document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); document.getElementById(id).classList.add("active"); window.scrollTo(0,0); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function showXPToast(msg) { const t=document.getElementById("xpToast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1200); }
init();
</script>
