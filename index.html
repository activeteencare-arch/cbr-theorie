<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Theorie rijbewijs B</title>
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0E1217; --surface:#161B22; --surface2:#1C232E; --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13); --gold:#C9A24B; --gold2:#E2C580; --text:#ECEAE4;
  --muted:#969DA8; --dim:#6B7280; --good:#46B48A; --bad:#DD7367;
  --r:14px; --r-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;justify-content:center}
#shell{width:100%;max-width:480px;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;padding:0 18px 110px}
h1,h2,h3,.font-d{font-family:'Outfit',sans-serif;font-weight:500}
.label{font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:500}
.muted{color:var(--muted)}
.dim{color:var(--dim)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* top bar */
.topbar{display:flex;align-items:center;gap:11px;padding:22px 2px 18px;position:sticky;top:0;background:linear-gradient(var(--bg) 78%,transparent);z-index:20}
.topbar .mark{width:34px;height:34px;flex:none}
.topbar .wm{font-family:'Outfit';font-weight:500;font-size:18px;letter-spacing:.5px}
.topbar .wm b{color:var(--gold);font-weight:500}
.topbar .sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.back{margin-left:auto;width:38px;height:38px;border-radius:50%;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;transition:.15s}
.back:hover{border-color:var(--gold);color:var(--gold)}

/* cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);transition:.15s}
.card:hover{border-color:var(--line2)}
.row{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);width:100%;text-align:left;transition:.15s;margin-bottom:10px}
.row:hover{border-color:var(--gold);background:var(--surface2)}
.row .idx{font-family:'Outfit';color:var(--gold);font-size:15px;font-weight:500;width:26px;flex:none}
.row .ttl{flex:1;font-size:14.5px}
.row .chev{color:var(--dim);font-size:17px}
.row .done{color:var(--good);font-size:17px}

/* hero / home */
.hero{display:flex;align-items:center;gap:18px;margin:6px 0 26px;padding:20px;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface)}
.ring{width:74px;height:74px;flex:none}
.hero .h-t{font-family:'Outfit';font-size:20px;font-weight:500;line-height:1.25;margin-bottom:5px}
.hero .h-s{font-size:13px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 16px 16px;text-align:left;transition:.15s;display:flex;flex-direction:column;gap:10px;min-height:118px}
.tile:hover{border-color:var(--gold);transform:translateY(-2px)}
.tile .ic{font-size:24px;color:var(--gold)}
.tile .tl{font-family:'Outfit';font-size:16px;font-weight:500}
.tile .ts{font-size:12px;color:var(--muted);line-height:1.45}
.tile.wide{grid-column:1/3;flex-direction:row;align-items:center;min-height:auto;gap:14px}
.tile.wide .ic{font-size:22px}
.tile.wide .tx{flex:1}

/* section / leerstof */
.sec{padding:18px 17px;margin-bottom:13px}
.sec h3{font-size:16.5px;margin-bottom:11px;display:flex;align-items:center;gap:9px}
.sec h3 .n{color:var(--gold);font-size:13px}
.sec p{font-size:14.5px;line-height:1.72;color:#D7D5CE;margin-bottom:11px}
.kern{border-left:2px solid var(--gold);padding:3px 0 3px 13px;margin:13px 0 6px}
.kern li{list-style:none;font-size:13.5px;line-height:1.6;color:var(--text);margin-bottom:5px;position:relative;padding-left:15px}
.kern li:before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.bron{font-size:11.5px;color:var(--dim);margin-top:9px;font-style:italic}
.tools{display:flex;gap:8px;margin-top:13px}
.tbtn{display:inline-flex;align-items:center;gap:7px;font-family:'Outfit';font-size:12.5px;font-weight:500;color:var(--gold);border:1px solid var(--line2);border-radius:30px;padding:8px 14px;transition:.15s}
.tbtn:hover{border-color:var(--gold);background:rgba(201,162,75,.08)}
.tbtn.loading{opacity:.55;pointer-events:none}
.tbtn i{font-size:15px}

/* hoofdstuk header */
.chap-head{margin:4px 0 18px}
.chap-head .n{font-family:'Outfit';font-size:40px;font-weight:300;color:var(--gold);line-height:1}
.chap-head h2{font-size:21px;margin-top:6px}

/* quiz */
.q-meta{display:flex;justify-content:space-between;align-items:center;margin:6px 0 16px;font-size:12.5px;color:var(--muted)}
.qbar{height:4px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:20px}
.qbar i{display:block;height:100%;background:var(--gold);transition:.3s;width:0}
.q-txt{font-family:'Outfit';font-size:18px;font-weight:400;line-height:1.4;margin-bottom:20px}
.opt{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;margin-bottom:11px;font-size:14.5px;transition:.13s;line-height:1.4}
.opt:hover{border-color:var(--line2)}
.opt.good{border-color:var(--good);background:rgba(70,180,138,.1)}
.opt.bad{border-color:var(--bad);background:rgba(221,115,103,.1)}
.opt.dimmed{opacity:.5}
.opt.sel{border-color:var(--gold);background:rgba(201,162,75,.12)}
.opt.sel::before{content:'\2713';color:var(--gold);font-weight:700;margin-right:9px}
.invul{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;font-size:15px;color:var(--text);font-family:'Inter';outline:none}
.invul:focus{border-color:var(--gold)}
.invul.good{border-color:var(--good);background:rgba(70,180,138,.1)}
.invul.bad{border-color:var(--bad);background:rgba(221,115,103,.1)}
.timer{font-variant-numeric:tabular-nums;color:var(--gold);font-weight:600}
.timer.warn{color:var(--bad)}
.qtype{display:inline-block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 7px;margin-bottom:12px}
.ghscene{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:#23272e}
.ghsvg{display:block;width:100%;height:auto}
.fb{border-radius:var(--r);padding:14px 15px;margin:4px 0 16px;font-size:13.5px;line-height:1.6;border:1px solid var(--line)}
.fb.ok{border-color:rgba(70,180,138,.4);background:rgba(70,180,138,.07)}
.fb.no{border-color:rgba(221,115,103,.4);background:rgba(221,115,103,.07)}
.fb .h{font-family:'Outfit';font-weight:500;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.fb.ok .h{color:var(--good)} .fb.no .h{color:var(--bad)}

/* primary button */
.pbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:var(--gold);color:#1A1407;font-family:'Outfit';font-weight:500;font-size:15px;border-radius:var(--r);padding:15px;transition:.15s;margin-top:6px}
.pbtn:hover{background:var(--gold2)}
.pbtn.ghost{background:transparent;color:var(--gold);border:1px solid var(--line2)}
.pbtn.ghost:hover{border-color:var(--gold);background:rgba(201,162,75,.07)}

/* exam result */
.score{text-align:center;padding:26px 0 18px}
.score .big{font-family:'Outfit';font-size:54px;font-weight:300;line-height:1}
.score .big b{font-weight:500}
.score .verdict{font-family:'Outfit';font-size:20px;font-weight:500;margin-top:10px}
.score .verdict.pass{color:var(--good)} .score .verdict.fail{color:var(--bad)}
.score .sub{font-size:13px;color:var(--muted);margin-top:7px}

/* coach */
.coach-card{padding:22px 20px;text-align:center}
.coach-card .av{width:60px;height:60px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--gold);font-size:26px}
.coach-card h2{font-size:19px;margin-bottom:8px}
.coach-card p{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:6px}

.sec-title{display:flex;align-items:baseline;justify-content:space-between;margin:8px 2px 14px}
.sec-title .label{}
.sec-title .cnt{font-size:12px;color:var(--dim)}
.fade{animation:f .25s ease}
@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.center-note{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://yigzycbutzpgelmjzgdn.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ilo8tba3rHsheaXO-cx1Ng_TZ1IhUcv";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let user = null;
let coachConv = null;
let besprokenNu = null, coachUI = null;
function logBesproken(){ if(besprokenNu){ P.besproken=P.besproken||[]; if(!P.besproken.includes(besprokenNu)){ P.besproken.push(besprokenNu); saveP(); } besprokenNu=null; } }
const LEERSTOF = [{"hoofdstuk": 1, "titel": "Verkeersdeelnemer en mens", "secties": [{"kop": "De rijtaak en jouw verantwoordelijkheid", "tekst": "Achter het stuur ben je continu bezig, ook al heb je dat zelf niet altijd door. Je kijkt, je leest de situatie, je beslist en je stuurt bij. Vaak meerdere keren per seconde. Dat hele proces samen heet de rijtaak, en het vraagt je volle aandacht.\n\nZodra je rijdt, ben jij verantwoordelijk. Voor je auto, en voor iedereen om je heen. De regel is simpel: je rijdt zo dat je niemand in gevaar brengt en niemand ophoudt. Maakt een ander een fout, dan blijf jij toch verplicht om het ongeluk te voorkomen als dat kan.\n\nDaar hoort ook bij dat je alleen de weg op gaat als je het aankunt. Uitgerust, nuchter, hoofd erbij. Twijfel je of je veilig kunt rijden, dan stap je niet in.", "kernpunten": ["De rijtaak = steeds kijken, beslissen en handelen", "Je mag geen gevaar veroorzaken of het verkeer hinderen", "Voorkom ongelukken, ook als een ander een fout maakt", "Rijd alleen als je veilig kunt rijden"], "bron": "RVV 1990 art. 5; WVW 1994 art. 5 (gevaar/hinder op de weg); CBR exameneisen rijbewijs B"}, {"kop": "Vermoeidheid en concentratie", "tekst": "Vermoeidheid is gevaarlijk in het verkeer. Als je moe bent reageer je langzamer, let je minder goed op en kun je zelfs heel even wegvallen zonder dat je het merkt. Zo'n microslaap duurt soms maar een paar seconden, en dat is al genoeg voor een ongeluk.\n\nLet op de signalen. Je geeuwt, je ogen worden branderig, je kunt je het laatste stuk weg niet meer herinneren, of je hebt moeite om je rijstrook te houden. Schuif die signalen niet opzij.\n\nWat echt helpt is stoppen en rusten. Even een raampje open of de radio harder zetten doet niets. Een korte pauze, eventueel met een powernap, maakt je weer alert. Rijd je een lange rit, plan dan op tijd je pauzes in.", "kernpunten": ["Moe rijden = trager reageren en risico op microslaap", "Let op signalen: geeuwen, branderige ogen, slingeren", "Alleen stoppen en rusten helpt echt", "Plan pauzes bij lange ritten"], "bron": "CBR exameneisen rijbewijs B (mens en rijtaak); SWOV-kennis over vermoeidheid; RVV 1990 art. 5 (geen gevaar veroorzaken)"}, {"kop": "Alcohol achter het stuur", "tekst": "Alcohol en autorijden gaan niet samen. Alcohol maakt je reactietijd langer en je inschatting slechter, terwijl je zelfvertrouwen juist toeneemt zonder dat daar reden voor is. Je merkt vaak zelf niet hoeveel slechter je rijdt.\n\nIn Nederland geldt voor een ervaren bestuurder een grens van 0,5 promille alcohol in het bloed. Voor een beginnende bestuurder is de grens strenger: 0,2 promille. Je bent beginnende bestuurder gedurende de eerste 5 jaar nadat je je rijbewijs hebt gehaald. Haal je je rijbewijs vóór je 18e, zoals via 2toDrive, dan duurt die periode 7 jaar.\n\nVoor jou betekent 0,2 promille in de praktijk maar één ding: niet drinken als je nog moet rijden. Eén glas kan je er al overheen brengen. Rijd je toch boven de grens, dan ben je strafbaar volgens artikel 8 van de Wegenverkeerswet, en dat kan je een boete, een rijontzegging of inname van je rijbewijs opleveren.", "kernpunten": ["Ervaren bestuurder: maximaal 0,5 promille", "Beginnende bestuurder: maximaal 0,2 promille (5 jaar, of 7 jaar als je je rijbewijs vóór je 18e haalt, zoals bij 2toDrive)", "0,2 promille betekent in de praktijk: niet drinken en rijden", "Rijden onder invloed is strafbaar (art. 8 WVW)"], "bron": "WVW 1994 art. 8 (strafbaarstelling); grenswaarden 0,5 / 0,2 promille beginnende bestuurder; CBR exameneisen rijbewijs B"}, {"kop": "Drugs en medicijnen", "tekst": "Niet alleen alcohol beïnvloedt je rijgedrag. Drugs maken je rijden onvoorspelbaar en gevaarlijk, omdat ze je traag, onrustig of overmoedig kunnen maken. Rijden onder invloed van drugs is verboden en strafbaar, net als bij alcohol.\n\nOok medicijnen kunnen je rijvaardigheid aantasten. Sommige maken je slaperig of verminderen je concentratie. Op de verpakking of in de bijsluiter staat een waarschuwing, vaak met een gele sticker. Die gele sticker betekent: wees voorzichtig. Een rode of zwarte waarschuwing betekent meestal: niet rijden.\n\nWeet je niet zeker of je met een medicijn mag rijden, vraag het dan aan je arts of apotheker voordat je de weg op gaat.", "kernpunten": ["Rijden onder invloed van drugs is verboden en strafbaar", "Medicijnen kunnen je slaperig en minder alert maken", "Let op de waarschuwingssticker op de verpakking", "Twijfel? Vraag arts of apotheker"], "bron": "WVW 1994 art. 8 (onder invloed van stoffen die de rijvaardigheid verminderen); CBR exameneisen rijbewijs B; medicijnwaarschuwingssystematiek (KNMP/CBG)"}, {"kop": "Afleiding en de telefoon", "tekst": "Afleiding is een belangrijke oorzaak van ongelukken. Alles wat je aandacht van de weg haalt vergroot het risico, of dat nu je telefoon is, eten, het instellen van de navigatie of een druk gesprek.\n\nEen mobiel elektronisch apparaat vasthouden tijdens het rijden is verboden. Denk aan een telefoon, tablet of mediaspeler. Het vasthouden is het probleem: zelfs als je stilstaat voor een rood licht mag je het apparaat niet in je hand hebben.\n\nIn een houder gebruiken mag wel, bijvoorbeeld voor navigatie, zolang je het niet vasthoudt. Maar ook dan hoort je aandacht bij de weg. Stel daarom alles in voordat je wegrijdt.", "kernpunten": ["Een mobiel apparaat vasthouden tijdens het rijden is verboden", "Het verbod geldt ook bij stilstaan voor een rood licht", "In een houder gebruiken mag, vasthouden niet", "Stel navigatie en muziek in vóór je wegrijdt"], "bron": "RVV 1990 art. 61a (verbod vasthouden mobiel elektronisch apparaat, geldend sinds 1-7-2019); CBR exameneisen rijbewijs B"}, {"kop": "Rijbewijs en verplichte documenten", "tekst": "Als bestuurder moet je een paar documenten bij je hebben en kunnen laten zien als de politie erom vraagt: je rijbewijs, het kentekenbewijs (dat vaak digitaal te controleren is) en een geldig identiteitsbewijs.\n\nJe rijbewijs B haal je in stappen. Via 2toDrive mag je vanaf 16 jaar theorie-examen doen, vanaf 16,5 jaar rijles nemen en vanaf 17 jaar praktijkexamen doen. Haal je je rijbewijs op je 17e, dan mag je tot je 18e alleen rijden met een begeleider naast je. Je kunt maximaal vijf begeleiders aanwijzen, en zij staan op een verplichte begeleiderspas die je bij je moet hebben.\n\nRijd nooit zonder geldig rijbewijs. Doe je dat toch, dan ben je strafbaar.", "kernpunten": ["Bij je: rijbewijs en geldig identiteitsbewijs", "2toDrive: theorie vanaf 16, rijles vanaf 16,5, praktijk vanaf 17", "Rijbewijs op je 17e: tot 18e rijden met begeleider en begeleiderspas", "Maximaal vijf begeleiders aanwijzen"], "bron": "WVW 1994 art. 107 (rijbewijsplicht) en art. 160 (tonen documenten); CBR informatie 2toDrive en begeleidersregeling rijbewijs B"}]}, {"hoofdstuk": 2, "titel": "De auto rijklaar maken", "secties": [{"kop": "Banden: profiel en spanning", "tekst": "Je banden zijn het enige contact tussen je auto en de weg. Goede banden remmen korter en houden beter grip, zeker als het regent.\n\nDe wettelijke minimale profieldiepte voor de banden van een personenauto is 1,6 mm, gemeten in de hoofdgroeven over de hele omtrek. Kom je daaronder, dan word je afgekeurd bij de APK en mag je niet rijden. Voor de veiligheid wordt vaak aangeraden om al eerder nieuwe banden te nemen.\n\nNaast het profiel telt de bandenspanning. Te zachte banden slijten sneller, verbruiken meer brandstof en kunnen klappen. Controleer de spanning regelmatig en houd de waarde aan die de fabrikant adviseert. Die vind je in het instructieboekje of op een sticker bij het portier.", "kernpunten": ["Minimale profieldiepte: 1,6 mm (wettelijk)", "Te weinig profiel = afkeur bij de APK", "Goed profiel = kortere remweg en meer grip, vooral bij regen", "Houd de juiste bandenspanning aan volgens de fabrikant"], "bron": "Regeling voertuigen art. 5.2.27 (minimale profieldiepte 1,6 mm hoofdgroeven); RDW; CBR exameneisen rijbewijs B"}, {"kop": "Verlichting: welk licht wanneer", "tekst": "Met de juiste verlichting zie je beter en word je beter gezien. In het donker en bij slecht zicht overdag moet je je verlichting voeren.\n\nDimlicht gebruik je in het donker en bij slecht zicht. Grootlicht mag je gebruiken als er geen tegenliggers zijn en je je voorganger niet verblindt, en je dimt het op tijd. Het achterlicht en de kentekenplaatverlichting branden altijd mee met dimlicht, grootlicht, stadslicht of mistlicht.\n\nVoor mistlicht gelden aparte regels. Mistlicht vóór mag je gebruiken bij mist, sneeuw of regen die het zicht ernstig beperkt. Mistlicht achter mag je alleen gebruiken als het zicht door mist of sneeuw minder is dan 50 meter, want anders verblind je de mensen achter je. Wordt het zicht beter, zet het mistachterlicht dan meteen weer uit.", "kernpunten": ["Dimlicht bij duisternis en slecht zicht", "Grootlicht alleen zonder tegenligger of voorganger; tijdig dimmen", "Mistlicht vóór bij ernstig beperkt zicht", "Mistlicht achter pas bij zicht onder 50 meter"], "bron": "RVV 1990 art. 32 (verlichting/achterlicht), art. 34 (mistlicht achter bij zicht < 50 m); RVV 1990 art. 35-38 (gebruik licht); CBR exameneisen rijbewijs B"}, {"kop": "Remmen", "tekst": "Een goed remsysteem is letterlijk levensbelangrijk. Je remmen moeten je auto betrouwbaar en recht tot stilstand kunnen brengen.\n\nLet op de waarschuwingssignalen. Een zacht of wegzakkend rempedaal, piepende of schurende geluiden, of een auto die bij het remmen naar één kant trekt. Merk je zoiets, laat de remmen dan controleren.\n\nVeel auto's hebben ABS, het antiblokkeersysteem. Daardoor blijven de wielen tijdens hard remmen draaien, zodat je kunt blijven sturen. Maak je een noodstop met ABS, trap het rempedaal dan stevig in en blijf sturen. Het pedaal kan daarbij trillen, en dat is normaal.", "kernpunten": ["Remmen moeten recht en betrouwbaar stoppen", "Let op piepen, schuren, zacht pedaal of trekken naar één kant", "ABS houdt de wielen draaiend zodat je kunt blijven sturen", "Noodstop met ABS: stevig intrappen en blijven sturen"], "bron": "Regeling voertuigen (eisen reminrichting, hoofdstuk 5); CBR exameneisen rijbewijs B (techniek en bediening)"}, {"kop": "Zicht: ruiten en spiegels", "tekst": "Je moet goed naar buiten kunnen kijken. Houd je ruiten schoon, van binnen en van buiten, en zorg dat de ruitenwissers en de sproeiers het doen. Een bevroren of beslagen ruit maak je eerst helemaal vrij voordat je wegrijdt. Een klein kijkgaatje is niet genoeg en niet veilig.\n\nStel je spiegels goed af voordat je wegrijdt: de binnenspiegel en allebei de buitenspiegels. Daarmee overzie je het verkeer achter en naast je.\n\nElke auto heeft een dode hoek, het gebied naast en schuin achter je dat je niet in je spiegels ziet. Voordat je van rijstrook wisselt of afslaat, kijk je daarom ook even over je schouder.", "kernpunten": ["Houd ruiten schoon en maak ze helemaal vrij van ijs of condens", "Stel binnen- en buitenspiegels goed af vóór vertrek", "Elke auto heeft een dode hoek", "Kijk over je schouder bij wisselen van strook of afslaan"], "bron": "Regeling voertuigen (eisen ruiten, zicht en spiegels); RVV 1990 art. 5 (geen gevaar); CBR exameneisen rijbewijs B"}, {"kop": "APK: de periodieke keuring", "tekst": "De APK, de Algemene Periodieke Keuring, controleert of je auto veilig is en niet te veel vervuilt. Zonder een geldige APK mag je niet de weg op.\n\nVoor een personenauto op benzine of elektrisch geldt: de eerste keuring na 4 jaar, daarna twee keer na 2 jaar, en vanaf 8 jaar elk jaar. Rijd je op diesel of gas, dan is de eerste keuring na 3 jaar en daarna elk jaar.\n\nJij blijft als bestuurder verantwoordelijk dat de auto rijklaar is, ook tussen de keuringen door. Een geldige APK wil niet zeggen dat alles vanzelf in orde blijft.", "kernpunten": ["Zonder geldige APK mag je niet rijden", "Benzine/elektrisch: 4-2-2-1 (eerst na 4 jaar, dan 2, 2, jaarlijks)", "Diesel/gas: eerste keuring na 3 jaar, daarna jaarlijks", "Jij blijft verantwoordelijk voor een veilige auto, ook tussendoor"], "bron": "RDW APK-regelgeving (keuringsfrequentie personenauto); WVW 1994 art. 72 (APK-plicht); CBR exameneisen rijbewijs B"}, {"kop": "Lading en beladen", "tekst": "Hoe je je auto belaadt, bepaalt hoe hij rijdt. Een zwaar beladen auto remt langer en reageert anders in de bocht. Verdeel het gewicht daarom zo laag en gelijkmatig mogelijk.\n\nLading moet goed vastzitten, zodat er niets kan verschuiven, vallen of van de auto af waaien. Losse spullen in de auto worden bij hard remmen zomaar gevaarlijke projectielen.\n\nJe auto heeft een maximaal toegestaan gewicht, en daar mag je niet overheen. Ook mag de lading niet zo ver of zo breed uitsteken dat het gevaarlijk wordt. Steekt lading meer dan een meter achter de auto uit, dan moet je die markeren.", "kernpunten": ["Beladen verandert remweg en weggedrag", "Zet lading goed vast; niets mag verschuiven of vallen", "Blijf onder het maximaal toegestane gewicht", "Ver uitstekende lading markeren"], "bron": "RVV 1990 art. 5 (geen gevaar/hinder); Regeling voertuigen / WVW (eisen lading en afmetingen); CBR exameneisen rijbewijs B"}, {"kop": "Gordels, hoofdsteunen en kinderbeveiliging", "tekst": "De veiligheidsgordel is je belangrijkste bescherming bij een botsing. Iedereen in de auto draagt de gordel, bestuurder en passagiers, voorin en achterin. En als bestuurder ben jij ervoor verantwoordelijk dat kinderen goed vastzitten.\n\nKinderen die kleiner zijn dan 1,35 meter horen in een goedgekeurd kinderbeveiligingssysteem, dus een kinderzitje of stoelverhoger, dat bij hun lengte en gewicht past. Is er geen kinderzitje, dan mogen kinderen onder de 1,35 meter niet voorin, maar moeten ze achterin met de gordel.\n\nStel ook je hoofdsteun goed af, met de bovenkant ongeveer op ooghoogte. Een goede hoofdsteun beschermt je nek als je van achteren wordt aangereden.", "kernpunten": ["Gordel verplicht voor iedereen, voor- en achterin", "Kinderen < 1,35 m: goedgekeurd kinderbeveiligingssysteem", "Bestuurder is verantwoordelijk dat kinderen goed vastzitten", "Hoofdsteun op ooghoogte beschermt je nek"], "bron": "RVV 1990 art. 59 (autogordel, kinderbeveiligingssysteem, grens 1,35 m); CBR exameneisen rijbewijs B"}, {"kop": "Milieu en zuinig rijden", "tekst": "Hoe je rijdt, bepaalt hoeveel brandstof je verbruikt en hoeveel je uitstoot. Zuinig rijden is beter voor het milieu en voor je portemonnee.\n\nEen paar simpele gewoontes helpen al. Schakel op tijd naar een hogere versnelling en rijd in een zo hoog mogelijke versnelling, houd een rustige snelheid aan, en kijk vooruit zodat je rustig kunt remmen en optrekken. Onnodig optrekken en afremmen kost veel brandstof.\n\nLaat de motor niet voor niets stationair draaien en zorg voor de juiste bandenspanning, want te zachte banden verbruiken meer. Haal ook onnodig gewicht uit de auto, zoals een lege dakkoffer.", "kernpunten": ["Schakel op tijd op en rijd in een hoge versnelling", "Kijk vooruit en rijd gelijkmatig: minder remmen en optrekken", "Juiste bandenspanning verlaagt verbruik", "Geen onnodig gewicht of onnodig stationair draaien"], "bron": "CBR exameneisen rijbewijs B (Het Nieuwe Rijden / milieubewust rijden); RDW; ANWB-rijtips"}, {"kop": "Rijhulpsystemen en waarschuwingslampjes", "tekst": "Moderne auto's hebben rijhulpsystemen die je helpen, maar het stuur blijft altijd jouw verantwoordelijkheid. Cruise control houdt je snelheid vast zodat je niet steeds gas hoeft te geven. Adaptieve cruise control gaat een stap verder en houdt ook automatisch afstand tot de auto voor je. ABS zorgt dat je wielen bij een noodstop niet blokkeren, zodat je kunt blijven sturen terwijl je vol remt. Een dodehoekwaarschuwing geeft een seintje als er iets in je dode hoek zit.\n\nDeze systemen nemen het rijden niet van je over. Jij blijft eindverantwoordelijk en moet altijd zelf blijven kijken en ingrijpen.\n\nOp je dashboard waarschuwen lampjes je als er iets is, en de kleur zegt hoe ernstig het is. Een rood lampje betekent gevaar of een serieus probleem, bijvoorbeeld te lage oliedruk of een remstoring. Stop dan zo snel als het veilig kan en rijd niet door. Een oranje of geel lampje is een waarschuwing: er vraagt iets om aandacht, laat het op korte termijn nakijken, maar meestal kun je nog wel rustig doorrijden.", "kernpunten": ["Rijhulpsystemen helpen, maar jij blijft altijd eindverantwoordelijk", "Cruise control houdt snelheid; adaptieve cruise control houdt ook afstand", "ABS: wielen blokkeren niet, je kunt blijven sturen tijdens een noodstop", "Rood dashboardlampje: gevaar, stop zo snel als het veilig kan", "Oranje of geel lampje: waarschuwing, laat het nakijken"], "bron": "WVW 1994 art. 5 (bestuurder blijft verantwoordelijk); voertuighandleiding en RDW (dashboardsymbolen); CBR exameneisen rijbewijs B (rijhulpsystemen)"}, {"kop": "Verzekering, kenteken en documenten", "tekst": "Elke auto die op de openbare weg komt, moet verzekerd zijn. De wet verplicht voor elk motorrijtuig minstens een aansprakelijkheidsverzekering, de WA-verzekering. Die dekt de schade die je met je auto aan anderen toebrengt.\n\nDie plicht hangt aan het kenteken, niet aan het rijden. Zolang een auto een kenteken heeft, moet hij verzekerd zijn, ook als hij alleen maar geparkeerd op straat staat. Wil je dat niet, dan moet je het kenteken laten schorsen, en dan mag de auto alleen nog op eigen terrein staan en niet op de openbare weg.\n\nRijden of een auto bezitten zonder geldige verzekering is strafbaar en levert een boete op. Bij een aanrijding zonder verzekering draai je bovendien zelf op voor de schade.\n\nNaast de verzekering moet de auto een geldig kenteken en een geldige APK hebben, en moet jij je rijbewijs kunnen tonen.", "kernpunten": ["Elk motorrijtuig moet minstens WA-verzekerd zijn", "De plicht hangt aan het kenteken, ook bij een auto die alleen geparkeerd staat", "Geen verzekering is strafbaar en je betaalt de schade zelf", "De auto heeft ook een geldig kenteken en een geldige APK nodig"], "bron": "WAM art. 2 (verzekeringsplicht motorrijtuig); WVW 1994 art. 36 (kentekenplicht) en art. 72 (APK)"}, {"kop": "Milieuzone", "tekst": "In veel binnensteden geldt een milieuzone. Dat is een gebied waar vervuilende voertuigen niet in mogen, om de lucht schoner te houden. De gemeente bepaalt zelf waar zo'n zone ligt en voor welke voertuigen hij geldt.\n\nJe herkent een milieuzone aan een bord aan het begin van de zone, met daaronder informatie over welke voertuigen geweerd worden. Rijd je er toch in met een voertuig dat niet is toegestaan, dan kun je een boete krijgen.\n\nVoor een gewone, niet te oude personenauto is een milieuzone meestal geen probleem, maar let altijd op het bord en de onderborden.", "kernpunten": ["Milieuzone: gebied waar vervuilende voertuigen niet in mogen, voor schonere lucht", "De gemeente bepaalt de zone en voor welke voertuigen die geldt", "Aangegeven met een bord plus onderbord, let daarop", "Erin rijden terwijl het niet mag levert een boete op"], "bron": "RVV 1990 bord C22e (milieuzone en nul-emissiezone, per 1-1-2026); gemeentelijke verordening"}]}, {"hoofdstuk": 3, "titel": "Wegen en weggedeelten", "secties": [{"kop": "Rijbaan, rijstrook en weggedeelte", "tekst": "Om de regels goed te snappen, moet je de woorden voor de weg kennen. De hele verharde weg waarover het verkeer rijdt heet de rijbaan. Een rijbaan kan verdeeld zijn in rijstroken: de banen die door strepen van elkaar gescheiden zijn en waar één rij voertuigen op past.\n\nEen weg kan uit meerdere weggedeelten bestaan, bijvoorbeeld een rijbaan voor auto's, een fietspad en een trottoir. Elk weggedeelte heeft zijn eigen regels en is voor een bepaalde groep weggebruikers.\n\nWeet je welk weggedeelte je voor je hebt, dan weet je ook wie daar hoort te rijden en wat je kunt verwachten.", "kernpunten": ["Rijbaan = het deel van de weg waarover gereden wordt", "Rijstrook = een door strepen begrensde baan voor één rij voertuigen", "Een weg kan meerdere weggedeelten hebben (rijbaan, fietspad, trottoir)", "Elk weggedeelte heeft eigen regels en gebruikers"], "bron": "RVV 1990 art. 1 (begripsbepalingen rijbaan, rijstrook, weg); CBR exameneisen rijbewijs B"}, {"kop": "Fietsstrook en fietspad", "tekst": "Een fietsstrook is een deel van de rijbaan dat met strepen is gemarkeerd en waarop fietssymbolen staan. De fietsstrook hoort bij de rijbaan en is bedoeld voor fietsers en voor bestuurders van invalidenvoertuigen.\n\nIs de fietsstrook begrensd met een doorgetrokken streep, dan mag je daar als automobilist niet op rijden. Bij een onderbroken streep mag je de fietsstrook wel kruisen of er overheen rijden als dat nodig is, maar stilstaan of parkeren mag er niet.\n\nEen fietspad is iets anders. Dat ligt vrij van de rijbaan en hoort er niet bij. Je herkent het aan het blauwe bord met een fiets of aan een bord met de tekst 'fietspad'. Daar mogen auto's niet komen.", "kernpunten": ["Fietsstrook hoort bij de rijbaan, met fietssymbolen", "Doorgetrokken streep: niet op rijden; onderbroken streep: niet op stilstaan/parkeren", "Fietspad ligt vrij van de rijbaan; auto's mogen er niet komen", "Fietspad herken je aan het blauwe bord G11/G12 of tekstbord"], "bron": "RVV 1990 art. 1 (fietsstrook), art. 5 en 10 (plaats op de weg); RVV 1990 borden G11/G13 (fietspad); CBR exameneisen rijbewijs B"}, {"kop": "Busstrook en busbaan", "tekst": "Een busstrook is een deel van de rijbaan dat met strepen is gemarkeerd en waarop het woord 'BUS' of 'LIJNBUS' op het wegdek staat. Bij een busbaan gaat het om een hele rijbaan met die markering.\n\nEen busstrook of busbaan is bedoeld voor bussen, dus lijnbussen, en soms voor trams. Als gewone automobilist mag je er niet op rijden, tenzij een bord een uitzondering toelaat.\n\nOp en naast een busstrook mag je niet stilstaan of parkeren. Naast een busbaan mag dat meestal wel, tenzij andere regels of borden het verbieden.", "kernpunten": ["Busstrook/busbaan herken je aan 'BUS' of 'LIJNBUS' op het wegdek", "Alleen voor bussen (en soms trams); auto's niet, tenzij een bord het toestaat", "Op en naast een busstrook: niet stilstaan of parkeren", "Naast een busbaan mag stilstaan/parkeren meestal wel"], "bron": "RVV 1990 art. 1 (busstrook/busbaan) en art. 73 en 81 (gebruik en stilstaan); CBR exameneisen rijbewijs B"}, {"kop": "Voetpad en trottoir", "tekst": "Een trottoir of voetpad is voor voetgangers. Als bestuurder van een auto hoor je daar niet, en je mag er niet rijden, stilstaan of parkeren.\n\nSoms moet je het trottoir wel even kruisen, bijvoorbeeld om een inrit of een parkeerplaats te bereiken. Dan laat je voetgangers altijd voorgaan, want zij hebben daar voorrang.\n\nRijd je een uitrit of inrit op of af, kijk dan goed uit voor voetgangers en fietsers die over het trottoir of fietspad langskomen.", "kernpunten": ["Trottoir en voetpad zijn voor voetgangers", "Auto's mogen er niet rijden, stilstaan of parkeren", "Bij het kruisen van een trottoir: voetgangers gaan voor", "Let extra op bij in- en uitritten"], "bron": "RVV 1990 art. 1 (voetpad/trottoir), art. 4 en 5; CBR exameneisen rijbewijs B"}, {"kop": "Het erf", "tekst": "Een erf is een woon- of verblijfsgebied met een speciaal blauw bord. Op een erf wonen en spelen mensen, en voetgangers mogen de hele breedte van de weg gebruiken.\n\nOp een erf mag je niet harder dan 15 km/u. Je rijdt er dus heel rustig en houdt extra rekening met spelende kinderen, die plotseling de weg op kunnen komen.\n\nParkeren mag op een erf alleen op de plekken die daarvoor zijn aangegeven, vaak met een P of een blauwe streep. Buiten die plekken parkeren mag niet.", "kernpunten": ["Erf = woon-/verblijfsgebied met blauw erfbord", "Maximumsnelheid op een erf: 15 km/u", "Voetgangers mogen de hele breedte gebruiken; let op spelende kinderen", "Parkeren alleen op aangegeven plekken"], "bron": "RVV 1990 art. 44 (voetgangers op erf) en art. 45 (max. 15 km/u op erf); CBR exameneisen rijbewijs B"}, {"kop": "Autoweg en autosnelweg", "tekst": "De autoweg en de autosnelweg zijn wegen voor doorgaand, snel verkeer. Je herkent ze aan hun eigen borden: de autoweg aan een rood-wit bord met een auto, de autosnelweg aan een blauw bord met een wegbeeld.\n\nDeze wegen zijn alleen toegankelijk voor snelle motorvoertuigen. Op de autoweg moet je voertuig minstens 50 km/u kunnen en mogen rijden, op de autosnelweg minstens 60 km/u. Langzame voertuigen, fietsers, bromfietsen en voetgangers mogen er niet komen.\n\nHet grote verschil zit hierin: een autosnelweg heeft meestal gescheiden rijbanen en geen gelijkvloerse kruisingen, en is bedoeld voor de hoogste snelheden. De autoweg is wat eenvoudiger en kan wel kruisingen hebben.", "kernpunten": ["Autoweg: rood-wit bord; voertuig moet minstens 50 km/u kunnen/mogen", "Autosnelweg: blauw bord; voertuig moet minstens 60 km/u kunnen/mogen", "Geen fietsers, bromfietsen of voetgangers", "Autosnelweg: gescheiden rijbanen, geen gelijkvloerse kruisingen"], "bron": "RVV 1990 art. 1 (autoweg/autosnelweg) en art. 42 (minimumsnelheid-eis: autosnelweg 60 km/u, autoweg 50 km/u), art. 43 (gedrag op autosnelweg/autoweg); borden G1-G4; CBR exameneisen rijbewijs B"}, {"kop": "In- en uitvoegstrook", "tekst": "Om veilig de snelweg op te komen gebruik je de invoegstrook, de oprit. Daar pas je je snelheid aan die van het verkeer op de snelweg, kijk je goed in je spiegels en over je schouder, en voeg je in op een veilig gat. Jij past je aan het overige verkeer aan, want de auto's op de snelweg hoeven niet voor jou te remmen.\n\nWil je de snelweg af, dan gebruik je de uitvoegstrook, de afrit. Je gaat op tijd naar de uitvoegstrook en remt pas af als je daarop rijdt, niet op de doorgaande rijbaan.\n\nGebruik altijd je richtingaanwijzer, zowel bij invoegen als bij uitvoegen, zodat anderen weten wat je van plan bent.", "kernpunten": ["Invoegstrook: snelheid aanpassen en invoegen op een veilig gat", "Doorgaand verkeer hoeft niet voor jou te remmen", "Uitvoegstrook: tijdig erop gaan en daar pas afremmen", "Altijd richting aangeven bij in- en uitvoegen"], "bron": "RVV 1990 art. 43 (gedrag op autosnelweg/autoweg), art. 5 en art. 17-18 (snelheid/inhalen-context); CBR exameneisen rijbewijs B"}, {"kop": "Vluchtstrook en pechhaven", "tekst": "De vluchtstrook is de strook helemaal rechts op de autosnelweg. Die is er voor noodgevallen, bij pech of een ongeval. Normaal mag je er niet op rijden of stilstaan.\n\nKrijg je pech, stuur dan zo ver mogelijk naar rechts de vluchtstrook op, zet je alarmlichten aan en stap uit aan de veilige kant, meestal de rechterkant, achter de vangrail. Bel daarna voor hulp.\n\nSommige wegen hebben een pechhaven, een verbrede plek aan de kant van de weg waar je veiliger kunt stoppen bij pech. Is die er, gebruik die dan.", "kernpunten": ["Vluchtstrook is alleen voor noodgevallen, niet om op te rijden", "Bij pech: naar rechts, alarmlichten aan, veilig uitstappen achter de vangrail", "Bel daarna voor hulp", "Een pechhaven is een veilige stopplek bij pech"], "bron": "RVV 1990 art. 43 lid 3 (verbod gebruik vluchtstrook behalve noodgeval); CBR exameneisen rijbewijs B"}]}, {"hoofdstuk": 4, "titel": "Algemene verkeersregels", "secties": [{"kop": "Plaats op de weg: rechts houden", "tekst": "De basisregel in Nederland is dat je zo veel mogelijk rechts houdt. Op een gewone weg rijd je dus aan de rechterkant van de rijbaan.\n\nOp een autosnelweg of autoweg met meerdere rijstroken rijd je op de meest rechtse vrije rijstrook. De stroken links daarvan zijn om in te halen, en ben je klaar met inhalen, dan ga je weer naar rechts.\n\nDoor rechts te houden blijft het verkeer overzichtelijk en geef je sneller verkeer de ruimte om links in te halen.", "kernpunten": ["Basisregel: zo veel mogelijk rechts houden", "Op meerdere rijstroken: rijd op de meest rechtse vrije strook", "Linkerstroken zijn om in te halen", "Na inhalen weer netjes naar rechts"], "bron": "RVV 1990 art. 3 (rechts houden); CBR exameneisen rijbewijs B"}, {"kop": "In- en uitvoegen", "tekst": "Bij invoegen kom je vanaf een invoegstrook de doorgaande rijbaan op. Je past je snelheid aan, kijkt in je spiegels en over je schouder naar de dode hoek, geeft richting aan en voegt in op een veilig gat. De auto's op de doorgaande baan hoef je geen voorrang af te dwingen, maar in de praktijk pas jij je aan hun snelheid aan en dring je je niet op.\n\nBij uitvoegen verlaat je de doorgaande rijbaan via een uitvoegstrook. Geef op tijd richting aan en ga rustig naar de uitvoegstrook. Je remt pas af als je op de uitvoegstrook rijdt, niet op de doorgaande baan, zodat je het verkeer achter je niet verrast.\n\nKijk bij elke strookwisseling altijd even over je schouder naar de dode hoek.", "kernpunten": ["Invoegen: snelheid aanpassen, dode hoek checken, richting aangeven, veilig gat kiezen", "Uitvoegen: tijdig richting aangeven en naar de uitvoegstrook", "Afremmen pas op de uitvoegstrook, niet op de doorgaande baan", "Altijd over je schouder kijken bij strookwisseling"], "bron": "RVV 1990 art. 3 en art. 17-18 (rijstrook wisselen/inhalen-context); RVV 1990 art. 5 (geen gevaar/hinder); CBR exameneisen rijbewijs B"}, {"kop": "Ritsen", "tekst": "Ritsen doe je waar twee rijstroken samenkomen tot één, bijvoorbeeld bij een wegversmalling of een afgesloten rijstrook. Het werkt als de tanden van een ritssluiting: om en om voegt steeds één auto in.\n\nBij langzaam rijdend of stilstaand verkeer is ritsen verplicht, ook als er geen bord staat. Je rijdt dan op de wegvallende rijstrook door tot vlak bij het einde en voegt daar pas in. De bestuurders op de doorgaande strook laten om beurten één auto invoegen.\n\nRitsen voorkomt dat het verkeer vroeg op één rijstrook gaat samendringen, waardoor de doorstroming juist beter op gang blijft.", "kernpunten": ["Ritsen: om en om invoegen waar twee stroken samenkomen", "Bij langzaam of stilstaand verkeer is ritsen verplicht, ook zonder bord", "Rij door tot vlak bij het einde van de wegvallende strook", "Op de doorgaande strook: laat om beurten één auto invoegen"], "bron": "RVV 1990 art. 54 (invoegen/voorrang bij van rijstrook wisselen) en de ritsplicht bij filevorming; CBR exameneisen rijbewijs B 2026. NB: SCHEMA noemt 'art. 43'; de feitelijke ritsbepaling staat in art. 54 RVV 1990."}, {"kop": "Gebruik van claxon en lichtsignaal", "tekst": "De claxon en het knipperen met je grootlicht zijn er niet om je ongeduld te uiten. Je mag ze alleen gebruiken om dreigend gevaar af te wenden, dus om iemand te waarschuwen voor een gevaarlijke situatie.\n\nBinnen de bebouwde kom mag je 's nachts geen geluidssignaal geven, behalve om gevaar te voorkomen. Toeteren uit boosheid of om iemand te laten opschieten is dus niet toegestaan.\n\nGebruik je signalen kort en gericht. Een onnodig signaal kan andere weggebruikers juist laten schrikken.", "kernpunten": ["Claxon en lichtsignaal alleen om dreigend gevaar af te wenden", "Niet toeteren uit ongeduld of boosheid", "Binnen de bebouwde kom 's nachts geen geluidssignaal (behalve bij gevaar)", "Houd signalen kort en gericht"], "bron": "RVV 1990 art. 28 (geluids- en knippersignalen ter afwending van dreigend gevaar); CBR exameneisen rijbewijs B"}, {"kop": "Doelgroepstroken", "tekst": "Sommige rijstroken zijn gereserveerd voor een bepaalde groep weggebruikers. Die heten doelgroepstroken. Bekende voorbeelden zijn de busstrook, voor lijnbussen, en de fietsstrook, voor fietsers.\n\nOp het wegdek of met een bord staat aangegeven voor wie de strook bedoeld is, bijvoorbeeld het woord 'BUS'. Als gewone automobilist mag je zo'n strook niet gebruiken, tenzij een bord uitdrukkelijk een uitzondering maakt.\n\nLet goed op de markering en de borden, zodat je niet per ongeluk op een strook rijdt waar je niet hoort.", "kernpunten": ["Doelgroepstrook = rijstrook voor een specifieke groep (bus, fiets)", "Herkenbaar aan markering op het wegdek of een bord", "Auto's mogen er niet op, tenzij een bord het toestaat", "Let op markering en borden"], "bron": "RVV 1990 art. 1 (busstrook/fietsstrook) en art. 73 (gebruik busstrook); CBR exameneisen rijbewijs B"}, {"kop": "Bijzondere weggedeelten", "tekst": "Naast de gewone rijbaan kom je bijzondere weggedeelten tegen met hun eigen regels. Denk aan het erf, waar je maximaal 15 km/u mag en voetgangers overal lopen, de voetgangerszone, of een gebied met een geslotenverklaring voor bepaald verkeer.\n\nOok markeringen op de weg vragen aandacht. Een doorgetrokken streep mag je niet overschrijden, en blokmarkering, dus grote blokken, geeft de scheiding aan tussen een doorgaande strook en een in- of uitvoegstrook.\n\nLet bij elk bijzonder weggedeelte op de borden en markeringen die erbij horen. Die vertellen je precies wat er geldt en wie er voorrang heeft.", "kernpunten": ["Bijzondere weggedeelten hebben eigen regels (erf, voetgangerszone)", "Doorgetrokken streep: niet overschrijden", "Blokmarkering scheidt de doorgaande strook van in-/uitvoegstrook", "Volg altijd de bijbehorende borden en markeringen"], "bron": "RVV 1990 art. 76-77 (wegmarkeringen, doorgetrokken streep), art. 44-45 (erf); CBR exameneisen rijbewijs B"}]}, {"hoofdstuk": 5, "titel": "Snelheid en afstand", "secties": [{"kop": "Maximumsnelheden per wegtype", "tekst": "Elk wegtype in Nederland heeft een eigen standaardsnelheid. Die geldt ook als er nergens een bord staat. Een bord kan de snelheid verlagen, en op de snelweg soms verhogen.\n\nVoor een personenauto zijn de standaardlimieten zo: binnen de bebouwde kom rijd je 50 km/u, buiten de bebouwde kom 80 km/u, en op de autoweg 100 km/u. Op de autosnelweg geldt overdag tussen 06.00 en 19.00 uur 100 km/u, en 's nachts mag je op veel trajecten 130 km/u als een bord dat aangeeft. Daar gaat de volgende sectie dieper op in.\n\nDe bebouwde kom begint bij het blauwe plaatsnaambord en houdt op bij datzelfde bord met een rode streep erdoor. Binnen de kom kan een bord 30 km/u aangeven, bijvoorbeeld in een woonwijk.\n\nKijk goed naar het verschil tussen autoweg en autosnelweg. De autoweg herken je aan een bord met een witte auto op blauw, de autosnelweg aan een bord met een viaduct op blauw. Op de autoweg is de standaard 100. Op de autosnelweg hangt het af van het tijdstip en het bord: overdag 100, 's nachts tot 130.", "kernpunten": ["Bebouwde kom: 50 km/u", "Buiten de bebouwde kom: 80 km/u", "Autoweg: 100 km/u", "Autosnelweg: overdag 100 km/u, 's nachts tot 130, altijd per bord"], "bron": "RVV 1990 art. 20 (binnen bebouwde kom), art. 21 (buiten bebouwde kom, autoweg, autosnelweg), art. 22 RVV 1990"}, {"kop": "Snelheid op de autosnelweg overdag en 's nachts", "tekst": "Sinds 16 maart 2020 geldt overdag op vrijwel alle Nederlandse autosnelwegen maximaal 100 km/u, en wel tussen 06.00 en 19.00 uur. Deze regel wordt vaak getoetst, dus hou hem goed vast.\n\nBuiten die uren, tussen 19.00 en 06.00, mag je op veel trajecten harder, vaak 120 of 130 km/u. Wat er precies geldt lees je van het bord. Zie je een bord met 100 en daaronder een venster met 6-19 h, dan betekent dat 100 km/u tussen 06.00 en 19.00, en daarbuiten de hogere limiet van die weg.\n\nOp een enkel traject geldt de hele dag 130 km/u, en dat staat dan op het bord. Het bord langs de weg is altijd je zekerheid.\n\nDe vuistregel voor het examen is simpel: overdag 100, 's nachts tot 130, en altijd binnen wat het bord aangeeft.", "kernpunten": ["Op de meeste snelwegen: 100 km/u tussen 06.00-19.00 uur (sinds 16 maart 2020)", "'s Nachts (19.00-06.00) vaak 120 of 130 km/u", "Het bord is altijd leidend, ook bij een tijdvenster (bijv. 6-19 h)", "Vuistregel: overdag 100, 's nachts tot 130"], "bron": "Rijkswaterstaat, maximumsnelheid (sinds 16 maart 2020); RVV 1990 art. 21-22; snelheid altijd per bord (RVV 1990 art. 62, bord A)"}, {"kop": "Aangepaste snelheid: niet altijd zo hard als mag", "tekst": "De maximumsnelheid is een bovengrens, geen verplichting. Je past je snelheid aan aan wat er om je heen gebeurt: het weer, het zicht, de drukte en de staat van de weg.\n\nBij regen, mist, sneeuw of gladheid ga je langzamer rijden, ook al staat er een hoger bord. Hetzelfde geldt bij druk verkeer, bij een school, in een bocht of als je de weg niet goed kunt overzien.\n\nDe basisregel staat in de wet: je moet je voertuig kunnen stoppen binnen de afstand die je kunt overzien en die vrij is. Zie je door mist maar 30 meter ver, dan moet je binnen die 30 meter tot stilstand komen.\n\nTe hard rijden voor de situatie is gevaarlijk, ook als je netjes onder de limiet blijft. Je snelheid aanpassen hoort bij veilig rijden, net zo goed als remmen en sturen.", "kernpunten": ["De maximumsnelheid is een grens, geen doel", "Pas je snelheid aan bij slecht weer, slecht zicht of drukte", "Je moet kunnen stoppen binnen de afstand die je kunt overzien en die vrij is", "Te hard voor de situatie kan ook onder de limiet zijn"], "bron": "RVV 1990 art. 19 (stoppen binnen de te overziene en vrije afstand); WVW 1994 art. 5 (geen gevaar of hinder)"}, {"kop": "Volgafstand: de 2-secondenregel", "tekst": "Achter een ander voertuig hou je genoeg afstand om op tijd te kunnen stoppen. De vuistregel daarvoor is de 2-secondenregel.\n\nZo werkt het: je kiest een vast punt langs de weg, bijvoorbeeld een lantaarnpaal of een bord. Zodra je voorligger dat punt passeert, tel je 'eenentwintig, tweeentwintig'. Ben je zelf bij het punt voordat je klaar bent met tellen, dan zit je te dicht op je voorligger.\n\nBij slecht weer of slecht zicht, dus regen, mist of ijs, verdubbel je dit naar minstens 3 tot 4 seconden. Je remweg is dan langer, dus je hebt meer ruimte nodig.\n\nTe weinig afstand houden heet bumperkleven. Dat is gevaarlijk en strafbaar, omdat je bij plotseling remmen niet op tijd tot stilstand komt.", "kernpunten": ["Houd minimaal 2 seconden afstand tot je voorligger", "Tel vanaf een vast punt: 'eenentwintig, tweeentwintig'", "Bij slecht weer of zicht: 3 tot 4 seconden", "Te dicht volgen (bumperkleven) is gevaarlijk en strafbaar"], "bron": "CBR exameneisen rijbewijs B (2-secondenregel als praktijknorm); RVV 1990 art. 19 (voldoende afstand om te kunnen stoppen)"}, {"kop": "Reactieafstand, remafstand en stopafstand", "tekst": "De totale afstand die je nodig hebt om stil te staan, bestaat uit twee delen: de reactieafstand en de remafstand. Bij elkaar vormen ze de stopafstand.\n\nDe reactieafstand is de afstand die je aflegt vanaf het moment dat je een gevaar ziet tot het moment dat je echt op de rem trapt. In die tijd rij je gewoon door. Hoe sneller je rijdt, hoe groter deze afstand wordt.\n\nDe remafstand is de afstand vanaf het intrappen van de rem tot stilstand. En hier zit een addertje: die afstand neemt niet recht evenredig toe, maar veel sneller. Verdubbel je je snelheid, dan wordt de remafstand ongeveer vier keer zo lang.\n\nStopafstand is dus reactieafstand plus remafstand. Vermoeidheid, alcohol en afleiding maken vooral je reactieafstand langer. Een natte of gladde weg maakt je remafstand langer. Hoe hoger je snelheid en hoe slechter de omstandigheden, hoe meer ruimte je nodig hebt.", "kernpunten": ["Stopafstand = reactieafstand + remafstand", "Reactieafstand: de weg die je aflegt voordat je remt", "Remafstand: van remmen tot stilstand; groeit veel sneller dan de snelheid (dubbele snelheid ≈ 4x remweg)", "Vermoeidheid, alcohol en afleiding verlengen de reactieafstand; nat/glad wegdek verlengt de remafstand"], "bron": "CBR exameneisen rijbewijs B (stopafstand, reactie- en remafstand); natuurkundige verhouding remweg-snelheid (kwadratisch)"}, {"kop": "Snelheid met een aanhanger of caravan", "tekst": "Rijd je met een aanhanger of caravan achter je, dan gelden lagere maximumsnelheden. Je gespan is zwaarder en langer, waardoor remmen en sturen lastiger worden.\n\nMet een aanhanger of caravan mag je op de autosnelweg en de autoweg maximaal 90 km/u. Op andere wegen buiten de bebouwde kom is het 80 km/u, en binnen de bebouwde kom 50 km/u, tenzij een bord een lagere snelheid aangeeft.\n\nDoor het extra gewicht wordt je remweg langer. Hou daarom meer volgafstand dan je gewend bent. Bij hoge snelheid of wind kan een aanhanger gaan slingeren, en rustig en gelijkmatig rijden voorkomt dat.\n\nMet je gewone rijbewijs B mag je een aanhanger trekken tot bepaalde gewichtsgrenzen. Zit je daarboven, dan heb je rijbewijs BE of code 96 nodig.", "kernpunten": ["Met aanhanger of caravan: autosnelweg en autoweg 90 km/u", "Andere wegen buiten de bebouwde kom: 80 km/u; binnen de kom 50 km/u", "Langere remweg: houd extra volgafstand", "Boven bepaalde gewichten is rijbewijs BE of code 96 nodig"], "bron": "RVV 1990 art. 22 onder e (maximumsnelheid auto met aanhangwagen); CBR/RDW rijbewijscategorieen B, BE, code 96"}]}, {"hoofdstuk": 6, "titel": "Inhalen", "secties": [{"kop": "Wat is inhalen en hoe doe je het", "tekst": "Inhalen is het voorbijrijden van een voertuig dat dezelfde kant op rijdt als jij. De hoofdregel is helder: inhalen doe je links.\n\nVoordat je begint, kijk je goed. Eerst in je spiegels, dan over je schouder voor de dode hoek, en je geeft op tijd richting aan. Je haalt alleen in als de weg ver genoeg vrij en overzichtelijk is, en als je daarna vlot terug naar rechts kunt zonder degene die je inhaalt op te houden.\n\nNa het inhalen ga je weer netjes naar rechts, maar pas als je de ingehaalde volledig in je binnenspiegel ziet. Snijd nooit af.\n\nInhalen kost ruimte en tijd. Twijfel je of het past, doe het dan niet. Een inhaalmanoeuvre die je laat schieten is nooit een probleem, een mislukte wel.", "kernpunten": ["Inhalen gebeurt links", "Kijk in spiegels en dode hoek, geef op tijd richting aan", "Haal alleen in als de weg vrij en overzichtelijk is", "Ga pas terug naar rechts als je de ingehaalde in je spiegel ziet"], "bron": "RVV 1990 art. 11 lid 1 (inhalen geschiedt links)"}, {"kop": "Waar je niet mag inhalen", "tekst": "Op sommige plekken is inhalen verboden of gewoon onverstandig, omdat je het tegemoetkomende verkeer of het overzicht niet kunt vertrouwen.\n\nJe mag niet over een doorgetrokken streep heen rijden om in te halen. Die streep mag je niet overschrijden. Een onderbroken streep mag je wel overschrijden, zolang het veilig kan.\n\nVlak voor of op een voetgangersoversteekplaats haal je niet in. Voetgangers kunnen daar plotseling oversteken en achter het ingehaalde voertuig vandaan komen.\n\nVerder haal je niet in bij onoverzichtelijke situaties: in een bocht, vlak voor de top van een heuvel, bij een kruispunt, of als je niet ver genoeg vooruit kunt kijken. Staat er een bord inhaalverbod, een rode auto naast een zwarte auto, dan is inhalen ronduit verboden.", "kernpunten": ["Niet inhalen over een doorgetrokken streep", "Niet inhalen vlak voor of op een voetgangersoversteekplaats", "Niet inhalen in bochten, bij heuveltoppen of onoverzichtelijke plekken", "Een inhaalverbodsbord (C13/borden) maakt het expliciet verboden"], "bron": "RVV 1990 art. 12 (verbod inhalen voor/op voetgangersoversteekplaats); RVV 1990 art. 76-77 (doorgetrokken en onderbroken strepen); RVV 1990 bijlage 1, bord F1/F3 (inhaalverbod)"}, {"kop": "Rechts inhalen: verboden, met uitzonderingen", "tekst": "De hoofdregel is dat je links inhaalt. Rechts inhalen mag dus in principe niet. Toch zijn er een paar duidelijke uitzonderingen waarin het wel mag.\n\nJe mag rechts inhalen als de bestuurder voor je links heeft voorgesorteerd en met zijn richtingaanwijzer aangeeft dat hij linksaf gaat of een weg op draait. Je passeert hem dan rechts.\n\nEen tram mag je rechts inhalen, omdat een tram meestal in het midden van de weg rijdt.\n\nStaan er rijstroken die in een file langzaam rijden, dan mag het verkeer rechts sneller gaan dan links. Dat telt formeel niet als verboden inhalen. Sta je in de file en gaat jouw strook sneller, dan hoef je niet te wachten.\n\nOok bij een blokmarkering mag de bestuurder rechts daarvan de bestuurder links daarvan rechts passeren.", "kernpunten": ["Rechts inhalen is in principe verboden", "Wel toegestaan: voorligger sorteert links voor om af te slaan", "Een tram mag je rechts inhalen", "In een file mag een rechterstrook sneller rijden dan links"], "bron": "RVV 1990 art. 11 lid 2 (uitzonderingen: links voorgesorteerd, tram, blokmarkering); RVV 1990 art. 13 (filerijden: rechts sneller toegestaan)"}, {"kop": "Inhalen van langere en langzame voertuigen", "tekst": "Vrachtwagens, bussen en tractoren zijn lang en rijden vaak langzamer. Ze inhalen kost je meer tijd en afstand dan het inhalen van een personenauto.\n\nSchat dus goed in hoeveel weg je nodig hebt. Achter een lang voertuig zie je bovendien minder van de weg vooruit. Hou daarom eerst wat extra afstand, zodat je beter langs het voertuig heen kunt kijken voordat je begint.\n\nLandbouwvoertuigen mogen niet op de autosnelweg en de autoweg komen. Je komt ze dus vooral tegen op gewone wegen buiten de bebouwde kom. Ze kunnen plotseling een erf of veld opdraaien, dus let op hun richtingaanwijzers en op hun soms behoorlijke breedte.\n\nBegin nooit aan het inhalen van een lang voertuig als je twijfelt of je het op tijd en veilig afrondt.", "kernpunten": ["Lange voertuigen inhalen kost meer weg en tijd", "Houd extra afstand zodat je beter vooruit kunt kijken", "Landbouwverkeer mag niet op de autoweg/autosnelweg", "Let op brede afmetingen en plotseling afslaan naar een erf of veld"], "bron": "CBR exameneisen rijbewijs B (inhalen langere/langzame voertuigen, afstand inschatten); RVV 1990 art. 11 (inhalen); RVV 1990 art. 43 (verbod landbouwverkeer op autosnelweg/autoweg)"}]}, {"hoofdstuk": 7, "titel": "Voorrang en voor laten gaan", "secties": [{"kop": "Verschil tussen voorrang verlenen en voor laten gaan", "tekst": "Deze twee begrippen lijken op elkaar, maar ze betekenen niet hetzelfde. En precies daar zit een vaste examenval.\n\nVoorrang verlenen betekent: een andere bestuurder ongehinderd zijn weg laten vervolgen. Je laat hem gaan zonder dat hij hoeft te remmen of van richting te veranderen. Voorrang gaat altijd over bestuurders, dus auto's, fietsers en bromfietsers.\n\nVoor laten gaan gebruik je bij voetgangers. Staat er iemand bij een voetgangersoversteekplaats, dan laat je die voorgaan. Dat geldt ook voor iemand in een gehandicaptenvoertuig.\n\nVoor jou komt het in beide gevallen op hetzelfde neer: jij wacht. Maar de juiste term kan in een examenvraag het verschil maken tussen goed en fout.", "kernpunten": ["Voorrang verlenen: een bestuurder ongehinderd door laten gaan", "Voor laten gaan: geldt voor voetgangers (en gehandicaptenvoertuigen)", "Bestuurders verleen je voorrang, voetgangers laat je voorgaan", "In beide gevallen wacht jij"], "bron": "RVV 1990 art. 1 (begripsbepaling voorrang verlenen); RVV 1990 art. 49 (voetgangers op oversteekplaats voor laten gaan)"}, {"kop": "Gelijkwaardig kruispunt: rechts gaat voor", "tekst": "Een gelijkwaardig kruispunt is een kruispunt zonder voorrangsborden, zonder haaientanden en zonder werkende verkeerslichten. De wegen zijn dan gelijk in rang.\n\nOp zo'n kruispunt geldt de rechtsregel: je verleent voorrang aan bestuurders die van rechts komen. Komt er iemand van rechts, dan laat jij hem gaan.\n\nDit geldt voor alle bestuurders, dus ook voor fietsers en bromfietsers van rechts. Een fietser die van rechts komt heeft op een gelijkwaardig kruispunt net zo goed voorrang.\n\nLet op een veelgemaakte fout: ook als de weg rechts smaller of minder belangrijk lijkt, gaat rechts voor, zolang het kruispunt gelijkwaardig is. Alleen borden, haaientanden of verkeerslichten veranderen daar iets aan.", "kernpunten": ["Gelijkwaardig kruispunt: geen borden, geen haaientanden, geen werkend verkeerslicht", "Rechtsregel: verkeer van rechts heeft voorrang", "Geldt ook voor fietsers en bromfietsers van rechts", "Een smallere weg rechts maakt het kruispunt niet ongelijkwaardig"], "bron": "RVV 1990 art. 15 lid 1 (op kruispunten verlenen bestuurders voorrang aan voor hen van rechts komende bestuurders)"}, {"kop": "Voorrangsweg, voorrangsborden en haaientanden", "tekst": "Een kruispunt kan met borden en wegmarkering ongelijkwaardig zijn gemaakt. Dan geldt niet de rechtsregel, maar wat de borden aangeven.\n\nDe belangrijkste voorrangsborden zijn deze. Een gele ruit betekent voorrangsweg, dus jij hebt voorrang op deze weg. Dezelfde ruit met een zwarte streep erdoor betekent einde voorrangsweg. Een omgekeerde driehoek betekent: verleen voorrang aan al het verkeer op de kruisende weg. En een STOP-bord, achthoekig, betekent dat je volledig moet stilstaan en daarna voorrang verlenen.\n\nHaaientanden zijn witte driehoeken op het wegdek met de punt naar jou toe. Ze betekenen: verleen voorrang aan het verkeer op de kruisende weg. Vaak staan ze samen met de omgekeerde driehoek.\n\nZie je een gele ruit op jouw weg, dan ben jij de voorrangsweg en hoef je niet te wachten, tenzij borden of een verkeersregelaar iets anders aangeven.", "kernpunten": ["Gele ruit = voorrangsweg (jij hebt voorrang)", "Omgekeerde driehoek = verleen voorrang aan kruisend verkeer", "STOP-bord = volledig stilstaan en dan voorrang verlenen", "Haaientanden (punt naar jou) = voorrang verlenen aan de kruisende weg"], "bron": "RVV 1990 bijlage 1, borden B1-B7 (voorrang, o.a. B1 voorrangsweg, B6 verleen voorrang, B7 stop); RVV 1990 art. 80 (haaientanden: voorrang verlenen aan bestuurders op de kruisende weg)"}, {"kop": "Voorrangsvoertuigen: ambulance, politie, brandweer", "tekst": "Een voorrangsvoertuig is een voertuig dat zowel een blauw zwaailicht als een sirene voert, dus een tweetonige hoorn. Dat zijn meestal politie, brandweer en ambulance op een spoedrit.\n\nVoor zo'n voertuig moet je altijd ruimte maken en het voor laten gaan, ongeacht wie er normaal voorrang heeft. Ga rustig naar rechts, rem gecontroleerd en blokkeer geen kruispunt.\n\nLet op: alleen een zwaailicht zonder sirene maakt het nog geen voorrangsvoertuig, denk aan een wegsleepauto of een langzaam werkvoertuig. Dan hoef je geen voorrang te verlenen, maar je houdt er wel rekening mee.\n\nRaak niet in paniek. Kijk waar het voertuig vandaan komt en waar het heen wil, en maak op een veilige manier ruimte. Sta je voor rood, dan mag je niet zomaar door rood rijden om plaats te maken. Doe dat alleen als het veilig kan en je geen gevaar veroorzaakt.", "kernpunten": ["Voorrangsvoertuig = blauw zwaailicht EN sirene samen", "Altijd ruimte maken en voor laten gaan", "Alleen zwaailicht (zonder sirene) is geen voorrangsvoertuig", "Maak veilig plaats; rijd niet onnodig gevaarlijk door rood"], "bron": "RVV 1990 art. 1 (begrip voorrangsvoertuig: blauw zwaailicht en tweetonige hoorn); RVV 1990 art. 50 (weggebruikers verlenen voorrang aan bestuurders van een voorrangsvoertuig)"}, {"kop": "Tram heeft bijna altijd voorrang", "tekst": "De tram is een bijzonder geval. In de meeste situaties moet je een tram voor laten gaan, ook als jij volgens de rechtsregel of de borden eigenlijk voorrang zou hebben.\n\nDe reden is praktisch: een tram rijdt op rails en kan niet uitwijken, en zijn remweg is lang. Daarom geldt dat bestuurders een tram voor laten gaan als dat nodig is.\n\nEr zijn een paar uitzonderingen, bijvoorbeeld als een verkeersbord of verkeerslicht speciaal voor de tram iets anders aangeeft. Maar als vuistregel voor het examen: bij twijfel laat je de tram gaan.\n\nLet ook op trams bij haltes en op kruisende rails. Steek nooit vlak voor een naderende tram over.", "kernpunten": ["Vuistregel: laat de tram voorgaan", "Een tram kan niet uitwijken en heeft een lange remweg", "Geldt vaak ook als jij volgens rechts of bord voorrang zou hebben", "Steek nooit vlak voor een naderende tram over"], "bron": "RVV 1990 art. 15a (bestuurders laten een tram voorgaan als dat nodig is voor een veilige doorgang)"}, {"kop": "Afslaan ten opzichte van tegenliggers", "tekst": "Bij het afslaan op een kruispunt kom je soms dicht in de buurt van het tegemoetkomende verkeer. Daar geldt een vaste regel voor.\n\nWil je linksaf, dan moet je het tegemoetkomende verkeer dat rechtdoor gaat of rechtsaf slaat, voor laten gaan. Jij kruist namelijk hun rijbaan, zij die van jou niet.\n\nWil je rechtsaf, dan blijf je aan jouw kant van de weg en hoef je tegenliggers niet voor te laten gaan. Wel let je op fietsers en voetgangers die rechtdoor gaan, want die kunnen rechts naast je rijden of oversteken.\n\nGeef bij elk afslaan op tijd richting aan, kijk in je spiegels en controleer de dode hoek, vooral op fietsers en bromfietsers naast je.", "kernpunten": ["Linksaf: tegenliggers (rechtdoor of rechtsaf) voor laten gaan", "Rechtsaf: je blijft aan je eigen kant, tegenliggers hoef je niet voor te laten gaan", "Let bij afslaan altijd op fietsers en bromfietsers (dode hoek)", "Geef op tijd richting aan"], "bron": "RVV 1990 art. 18 (bij afslaan voorrang/voor laten gaan van tegemoetkomend verkeer en bestuurders die zich aan de zijkant bevinden)"}, {"kop": "Lijnbus die wegrijdt uit een halte", "tekst": "Binnen de bebouwde kom heeft een lijnbus die uit een halte wil wegrijden een bijzondere positie.\n\nGeeft de buschauffeur met zijn richtingaanwijzer aan dat hij de halte wil verlaten, dan moet je hem de gelegenheid geven om weg te rijden. Je laat de bus dus voorgaan, ook al naderde jij eerder.\n\nDeze regel geldt alleen binnen de bebouwde kom. Buiten de bebouwde kom geldt deze plicht niet, want daar voert de bus een gewone manoeuvre uit en gelden de normale regels.\n\nWees alert bij bushaltes: rem op tijd af, hou afstand en geef de bus ruimte zodra je zijn richtingaanwijzer ziet knipperen.", "kernpunten": ["Binnen de bebouwde kom: laat een lijnbus uit de halte wegrijden", "Voorwaarde: de buschauffeur geeft richting aan", "Buiten de bebouwde kom geldt deze plicht NIET", "Let bij haltes op de richtingaanwijzer van de bus"], "bron": "RVV 1990 art. 56 (binnen de bebouwde kom gelegenheid geven aan een autobus om van een halte weg te rijden bij gegeven richtingaanwijzer). LET OP: de opdracht noemde art. 54a; de actuele bron plaatst deze regel in art. 56 RVV 1990."}]}, {"hoofdstuk": 8, "titel": "Kruispunten en verkeerslichten", "secties": [{"kop": "Verkeerslichten: rood, geel en groen", "tekst": "Een driekleurig verkeerslicht regelt wie er mag rijden. Wat de kleuren betekenen, staat in de wet.\n\nGroen betekent: doorgaan. Geel betekent: stoppen. Alleen als je het licht al zo dicht genaderd bent dat veilig stoppen redelijkerwijs niet meer kan, mag je doorrijden. Geel is dus geen sein om er nog snel doorheen te schieten.\n\nRood betekent: stoppen. Je stopt voor de stopstreep. Door rood rijden is een ernstige overtreding en een veelvoorkomende oorzaak van zware ongevallen op kruispunten.\n\nLet ook op de volgorde: een verkeerslicht springt van groen naar geel naar rood. Brandt groen al een tijd, hou er dan rekening mee dat het zo op geel kan springen.", "kernpunten": ["Groen: doorgaan", "Geel: stoppen, tenzij stoppen redelijkerwijs niet meer veilig kan", "Rood: stoppen voor de stopstreep", "Geel is geen sein om te versnellen"], "bron": "RVV 1990 art. 68 lid 1 (groen: doorgaan; geel: stop, tenzij stoppen redelijkerwijs niet meer mogelijk; rood: stop)"}, {"kop": "Pijlverkeerslichten en aparte lichten", "tekst": "Naast de gewone ronde lichten bestaan er verkeerslichten met een pijl. Die gelden alleen voor de richting waar de pijl heen wijst.\n\nEen groene pijl naar links betekent dat je naar links mag, en dat het kruisende verkeer voor die richting stilstaat. Een rode pijl betekent dat je voor die richting moet stoppen, ook al is een ander licht groen.\n\nEr zijn ook aparte verkeerslichten voor fietsers, vaak met een fietssymbool, voor voetgangers met een rood of groen poppetje, en voor het openbaar vervoer. Hou alleen het licht aan dat voor jou als automobilist geldt.\n\nKnipperend geel betekent dat het licht niet meer als regelaar werkt. Dan pas je zelf de normale voorrangsregels en borden toe. Wees op zo'n moment extra voorzichtig.", "kernpunten": ["Pijllicht geldt alleen voor de aangegeven richting", "Groene pijl: die richting mag, kruisend verkeer staat stil", "Aparte lichten bestaan voor fietsers, voetgangers en OV", "Knipperend geel: licht buiten werking, pas zelf de gewone regels en borden toe"], "bron": "RVV 1990 art. 68 (driekleurige verkeerslichten en pijlen); RVV 1990 art. 69-72 (aparte lichten voor o.a. fietsers en voetgangers); RVV 1990 art. 73 (knipperend geel)"}, {"kop": "De rotonde", "tekst": "Een rotonde is een rond kruispunt waar het verkeer in een kring rijdt, in Nederland tegen de klok in. Rotondes verlagen de snelheid en zorgen voor minder ernstige ongevallen.\n\nBij de meeste rotondes heeft het verkeer dat al op de rotonde rijdt voorrang. Dat zie je aan de haaientanden en het bord 'verleen voorrang' bij de oprit. Voordat je de rotonde op gaat, verleen je dus voorrang aan iedereen die al rondrijdt.\n\nGeef richting aan als je de rotonde verlaat, zodat anderen weten dat je eraf gaat. Bij een rotonde met meerdere stroken kies je op tijd de juiste strook.\n\nLet bijzonder op fietsers op de rotonde of op een fietspad eromheen. Afhankelijk van hoe de rotonde is ingericht kunnen zij voorrang hebben, dus kijk goed naar de haaientanden en borden ter plaatse.", "kernpunten": ["Op een rotonde rijd je tegen de klok in", "Meestal heeft verkeer op de rotonde voorrang (haaientanden + bord bij oprit)", "Geef richting aan bij het verlaten van de rotonde", "Let goed op fietsers; hun voorrang hangt af van de inrichting en borden"], "bron": "RVV 1990 art. 80 (haaientanden); RVV 1990 bijlage 1, bord D1 (verplichte rijrichting rotonde) en B6 (verleen voorrang); voorrang op rotonde volgt uit de plaatselijke borden en markering"}, {"kop": "Verkeersregelaar en agent gaan boven alles", "tekst": "Soms regelt een mens het verkeer in plaats van een licht of een bord: een politieagent of een bevoegde verkeersregelaar, bijvoorbeeld bij een ongeluk, een evenement of wegwerkzaamheden.\n\nHun aanwijzingen gaan boven de verkeerstekens en boven de gewone verkeersregels. Geeft een agent je een stopteken terwijl het licht groen is, dan stop je. Wuift hij je door terwijl het rood is, dan rijd je voorzichtig door.\n\nDe rangorde is zo: aanwijzingen van een bevoegd persoon staan bovenaan, daarna komen de verkeerslichten, dan de verkeerstekens zoals borden en strepen, en als laatste de gewone verkeersregels.\n\nLet op de gebaren. Een opgeheven arm betekent stop voor iedereen, en een arm zijwaarts uitgestrekt betekent stop voor het verkeer dat erop af komt. Volg altijd wat de regelaar aangeeft.", "kernpunten": ["Aanwijzingen van agent of verkeersregelaar gaan boven licht en borden", "Rangorde: persoon > verkeerslicht > verkeerstekens > verkeersregels", "Stopteken van een agent volg je, ook bij groen licht", "Let op de gebaren (opgeheven arm = stop)"], "bron": "RVV 1990 art. 84 (rangorde: aanwijzingen gaan boven verkeerstekens en verkeersregels); RVV 1990 art. 82 (plicht aanwijzingen van bevoegd persoon op te volgen); RVV 1990 art. 83 (gebaren/tekens verkeersregelaar)"}]}, {"hoofdstuk": 9, "titel": "Stilstaan en parkeren", "secties": [{"kop": "Het verschil tussen stilstaan en parkeren", "tekst": "Stilstaan en parkeren lijken op elkaar, maar de wet trekt er een duidelijke streep tussen. Parkeren is je voertuig laten staan, behalve als je iemand onmiddellijk laat in- of uitstappen of als je onmiddellijk goederen laadt of lost. Sta je dus stil om iemand te laten uitstappen of om snel een paar tassen in te laden, dan parkeer je niet.\n\nStilstaan zijn alle andere gevallen waarin je voertuig niet rijdt, maar je ook niet parkeert. Wachten voor een rood licht bijvoorbeeld, of even stoppen om iemand te laten instappen.\n\nWaarom telt dat verschil? Omdat er plekken zijn waar je wel mag stilstaan, maar niet mag parkeren, en andersom plekken waar zelfs stilstaan verboden is. Voor het examen moet je weten welk verbod waar geldt.", "kernpunten": ["Parkeren = laten staan, behalve direct in-/uitstappen of laden/lossen", "Stilstaan = niet rijden en ook niet parkeren", "Een parkeerverbod betekent niet automatisch een stopverbod"], "bron": "RVV 1990 art. 1 (begripsbepalingen 'parkeren')"}, {"kop": "Waar je niet mag stilstaan (stopverbod)", "tekst": "Op sommige plekken mag je je voertuig helemaal niet laten stilstaan. Dat geldt onder andere op een kruispunt of overweg, op een fietspad of op de rijbaan langs een fietspad, en op een voetgangersoversteekplaats of binnen vijf meter daarvoor.\n\nOok in een tunnel mag je niet stilstaan, en niet bij een bushalte ter hoogte van de markering. Is er geen markering, dan geldt een afstand van twaalf meter aan weerszijden van het bord.\n\nEen duidelijk teken is de gele doorgetrokken streep langs de kant van de weg of op de stoeprand. Daar geldt een stopverbod, dus je mag er niet stilstaan en niet parkeren.", "kernpunten": ["Niet stilstaan: kruispunt, overweg, fietspad, voetgangersoversteekplaats en 5 m ervoor, tunnel", "Gele doorgetrokken streep = stopverbod (niet stilstaan, niet parkeren)", "Bushalte: niet stilstaan bij de markering, of binnen 12 m van het bord"], "bron": "RVV 1990 art. 23 lid 1; art. 24 lid 1 onder f (gele doorgetrokken streep = stopverbod)"}, {"kop": "Waar je niet mag parkeren (parkeerverbod)", "tekst": "Bij een parkeerverbod mag je nog wel even kort stilstaan om iemand te laten in- of uitstappen of om te laden en lossen, maar je voertuig laten staan mag niet.\n\nJe mag niet parkeren bij een kruispunt op een afstand van minder dan vijf meter daarvan. Ook niet voor een inrit of uitrit, en niet op een plek waar je het verkeer hindert of in gevaar brengt.\n\nDe gele onderbroken streep langs de kant van de weg betekent parkeerverbod. Stilstaan om iemand te laten in- of uitstappen mag daar dus nog, parkeren niet.", "kernpunten": ["Niet parkeren binnen 5 meter van een kruispunt", "Niet parkeren voor een in- of uitrit", "Gele onderbroken streep = parkeerverbod (stilstaan mag, parkeren niet)"], "bron": "RVV 1990 art. 24 lid 1 onder a (5 m kruising), onder e (in-/uitrit); art. 24 lid 1 onder e (gele onderbroken streep = parkeerverbod)"}, {"kop": "Parkeerschijf en blauwe zone", "tekst": "In een parkeerschijfzone, de blauwe zone, mag je alleen parkeren op plekken met een blauwe streep of een aangeduid parkeervak. Je moet dan een duidelijk zichtbare parkeerschijf gebruiken.\n\nOp de parkeerschijf zet je het tijdstip waarop je begon met parkeren. Dat rond je naar boven af op het eerstvolgende hele of halve uur. Hoe lang je mag blijven staan, lees je op het bord van de blauwe zone.\n\nGebruik je geen parkeerschijf of staat hij verkeerd ingesteld, dan ben je in overtreding.", "kernpunten": ["Blauwe zone: alleen parkeren met zichtbare parkeerschijf", "Zet de begintijd erop, naar boven afgerond op heel/half uur", "Maximale parkeertijd staat op het bord"], "bron": "RVV 1990 art. 25"}, {"kop": "Gehandicaptenparkeerplaats", "tekst": "Een gehandicaptenparkeerplaats herken je aan bord E6: een blauw bord met een witte P en een rolstoelsymbool. Op zo'n plek mag je alleen parkeren als je een geldige gehandicaptenparkeerkaart duidelijk zichtbaar achter de voorruit hebt liggen.\n\nHeb je die kaart niet, dan mag je er niet parkeren, ook niet heel even. Sta je er onterecht, dan kost dat een stevige boete.\n\nStaat er een kenteken op het bord, dan is de plek gereserveerd voor één bepaald voertuig.", "kernpunten": ["Bord E6 = gehandicaptenparkeerplaats", "Parkeren alleen met geldige, zichtbare gehandicaptenparkeerkaart", "Kenteken op het bord = gereserveerd voor dat ene voertuig"], "bron": "RVV 1990 bijlage 1, bord E6; RVV 1990 art. 26 (gebruik gehandicaptenparkeerplaats)"}, {"kop": "Parkeerzones en parkeerborden", "tekst": "Een parkeerverbodszone, bord E1 met 'zone', geldt voor een heel gebied en niet voor één straat. Vanaf het bord tot het bord met 'einde zone' mag je nergens parkeren, behalve in de vakken die daarvoor zijn aangegeven.\n\nLet ook op de borden E1 (parkeerverbod) en E2 (verbod stil te staan). E1 verbiedt alleen parkeren, E2 verbiedt zowel stilstaan als parkeren.\n\nBord E4 wijst je juist op een parkeergelegenheid: hier mag je wel parkeren. Soms staat er een onderbord met voorwaarden, bijvoorbeeld een maximale tijd of alleen voor vergunninghouders.", "kernpunten": ["Zonebord geldt voor een heel gebied tot 'einde zone'", "E1 = parkeerverbod; E2 = verbod stil te staan (strenger)", "E4 = parkeergelegenheid; let op onderborden met voorwaarden"], "bron": "RVV 1990 bijlage 1, borden E1, E2, E4; art. 24 en art. 23"}]}, {"hoofdstuk": 10, "titel": "Bijzondere weggebruikers", "secties": [{"kop": "Voetgangers en de oversteekplaats", "tekst": "Voetgangers zijn kwetsbaar. Ze hebben geen bescherming om zich heen en zijn soms slecht te zien. Als bestuurder let je daarom extra op hen, en zeker bij oversteekplaatsen.\n\nVoetgangers en bestuurders van een gehandicaptenvoertuig die op een voetgangersoversteekplaats, het zebrapad, oversteken of duidelijk op het punt staan dat te doen, moet je voor laten gaan. Je stopt dus en wacht tot ze veilig over zijn.\n\nPas op, want 'voor laten gaan' is iets anders dan 'voorrang'. Voorrang gaat over bestuurders onderling op een kruising. Voetgangers op een zebrapad laat je altijd voorgaan, van welke kant ze ook komen.", "kernpunten": ["Voetgangers op een zebrapad: voor laten gaan (art. 49)", "Geldt ook voor wie duidelijk op het punt staat over te steken", "Gehandicaptenvoertuigen op de oversteekplaats: ook voor laten gaan"], "bron": "RVV 1990 art. 49 lid 2"}, {"kop": "Blinden en mensen die zich moeilijk voortbewegen", "tekst": "Sommige weggebruikers verdienen extra bescherming. Een blinde met een witte stok met één of meer rode ringen moet je altijd voor laten gaan, ook buiten een oversteekplaats.\n\nHetzelfde geldt voor mensen die zich moeilijk voortbewegen, denk aan ouderen met een rollator of mensen die slecht ter been zijn. Geef hun de tijd en de ruimte om veilig over te steken.\n\nDeze regel draait vooral om oplettendheid: je moet deze mensen op tijd zien aankomen en je snelheid aanpassen.", "kernpunten": ["Blinde met witte stok (rode ringen): altijd voor laten gaan", "Ook mensen die zich moeilijk voortbewegen voor laten gaan", "Geldt ook buiten een officiële oversteekplaats"], "bron": "RVV 1990 art. 49 lid 1"}, {"kop": "Fietsers, snorfietsers en bromfietsers", "tekst": "Fietsers en snorfietsers rijden meestal op het fietspad, bromfietsers vaak op het fiets-/bromfietspad of op de rijbaan. Binnen de bebouwde kom rijdt een bromfietser in principe op de rijbaan, buiten de bebouwde kom op het fiets-/bromfietspad.\n\nEen snorfiets mag niet harder dan 25 km/h. Een bromfiets mag op de rijbaan maximaal 45 km/h. Op zowel de brom- als de snorfiets is een helm verplicht, en voor de snorfiets geldt dat sinds 1 januari 2023.\n\nAchter het stuur van een auto houd je rekening met hun lagere snelheid en hun kwetsbaarheid. Houd genoeg afstand als je inhaalt.", "kernpunten": ["Snorfiets: max 25 km/h, meestal op het fietspad", "Bromfiets: binnen kom op de rijbaan, buiten kom op fiets-/bromfietspad", "Helm verplicht op brom- en snorfiets (snorfiets sinds 1-1-2023)"], "bron": "RVV 1990 art. 5, art. 6; borden G11, G12a; helmplicht snorfiets per 1-1-2023 (RVV 1990 art. 60, Helmen)"}, {"kop": "Gehandicaptenvoertuigen, landbouwverkeer en ruiters", "tekst": "Een gehandicaptenvoertuig, zoals een scootmobiel, mag op het trottoir, het fietspad of de rijbaan rijden, afhankelijk van de snelheid. Houd er rekening mee dat deze voertuigen langzaam zijn.\n\nLandbouwverkeer, zoals tractoren, rijdt langzaam en is breed. Buiten de bebouwde kom kun je het op de rijbaan tegenkomen. Haal alleen in als je goed zicht hebt en genoeg ruimte.\n\nRuiters te paard zijn ook weggebruikers. Een paard kan schrikken, dus rij rustig, houd afstand en vermijd hard claxonneren of plotseling gas geven als je een paard nadert.", "kernpunten": ["Gehandicaptenvoertuigen zijn langzaam; geef ruimte", "Landbouwverkeer is breed en traag; inhalen alleen met goed zicht", "Rijd rustig en kalm langs paarden; ze kunnen schrikken"], "bron": "RVV 1990 art. 1 (gehandicaptenvoertuig), art. 87 (ontheffingen); algemene zorgvuldigheidsplicht WVW 1994 art. 5"}, {"kop": "Kinderen en ouderen", "tekst": "Kinderen gedragen zich onvoorspelbaar in het verkeer. Ze rennen zo de straat op achter een bal aan en overzien gevaar nog niet goed. Bij een school, een speelplaats of een woonwijk haal je je snelheid eraf en ben je extra alert.\n\nOuderen reageren vaak trager en hebben meer tijd nodig om over te steken. Geef hun die tijd en wees geduldig.\n\nWaar het op neerkomt: je past je snelheid en je oplettendheid aan op de mensen die je verwacht. Bij een speelplaats of school is de kans op onverwacht gedrag groter.", "kernpunten": ["Kinderen zijn onvoorspelbaar; mind je snelheid bij school en speelplaats", "Ouderen hebben meer tijd nodig; wees geduldig", "Anticipeer op onverwacht gedrag van kwetsbare weggebruikers"], "bron": "WVW 1994 art. 5 (gevaar of hinder voorkomen); CBR exameneisen rijbewijs B (gevaarherkenning)"}, {"kop": "Motorrijders en de blinde hoek", "tekst": "Motorrijders zijn smal en daardoor makkelijk over het hoofd te zien, zeker als je afslaat of van rijstrook wisselt. Kijk daarom altijd extra goed en gebruik je spiegels én een schouderblik.\n\nDe blinde hoek, ook wel dode hoek, is het gebied naast en schuin achter je auto dat je niet in je spiegels ziet. Juist motorrijders en fietsers kunnen zich daar bevinden.\n\nBij vrachtwagens is de blinde hoek nog groter, vooral rechtsvoor. Als automobilist en zeker als fietser moet je beseffen dat een vrachtwagenchauffeur jou bij het rechts afslaan misschien niet ziet. Blijf uit die blinde hoek.", "kernpunten": ["Motorrijders zijn smal; kijk extra goed bij afslaan en wisselen van strook", "Blinde hoek = naast en schuin achter je, niet in de spiegel zichtbaar", "Schouderblik geven naast spiegelgebruik"], "bron": "RVV 1990 art. 17, art. 18 (afslaan, ander weggedeelte oprijden); WVW 1994 art. 5; CBR exameneisen rijbewijs B (blinde hoek)"}]}, {"hoofdstuk": 11, "titel": "Bijzondere verkeerssituaties", "secties": [{"kop": "Spoorwegovergang", "tekst": "Bij een spoorwegovergang, ook wel overweg, heeft de trein altijd voorrang. Een bewaakte overweg heeft bomen, de slagbomen, en rode knipperlichten, soms met een bel erbij. Een onbewaakte overweg heeft die niet, dus daar moet je zelf go
