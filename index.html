< 50 m); WVW 1994 art. 5"}, {"kop": "De tram", "tekst": "Een tram is een bijzonder voertuig dat over rails rijdt en niet kan uitwijken. Daarom heeft een tram vaak voorrang.\n\nOp een gelijkwaardig kruispunt gaat een tram vóór: ook als je van rechts komt, moet je een tram voor laten gaan. Een tram kan niet remmen zoals een auto en heeft een lange remweg.\n\nLet ook op trampassagiers die in- en uitstappen. Staat er een tram of bus stil bij een halte en stappen er mensen uit, dan houd je daar rekening mee en geef je hun de ruimte.", "kernpunten": ["Tram rijdt op rails en kan niet uitwijken; lange remweg", "Op een gelijkwaardig kruispunt gaat de tram voor, ook van links", "Let op in- en uitstappende passagiers bij haltes"], "bron": "RVV 1990 art. 15 lid 2 (tram voor laten gaan op gelijkwaardig kruispunt)"}]}, {"hoofdstuk": 12, "titel": "Manoeuvres en bijzondere verrichtingen", "secties": [{"kop": "Wegrijden", "tekst": "Wegrijden is een bijzondere manoeuvre: je gaat van stilstaan naar rijden en mengt je tussen het verkeer dat al rijdt. Daarbij heb jij geen voorrang. Het bestaande verkeer mag gewoon doorrijden; jij moet wachten tot het veilig kan.\n\nVoor je wegrijdt kijk je in je binnenspiegel, je buitenspiegel en over je schouder in de dode hoek. Geef altijd richting aan, zodat anderen zien wat je van plan bent.\n\nLet vooral op fietsers en bromfietsers die je rechts kunnen inhalen. Die zie je makkelijk over het hoofd. Pas als de weg vrij is en je niemand hindert, rijd je rustig weg.", "kernpunten": ["Bij wegrijden heb je geen voorrang; bestaand verkeer gaat voor", "Eerst spiegels, dan over de schouder in de dode hoek kijken", "Geef richting aan en let op fietsers/bromfietsers"], "bron": "RVV 1990 art. 54 (bijzondere manoeuvres, o.a. wegrijden, ander verkeer voor laten gaan); CBR exameneisen rijbewijs B"}, {"kop": "Keren", "tekst": "Keren is een bijzondere manoeuvre waarbij je je rijrichting omdraait, bijvoorbeeld via een driepuntsdraai of door achteruit een inrit in te steken. Ook bij keren moet je al het andere verkeer voor laten gaan; jij hebt geen voorrang.\n\nKies een plek waar je goed overzicht hebt. Keren mag niet als het onveilig is, bijvoorbeeld bij een onoverzichtelijke bocht, vlak voor of op een kruising, of waar een doorgetrokken streep ligt.\n\nKijk goed rond voor en tijdens het keren, geef tijdig richting aan en voer de manoeuvre rustig uit. Liever twee keer steken en veilig blijven dan in één keer en risico nemen.", "kernpunten": ["Bij keren laat je al het andere verkeer voorgaan", "Niet keren op onoverzichtelijke of gevaarlijke plekken", "Goed rondkijken, richting aangeven, rustig uitvoeren"], "bron": "RVV 1990 art. 54 (ander verkeer voor laten gaan bij o.a. keren); CBR exameneisen rijbewijs B"}, {"kop": "Achteruitrijden", "tekst": "Achteruitrijden is een van de lastigste manoeuvres, omdat je zicht naar achteren beperkt is. Ook hierbij laat je al het andere verkeer voorgaan.\n\nKijk voor je begint goed rond: achterom door de achterruit, in je spiegels en in de dode hoeken. Let vooral op kleine kinderen, fietsers en voetgangers die laag of dicht achter de auto kunnen zijn.\n\nRijd langzaam en houd tijdens het rijden zicht op de ruimte achter je. Een achteruitrijcamera of parkeersensoren helpen, maar vervangen niet je eigen blik. Bij twijfel: stoppen en opnieuw kijken.", "kernpunten": ["Bij achteruitrijden laat je al het andere verkeer voorgaan", "Eerst rondkijken: achterruit, spiegels en dode hoeken", "Langzaam rijden; let op kinderen en fietsers laag achter de auto"], "bron": "RVV 1990 art. 54 (ander verkeer voor laten gaan bij o.a. achteruitrijden); CBR exameneisen rijbewijs B"}, {"kop": "Veilig in- en uitstappen: het portier openen", "tekst": "Een geopend portier kan gevaarlijk zijn voor langsrijdende fietsers en bromfietsers. Rijden zij tegen een openslaand portier (dit heet 'dooring'), dan kan dat ernstig misgaan. Daarom open je het portier altijd voorzichtig en pas nadat je hebt gekeken.\n\nEen handige techniek is de zogenoemde 'Dutch reach': je opent het portier met de hand die het verst van het portier zit. Als bestuurder gebruik je dan je rechterhand voor het linker portier. Daardoor draait je bovenlichaam en hoofd vanzelf mee en kijk je over je schouder naar achteren. Zo zie je aankomende fietsers eerder.\n\nDe Dutch reach is niet wettelijk verplicht en niet verplicht op het rijexamen, maar het is een sterk aanbevolen gewoonte. Het CBR kan bij het praktijkexamen wel letten op of je veilig en met aandacht uitstapt.", "kernpunten": ["Open het portier voorzichtig; let op fietsers/bromfietsers ('dooring')", "Dutch reach: openen met de hand het verst van het portier (bestuurder: rechterhand)", "Niet wettelijk verplicht, maar wel een sterk aanbevolen veilige gewoonte"], "bron": "CBR informatie praktijkexamen rijbewijs B (Dutch reach niet verplicht, wel aanbevolen); algemene verkeersveiligheidsregel veilig uitstappen"}, {"kop": "Slepen en pech onderweg", "tekst": "Krijg je pech of moet een ander voertuig je slepen, dan gelden er aandachtspunten. Bij pech op een gewone weg zet je de auto zo veilig mogelijk aan de kant, zet je de alarmlichten aan en plaats je zo nodig een gevarendriehoek om anderen te waarschuwen.\n\nBij slepen rijd je rustig en houd je extra afstand, want het gesleepte voertuig stuurt en remt minder goed. Het gesleepte voertuig moet bestuurd worden door iemand met een geldig rijbewijs.\n\nOp de autosnelweg en autoweg gelden strengere regels: een voertuig dat door pech niet de minimumsnelheid kan halen, hoort daar in principe niet thuis. Gebruik bij pech de vluchtstrook of een pechhaven en bel zo nodig de wegenwacht of hulpdiensten.", "kernpunten": ["Bij pech: veilig aan de kant, alarmlichten aan, zo nodig gevarendriehoek", "Bij slepen: rustig rijden, extra afstand; bestuurder gesleept voertuig met geldig rijbewijs", "Op snelweg/autoweg vluchtstrook of pechhaven gebruiken bij pech"], "bron": "RVV 1990 (gebruik vluchtstrook/pechhaven, alarmsignaal); WVW 1994 (rijbewijsplicht bestuurder); CBR exameneisen rijbewijs B"}, {"kop": "Bijzondere verrichtingen op het praktijkexamen", "tekst": "Op het praktijkexamen toont de examinator een aantal 'bijzondere verrichtingen'. Dat zijn manoeuvres die je beheerst moet uitvoeren met aandacht voor de omgeving en de veiligheid van anderen.\n\nVoorbeelden zijn: keren op de weg, een parkeervak in- en uitrijden (vooruit of achteruit), file- of stopsimulatie, en het hellingproef-achtig wegrijden. Welke verrichtingen je doet, kan per examen verschillen.\n\nBij elke verrichting geldt hetzelfde: goed kijken vóór en tijdens de manoeuvre, andere weggebruikers voor laten gaan, op tijd richting aangeven en rustig en gecontroleerd rijden. Techniek is belangrijk, maar veiligheid en overzicht wegen het zwaarst.", "kernpunten": ["Bijzondere verrichtingen toetsen beheersing én veilig handelen", "Voorbeelden: keren, in-/uitparkeren, wegrijden op een helling", "Altijd: kijken, anderen voor laten gaan, richting aangeven, rustig rijden"], "bron": "CBR exameneisen praktijkexamen rijbewijs B (bijzondere verrichtingen)"}]}, {"hoofdstuk": 13, "titel": "Gevaarherkenning", "secties": [{"kop": "Wat is gevaarherkenning", "tekst": "Gevaarherkenning is het op tijd zien aankomen van gevaarlijke situaties, zodat je er rustig op kunt reageren. Een goede bestuurder reageert niet pas als het misgaat, maar voorkomt dat het zover komt.\n\nHet draait om drie stappen: waarnemen (wat zie ik?), voorspellen (wat kan er gebeuren?) en handelen (wat doe ik nu?). Wie ver vooruit kijkt en mogelijke gevaren al inschat, heeft meer tijd om veilig te handelen.\n\nGevaarherkenning is een vast en belangrijk onderdeel van het theorie-examen rijbewijs B.", "kernpunten": ["Gevaarherkenning = gevaar op tijd zien en voorkomen", "Drie stappen: waarnemen, voorspellen, handelen", "Vast onderdeel van het theorie-examen B"], "bron": "CBR exameneisen theorie-examen rijbewijs B (gevaarherkenning: waarnemen, voorspellen, handelen)"}, {"kop": "Examenvorm: animaties met drie keuzes", "tekst": "In het vernieuwde theorie-examen (sinds 7 april 2025) wordt gevaarherkenning onder andere getoetst met korte animatiefilmpjes zonder geluid. Je ziet een realistische verkeerssituatie vanuit de bestuurdersplaats.\n\nBij dit soort vragen kies je meestal uit drie antwoorden: remmen, gas loslaten of niets doen.\n\nDe betekenis: kies 'remmen' als je flink snelheid moet minderen of moet stoppen vanwege een direct gevaar. Kies 'gas loslaten' als er een mogelijk gevaar is dat zich nog niet direct voordoet, zodat je alvast voorbereid bent. Kies 'niets doen' als je de situatie goed overziet en er geen gevaar dreigt.", "kernpunten": ["Sinds 7 april 2025: gevaarherkenning ook met korte animaties zonder geluid", "Meestal drie keuzes: remmen, gas loslaten, niets doen", "Remmen = direct gevaar; gas loslaten = mogelijk gevaar; niets doen = veilig overzicht"], "bron": "CBR nieuws 'Vernieuwd theorie-examen B-rijbewijs vanaf 7 april' (cbr.nl); CBR exameneisen gevaarherkenning"}, {"kop": "Kijktechniek: ver vooruit en spiegels", "tekst": "Goed kijken is de basis van gevaarherkenning. Kijk niet alleen vlak voor de auto, maar ver vooruit, zodat je situaties al ziet aankomen voordat je er bent.\n\nLaat je blik bewegen: ver vooruit, dan dichterbij, dan naar links en rechts, en regelmatig in je spiegels. Zo houd je een compleet beeld van wat er om je heen gebeurt.\n\nVoor elke handeling die je rijrichting of -snelheid verandert, controleer je je spiegels en zo nodig de dode hoek. Kijken kost een seconde; niet kijken kan een ongeluk kosten.", "kernpunten": ["Kijk ver vooruit om situaties op tijd te zien", "Laat je blik bewegen: ver, dichtbij, opzij, spiegels", "Voor elke wijziging eerst spiegels (en dode hoek) controleren"], "bron": "CBR exameneisen rijbewijs B (kijktechniek, waarnemen); RVV 1990 art. 54 (dode hoek bij manoeuvres)"}, {"kop": "Anticiperen en risico inschatten", "tekst": "Anticiperen betekent vooruitdenken: je bedenkt wat andere weggebruikers zouden kunnen doen en houdt daar rekening mee. Een bal op straat kan betekenen dat er zo een kind achteraan rent. Een geparkeerde auto met inzittenden kan een openslaand portier betekenen.\n\nNiet elk gevaar is even groot. Schat in hoe waarschijnlijk én hoe ernstig een situatie kan worden. Bij een kwetsbare weggebruiker dichtbij (kind, fietser, voetganger) neem je meer ruimte en mindering dan bij een verre, overzichtelijke situatie.\n\nDoor vooruit te denken kun je rustig en op tijd reageren, in plaats van plotseling en hard te moeten remmen.", "kernpunten": ["Anticiperen = vooruitdenken over wat anderen kunnen doen", "Let op signalen: bal op straat, inzittenden in geparkeerde auto", "Schat kans én ernst in; kwetsbare weggebruikers vragen extra ruimte"], "bron": "CBR exameneisen rijbewijs B (voorspellen, anticiperen, risico-inschatting)"}, {"kop": "Snelheid aanpassen aan de situatie", "tekst": "De maximumsnelheid is een bovengrens, geen verplichting. Bij gevaar of slecht overzicht pas je je snelheid daaraan aan, ook al rijd je dan langzamer dan toegestaan.\n\nMinder snelheid geeft je meer tijd om te kijken, te beslissen en te remmen, en je remweg wordt korter. In een woonwijk, bij een school, bij mist of regen, of op een drukke, onoverzichtelijke weg rijd je rustiger.\n\nIn de animatievragen kies je vaak 'gas loslaten' juist om alvast snelheid te minderen, zodat je voorbereid bent als het gevaar zich ontwikkelt.", "kernpunten": ["Maximumsnelheid is een grens, geen doel; pas aan de situatie aan", "Lagere snelheid = meer tijd om te reageren en kortere remweg", "Gas loslaten bereidt je voor op een mogelijk gevaar"], "bron": "RVV 1990 art. 19 (snelheid kunnen aanpassen, tijdig stoppen); CBR exameneisen gevaarherkenning"}, {"kop": "Blinde hoek en kwetsbare weggebruikers", "tekst": "De dode hoek (blinde hoek) is het gebied dat je niet via je spiegels ziet. Vooral bij vrachtwagens en bussen is die hoek groot: fietsers en voetgangers dichtbij het voertuig zijn voor de bestuurder soms onzichtbaar.\n\nKijk daarom altijd zelf over je schouder in de dode hoek voordat je naar links of rechts gaat, en houd afstand van grote voertuigen die rechtsaf willen.\n\nWees extra alert bij kinderen en bij scholen. Kinderen zijn klein, onvoorspelbaar en overzien het verkeer nog niet. Bij een school, speelplek of oversteekplaats verlaag je je snelheid en houd je rekening met plotseling overstekende kinderen.", "kernpunten": ["Dode hoek: gebied dat spiegels niet tonen; zelf over de schouder kijken", "Vrachtwagens/bussen hebben grote dode hoeken; houd afstand bij afslaan", "Bij scholen en kinderen: snelheid omlaag, reken op plots overstekenden"], "bron": "RVV 1990 art. 54 (dode hoek bij manoeuvres); CBR exameneisen rijbewijs B (kwetsbare weggebruikers, gevaarherkenning)"}]}, {"hoofdstuk": 14, "titel": "Verkeersborden en verkeerstekens", "secties": [{"kop": "Hoe verkeersborden zijn ingedeeld", "tekst": "Alle officiële verkeersborden staan in Bijlage 1 van het RVV 1990. Ze zijn geordend in categorieën, elk met een letter en een nummer (bijvoorbeeld A1, B6, C1).\n\nDe letter vertelt je het soort bord: A gaat over snelheid, B over voorrang, C over geslotenverklaringen en verboden, D over geboden (verplichte rijrichting), E over parkeren en stilstaan, F over overige geboden en verboden, G over verkeersregels (soort weg), en J over waarschuwingen.\n\nAls je de betekenis van een categorie kent, herken je nieuwe borden binnen die categorie sneller. Hieronder lopen we de categorieën langs.", "kernpunten": ["Alle borden staan in Bijlage 1 RVV 1990, met letter + nummer", "Letter = soort bord (A snelheid, B voorrang, C verbod, D gebod, enz.)", "Categorie kennen helpt nieuwe borden snel herkennen"], "bron": "RVV 1990 Bijlage 1 (Verkeersborden), indeling in hoofdstukken A t/m J"}, {"kop": "Categorie A — Snelheid", "tekst": "A-borden gaan over snelheid. Ze geven een maximumsnelheid aan of het einde daarvan.\n\nVoorbeelden: A1 geeft een maximumsnelheid aan (bijvoorbeeld 'maximum 50' of 'maximum 130'). Een A1-bord met een schuine streep of de tekst 'einde' geeft het einde van die maximumsnelheid aan. Ook adviessnelheden vallen hieronder.\n\nLet op: ook zonder bord geldt een maximumsnelheid, afhankelijk van de soort weg (bijvoorbeeld 50 binnen de bebouwde kom).", "kernpunten": ["A-borden = maximumsnelheid of einde maximumsnelheid", "A1 toont de toegestane maximumsnelheid (bv. 50, 130)", "Zonder bord geldt de standaardsnelheid van de wegsoort"], "bron": "RVV 1990 Bijlage 1, hoofdstuk A (Snelheid), o.a. bord A1"}, {"kop": "Categorie B — Voorrang", "tekst": "B-borden regelen de voorrang. Ze maken duidelijk wie voorrang heeft op een kruising of weg.\n\nVoorbeelden: B1 geeft aan dat je op een voorrangsweg rijdt; B6 (het driehoekige bord met de punt naar beneden) betekent 'verleen voorrang aan bestuurders op de kruisende weg'; B7 is het stopbord, waarbij je verplicht moet stoppen en daarna voorrang verlenen.\n\nB-borden horen vaak samen met haaientanden op het wegdek (zie de sectie over wegmarkeringen).", "kernpunten": ["B-borden regelen voorrang op kruising of weg", "B1 = voorrangsweg; B6 = voorrang verlenen; B7 = stoppen en voorrang verlenen", "Vaak gecombineerd met haaientanden op de weg"], "bron": "RVV 1990 Bijlage 1, hoofdstuk B (Voorrang), o.a. borden B1, B6, B7"}, {"kop": "Categorie C — Geslotenverklaring en verboden", "tekst": "C-borden zijn ronde borden met een rode rand. Ze verklaren een weg geheel of voor bepaalde voertuigen gesloten, of verbieden iets.\n\nVoorbeelden: C1 betekent 'gesloten in beide richtingen voor voertuigen, ruiters en geleiders van vee'; een rond bord met een rode rand en een voertuigsymbool sluit dat type voertuig uit; C12 betekent 'gesloten voor alle motorvoertuigen' (fietsers en voetgangers mogen er nog wel langs).\n\nDe rode rand is het signaal: hier mag iets niet.", "kernpunten": ["C-borden: rond met rode rand = geslotenverklaring of verbod", "C1 = gesloten in beide richtingen voor (bijna) alle voertuigen", "Voertuigsymbool in het bord = dat type voertuig mag er niet in"], "bron": "RVV 1990 Bijlage 1, hoofdstuk C (Geslotenverklaring), o.a. bord C1"}, {"kop": "Categorie D — Gebod (verplichte rijrichting)", "tekst": "D-borden zijn ronde blauwe borden met witte pijlen. Ze geven een gebod: je móet de aangegeven richting volgen.\n\nVoorbeelden: een D-bord met een pijl recht omhoog betekent 'rechtdoor'; een pijl naar rechts betekent 'verplicht rechtsaf'. Het ronde blauwe bord bij een rotonde of obstakel geeft aan welke kant je het voorbij moet (gebod tot het volgen van die rijrichting).\n\nBlauw en rond met een witte pijl betekent dus: dit moet je doen.", "kernpunten": ["D-borden: rond, blauw, witte pijl = verplichte rijrichting", "Pijl toont welke richting je moet volgen (rechtdoor, rechtsaf, enz.)", "Blauw + rond = gebod (moet), tegenover rood-omrand verbod (mag niet)"], "bron": "RVV 1990 Bijlage 1, hoofdstuk D (Rijrichting / gebod), o.a. borden D-reeks"}, {"kop": "Categorie E — Parkeren en stilstaan", "tekst": "E-borden gaan over parkeren en stilstaan. Ze geven aan waar je wel of niet mag parkeren of stilstaan.\n\nVoorbeelden: E1 betekent 'parkeerverbod'; E2 betekent 'verbod stil te staan' (en dus ook niet parkeren); E4 geeft een parkeergelegenheid aan; E6 wijst een gehandicaptenparkeerplaats aan.\n\nPijlen onder een E-bord geven aan vanaf of tot waar het verbod of de plek geldt. Let dus altijd op onderborden.", "kernpunten": ["E-borden regelen parkeren en stilstaan", "E1 = parkeerverbod; E2 = stopverbod; E4 = parkeergelegenheid; E6 = gehandicaptenplaats", "Pijlen/onderborden geven het begin, einde of bereik aan"], "bron": "RVV 1990 Bijlage 1, hoofdstuk E (Parkeren en stilstaan), o.a. borden E1, E2, E4, E6"}, {"kop": "Categorie F — Overige geboden en verboden", "tekst": "F-borden bevatten overige geboden en verboden die niet onder de andere letters vallen.\n\nVoorbeelden: F1 'verbod voor bestuurders door te gaan bij nadering van verkeer uit tegengestelde richting'; F5 'verbod voor bestuurders door te gaan bij nadering van verkeer uit tegengestelde richting' / 'wachtplicht'; F7 geeft juist voorrang bij een smalle doorgang. Ook inhaalverboden (zoals het verbod voor vrachtauto's om in te halen) en het einde daarvan vallen onder F.\n\nKortom: F is de verzamelcategorie voor regels over doorgaan, wachten en inhalen.", "kernpunten": ["F-borden = overige geboden en verboden", "Bevatten o.a. regels bij smalle doorgangen en inhaalverboden", "Let op de paren 'begin' en 'einde' van een F-verbod"], "bron": "RVV 1990 Bijlage 1, hoofdstuk F (Overige geboden en verboden); specifieke bordnummers TE VERIFIEREN: exacte F-nummers per voorbeeld niet één-op-één in zoekresultaat bevestigd"}, {"kop": "Categorie G — Verkeersregels (soort weg)", "tekst": "G-borden geven aan op wat voor soort weg je rijdt en welke regels daar gelden. De wegsoort bepaalt onder andere de standaardsnelheid en wie er mag rijden.\n\nVoorbeelden: G1 'autosnelweg' en het einde ervan; G3 'autoweg'; G5 'erf' (waar je stapvoets rijdt en voetgangers de hele weg mogen gebruiken) en G6 'einde erf'; G11 'verplicht fietspad'; G7 'voetpad'.\n\nZodra je zo'n bord ziet, weet je meteen welke verkeersregels en snelheid daar horen.", "kernpunten": ["G-borden tonen de wegsoort en de bijbehorende regels", "G1 autosnelweg, G3 autoweg, G5 erf (stapvoets), G11 verplicht fietspad", "Wegsoort bepaalt standaardsnelheid en toegestane voertuigen"], "bron": "RVV 1990 Bijlage 1, hoofdstuk G (Verkeersregels), o.a. borden G1, G3, G5, G7, G11"}, {"kop": "Categorie J — Waarschuwing", "tekst": "J-borden zijn driehoekig met een rode rand en een zwart symbool op een witte achtergrond. Ze waarschuwen voor een gevaar of bijzondere situatie verderop.\n\nVoorbeelden: J1 'slecht wegdek' of een bocht; J16 'spoorwegovergang met overwegbomen'; J20 'voetgangersoversteekplaats'-waarschuwing; J21 'kinderen' (let op spelende kinderen, bijvoorbeeld bij een school).\n\nEen J-bord verbiedt of gebiedt niets, maar zegt: let op, pas je rijgedrag aan. Verlaag zo nodig je snelheid en wees extra alert.", "kernpunten": ["J-borden: driehoekig, rode rand, zwart symbool = waarschuwing", "Voorbeelden: J16 spoorwegovergang, J21 kinderen, J20 oversteekplaats", "Waarschuwt voor gevaar verderop; pas je rijgedrag aan"], "bron": "RVV 1990 Bijlage 1, hoofdstuk J (Waarschuwing), o.a. borden J16, J20, J21"}, {"kop": "Wegmarkeringen op het wegdek", "tekst": "Naast borden geven ook strepen en tekens op de weg regels aan. De belangrijkste moet je goed kennen.\n\nEen doorgetrokken streep mag je niet overschrijden of erop rijden: je blijft aan je kant. Een onderbroken streep mag je wel overschrijden, bijvoorbeeld om in te halen, als het veilig is. Staan er een doorgetrokken en een onderbroken streep naast elkaar, dan geldt voor jou de streep die het dichtst bij jou ligt.\n\nHaaientanden (driehoeken met de punt naar je toe) betekenen: verleen voorrang aan bestuurders op de kruisende weg. Een blokmarkering (grote blokken) markeert bijvoorbeeld de grens van een busbaan of een verdrijvingsvlak; daar mag je niet zomaar rijden. Het woord 'BUS' of een busbaanmarkering geeft aan dat de strook voor bussen is.", "kernpunten": ["Doorgetrokken streep: niet overschrijden; onderbroken streep: mag wel als veilig", "Bij dubbele streep geldt de streep het dichtst bij jou", "Haaientanden = voorrang verlenen; blokmarkering = busbaan/verdrijvingsvlak, niet op rijden"], "bron": "RVV 1990 art. 76-78 (markeringen, doorgetrokken/onderbroken strepen); RVV 1990 art. 80 (haaientanden = voorrang verlenen)"}, {"kop": "Verkeerslichten", "tekst": "Verkeerslichten regelen wie er mag rijden. Rood betekent stoppen, geel betekent stoppen tenzij dat niet meer veilig kan, en groen betekent doorrijden als de weg vrij is.\n\nNaast gewone ronde lichten zijn er pijllichten: die gelden alleen voor de richting van de pijl. Een groene pijl naar rechts betekent bijvoorbeeld dat alleen rechtsaf vrij is.\n\nKnipperend geel betekent: let op, maar je mag doorrijden; de normale voorrangsregels gelden dan. Aparte lichten voor fietsers, voetgangers en bussen gelden alleen voor die groep.", "kernpunten": ["Rood = stoppen; geel = stoppen tenzij niet veilig; groen = doorrijden als vrij", "Pijllichten gelden alleen voor die richting", "Knipperend geel: oppassen, normale voorrangsregels gelden"], "bron": "RVV 1990 art. 68 (driekleurige verkeerslichten); RVV 1990 art. 70 (knipperend geel)"}, {"kop": "Gebaren van de verkeersregelaar", "tekst": "Een verkeersregelaar of politieagent kan het verkeer met gebaren regelen. Hun aanwijzingen gaan boven verkeerslichten, verkeersborden en de gewone verkeersregels. Geeft de regelaar dus een ander teken dan het verkeerslicht, dan volg je de regelaar.\n\nHet algemene stopteken is: één arm omhoog met de handpalm naar voren. Verkeer dat die kant op nadert, moet stoppen. Houdt de regelaar beide armen of een arm zijwaarts gestrekt, dan moet het verkeer dat op die arm afkomt stoppen; verkeer evenwijdig aan de armen mag doorrijden.\n\nVolg de aanwijzingen van een bevoegde, herkenbare verkeersregelaar altijd op. Dit is wettelijk verplicht.", "kernpunten": ["Aanwijzingen verkeersregelaar/agent gaan boven licht, borden én regels", "Arm omhoog, handpalm naar voren = stopteken", "Aanwijzingen van een bevoegde, herkenbare regelaar zijn verplicht op te volgen"], "bron": "RVV 1990 art. 84 (rangorde: aanwijzingen gaan boven verkeerstekens en verkeersregels); RVV 1990 art. 82 (plicht aanwijzingen van een bevoegd persoon op te volgen); RVV 1990 art. 83 (gebaren/tekens verkeersregelaar)"}]}];
const VRAGEN = [{"cat": "Voorrang", "q": "Je rijdt op een gelijkwaardige kruising. Van rechts nadert een voertuig. Wat doe je?", "opts": ["Je hebt voorrang, rij door", "Je verleent voorrang aan het voertuig van rechts", "Je claxonneert en rijdt door", "Je stopt altijd"], "correct": 1, "explain": "Op een gelijkwaardige kruising heeft verkeer van rechts altijd voorrang."}, {"cat": "Voorrang", "q": "Je nadert een kruising met haaientanden op het wegdek. Wat betekent dit?", "opts": ["Je hebt voorrang", "Je moet voorrang verlenen aan kruisend verkeer", "Je moet altijd stoppen", "Je mag doorrijden als de weg vrij is"], "correct": 1, "explain": "Haaientanden (driehoeken op het wegdek) = jij verleent voorrang."}, {"cat": "Voorrang", "q": "Een ambulance met sirene en blauw zwaailicht nadert van achteren. Wat doe je?", "opts": ["Versnellen", "Stoppen waar je rijdt", "Naar rechts gaan en zo nodig stoppen", "Naar links gaan"], "correct": 2, "explain": "Voorrangsvoertuigen geef je doorgang. Wijk naar rechts, stop indien nodig."}, {"cat": "Voorrang", "q": "Je wilt linksaf slaan. Een tegenligger rijdt rechtdoor. Wie heeft voorrang?", "opts": ["Jij", "De tegenligger", "Gelijktijdig mag", "De tegenligger, maar jij mag er tussendoor"], "correct": 1, "explain": "Bij linksafslaan moet je tegemoetkomend verkeer dat rechtdoor rijdt laten gaan."}, {"cat": "Voorrang", "q": "Je rijdt op een erftoegangweg en wilt de hoofdweg oprijden. Wat geldt?", "opts": ["Je hebt voorrang", "Je moet voorrang verlenen", "Je mag als er geen auto's zijn", "Hoofdweg stopt voor jou"], "correct": 1, "explain": "Hier verleen je voorrang aan de hoofdweg. Let altijd op de borden en haaientanden: die bepalen wie voorrang heeft."}, {"cat": "Voorrang", "q": "Op een kruising staat het licht op oranje. Wat doe je?", "opts": ["Versnellen om de kruising over te steken", "Stoppen als dit veilig mogelijk is", "Alleen stoppen bij politie", "Doorrijden want oranje is geen verbod"], "correct": 1, "explain": "Oranje = stop, ten maximum. Je mag niet harder dan 30 km/u."}, {"cat": "Snelheid", "q": "Het is glad door ijzel. Jij rijdt normaal 80 km/u op deze weg. Wat doe je?", "opts": ["Gewoon 80 km/u, auto heeft ABS", "Snelheid sterk aanpassen en aanzienlijk langzamer rijden", "Iets langzamer, max 60 km/u", "4WD aanzetten en doorrijden"], "correct": 1, "explain": "Bij ijzel is de remweg enorm langer, ook met ABS. Pas je snelheid sterk aan."}, {"cat": "Verkeersborden", "q": "Wat betekent een rond blauw bord met een pijl omhoog?", "opts": ["Eenrichtingsverkeer", "Verplichte rijrichting rechtdoor", "Verbod om te stoppen", "Aanbevolen rijrichting"], "correct": 1, "explain": "Blauw rond bord met pijl = gebodsbord. Pijl omhoog = verplicht rechtdoor."}, {"cat": "Verkeersborden", "q": "Wat betekent een driehoekig bord met rode rand en uitroepteken?", "opts": ["Stop, gevaar", "Algemeen gevaar, wees voorzichtig", "Verboden doorgang", "Werk in uitvoering"], "correct": 1, "explain": "Driehoek rode rand = waarschuwing. Uitroepteken = algemeen gevaar."}, {"cat": "Verkeersborden", "q": "Wat is het verschil tussen een stopbord en haaientanden?", "opts": ["Stopbord mag je door als er niemand is", "Stopbord moet je altijd stoppen; haaientanden stop je alleen als nodig", "Ze betekenen hetzelfde", "Stopbord alleen voor auto's"], "correct": 1, "explain": "Stopbord (achthoek rood) = altijd stoppen. Haaientanden = alleen stoppen als nodig."}, {"cat": "Verkeersborden", "q": "Een blauw rechthoekig bord met een witte P. Wat betekent dit?", "opts": ["Parkeerverbod", "Parkeerplaats", "Alleen voor vergunninghouders", "Betaald parkeren"], "correct": 1, "explain": "Blauw bord met P = parkeerplaats."}, {"cat": "Verkeersborden", "q": "Een geel diamantvormig bord betekent:", "opts": ["Gevaarlijke kruising", "Je rijdt op een voorrangsweg", "Werk in uitvoering", "Gevaarlijke bocht"], "correct": 1, "explain": "Gele ruit = voorrangsweg. Jij hebt voorrang op kruisingen."}, {"cat": "Verkeersborden", "q": "Een bord met rode rand en d     if(btn) btn.innerHTML='<i class="ti ti-player-stop"></i> Stop';
  }catch(e){ if(btn) btn.innerHTML=btn._orig; audioBtn=null; }
}
function stopAudio(){ if(audio){audio.pause();audio=null} if(audioBtn){ audioBtn.innerHTML=audioBtn._orig; audioBtn=null; } }

/* ---- navigatie ---- */
function show(fn){ stopAudio(); fn(); window.scrollTo(0,0); }
function nav(fn){ stack.push(fn); render(); }
function goBack(){ stopAudio(); stack.pop(); render(); }
function render(){ const f=stack[stack.length-1]; backBtn.style.display = stack.length>1?'flex':'none'; if(coachConv && f!==coach){ try{coachConv.endSession()}catch(e){} coachConv=null; logBesproken(); } if(f!==coach){ coachTopic=null; coachLeerstof=null; } app.className='fade'; void app.offsetWidth; app.classList.add('fade'); f(); window.scrollTo(0,0); }
function go(fn){ stack.push(fn); render(); }
function reset(fn){ stack=[fn]; render(); }

/* ---- schermen ---- */
function home(){
  const pct = Math.round(P.gelezen.length/LEERSTOF.length*100);
  const C=2*Math.PI*30, off=C*(1-pct/100);
  const last = P.examens[P.examens.length-1];
  app.innerHTML = `
  <div class="hero">
    <svg class="ring" viewBox="0 0 74 74"><circle cx="37" cy="37" r="30" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/><circle cx="37" cy="37" r="30" fill="none" stroke="#C9A24B" stroke-width="5" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 37 37)"/><text x="37" y="42" text-anchor="middle" fill="#ECEAE4" font-family="Outfit" font-size="16">${pct}%</text></svg>
    <div><div class="h-t">Klaar voor de weg</div><div class="h-s">${P.gelezen.length} van ${LEERSTOF.length} hoofdstukken gelezen</div></div>
  </div>
  <div class="grid2">
    <button class="tile" onclick="go(leerLijst)"><span class="ic"><i class="ti ti-book-2"></i></span><div><div class="tl">Leren</div><div class="ts">De theorie per hoofdstuk</div></div></button>
    <button class="tile" onclick="go(oefenLijst)"><span class="ic"><i class="ti ti-pencil"></i></span><div><div class="tl">Oefenen</div><div class="ts">Vragen per onderwerp</div></div></button>
    <button class="tile" onclick="go(examenStart)"><span class="ic"><i class="ti ti-checklist"></i></span><div><div class="tl">Examen</div><div class="ts">50 vragen, slagen vanaf 44</div></div></button>
    <button class="tile" onclick="go(coach)"><span class="ic"><i class="ti ti-microphone"></i></span><div><div class="tl">Coach</div><div class="ts">Stel je vraag, krijg uitleg</div></div></button>
  </div>
  ${last?`<div class="card" style="padding:14px 16px;margin-top:14px;font-size:13px;color:var(--muted)"><span class="dim">Laatste oefenexamen:</span> ${last.score}/${last.total} — ${last.score>=PASS?'<span style="color:var(--good)">geslaagd</span>':'<span style="color:var(--bad)">net niet</span>'}</div>`:''}
  <div style="text-align:center;margin-top:26px"><button onclick="logout()" style="color:var(--dim);font-size:12.5px;background:none;display:inline-flex;align-items:center;gap:6px"><i class="ti ti-logout" style="font-size:15px"></i> Uitloggen</button></div>
  `;
}

function leerLijst(){
  app.innerHTML = `<div class="sec-title"><span class="label">Leren</span><span class="cnt">${LEERSTOF.length} hoofdstukken</span></div>` +
   LEERSTOF.map((h,i)=>`<button class="row" onclick="go(()=>leerHoofdstuk(${i}))"><span class="idx">${String(h.hoofdstuk).padStart(2,'0')}</span><span class="ttl">${esc(h.titel)}</span>${P.gelezen.includes(h.hoofdstuk)?'<i class="ti ti-circle-check done"></i>':'<i class="ti ti-chevron-right chev"></i>'}</button>`).join('');
}

function leerHoofdstuk(i){
  const h=LEERSTOF[i];
  if(!P.gelezen.includes(h.hoofdstuk)){P.gelezen.push(h.hoofdstuk);saveP(P)}
  app.innerHTML = `<div class="chap-head"><div class="n">${String(h.hoofdstuk).padStart(2,'0')}</div><h2>${esc(h.titel)}</h2></div>` +
   h.secties.map((s,si)=>`
     <div class="card sec">
       <h3><span class="n">${String(si+1).padStart(2,'0')}</span> ${esc(s.kop)}</h3>
       ${s.tekst.split(/\n+/).filter(x=>x.trim()).map(p=>`<p>${esc(p)}</p>`).join('')}
       ${s.kernpunten&&s.kernpunten.length?`<ul class="kern">${s.kernpunten.map(k=>`<li>${esc(k)}</li>`).join('')}</ul>`:''}
       <div class="bron">${esc(s.bron)}</div>
       <div class="tools"><button class="tbtn" onclick="coachOver(${JSON.stringify(s.kop).replace(/"/g,'&quot;')}, ${JSON.stringify(s.tekst).replace(/"/g,'&quot;')})"><i class="ti ti-microphone"></i> Laat je coach dit uitleggen</button></div>
     </div>`).join('') +
   (YT[h.hoofdstuk]?`<a class="pbtn ghost" href="${YT[h.hoofdstuk]}" target="_blank" rel="noopener" style="margin-top:14px;text-decoration:none"><i class="ti ti-brand-youtube"></i> Bekijk uitleg op YouTube</a>`:'') +
   `<div style="display:flex;gap:10px;margin-top:18px">
      ${i>0?`<button class="pbtn ghost" style="flex:1" onclick="stack.pop();go(()=>leerHoofdstuk(${i-1}))">Vorige</button>`:''}
      ${i<LEERSTOF.length-1?`<button class="pbtn" style="flex:1" onclick="stack.pop();go(()=>leerHoofdstuk(${i+1}))">Volgende</button>`:`<button class="pbtn" style="flex:1" onclick="reset(home)">Klaar</button>`}
    </div>`;
}

function oefenLijst(){
  const cats=[...new Set(VRAGEN.map(q=>q.cat))];
  app.innerHTML = `<div class="sec-title"><span class="label">Oefenen</span><span class="cnt">${VRAGEN.length} vragen</span></div>` +
   `<button class="row" onclick="go(()=>quiz(shuffle(VRAGEN),'Alle vragen'))"><span class="idx"><i class="ti ti-stack-2"></i></span><span class="ttl">Alle onderwerpen door elkaar</span><i class="ti ti-chevron-right chev"></i></button>
    <div style="height:8px"></div>` +
   cats.map(c=>{const n=VRAGEN.filter(q=>q.cat===c).length;return `<button class="row" onclick="go(()=>quiz(shuffle(VRAGEN.filter(q=>q.cat==='${c.replace(/'/g,"\\'")}')),'${c.replace(/'/g,"\\'")}'))"><span class="ttl">${esc(c)}</span><span class="dim" style="font-size:12px">${n}</span><i class="ti ti-chevron-right chev"></i></button>`}).join('');
}

let Q={};
function quiz(list,titel){
  Q={list,titel,i:0,answered:false};
  quizStep();
}
function quizStep(){
  const q=Q.list[Q.i];
  backBtn.style.display='none';
  app.innerHTML = `
   <div class="q-meta"><span>${esc(Q.titel)}</span><span>${Q.i+1} / ${Q.list.length}</span></div>
   <div class="qbar"><i style="width:${(Q.i)/Q.list.length*100}%"></i></div>
   <div class="q-txt">${esc(q.q)}</div>
   <div id="opts">${q.opts.map((o,k)=>`<button class="opt" onclick="answer(${k})">${esc(o)}</button>`).join('')}</div>
   <div id="fbslot"></div>`;
}
function answer(k){
  if(Q.answered) return; Q.answered=true;
  const q=Q.list[Q.i], opts=document.querySelectorAll('#opts .opt');
  opts.forEach((el,idx)=>{el.onclick=null;el.classList.add('dimmed');if(idx===q.correct){el.classList.remove('dimmed');el.classList.add('good')}if(idx===k&&k!==q.correct){el.classList.remove('dimmed');el.classList.add('bad')}});
  const ok=k===q.correct;
  if(!ok){ P.fouten=P.fouten||{}; P.fouten[q.cat]=(P.fouten[q.cat]||0)+1; saveP(); }
  document.getElementById('fbslot').innerHTML=`
   <div class="fb ${ok?'ok':'no'}"><div class="h"><i class="ti ti-${ok?'circle-check':'alert-circle'}"></i>${ok?'Goed':'Niet juist'}</div>${esc(q.explain)}</div>
   <button class="pbtn" onclick="nextQ()">${Q.i<Q.list.length-1?'Volgende vraag':'Klaar'}</button>`;
}
function nextQ(){
  stopAudio();
  if(Q.i<Q.list.length-1){Q.i++;Q.answered=false;quizStep();window.scrollTo(0,0);}
  else{ reset(home); }
}

/* ---- examen ---- */
function examenStart(){
  app.innerHTML=`
   <div class="sec-title"><span class="label">Examen</span></div>
   <div class="card" style="padding:22px 20px">
     <h2 style="font-size:19px;margin-bottom:12px">Oefenexamen</h2>
     <p class="muted" style="font-size:14px;line-height:1.65;margin-bottom:8px">Net als het echte CBR-examen: <b style="color:var(--text)">${EXAM_N} vragen</b>, je slaagt vanaf <b style="color:var(--text)">${PASS} goed</b>. Geen tijdslimiet hier — leren staat voorop.</p>
     <p class="dim" style="font-size:12.5px;margin-bottom:18px">De vragen komen door elkaar uit alle onderwerpen.</p>
     <button class="pbtn" onclick="startExam()"><i class="ti ti-player-play"></i> Start examen</button>
   </div>`;
}
let EX={};
function startExam(){
  const pool=shuffle(VRAGEN).slice(0,Math.min(EXAM_N,VRAGEN.length));
  EX={list:pool,i:0,goed:0,answered:false,fout:[]};
  examStep();
}
function examStep(){
  const q=EX.list[EX.i];
  backBtn.style.display='none';
  app.innerHTML=`
   <div class="q-meta"><span>Examen</span><span>${EX.i+1} / ${EX.list.length} · ${EX.goed} goed</span></div>
   <div class="qbar"><i style="width:${EX.i/EX.list.length*100}%"></i></div>
   <div class="q-txt">${esc(q.q)}</div>
   <div id="opts">${q.opts.map((o,k)=>`<button class="opt" onclick="examAnswer(${k})">${esc(o)}</button>`).join('')}</div>
   <div id="fbslot"></div>`;
}
function examAnswer(k){
  if(EX.answered) return; EX.answered=true;
  const q=EX.list[EX.i], opts=document.querySelectorAll('#opts .opt');
  opts.forEach((el,idx)=>{el.onclick=null;el.classList.add('dimmed');if(idx===q.correct){el.classList.remove('dimmed');el.classList.add('good')}if(idx===k&&k!==q.correct){el.classList.remove('dimmed');el.classList.add('bad')}});
  const ok=k===q.correct; if(ok)EX.goed++; else { EX.fout.push(q); P.fouten=P.fouten||{}; P.fouten[q.cat]=(P.fouten[q.cat]||0)+1; }
  document.getElementById('fbslot').innerHTML=`
   <div class="fb ${ok?'ok':'no'}"><div class="h"><i class="ti ti-${ok?'circle-check':'alert-circle'}"></i>${ok?'Goed':'Niet juist'}</div>${esc(q.explain)}</div>
   <button class="pbtn" onclick="examNext()">${EX.i<EX.list.length-1?'Volgende':'Bekijk uitslag'}</button>`;
}
function examNext(){
  stopAudio();
  if(EX.i<EX.list.length-1){EX.i++;EX.answered=false;examStep();window.scrollTo(0,0);}
  else examResult();
}
function examResult(){
  const total=EX.list.length, pass=EX.goed>=PASS;
  P.examens.push({score:EX.goed,total,date:Date.now()}); saveP(P);
  app.innerHTML=`
   <div class="score">
     <div class="big"><b>${EX.goed}</b> / ${total}</div>
     <div class="verdict ${pass?'pass':'fail'}">${pass?'Geslaagd!':'Net niet'}</div>
     <div class="sub">${pass?'Dit zou een voldoende zijn op het echte examen.':`Je had ${PASS} goed nodig. Nog ${PASS-EX.goed} te gaan — je komt er wel.`}</div>
   </div>
   <button class="pbtn" onclick="startExam()" style="margin-bottom:10px"><i class="ti ti-refresh"></i> Opnieuw</button>
   <button class="pbtn ghost" onclick="reset(home)">Naar start</button>
   ${EX.fout.length?`<div class="sec-title" style="margin-top:26px"><span class="label">Terugkijken</span><span class="cnt">${EX.fout.length} fout</span></div>`+EX.fout.map(q=>`<div class="card sec"><div class="q-txt" style="font-size:15px">${esc(q.q)}</div><div class="fb ok"><div class="h"><i class="ti ti-circle-check"></i>${esc(q.opts[q.correct])}</div>${esc(q.explain)}</div></div>`).join(''):''}`;
}

/* ---- coach ---- */
function coach(){
  app.innerHTML=`
   <div class="card coach-card">
     <button id="coachMic" onclick="toggleCoach()" class="av" style="cursor:pointer;background:none;transition:.15s" aria-label="Start coach"><i class="ti ti-microphone"></i></button>
     <h2>Je theoriecoach</h2>
     ${coachTopic?`<div style="font-size:12.5px;color:var(--gold);margin-bottom:6px">Onderwerp: ${esc(coachTopic)}</div>`:''}
     <p id="coachStatus">${coachTopic?'Tik op de microfoon — je coach legt dit onderwerp uit en je kunt meteen doorvragen.':'Tik op de microfoon en stel je vraag — gewoon hardop.'}</p>
     <p class="dim" style="font-size:12px;margin-top:10px">De coach legt alleen uit wat in de gecontroleerde theorie staat. Twijfelt hij, dan zegt hij dat eerlijk.</p>
   </div>
   <div class="card" style="padding:16px;margin-top:13px">
     <div class="label" style="margin-bottom:10px">Probeer bijvoorbeeld</div>
     ${['Leg voorrang op een gelijkwaardig kruispunt uit','Wat betekenen haaientanden op de weg?','Hoe groot moet mijn volgafstand zijn?'].map(s=>`<div class="row" style="cursor:default"><i class="ti ti-message-2" style="color:var(--gold);font-size:16px"></i><span class="ttl" style="font-size:13.5px">${s}</span></div>`).join('')}
   </div>`;
  if(coachConv) setCoachUI(coachConv._mode||'listening');
}
function setCoachUI(state){
  const mic=document.getElementById('coachMic'), st=document.getElementById('coachStatus');
  if(!mic||!st) return;
  const m={
    idle:['Tik op de microfoon en stel je vraag — gewoon hardop.','ti-microphone','#C9A24B'],
    connecting:['Verbinden met je coach…','ti-loader-2','#C9A24B'],
    listening:['Ik luister — stel je vraag.','ti-microphone','#46B48A'],
    speaking:['Je coach legt uit…','ti-volume','#46B48A'],
    error:['Microfoon nodig, of verbinding mislukt. Tik om opnieuw te proberen.','ti-microphone','#DD7367'],
    stopped:['Gesprek gestopt. Tik om opnieuw te starten.','ti-microphone','#C9A24B']
  };
  const [txt,ic,col]=m[state]||m.idle;
  st.textContent=txt; mic.querySelector('i').className='ti '+ic; mic.style.borderColor=col; mic.style.color=col;
}
function voortgangSamenvatting(){
  const totaal=LEERSTOF.length, gelezenN=P.gelezen.length;
  const gelezenT=LEERSTOF.filter(h=>P.gelezen.includes(h.hoofdstuk)).map(h=>h.titel).join(', ')||'nog niets';
  const niet=LEERSTOF.filter(h=>!P.gelezen.includes(h.hoofdstuk)).map(h=>h.titel);
  const last=P.examens[P.examens.length-1];
  const ex=last?`${last.score} van ${last.total} goed (${last.score>=PASS?'geslaagd':'nog niet geslaagd'})`:'nog geen oefenexamen gedaan';
  const zwak=Object.entries(P.fouten||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  const besproken=(P.besproken&&P.besproken.length)?P.besproken.join(', '):'nog niets';
  return `Liam heeft ${gelezenN} van de ${totaal} hoofdstukken gelezen: ${gelezenT}. Nog te lezen: ${niet.join(', ')||'alles gelezen'}. Laatste oefenexamen: ${ex}. Onderwerpen waar hij de meeste fouten maakt: ${zwak.length?zwak.join(', '):'nog niet bekend'}. Eerder met jou (de coach) besproken: ${besproken}.`;
}
async function toggleCoach(){
  if(coachConv){ try{await coachConv.endSession()}catch(e){} coachConv=null; logBesproken(); setCoachUI('stopped'); return; }
  setCoachUI('connecting');
  besprokenNu = coachTopic||null;
  const opening = coachLeerstof
    ? `${coachTopic}. ${coachLeerstof} ... Heb je hier vragen over, of zal ik je er een controlevraag over stellen?`
    : 'Hoi Liam! Ik ben je theoriecoach. Waar wil je het over hebben: voorrang, verkeersborden, snelheid, of iets anders?';
  try{
    const { Conversation } = await import('https://esm.sh/@elevenlabs/client');
    coachConv = await Conversation.startSession({
      agentId:'agent_6801kv3dsj3xfh0sr08k806tvs9r',
      connectionType:'webrtc',
      dynamicVariables:{ voortgang: voortgangSamenvatting(), opening: opening },
      onModeChange:({mode})=>{ const s=(mode==='speaking')?'speaking':'listening'; if(coachConv)coachConv._mode=s; setCoachUI(s); },
      onStatusChange:({status})=>{ if(status==='disconnected'){ coachConv=null; logBesproken(); setCoachUI('stopped'); } },
      onError:()=>{ coachConv=null; setCoachUI('error'); }
    });
  }catch(e){ coachConv=null; setCoachUI('error'); }
}

/* ---- auth + login ---- */
function convai(show){ const c=document.querySelector('elevenlabs-convai'); if(c) c.style.display = show?'':'none'; }
function loginScreen(){
  stack=[]; backBtn.style.display='none'; convai(false);
  app.className='fade'; void app.offsetWidth; app.classList.add('fade');
  app.innerHTML = `
   <div style="height:7vh"></div>
   <div style="text-align:center;margin-bottom:22px">
     <svg width="56" height="56" viewBox="0 0 100 100" style="margin:0 auto"><g fill="none" stroke="#C9A24B" stroke-linecap="round"><circle cx="50" cy="50" r="38" stroke-width="2.6"/><line x1="50" y1="57" x2="50" y2="84" stroke-width="2.2"/><line x1="43.9" y1="46.5" x2="20.6" y2="33" stroke-width="2.2"/><line x1="56.1" y1="46.5" x2="79.4" y2="33" stroke-width="2.2"/></g><circle cx="50" cy="50" r="7" fill="#C9A24B"/><circle cx="50" cy="16" r="2.4" fill="#C9A24B"/></svg>
   </div>
   <div class="card" style="padding:24px 22px">
     <div class="label" style="margin-bottom:9px">Welkom</div>
     <h2 style="font-size:20px;margin-bottom:6px">Log in om te leren</h2>
     <p class="muted" style="font-size:13.5px;line-height:1.6;margin-bottom:20px">Je voortgang wordt veilig bewaard en is alleen voor jou zichtbaar.</p>
     <input id="em" type="email" placeholder="E-mailadres" autocomplete="email" style="width:100%;background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:14px;color:var(--text);font-size:15px;margin-bottom:11px;outline:none">
     <input id="pw" type="password" placeholder="Wachtwoord" autocomplete="current-password" style="width:100%;background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:14px;color:var(--text);font-size:15px;margin-bottom:8px;outline:none">
     <div id="autherr" style="color:var(--bad);font-size:13px;min-height:18px;margin-bottom:6px"></div>
     <button class="pbtn" onclick="doAuth('in')">Inloggen</button>
     <button class="pbtn ghost" style="margin-top:10px" onclick="doAuth('up')">Nieuw account aanmaken</button>
   </div>`;
  window.scrollTo(0,0);
}
async function doAuth(mode){
  const em=(document.getElementById('em').value||'').trim();
  const pw=document.getElementById('pw').value||'';
  const err=document.getElementById('autherr'); err.textContent='';
  if(!em||!pw){ err.textContent='Vul je e-mail en wachtwoord in.'; return; }
  if(mode==='up'&&pw.length<6){ err.textContent='Kies een wachtwoord van minstens 6 tekens.'; return; }
  const {error} = mode==='up'
    ? await sb.auth.signUp({email:em,password:pw})
    : await sb.auth.signInWithPassword({email:em,password:pw});
  if(error){ err.textContent = /invalid/i.test(error.message)?'E-mail of wachtwoord klopt niet.':error.message; }
}
async function logout(){ stopAudio(); await sb.auth.signOut(); }

sb.auth.onAuthStateChange((event, session)=>{
  if(session && session.user){
    user=session.user;
    P = cacheLoad();
    reset(home);
    loadProgress();
  } else {
    user=null; loginScreen();
  }
});
</script>

</html>
